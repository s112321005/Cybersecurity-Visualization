                <div class="pingpong-image-card" data-pingpong-step="5"><div class="pingpong-step-summary"><span class="pingpong-step-number">5</span><span class="pingpong-step-title">PUBLIC / RECOVER</span></div><img id="zm-step5-img" src="pictures/zm-5.png" alt="Zhang-Man Step 5"></div>

<div class="main-card" id="stage">
    <div class="mode-badge" id="mode-badge">Mode</div>

    <div class="ent-line" id="line12"></div>
    <div class="ent-line" id="line34"></div>

    <div class="ent-tag" id="etag34">\( |𝜓^-\rangle_{34} \)</div>

    <div class="party party-alice" id="party-alice">
        <img src="pictures/cat_alice.svg" alt="Alice">

        <p class="hint-text" id="hint-text">The action depends on the mode Alice selected in Step 3.</p>

</div>

<script>
    const selectedMode = localStorage.getItem('zhangManMode') || 'detecting';
    let operationChoice = '';
    let aliceBellResult = '';
    let detectingResult = null;
    let detectingPrepared = null;
    let detectingSequence = [];
    let detectingStepIndex = 0;
    let detectingIsRunning = false;
    let detectingHasAutoPlayed = false;
    let detectingStepMode = false;

    const swapResults = [
        { index: 0, sign: '-', bell16: '|𝜙⁺⟩₁₆', bell25: '|𝜙⁺⟩₂₅', latex16: '𝜙^+', latex25: '𝜙^+' },
        { index: 1, sign: '+', bell16: '|𝜙⁻⟩₁₆', bell25: '|𝜙⁻⟩₂₅', latex16: '𝜙^-', latex25: '𝜙^-' },
        { index: 2, sign: '+', bell16: '|𝜓⁺⟩₁₆', bell25: '|𝜓⁺⟩₂₅', latex16: '𝜓^+', latex25: '𝜓^+' },
        { index: 3, sign: '-', bell16: '|𝜓⁻⟩₁₆', bell25: '|𝜓⁻⟩₂₅', latex16: '𝜓^-', latex25: '𝜓^-' }
    ];
    const operationMap = {
        '00': { op: 'I', resultLatex: '𝜓^-', resultText: '|𝜓⁻⟩₁₂', encodedKey: 'psi-minus' },
        '01': { op: 'Z', resultLatex: '𝜓^+', resultText: '|𝜓⁺⟩₁₂', encodedKey: 'psi-plus' },
        '10': { op: 'Y', resultLatex: '𝜙^+', resultText: '|𝜙⁺⟩₁₂', encodedKey: 'phi-plus' },
        '11': { op: 'X', resultLatex: '𝜙^-', resultText: '-|𝜙⁻⟩₁₂', encodedKey: 'phi-minus', phase: '-' }
    };

    const operationSwapTables = {
        '00': {
            encodedLatex: '𝜓^-',
            terms: [
                { sign: '-', bell16: '|𝜙⁺⟩₁₆', bell25: '|𝜙⁺⟩₂₅', latex16: '𝜙^+', latex25: '𝜙^+' },
                { sign: '+', bell16: '|𝜙⁻⟩₁₆', bell25: '|𝜙⁻⟩₂₅', latex16: '𝜙^-', latex25: '𝜙^-' },
                { sign: '+', bell16: '|𝜓⁺⟩₁₆', bell25: '|𝜓⁺⟩₂₅', latex16: '𝜓^+', latex25: '𝜓^+' },
                { sign: '-', bell16: '|𝜓⁻⟩₁₆', bell25: '|𝜓⁻⟩₂₅', latex16: '𝜓^-', latex25: '𝜓^-' }
            ]
        },
        '01': {
            encodedLatex: '𝜓^+',
            terms: [
                { sign: '+', bell16: '|𝜙⁺⟩₁₆', bell25: '|𝜙⁻⟩₂₅', latex16: '𝜙^+', latex25: '𝜙^-' },
                { sign: '-', bell16: '|𝜙⁻⟩₁₆', bell25: '|𝜙⁺⟩₂₅', latex16: '𝜙^-', latex25: '𝜙^+' },
                { sign: '-', bell16: '|𝜓⁺⟩₁₆', bell25: '|𝜓⁻⟩₂₅', latex16: '𝜓^+', latex25: '𝜓^-' },
                { sign: '+', bell16: '|𝜓⁻⟩₁₆', bell25: '|𝜓⁺⟩₂₅', latex16: '𝜓^-', latex25: '𝜓^+' }
            ]
        },
        '10': {
            encodedLatex: '𝜙^+',
            terms: [
                { sign: '-', bell16: '|𝜙⁺⟩₁₆', bell25: '|𝜓⁻⟩₂₅', latex16: '𝜙^+', latex25: '𝜓^-' },
                { sign: '-', bell16: '|𝜙⁻⟩₁₆', bell25: '|𝜓⁺⟩₂₅', latex16: '𝜙^-', latex25: '𝜓^+' },
                { sign: '+', bell16: '|𝜓⁺⟩₁₆', bell25: '|𝜙⁻⟩₂₅', latex16: '𝜓^+', latex25: '𝜙^-' },
                { sign: '+', bell16: '|𝜓⁻⟩₁₆', bell25: '|𝜙⁺⟩₂₅', latex16: '𝜓^-', latex25: '𝜙^+' }
            ]
        },
        '11': {
            encodedLatex: '𝜙^-',
            encodedPhase: '-',
            terms: [
                { sign: '+', bell16: '|𝜙⁺⟩₁₆', bell25: '|𝜓⁺⟩₂₅', latex16: '𝜙^+', latex25: '𝜓^+' },
                { sign: '+', bell16: '|𝜙⁻⟩₁₆', bell25: '|𝜓⁻⟩₂₅', latex16: '𝜙^-', latex25: '𝜓^-' },
                { sign: '-', bell16: '|𝜓⁺⟩₁₆', bell25: '|𝜙⁺⟩₂₅', latex16: '𝜓^+', latex25: '𝜙^+' },
                { sign: '-', bell16: '|𝜓⁻⟩₁₆', bell25: '|𝜙⁻⟩₂₅', latex16: '𝜓^-', latex25: '𝜙^-' }
            ]
        }
    };

    const initialEntanglementPairs = [
        { line: 'line12', tag: 'etag12', a: 'q1', b: 'q2', label: '\\( |𝜓^-\\rangle_{12} \\)', tagOffsetY: 10 },
        { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\\( |𝜓^-\\rangle_{34} \\)', tagOffsetY: 10 },
        { line: 'line56', tag: 'etag56', a: 'q5', b: 'q6', label: '\\( |𝜓^-\\rangle_{56} \\)', tagOffsetY: 10 }
    ];

    let linePairs = [...initialEntanglementPairs];

    function setEntanglementPairs(pairs) {
        linePairs = pairs;
        linePairs.forEach(pair => {
            const tag = document.getElementById(pair.tag);
            if (tag && pair.label) tag.innerHTML = pair.label;
        });
        if (window.MathJax) MathJax.typesetPromise(linePairs.map(pair => document.getElementById(pair.tag))).then(updateEntangleLines);
        else updateEntangleLines();
    }

    function renderSwapFormula(selectedIndex = null) {
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const table = operationSwapTables[operationChoice] || operationSwapTables['00'];

        const encodedPrefix = table.encodedPhase === '-' ? '-' : '';
        const encodedState = encodedPrefix + '|' + table.encodedLatex + '\\rangle_{12}';
        hintTitle.innerText = 'Entanglement Swapping: 1256 → 1625';
        hintText.innerHTML = String.raw`
            <div class="swap-formula">
                <div class="swap-line">\( ${encodedState}|𝜓^-\rangle_{56} \)</div>
                <div class="swap-line swap-inline">
                    <span class="swap-prefix">\( =\frac{1}{2}( \)</span>
                    <span class="swap-terms">
                        ${table.terms.map((term, index) => {
                            const sign = index === 0 ? term.sign : (term.sign === '-' ? '-' : '+');
                            return `<span class="swap-term" id="swap-term-${index}">\\( ${sign}|${term.latex16}\\rangle_{16}|${term.latex25}\\rangle_{25} \\)</span>`;
                        }).join('')}
                    </span>
                    <span class="swap-suffix">\( ) \)</span>
                </div>
                <div class="swap-line">\( ${encodedState}|𝜓^-\rangle_{34}|𝜓^-\rangle_{56}\Rightarrow |Bell\rangle_{16}|𝜓^-\rangle_{34}|Bell\rangle_{25} \)</div>
            </div>`;

        if (window.MathJax) {
            MathJax.typesetClear([hintText]);
            MathJax.typesetPromise([hintText]).then(() => {
                if (selectedIndex !== null) {
                    const term = document.getElementById('swap-term-' + selectedIndex);
                    if (term) term.classList.add('extracted');
                }
            });
        } else if (selectedIndex !== null) {
            const term = document.getElementById('swap-term-' + selectedIndex);
            if (term) term.classList.add('extracted');
        }
    }


    function renderMessageInstruction() {
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const hintBox = document.getElementById('hint-box');
        hintTitle.innerText = 'Select Message Operation';
        hintText.innerText = "Choose a two-bit message. Alice will apply the corresponding operation to q1, then measure q1 and q6.";
    }

    function renderEncodedFormula(operation) {
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const cfg = operationMap[operation];
        if (!cfg) return;

        const encodedPrefix = cfg.phase === '-' ? '-' : '';
        const encodedState = encodedPrefix + '|' + cfg.resultLatex + '\\rangle_{12}';
        hintTitle.innerText = 'Encoding on Target Particle 1';
        hintText.innerHTML = String.raw`
            <div class="encode-formula">
                <div class="swap-line"><b>Target Particle:</b> 1　<b>Operation:</b> ${operation} (${cfg.op})</div>
                <div class="swap-line">\( ${cfg.op}_1|𝜓^-\rangle_{12}=${encodedState} \)</div>
                <div class="swap-line">\( |𝜓_{\text{encoded}}\rangle=${encodedState}\otimes|𝜓^-\rangle_{34} \)</div>
            </div>`;
        if (window.MathJax) MathJax.typesetPromise([hintText]);
    }

    function flyMegaphone(fromId, toId, message = '') {
        const stage = document.getElementById('stage');
        const from = document.getElementById(fromId);
        const to = document.getElementById(toId);
        if (!stage || !from || !to) return;
        const a = centerOf(from, stage);
        const b = centerOf(to, stage);
        const icon = document.createElement('div');
        icon.className = 'megaphone';
        icon.innerHTML = '<span class="megaphone-icon">🚛</span><span class="megaphone-text">' + message + '</span>';
        icon.style.left = (a.x - 18) + 'px';
        icon.style.top = (a.y - 20) + 'px';
        icon.style.setProperty('--dx', (b.x - a.x) + 'px');
        icon.style.setProperty('--dy', (b.y - a.y) + 'px');
        stage.appendChild(icon);
        setTimeout(() => icon.remove(), 1900);
    }

    function centerOf(element, container) {
        const r = element.getBoundingClientRect();
        const c = container.getBoundingClientRect();
        return { x: r.left - c.left + r.width / 2, y: r.top - c.top + r.height / 2 };
    }

    function drawLine(lineId, fromId, toId, tagId, shape = 'straight', tagOffsetY = 10) {
        const area = document.getElementById('stage');
        const from = document.getElementById(fromId);
        const to = document.getElementById(toId);
        const line = document.getElementById(lineId);
        const tag = document.getElementById(tagId);
        const a = centerOf(from, area);
        const b = centerOf(to, area);

        if (shape === 'arc') {
            const left = Math.min(a.x, b.x);
            const right = Math.max(a.x, b.x);
            const width = right - left;
            const arcHeight = 76;
            const top = Math.min(a.y, b.y) - arcHeight + 8;

            line.classList.add('arc');
            line.style.left = left + 'px';
            line.style.top = top + 'px';
            line.style.width = width + 'px';
            line.style.height = arcHeight + 'px';
            line.style.border = '4px dashed var(--alice-color)';
            line.style.borderBottom = 'none';
            line.style.borderTop = '4px dashed var(--alice-color)';
            line.style.borderRadius = Math.max(48, width / 2) + 'px ' + Math.max(48, width / 2) + 'px 0 0';
            line.style.background = 'transparent';
            line.style.transform = 'none';

            tag.style.left = ((a.x + b.x) / 2) + 'px';
            tag.style.top = (top + tagOffsetY) + 'px';
            return;
        }

        line.classList.remove('arc');
        line.style.height = '0';
        line.style.border = '';
        line.style.borderTop = '4px dashed var(--alice-color)';
        line.style.borderRadius = '0';
        line.style.background = 'transparent';

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        line.style.left = a.x + 'px';
        line.style.top = a.y + 'px';
        line.style.width = length + 'px';
        line.style.transform = 'rotate(' + angle + 'deg)';
        tag.style.left = ((a.x + b.x) / 2) + 'px';
        tag.style.top = ((a.y + b.y) / 2 + tagOffsetY) + 'px';
    }

    function updateEntangleLines() {
        linePairs.forEach(pair => {
            const tag = document.getElementById(pair.tag);
            if (tag && pair.label) tag.innerHTML = pair.label;
            drawLine(pair.line, pair.a, pair.b, pair.tag, pair.shape || 'straight', pair.tagOffsetY ?? 10);
        });
        if (window.MathJax) MathJax.typesetPromise(['etag12','etag34','etag56'].map(id => document.getElementById(id)).filter(Boolean));
    }

    function setPairVisibility(lineId, tagId, visible) {
        const line = document.getElementById(lineId);
        const tag = document.getElementById(tagId);
        if (line) {
            line.style.opacity = visible ? '1' : '0';
            line.style.visibility = visible ? 'visible' : 'hidden';
        }
        if (tag) {
            tag.style.opacity = visible ? '1' : '0';
            tag.style.visibility = visible ? 'visible' : 'hidden';
        }
    }

    function resetPairVisibility() {
        setPairVisibility('line12', 'etag12', true);
        setPairVisibility('line34', 'etag34', true);
        setPairVisibility('line56', 'etag56', true);
    }

    document.addEventListener('DOMContentLoaded', () => {
        preloadEyeAssets();
        configureModeUI();
        setEntanglementPairs([...initialEntanglementPairs]);
        resetPairVisibility();
        window.addEventListener('resize', updateEntangleLines);
    });

    function forceInitialEntanglement() {
        setEntanglementPairs([
            { line: 'line12', tag: 'etag12', a: 'q1', b: 'q2', label: '\\( |𝜓^-\\rangle_{12} \\)', tagOffsetY: 10 },
            { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\\( |𝜓^-\\rangle_{34} \\)', tagOffsetY: 10 },
            { line: 'line56', tag: 'etag56', a: 'q5', b: 'q6', label: '\\( |𝜓^-\\rangle_{56} \\)', tagOffsetY: 10 }
        ]);
        resetPairVisibility();
        updateEntangleLines();
        setTimeout(updateEntangleLines, 0);
        setTimeout(updateEntangleLines, 80);
    }

    function forceInitialDetectingEntanglement() {
        forceInitialEntanglement();
    }

    function configureModeUI() {
        const badge = document.getElementById('mode-badge');
        const header = document.getElementById('header-subtitle');
        const panel = document.getElementById('center-panel');
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const hintBox = document.getElementById('hint-box');

        const step4Img = document.getElementById('zm-step4-img');
        const stage = document.getElementById('stage');
        if (stage) stage.classList.toggle('message-layout', selectedMode !== 'detecting');

        panel.classList.remove('message-panel');
        panel.classList.remove('detecting-panel');
        setEntanglementPairs([...initialEntanglementPairs]);
        resetPairVisibility();
        document.getElementById('q1').classList.remove('encode-target');
        if (hintBox) hintBox.classList.remove('expanded');
        document.getElementById('alice-result').innerText = '';
        document.getElementById('bob-result').innerText = '';
        document.getElementById('charlie-result').innerText = '';
        const announceBox = document.getElementById('announcement');
        if (announceBox) { announceBox.classList.remove('show'); announceBox.innerHTML = ''; }
        setTimeout(updateEntangleLines, 0);
        setTimeout(updateEntangleLines, 80);

        if (selectedMode === 'detecting') {
            if (stage) stage.classList.remove('message-layout');
            forceInitialDetectingEntanglement();
            if (step4Img) step4Img.src = 'pictures/zm-4-d.png';
            badge.innerText = 'Detecting Mode';
            badge.classList.add('corner');
            badge.style.borderColor = 'var(--detect)';
            badge.style.color = 'var(--detect)';
            header.innerText = 'STEP 4 : MEASURE';
            hintTitle.innerText = 'Detecting Measurement';
            hintText.innerHTML = `Alice chooses Z/X basis and measures ${qChip('q1')},${qChip('q6')}. Bob measures ${qChip('q2')} and Charlie measures ${qChip('q5')} with the same basis.`;

            panel.classList.add('detecting-panel');
            panel.innerHTML = `
                <div class="detecting-controls">
                    <button class="action-btn primary" id="start-detect-btn" onclick="startDetectingAuto()">Start Measurement</button>
                    <button class="action-btn" id="replay-btn" onclick="startDetectingAuto()" style="display:none">Replay</button>
                    <button class="action-btn" id="step-btn" onclick="startDetectingStepMode()" style="display:none">Step-by-step</button>
                    <button class="action-btn primary" id="next-step-btn" onclick="playNextDetectingStep()" style="display:none">Next Step</button>
                </div>
            `;
            if (!detectingHasAutoPlayed) {
                setDetectingControls('initial');
            } else {
                setDetectingControls('after-auto');
            }
            forceInitialDetectingEntanglement();
        } else {
            forceInitialEntanglement();
            if (step4Img) step4Img.src = 'pictures/zm-4-m.png';
            badge.innerText = 'Message Mode';
            badge.classList.remove('corner');
            badge.style.borderColor = 'var(--message)';
            badge.style.color = 'var(--message)';
            header.innerText = 'STEP 4 : ENCODE + ANNOUNCE';
            panel.classList.add('message-panel');
            document.getElementById('q1').classList.add('encode-target');
            renderMessageInstruction();

            panel.innerHTML = String.raw`
                <div class="operation-grid">
                    <button class="op-btn" onclick="selectOperation('00', this)"><span class="op-main">00</span><span class="op-sub">\( I=\begin{bmatrix}1 & 0\\ 0 & 1\end{bmatrix}_{2\times2} \)</span></button>
                    <button class="op-btn" onclick="selectOperation('01', this)"><span class="op-main">01</span><span class="op-sub">\( Z=\begin{bmatrix}1 & 0\\ 0 & -1\end{bmatrix}_{2\times2} \)</span></button>
                    <button class="op-btn" onclick="selectOperation('10', this)"><span class="op-main">10</span><span class="op-sub">\( Y=\begin{bmatrix}0 & 1\\ -1 & 0\end{bmatrix}_{2\times2} \)</span></button>
                    <button class="op-btn" onclick="selectOperation('11', this)"><span class="op-main">11</span><span class="op-sub">\( X=\begin{bmatrix}0 & 1\\ 1 & 0\end{bmatrix}_{2\times2} \)</span></button>
                </div>
                <button class="action-btn primary" id="measure16-btn" onclick="runMessageMeasurement()" disabled style="display:none">Measure q1,q6<br>and Announce</button>
            `;
            if (window.MathJax) MathJax.typesetPromise([panel]).then(forceInitialEntanglement);
            else forceInitialEntanglement();
        }
    }

    function randomBit() {
        return Math.random() < 0.5 ? '0' : '1';
    }

    function markMeasured(ids) {
        ids.forEach(id => document.getElementById(id).classList.add('measured'));
    }

    function randomBasis() {
        return Math.random() < 0.5 ? 'Z' : 'X';
    }

    function oppositeResult(value, basis) {
        if (basis === 'Z') return value === '|0⟩' ? '|1⟩' : '|0⟩';
        return value === '|+⟩' ? '|−⟩' : '|+⟩';
    }

    function randomBasisResult(basis) {
        if (basis === 'Z') return Math.random() < 0.5 ? '|0⟩' : '|1⟩';
        return Math.random() < 0.5 ? '|+⟩' : '|−⟩';
    }


    function wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }


    function setDetectingControls(mode = 'idle') {
        const startBtn = document.getElementById('start-detect-btn');
        const replayBtn = document.getElementById('replay-btn');
        const stepBtn = document.getElementById('step-btn');
        const nextBtn = document.getElementById('next-step-btn');
        if (!startBtn || !replayBtn || !stepBtn || !nextBtn) return;
        if (mode === 'initial') {
            startBtn.style.display = 'inline-block';
            replayBtn.style.display = 'none';
            stepBtn.style.display = 'none';
            nextBtn.style.display = 'none';
            nextBtn.disabled = false;
        } else if (mode === 'running') {
            startBtn.style.display = 'none';
            replayBtn.style.display = 'none';
            stepBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        } else if (mode === 'after-auto') {
            startBtn.style.display = 'none';
            replayBtn.style.display = 'inline-block';
            stepBtn.style.display = 'inline-block';
            nextBtn.style.display = 'none';
            nextBtn.disabled = false;
        } else if (mode === 'step') {
            startBtn.style.display = 'none';
            replayBtn.style.display = 'inline-block';
            stepBtn.style.display = 'none';
            nextBtn.style.display = 'inline-block';
            nextBtn.disabled = false;
        }
    }

    function getEyeAsset(party, basis) {
        const low = basis.toLowerCase();
        if (party === 'alice') return 'pictures/a_eye' + low + '.svg';
        if (party === 'charlie') return 'pictures/c_eye' + low + '.svg';
        return 'pictures/b_eye' + low + '.svg';
    }

    async function showMeasureEye(party, basis) {
        const stage = document.getElementById('stage');
        const anchor = document.getElementById('party-' + party);
        if (!stage || !anchor) return;
        const c = centerOf(anchor, stage);
        const src = getEyeAsset(party, basis);
        const eye = document.createElement('div');
        eye.className = 'measure-eye ' + party + '-eye';
        eye.innerHTML = '<img src="' + src + '" alt="' + party + ' ' + basis + ' basis" onerror="this.replaceWith(document.createTextNode(\'👁 ' + basis + '\'))">';
        eye.style.left = c.x + 'px';
        eye.style.top = (c.y - 70) + 'px';
        stage.appendChild(eye);
        requestAnimationFrame(() => eye.classList.add('show'));
        await wait(1250);
        eye.remove();
    }

    function preloadEyeAssets() {
        ['pictures/a_eyex.svg','pictures/a_eyez.svg','pictures/b_eyex.svg','pictures/b_eyez.svg','pictures/c_eyex.svg','pictures/c_eyez.svg'].forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    function clearDetectingResults() {
        ['alice-result','bob-result','charlie-result'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '';
        });
        ['q1','q2','q5','q6'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('measured', 'measuring');
        });
        resetPairVisibility();
        const announce = document.getElementById('announcement');
        if (announce) { announce.classList.remove('show'); announce.innerText = ''; }
    }

    function appendResult(targetId, role, textValue) {
        const host = document.getElementById(targetId);
        if (!host) return;
        const row = document.createElement('div');
        row.className = 'result-item';
        row.innerHTML = '<span class="result-dot ' + role + '"></span><span>' + textValue + '</span>';
        host.appendChild(row);
    }

    async function animateMeasurement(qubitId, targetId, role, textValue, party, basis) {
        const q = document.getElementById(qubitId);
        if (!q) return;
        q.classList.add('measuring');
        const eyePromise = showMeasureEye(party, basis);
        await wait(650);
        q.classList.remove('measuring');
        q.classList.add('measured');
        appendResult(targetId, role, textValue);
        await eyePromise;
        await wait(220);
    }



    function renderPsiFormula(pairLabel, firstValue = null, secondValue = null) {
        const basis = detectingPrepared ? detectingPrepared.basis : 'Z';
        const terms = basis === 'Z'
            ? [
                { a: '|0⟩', b: '|1⟩', latex: '|0\\rangle|1\\rangle' },
                { a: '|1⟩', b: '|0⟩', latex: '|1\\rangle|0\\rangle' }
            ]
            : [
                { a: '|+⟩', b: '|−⟩', latex: '|+\\rangle|-\\rangle' },
                { a: '|−⟩', b: '|+⟩', latex: '|-\\rangle|+\\rangle' }
            ];

        const selectedIndex = firstValue && secondValue
            ? terms.findIndex(t => t.a === firstValue && t.b === secondValue)
            : -1;

        const firstTerm = selectedIndex === 0
            ? `<span class="formula-hit">\\( ${terms[0].latex} \\)</span>`
            : `\\( ${terms[0].latex} \\)`;
        const secondTerm = selectedIndex === 1
            ? `<span class="formula-hit">\\( ${terms[1].latex} \\)</span>`
            : `\\( ${terms[1].latex} \\)`;

        return String.raw`
            <div class="detecting-bottom-formula">
                \( |𝜓^-\rangle_{${pairLabel}}=\frac{1}{\sqrt{2}}( \)
                ${firstTerm}
                \( - \)
                ${secondTerm}
                \( ) \)
            </div>`;
    }

    function qChip(id) {
        const owner = (id === 'q2') ? ' owner-bob' : (id === 'q5' ? ' owner-charlie' : '');
        return `<span class="hint-q-chip${owner}">${id}</span>`;
    }

    function renderDetectingHint(stage, d = detectingPrepared) {
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const hintBox = document.getElementById('hint-box');
        if (!hintTitle || !hintText || !d) return;
        if (hintBox) hintBox.classList.add('expanded');

        let title = 'Detecting Measurement';
        let html = '';

        if (stage === 'initial') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Alice chooses <b>${d.basis}</b> basis and will measure ${qChip('q1')} and ${qChip('q6')}. Bob measures ${qChip('q2')} and Charlie measures ${qChip('q5')} with the same basis.</div>
                    ${renderPsiFormula('12')}
                </div>`;
        } else if (stage === 'q1') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Alice measures ${qChip('q1')} using <b>${d.basis}</b> basis and gets <span class="detecting-highlight">${d.aliceQ1}</span>.</div>
                    ${renderPsiFormula('12', d.aliceQ1, d.bobQ2)}
                </div>`;
        } else if (stage === 'announce-bob') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Alice sends the <b>${d.basis}</b> basis to Bob so he can measure ${qChip('q2')} with the same basis.</div>
                    ${renderPsiFormula('12', d.aliceQ1, d.bobQ2)}
                </div>`;
        } else if (stage === 'q2') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Bob measures ${qChip('q2')} using <b>${d.basis}</b> basis and gets <span class="detecting-highlight">${d.bobQ2}</span>.</div>
                    ${renderPsiFormula('12', d.aliceQ1, d.bobQ2)}
                </div>`;
        } else if (stage === 'report-bob') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Bob reports his result to Alice. ${qChip('q1')} and ${qChip('q2')} should be opposite in \( |𝜓^-\rangle_{12} \).</div>
                    ${renderPsiFormula('12', d.aliceQ1, d.bobQ2)}
                </div>`;
        } else if (stage === 'q6') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Alice measures ${qChip('q6')} using <b>${d.basis}</b> basis and gets <span class="detecting-highlight">${d.aliceQ6}</span>.</div>
                    ${renderPsiFormula('56', d.charlieQ5, d.aliceQ6)}
                </div>`;
        } else if (stage === 'announce-charlie') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Alice sends the <b>${d.basis}</b> basis to Charlie so he can measure ${qChip('q5')}.</div>
                    ${renderPsiFormula('56', d.charlieQ5, d.aliceQ6)}
                </div>`;
        } else if (stage === 'q5') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Charlie measures ${qChip('q5')} using <b>${d.basis}</b> basis and gets <span class="detecting-highlight">${d.charlieQ5}</span>.</div>
                    ${renderPsiFormula('56', d.charlieQ5, d.aliceQ6)}
                </div>`;
        } else if (stage === 'report-charlie') {
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">Charlie reports his result to Alice. ${qChip('q5')} and ${qChip('q6')} should be opposite in \( |𝜓^-\rangle_{56} \).</div>
                    ${renderPsiFormula('56', d.charlieQ5, d.aliceQ6)}
                </div>`;
        } else if (stage === 'done') {
            title = 'Security Check Result';
            html = String.raw`
                <div class="detecting-hint">
                    <div class="detecting-note">${d.check}</div>
                    ${renderPsiFormula('12', d.aliceQ1, d.bobQ2)}
                    ${renderPsiFormula('56', d.charlieQ5, d.aliceQ6)}
                </div>`;
        }

        hintTitle.innerText = title;
        hintText.innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise([hintText]);
    }

    function prepareDetectingRun() {
        forceInitialDetectingEntanglement();
        clearDetectingResults();
        forceInitialDetectingEntanglement();
        const basis = randomBasis();
        const aliceQ1 = randomBasisResult(basis);
        const bobQ2 = oppositeResult(aliceQ1, basis);
        const aliceQ6 = randomBasisResult(basis);
        const charlieQ5 = oppositeResult(aliceQ6, basis);

        detectingPrepared = {
            basis,
            aliceQ1,
            bobQ2,
            aliceQ6,
            charlieQ5,
            check: 'Opposite outcomes mean no eavesdropping is detected in this run.'
        };
        detectingResult = detectingPrepared;
        detectingStepIndex = 0;
        renderDetectingHint('initial', detectingPrepared);
        document.getElementById('next-btn').disabled = true;
        return detectingPrepared;
    }

    function buildDetectingSequence() {
        const d = detectingPrepared;
        if (!d) return [];
        return [
            async () => {
                await animateMeasurement('q1', 'alice-result', 'alice', 'q1 = ' + d.aliceQ1 + ' (' + d.basis + ' basis)', 'alice', d.basis);
                setPairVisibility('line12', 'etag12', false);
                renderDetectingHint('q1', d);
            },
            async () => {
                const announce = document.getElementById('announcement');
                if (announce) {
                    announce.classList.add('show');
                    announce.innerText = 'Alice announces basis: ' + d.basis;
                }
                renderDetectingHint('announce-bob', d);
                flyMegaphone('party-alice', 'party-bob', 'Basis ' + d.basis);
                await wait(1950);
            },
            async () => {
                await animateMeasurement('q2', 'bob-result', 'bob', 'q2 = ' + d.bobQ2, 'bob', d.basis);
                renderDetectingHint('q2', d);
            },
            async () => {
                renderDetectingHint('report-bob', d);
                flyMegaphone('party-bob', 'party-alice', 'q2 = ' + d.bobQ2);
                await wait(1950);
            },
            async () => {
                await animateMeasurement('q6', 'alice-result', 'alice', 'q6 = ' + d.aliceQ6 + ' (' + d.basis + ' basis)', 'alice', d.basis);
                setPairVisibility('line56', 'etag56', false);
                renderDetectingHint('q6', d);
            },
            async () => {
                renderDetectingHint('announce-charlie', d);
                flyMegaphone('party-alice', 'party-charlie', 'Basis ' + d.basis);
                await wait(1950);
            },
            async () => {
                await animateMeasurement('q5', 'charlie-result', 'charlie', 'q5 = ' + d.charlieQ5, 'charlie', d.basis);
                renderDetectingHint('q5', d);
            },
            async () => {
                renderDetectingHint('report-charlie', d);
                flyMegaphone('party-charlie', 'party-alice', 'q5 = ' + d.charlieQ5);
                await wait(1950);
            }
        ];
    }

    function finishDetectingRun(afterMode = 'after-auto') {
        renderDetectingHint('done', detectingPrepared);
        localStorage.setItem('zhangManDetectingResults', JSON.stringify(detectingPrepared || {}));
        document.getElementById('next-btn').disabled = false;
        setDetectingControls(afterMode);
        detectingIsRunning = false;
    }

    async function startDetectingAuto() {
        if (detectingIsRunning) return;
        detectingHasAutoPlayed = true;
        detectingStepMode = false;
        setDetectingControls('running');
        prepareDetectingRun();
        detectingSequence = buildDetectingSequence();
        detectingIsRunning = true;
        for (const step of detectingSequence) {
            await step();
        }
        finishDetectingRun('after-auto');
    }

    function startDetectingStepMode() {
        if (detectingIsRunning) return;
        detectingHasAutoPlayed = true;
        detectingStepMode = true;
        prepareDetectingRun();
        detectingSequence = buildDetectingSequence();
        setDetectingControls('step');
    }

    async function playNextDetectingStep() {
        if (detectingIsRunning || !detectingStepMode) return;
        if (detectingStepIndex >= detectingSequence.length) {
            finishDetectingRun('step');
            return;
        }
        detectingIsRunning = true;
        await detectingSequence[detectingStepIndex]();
        detectingStepIndex += 1;
        detectingIsRunning = false;
        if (detectingStepIndex >= detectingSequence.length) {
            finishDetectingRun('step');
        }
    }

    async function runDetectingMeasurement() {
        await startDetectingAuto();
    }

    function selectOperation(operation, button) {
        const measureBtn = document.getElementById('measure16-btn');
        if (!measureBtn) return;
        if (measureBtn.dataset.completed === 'true' || operationChoice) return;

        operationChoice = operation;
        document.querySelectorAll('.op-btn').forEach(btn => btn.classList.remove('selected'));
        button.classList.add('selected');
        document.querySelectorAll('.op-btn').forEach(btn => btn.disabled = true);

        measureBtn.style.display = 'block';
        measureBtn.disabled = false;

        renderEncodedFormula(operation);
        document.getElementById('q1').classList.add('encode-target');
        localStorage.setItem('zhangManOperation', operation);
    }

    function runMessageMeasurement() {
        if (!operationChoice) return;
        const measureBtn = document.getElementById('measure16-btn');
        if (measureBtn && measureBtn.dataset.completed === 'true') return;
        if (measureBtn) {
            measureBtn.dataset.completed = 'true';
            measureBtn.disabled = true;
        }
        document.querySelectorAll('.op-btn').forEach(btn => btn.disabled = true);
        document.getElementById('q1').classList.remove('encode-target');

        const currentSwapTable = operationSwapTables[operationChoice] || operationSwapTables['00'];
        const selectedIndex = Math.floor(Math.random() * currentSwapTable.terms.length);
        const selectedSwap = { ...currentSwapTable.terms[selectedIndex], index: selectedIndex };
        aliceBellResult = selectedSwap.bell16;

        markMeasured(['q1','q6']);
        setEntanglementPairs([
            { line: 'line12', tag: 'etag12', a: 'q1', b: 'q6', label: '\\( |' + selectedSwap.latex16 + '\\rangle_{16} \\)', shape: 'straight', tagOffsetY: 50 },
            { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\\( |𝜓^-\\rangle_{34} \\)', shape: 'straight', tagOffsetY: 4 },
            { line: 'line56', tag: 'etag56', a: 'q2', b: 'q5', label: '\\( |' + selectedSwap.latex25 + '\\rangle_{25} \\)', shape: 'arc', tagOffsetY: 4 }
        ]);

        document.getElementById('alice-result').innerText = '';
        document.getElementById('bob-result').innerText = '';
        document.getElementById('charlie-result').innerText = '';

        renderSwapFormula(selectedSwap.index);
        const hintBox = document.getElementById('hint-box');
        if (hintBox) hintBox.classList.add('expanded');

        const announce = document.getElementById('announcement');
        announce.classList.add('show');
        announce.innerHTML = 'Alice announces: <b>' + selectedSwap.bell16 + '</b>';

        setTimeout(() => {
            const picked = document.getElementById('swap-term-' + selectedSwap.index);
            if (picked) picked.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            flyMegaphone('party-alice', 'party-bob', selectedSwap.bell16);
            flyMegaphone('party-alice', 'party-charlie', selectedSwap.bell16);
        }, 450);

        localStorage.setItem('zhangManAliceBell16', selectedSwap.bell16);
        localStorage.setItem('zhangManBobCharlieBell25', selectedSwap.bell25);
        localStorage.setItem('zhangManSwapResult', JSON.stringify(selectedSwap));
        document.getElementById('next-btn').disabled = false;
    }

    function prevStep() { window.location.href = 'ZMstep2.html'; }
    function nextStep() { window.location.href = 'ZMstep4.html'; }
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.pingpong-image-dock');
    const windowBox = document.querySelector('.pingpong-image-window');
    const list = document.querySelector('.pingpong-image-list');
    let currentCard = document.querySelector('.pingpong-image-card.is-current');

    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    window.lockPingpongImageToCurrentStep = function () {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        const offset = isHorizontal
            ? (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2)
            : Math.max(0, (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2));
        list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
    };

    window.showPingpongImageStep = function (stepKey) {
        const nextCard = document.querySelector('.pingpong-image-card[data-pingpong-step="' + stepKey + '"]');
        if (!nextCard) return;
        document.querySelectorAll('.pingpong-image-card').forEach(card => {
            card.classList.remove('is-current');
            card.removeAttribute('aria-current');
        });
        nextCard.classList.add('is-current');
        nextCard.setAttribute('aria-current', 'step');
        currentCard = nextCard;
        requestAnimationFrame(window.lockPingpongImageToCurrentStep);
    };

    window.showPingpongImageStep(dock?.dataset.currentStep || '4');
    window.addEventListener('resize', window.lockPingpongImageToCurrentStep);
});
</script>
