<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>Learning | QSS: Zhang Li Man</title>
    <style>
        :root {
            --primary-blue: #549FD0;
            --alice-color: #004aad;
            --dark-text: #333333;
            --bg-color: #f8f9fa;
            --bg-gradient: linear-gradient(135deg, #E0F2FE 0%, #F5F3FF 50%, #ECFDF5 100%);
            --active-blue: #e3f2fd;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 74, 173, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0); }
        }

        @keyframes float-anim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes gentle-glow {
            0% { box-shadow: 0 0 5px rgba(0, 74, 173, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 15px rgba(0, 74, 173, 0.6); transform: scale(1.05); }
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; background: var(--bg-gradient); margin: 0;
            animation: fadeIn 0.8s ease-out;
            overflow-x: hidden;
        }

        .header {
            width: min(1000px, 95vw); 
            display: flex;
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 25px;
            height: 60px; 
        }

        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        .btn-back {
            width: 40px; 
            height: 40px; 
            background-color: var(--primary-blue);
            color: white; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-decoration: none; 
            font-size: 1.1rem;
            transition: transform 0.2s;
            cursor: pointer; 
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .btn-back:hover { 
            transform: scale(1.1); 
        }

        .title-pill {
            border: 2px solid var(--primary-blue); 
            height: 48px;           
            padding: 0 25px;        
            border-radius: 30px; 
            font-weight: bold; 
            background: white;
            display: flex;
            align-items: center;    
            justify-content: center;
            box-sizing: border-box;
            white-space: nowrap;
            font-size: 1.1rem;
        }

        .step-text { font-weight: bold; font-size: 1.1rem; margin: 0; color: var(--dark-text); }

        .nav-btn {
            border: 2px solid var(--primary-blue); 
            background: white;
            padding: 0 30px; 
            border-radius: 30px; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.3s;
            opacity: 0.3; 
            pointer-events: none;
            height: 48px;           
            display: flex;
            align-items: center;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .nav-btn.ready {
            opacity: 1; pointer-events: auto;
            background: var(--primary-blue); color: white;
            box-shadow: 0 4px 15px rgba(0, 74, 173, 0.3);
        }
        .main-card {
            width: min(1000px, 95vw); 
            height: 560px; 
            border: 3px solid var(--primary-blue); border-radius: 35px;
            position: relative; background: white; display: flex;
            flex-direction: column; justify-content: flex-start; align-items: center;
            overflow: hidden; padding-top: 25px; box-sizing: border-box;
        }

        .character-bob { 
            margin-bottom: 5px;
            animation: float-anim 3.5s ease-in-out infinite;
        }
        
        .bob-interactive {
            display: flex; flex-direction: column; align-items: center; z-index: 5;
            width: 100%;
        }
        
        .prompt-text {
            margin: 0 0 20px 0; 
            font-weight: bold; 
            color: var(--primary-blue); 
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .selector-area { display: flex; align-items: flex-start; gap: 60px; }

        .basis-column { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .basis-title { font-weight: bold; color: var(--primary-blue); font-size: 1.2rem; margin-bottom: 5px; }

        .options-row { display: flex; gap: 20px; }

        .state-btn {
            cursor: pointer; padding: 12px; border: 2px solid #eee;
            border-radius: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            width: 95px; background: white; position: relative;
            animation: pulse-anim 2s infinite; 
        }

        .state-btn:hover { 
            transform: translateY(-5px); 
            border-color: #bbdefb; 
            background: #fafcff;
        }

        .state-btn.active {
            border-color: var(--primary-blue);
            background: var(--active-blue);
            transform: scale(1.08); 
            animation: none; 
            box-shadow: 0 0 15px rgba(0, 74, 173, 0.4); 
        }

        .braket { font-size: 1.5rem; font-weight: bold; color: var(--primary-blue); margin-bottom: 2px; }
        .bit-label { font-size: 0.85rem; color: #666; font-weight: bold; }

        .explanation-area {
            display: flex; justify-content: center; align-items: center;
            margin-top: 20px; padding: 10px;
        }
        .explanation-text {
            color: #888; font-weight: bold; font-size: 1rem; margin: 0; text-align: center;
        }

        .logic-footer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background-color: #f8fbff;
            border-top: 2px dashed #d0e3ff;
            padding: 18px 0;
            display: flex; justify-content: center; align-items: center;
        }

        .logic-container {
            display: flex; align-items: center; gap: 12px;
            font-weight: bold; font-size: 1.05rem;
        }

        .logic-label {
            color: #888; font-size: 0.9rem; margin-right: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        .logic-pill {
            background: white; border: 2px solid #b3d4ff; padding: 6px 16px;
            border-radius: 20px; color: var(--primary-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .logic-operator { color: #aaa; font-weight: bold; font-size: 1.4rem; }

        .logic-pill.result {
            background: var(--primary-blue); color: white; border-color: var(--primary-blue);
            animation: gentle-glow 1.5s infinite alternate; 
        }
    

/* ===== ZLM right-side fixed current-step window ===== */
.zlm-image-dock {
    position: fixed;
    right: 16px;
    top: 0;
    width: 430px;
    height: 100vh;
    z-index: 900;
    pointer-events: none;
    display: flex;
    justify-content: center;
    overflow: visible;
    isolation: isolate;
    font-family:'Arial Rounded MT Bold','Arial Rounded MT','Arial',sans-serif;
}
.zlm-image-viewport {
    position: relative;
    width: 330px;
    height: 100vh;
    background: #ffffff;
    box-sizing: border-box;
    box-shadow: 0 12px 26px rgba(0,0,0,.12);
    overflow: visible;
    z-index: 1;
}
.zlm-image-viewport::before,
.zlm-image-viewport::after {
    content: "";
    position: absolute;
    top: 0;
    width: 14px;
    height: 100vh;
    background: #d9d9d9;
    z-index: 1;
    pointer-events: none;
}
.zlm-image-viewport::before { left: 0; }
.zlm-image-viewport::after { right: 0; }
.zlm-image-window {
    position: relative;
    width: 500px;
    height: 100vh;
    margin-left: -85px;
    overflow: hidden;
    z-index: 10;
}
.zlm-image-list {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 52px 0 42px;
    box-sizing: border-box;
    width: 500px;
    transform: translateY(0);
    transition: transform .55s cubic-bezier(.22,.8,.22,1);
    z-index: 20;
}
.zlm-image-card {
    position: relative;
    width: 350px;
    min-height: 52px;
    padding: 0 18px;
    box-sizing: border-box;
    background: #ffffff;
    border: 6px solid var(--primary-blue);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    transition: width .55s cubic-bezier(.22,.8,.22,1), min-height .55s cubic-bezier(.22,.8,.22,1), padding .55s cubic-bezier(.22,.8,.22,1), border-width .55s cubic-bezier(.22,.8,.22,1), border-radius .55s cubic-bezier(.22,.8,.22,1), box-shadow .55s cubic-bezier(.22,.8,.22,1), filter .35s ease, opacity .35s ease, transform .55s cubic-bezier(.22,.8,.22,1);
    z-index: 20;
    overflow: hidden;
}
.zlm-image-card:not(.is-current) { filter: none; opacity: 1; transform: scale(1); }
.zlm-image-card.is-current {
    width: 365px;
    min-height: 365px;
    padding: 14px;
    border: 7px solid var(--primary-blue);
    border-radius: 20px;
    box-shadow: 0 12px 28px rgba(84,159,208,.28);
    filter: none;
    opacity: 1;
    transform: scale(1);
    margin: 6px 0;
    z-index: 100;
}
.zlm-step-summary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    height: 100%;
    color: #111;
    font-weight: 900;
    font-size: 1rem;
    letter-spacing: .02em;
    white-space: nowrap;
    transition: opacity .22s ease, transform .22s ease;
}
.zlm-step-number {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--primary-blue);
    color: #ffffff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: .86rem;
    line-height: 1;
    flex: 0 0 auto;
}
.zlm-step-title { display: inline-block; line-height: 1; }
.zlm-image-card img {
    position: relative;
    z-index: 101;
    width: 100%;
    height: 100%;
    max-width: 0;
    max-height: 0;
    object-fit: contain;
    display: block;
    opacity: 0;
    transform: scale(.92);
    transition: opacity .28s ease .2s, transform .45s cubic-bezier(.22,.8,.22,1) .12s, max-width .55s cubic-bezier(.22,.8,.22,1), max-height .55s cubic-bezier(.22,.8,.22,1);
}
.zlm-image-card.is-current .zlm-step-summary {
    opacity: 0;
    transform: translateY(-8px);
    position: absolute;
    pointer-events: none;
}
.zlm-image-card.is-current img { max-width: 318px; max-height: 320px; opacity: 1; transform: scale(1); }
@media (min-width: 1180px) { body { padding-right: 450px !important; } }
@media (max-width: 1179px) {
    .zlm-image-dock { position: relative; right: auto; top: auto; width: min(94vw, 840px); height: 320px; margin: 18px auto 10px; overflow: visible; }
    .zlm-image-viewport { width: 100%; height: 320px; }
    .zlm-image-viewport::before, .zlm-image-viewport::after { width: 10px; height: 320px; }
    .zlm-image-window { width: 100%; height: 320px; margin-left: 0; overflow: hidden; }
    .zlm-image-list { flex-direction: row; align-items: center; gap: 14px; width: max-content; height: 320px; padding: 0 24px; }
    .zlm-image-card { width: 270px; min-height: 52px; }
    .zlm-image-card.is-current { width: 305px; min-height: 250px; margin: 0 10px; z-index: 100; }
    .zlm-image-card.is-current img { max-width: 275px; max-height: 220px; }
}
</style>
</head>
<body>
<aside class="zlm-image-dock" aria-label="ZLM current-step image preview">
    <div class="zlm-image-viewport">
        <div class="zlm-image-window">
            <div class="zlm-image-list">
                <div class="zlm-image-card is-current" data-zlm-step="1" aria-current="step"><div class="zlm-step-summary"><span class="zlm-step-number">1</span><span class="zlm-step-title">PREPARE</span></div><img src="pictures/zlm-1.png" alt="ZLM Step 1" onerror="this.onerror=null;this.src='pictures/zlm-1.png';"></div>
                <div class="zlm-image-card" data-zlm-step="2"><div class="zlm-step-summary"><span class="zlm-step-number">2</span><span class="zlm-step-title">ENCRYPT</span></div><img src="pictures/zlm-2.png" alt="ZLM Step 2" onerror="this.onerror=null;this.src='pictures/zlm-2.png';"></div>
                <div class="zlm-image-card" data-zlm-step="3"><div class="zlm-step-summary"><span class="zlm-step-number">3</span><span class="zlm-step-title">ENCODE</span></div><img src="pictures/zlm-3.png" alt="ZLM Step 3" onerror="this.onerror=null;this.src='pictures/zlm-3.png';"></div>
                <div class="zlm-image-card" data-zlm-step="4"><div class="zlm-step-summary"><span class="zlm-step-number">4</span><span class="zlm-step-title">COLLABORATE</span></div><img src="pictures/zlm-4.png" alt="ZLM Step 4" onerror="this.onerror=null;this.src='pictures/zlm-4.png';"></div>
            </div>
        </div>
    </div>
</aside>


<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html?section=qss#quantum-security-applications" class="btn-back" title="back home">&#x25C0;&#xFE0E;</a>
        <div class="title-pill">QSS : ZhangLiMan Protocol</div>
    </div>
    <div class="header-center"><p class="step-text">STEP 1 : PREPARE</p></div>
    <div class="header-right">
        <button id="next-btn" class="nav-btn" onclick="nextStep()" disabled>Next</button>
    </div>
</div>

<div class="main-card">
    <div class="bob-interactive">
        <div class="character-bob">
            <img src="pictures/cat_bob.svg" alt="Bob" width="120"> 
        </div>

        <p class="prompt-text">Choose a state!</p>
        
        <div class="selector-area">
            <div class="basis-column">
                <div class="basis-title">Z Basis</div>
                        <div class="options-row">
                    <div class="state-btn" onclick="selectState('Z', '0', this)">
                        <span class="braket">|0⟩</span>
                        <span class="bit-label">Bit 0</span>
                    </div>
                    <div class="state-btn" onclick="selectState('Z', '1', this)">
                        <span class="braket">|1⟩</span>
                        <span class="bit-label">Bit 1</span>
                    </div>
                </div>
            </div>

            <div style="width: 2px; height: 160px; background: #eee; align-self: center;"></div>

            <div class="basis-column">
                <div class="basis-title">X Basis</div>
                <div class="options-row">
                    <div class="state-btn" onclick="selectState('X', '0', this)">
                        <span class="braket">|+⟩</span>
                        <span class="bit-label">Bit 0</span>
                    </div>
                    <div class="state-btn" onclick="selectState('X', '1', this)">
                        <span class="braket">|-⟩</span>
                        <span class="bit-label">Bit 1</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="explanation-area">
            <p class="explanation-text">Click a state to confirm selection</p>
        </div>
    </div>

    <div class="logic-footer">
        <div class="logic-container">
            <span class="logic-label">Encoding Logic</span>
            <span class="logic-pill">Preparation Basis</span>
            <span class="logic-operator">+</span>
            <span class="logic-pill">Bit Value</span>
            <span class="logic-operator">=</span>
            <span class="logic-pill result">Quantum State</span>
        </div>
    </div>
</div>

<script>
    let selectedBasis = null;
    let selectedMsg = null;

    function selectState(basis, bit, el) {
        document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');

        document.querySelector('.prompt-text').textContent = "State Selected!";
        document.querySelector('.prompt-text').style.color = "#28a745"; 
        
        selectedBasis = basis;
        selectedMsg = bit;

        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = false;
        nextBtn.classList.add('ready');
    }

    function prevStep() {
        window.history.back();
    }

    function nextStep() {
        if (!selectedBasis) return;
        localStorage.removeItem('qssStepData'); 
        localStorage.removeItem('qssStep3Data'); 
        localStorage.setItem('bobOriginalChoice', JSON.stringify({ basis: selectedBasis, msg: selectedMsg }));
        window.location.href = `ZLMstep2.html?bobBasis=${selectedBasis}&bobMsg=${selectedMsg}`;
    }
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.zlm-image-dock');
    const windowBox = document.querySelector('.zlm-image-window');
    const list = document.querySelector('.zlm-image-list');
    const currentCard = document.querySelector('.zlm-image-card.is-current');

    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    function lockToCurrentStep() {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        if (isHorizontal) {
            const offset = (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2);
            list.style.transform = 'translateX(' + offset + 'px)';
        } else {
            const offset = (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2);
            list.style.transform = 'translateY(' + offset + 'px)';
        }
    }

    lockToCurrentStep();
    window.addEventListener('resize', lockToCurrentStep);
});
</script>

</body>
</html>
