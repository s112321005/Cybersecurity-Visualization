<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>Quantum Secret Sharing</title>
    <style>
        :root {
            --primary-blue: #004aad;
            --dark-text: #333333;
            --bg-color: #f8f9fa;
            --active-blue: #e3f2fd;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 74, 173, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0); }
        }

        @keyframes float-anim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes gentle-glow {
            0% { box-shadow: 0 0 5px rgba(0, 74, 173, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 15px rgba(0, 74, 173, 0.6); transform: scale(1.05); }
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; background-color: var(--bg-color); margin: 0;
            animation: fadeIn 0.8s ease-out;
            overflow-x: hidden;
        }

        /* --- Header 佈局校準 --- */
        .header {
            width: min(1000px, 95vw); 
            display: flex;
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 25px;
            height: 60px; /* 增加 Header 高度以容納大按鈕 */
        }

        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        /* 放大版返回按鈕 (48px) */
        .btn-back {
            width: 40px; 
            height: 40px; 
            background-color: var(--primary-blue);
            color: white; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-decoration: none; 
            font-size: 1.1rem; /* 稍微放大箭頭 */
            transition: transform 0.2s;
            cursor: pointer; 
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .btn-back:hover { 
            transform: scale(1.1); 
        }

        /* 放大版標題框 (48px) */
        .title-pill {
            border: 2px solid var(--primary-blue); 
            height: 48px;           
            padding: 0 25px;        
            border-radius: 30px; 
            font-weight: bold; 
            background: white;
            display: flex;
            align-items: center;    
            justify-content: center;
            box-sizing: border-box;
            white-space: nowrap;
            font-size: 1.1rem;
        }

        .step-text { font-weight: bold; font-size: 1.1rem; margin: 0; color: var(--dark-text); }

        /* 放大版 Next 按鈕 (48px) */
        .nav-btn {
            border: 2px solid var(--primary-blue); 
            background: white;
            padding: 0 30px; 
            border-radius: 30px; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.3s;
            opacity: 0.3; 
            pointer-events: none;
            height: 48px;           
            display: flex;
            align-items: center;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .nav-btn.ready {
            opacity: 1; pointer-events: auto;
            background: var(--primary-blue); color: white;
            box-shadow: 0 4px 15px rgba(0, 74, 173, 0.3);
        }
                /* --- 主卡片內容 --- */
        .main-card {
            width: min(1000px, 95vw); 
            height: 560px; 
            border: 3px solid var(--primary-blue); border-radius: 35px;
            position: relative; background: white; display: flex;
            flex-direction: column; justify-content: flex-start; align-items: center;
            overflow: hidden; padding-top: 25px; box-sizing: border-box;
        }

        .character-bob { 
            margin-bottom: 5px;
            animation: float-anim 3.5s ease-in-out infinite;
        }
        
        .bob-interactive {
            display: flex; flex-direction: column; align-items: center; z-index: 5;
            width: 100%;
        }
        
        .prompt-text {
            margin: 0 0 20px 0; 
            font-weight: bold; 
            color: var(--primary-blue); 
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .selector-area { display: flex; align-items: flex-start; gap: 60px; }

        .basis-column { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .basis-title { font-weight: bold; color: var(--primary-blue); font-size: 1.2rem; margin-bottom: 5px; }

        .options-row { display: flex; gap: 20px; }

        .state-btn {
            cursor: pointer; padding: 12px; border: 2px solid #eee;
            border-radius: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            width: 95px; background: white; position: relative;
            animation: pulse-anim 2s infinite; 
        }

        .state-btn:hover { 
            transform: translateY(-5px); 
            border-color: #bbdefb; 
            background: #fafcff;
        }

        .state-btn.active {
            border-color: var(--primary-blue);
            background: var(--active-blue);
            transform: scale(1.08); 
            animation: none; 
            box-shadow: 0 0 15px rgba(0, 74, 173, 0.4); 
        }

        .braket { font-size: 1.5rem; font-weight: bold; color: var(--primary-blue); margin-bottom: 2px; }
        .bit-label { font-size: 0.85rem; color: #666; font-weight: bold; }

        .explanation-area {
            display: flex; justify-content: center; align-items: center;
            margin-top: 20px; padding: 10px;
        }
        .explanation-text {
            color: #888; font-weight: bold; font-size: 1rem; margin: 0; text-align: center;
        }

        .logic-footer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background-color: #f8fbff;
            border-top: 2px dashed #d0e3ff;
            padding: 18px 0;
            display: flex; justify-content: center; align-items: center;
        }

        .logic-container {
            display: flex; align-items: center; gap: 12px;
            font-weight: bold; font-size: 1.05rem;
        }

        .logic-label {
            color: #888; font-size: 0.9rem; margin-right: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        .logic-pill {
            background: white; border: 2px solid #b3d4ff; padding: 6px 16px;
            border-radius: 20px; color: var(--primary-blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .logic-operator { color: #aaa; font-weight: bold; font-size: 1.4rem; }

        .logic-pill.result {
            background: var(--primary-blue); color: white; border-color: var(--primary-blue);
            animation: gentle-glow 1.5s infinite alternate; 
        }
    

/* ===== ZLM right-side image-only fixed current-step window =====
   需求：移到主體教學右側；灰色框線延伸至整個視窗高度；禁止使用者滾動此直式視窗；
   目前步驟藍色框框位於灰色框線上方，且可超出灰色框線。 */
.zlm-image-dock {
    position: fixed;
    right: 18px;
    top: 0;
    width: 330px;                 /* 灰色滑動視窗外層寬度固定 */
    height: 100vh;                /* 灰色框線延伸至網頁可視高度 */
    z-index: 900;
    pointer-events: none;         /* 禁止滑鼠滾動/拖曳此區域 */
    display: flex;
    justify-content: center;
    overflow: visible;
    isolation: isolate;
}
.zlm-image-viewport {
    position: relative;
    width: 285px;                 /* 灰色框框寬度固定不變 */
    height: 100vh;
    background: #ffffff;
    box-sizing: border-box;
    box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
    overflow: visible;            /* 允許藍色框框超出灰色框線 */
    z-index: 1;
}
/* 灰色側邊框使用低圖層 pseudo elements，藍色框框會蓋在灰線上方 */
.zlm-image-viewport::before,
.zlm-image-viewport::after {
    content: "";
    position: absolute;
    top: 0;
    width: 14px;
    height: 100vh;                /* 灰線延伸至整個網頁可視高度 */
    background: #d9d9d9;
    z-index: 1;
    pointer-events: none;
}
.zlm-image-viewport::before { left: 0; }
.zlm-image-viewport::after { right: 0; }
/* 內容層比灰框寬，但不改灰框本體寬度；用 overflow hidden 禁止直式滑動視窗被滾動 */
.zlm-image-window {
    position: relative;
    width: 393px;                 /* 285 + 54*2；只加寬內容圖層，不加寬灰框 */
    height: 100vh;
    margin-left: -54px;
    overflow: hidden;             /* 禁止直式滑動視窗滾動，只停在目前步驟 */
    z-index: 10;
}
.zlm-image-list {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 34px;
    padding: 24px 0 34px;
    box-sizing: border-box;
    width: 393px;
    transform: translateY(0);
    transition: transform .45s ease;
    z-index: 20;
}
.zlm-image-card {
    position: relative;
    width: 232px;
    min-height: 245px;
    padding: 12px;
    box-sizing: border-box;
    background: #ffffff;
    border: 0 solid transparent;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    transition: filter .25s ease, opacity .25s ease, transform .25s ease, width .25s ease, min-height .25s ease, box-shadow .25s ease;
    z-index: 20;
}
.zlm-image-card:not(.is-current) {
    filter: grayscale(1) saturate(0);
    opacity: .42;
    transform: scale(.9);
}
.zlm-image-card.is-current {
    width: 340px;
    min-height: 390px;
    padding: 16px;
    border: 11px solid #0054bd;
    border-radius: 36px;
    box-shadow: 0 12px 28px rgba(0, 84, 189, .28);
    filter: none;
    opacity: 1;
    transform: scale(1);
    margin: 8px 0;
    z-index: 100;                 /* 藍色框框位於灰色框線上方 */
}
.zlm-image-card img {
    position: relative;
    z-index: 101;
    width: 100%;
    height: 100%;
    max-width: 208px;
    max-height: 276px;
    object-fit: contain;
    display: block;
}
.zlm-image-card.is-current img {
    max-width: 305px;
    max-height: 350px;
}
@media (min-width: 1180px) {
    body { padding-right: 350px !important; }
}
@media (max-width: 1179px) {
    .zlm-image-dock {
        position: relative;
        right: auto;
        top: auto;
        width: min(94vw, 760px);
        height: 285px;
        margin: 18px auto 10px;
        overflow: visible;
    }
    .zlm-image-viewport {
        width: 100%;
        height: 285px;
    }
    .zlm-image-viewport::before,
    .zlm-image-viewport::after {
        width: 10px;
        height: 285px;
    }
    .zlm-image-window {
        width: 100%;
        height: 285px;
        margin-left: 0;
        overflow: hidden;
    }
    .zlm-image-list {
        flex-direction: row;
        align-items: center;
        gap: 22px;
        width: max-content;
        height: 285px;
        padding: 0 18px;
    }
    .zlm-image-card { width: 220px; min-height: 226px; }
    .zlm-image-card.is-current {
        width: 305px;
        min-height: 258px;
        margin: 0 10px;
        z-index: 100;
    }
    .zlm-image-card.is-current img { max-width: 270px; max-height: 230px; }
}

</style>
</head>
<body>
<aside class="zlm-image-dock" aria-label="ZLM current-step image preview">
    <div class="zlm-image-viewport">
        <div class="zlm-image-window">
            <div class="zlm-image-list">
            <div class="zlm-image-card is-current" data-zlm-step="1" aria-current="step">
                <img src="pictures/zlm-1.png" alt="ZLM Step 1" onerror="this.onerror=null;this.src='pictures/zlm-1.png';">
            </div>
            <div class="zlm-image-card" data-zlm-step="2">
                <img src="pictures/zlm-2.png" alt="ZLM Step 2" onerror="this.onerror=null;this.src='pictures/zlm-2.png';">
            </div>
            <div class="zlm-image-card" data-zlm-step="3">
                <img src="pictures/zlm-3.png" alt="ZLM Step 3" onerror="this.onerror=null;this.src='pictures/zlm-3.png';">
            </div>
            <div class="zlm-image-card" data-zlm-step="4">
                <img src="pictures/zlm-4.png" alt="ZLM Step 4" onerror="this.onerror=null;this.src='pictures/zlm-4.png';">
            </div>
            </div>
        </div>
    </div>
</aside>


<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html" class="btn-back" title="back home">◀&#xFE0E;</a>
        <div class="title-pill">Quantum Secret Sharing：ZhangLiMan</div>
    </div>
    <div class="header-center"><p class="step-text">STEP 1：Bob prepares a Basis</p></div>
    <div class="header-right">
        <button id="next-btn" class="nav-btn" onclick="nextStep()" disabled>Next</button>
    </div>
</div>

<div class="main-card">
    <div class="bob-interactive">
        <div class="character-bob">
            <img src="pictures/cat_bob.svg" alt="Bob" width="120"> 
        </div>

        <p class="prompt-text">Choose a state!</p>
        
        <div class="selector-area">
            <div class="basis-column">
                <div class="basis-title">Z Basis</div>
                        <div class="options-row">
                    <div class="state-btn" onclick="selectState('Z', '0', this)">
                        <span class="braket">|0⟩</span>
                        <span class="bit-label">Bit 0</span>
                    </div>
                    <div class="state-btn" onclick="selectState('Z', '1', this)">
                        <span class="braket">|1⟩</span>
                        <span class="bit-label">Bit 1</span>
                    </div>
                </div>
            </div>

            <div style="width: 2px; height: 160px; background: #eee; align-self: center;"></div>

            <div class="basis-column">
                <div class="basis-title">X Basis</div>
                <div class="options-row">
                    <div class="state-btn" onclick="selectState('X', '0', this)">
                        <span class="braket">|+⟩</span>
                        <span class="bit-label">Bit 0</span>
                    </div>
                    <div class="state-btn" onclick="selectState('X', '1', this)">
                        <span class="braket">|-⟩</span>
                        <span class="bit-label">Bit 1</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="explanation-area">
            <p class="explanation-text">Click a state to confirm selection</p>
        </div>
    </div>

    <div class="logic-footer">
        <div class="logic-container">
            <span class="logic-label">Encoding Logic</span>
            <span class="logic-pill">Preparation Basis</span>
            <span class="logic-operator">+</span>
            <span class="logic-pill">Bit Value</span>
            <span class="logic-operator">=</span>
            <span class="logic-pill result">Quantum State</span>
        </div>
    </div>
</div>

<script>
    let selectedBasis = null;
    let selectedMsg = null;

    function selectState(basis, bit, el) {
        document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');

        document.querySelector('.prompt-text').textContent = "State Selected!";
        document.querySelector('.prompt-text').style.color = "#28a745"; 
        
        selectedBasis = basis;
        selectedMsg = bit;

        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = false;
        nextBtn.classList.add('ready');
    }

    function prevStep() {
        window.history.back();
    }

    function nextStep() {
        if (!selectedBasis) return;
        localStorage.removeItem('qssStepData'); 
        localStorage.removeItem('qssStep3Data'); 
        localStorage.setItem('bobOriginalChoice', JSON.stringify({ basis: selectedBasis, msg: selectedMsg }));
        window.location.href = `QSSstep2.html?bobBasis=${selectedBasis}&bobMsg=${selectedMsg}`;
    }
</script>

<script>
/* ZLM 右側目前步驟視窗：禁止使用者滾動此區域，僅用 transform 固定顯示目前 step。 */
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.zlm-image-dock');
    const windowBox = document.querySelector('.zlm-image-window');
    const list = document.querySelector('.zlm-image-list');
    const currentCard = document.querySelector('.zlm-image-card.is-current');

    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    function lockToCurrentStep() {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        if (isHorizontal) {
            const offset = (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2);
            list.style.transform = 'translateX(' + offset + 'px)';
        } else {
            const offset = (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2);
            list.style.transform = 'translateY(' + offset + 'px)';
        }
    }

    lockToCurrentStep();
    window.addEventListener('resize', lockToCurrentStep);
});
</script>

</body>
</html>
