        #input-state.result-capsule.active { background: var(--alice-blue); border-color: var(--alice-blue); }

        .connector { position: relative; display: flex; align-items: center; height: 50px; width: 0; opacity: 0; transition: width 0.5s ease-out, opacity 0.2s ease; }

        .photon-particle { --beam-color: var(--zero); --state-angle: 90deg; position: absolute; width: 62px; height: 62px; border-radius: 50%; background: radial-gradient(circle, #ffffff 0 52%, color-mix(in srgb, var(--beam-color) 30%, #ffffff) 53% 72%, #ffffff 73% 100%); border: 3px solid #ffffff; box-shadow: 0 0 20px color-mix(in srgb, var(--beam-color) 45%, transparent), 0 0 0 1px color-mix(in srgb, var(--beam-color) 20%, #ffffff); display: flex; justify-content: center; align-items: center; color: transparent; font-size: 0; font-weight: bold; pointer-events: none; z-index: 100; box-sizing: border-box; }
        .photon-particle::after { content: ""; position: absolute; left: 50%; top: 50%; width: 17px; height: 46px; background: var(--beam-color); transform: translate(-50%, -50%) rotate(var(--state-angle)); box-shadow: 0 0 8px var(--beam-color); clip-path: polygon(50% 0, 100% 18%, 72% 18%, 72% 82%, 100% 82%, 50% 100%, 0 82%, 28% 82%, 28% 18%, 0 18%); }
        .basis-announcer { position: absolute; z-index: 110; left: calc(11% - 10px); top: 96px; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 4px; min-width: 142px; padding: 8px 13px; border: 2px solid #004AAD; border-radius: 18px; background: #f4f8ff; color: #004AAD; font-weight: 900; font-size: .9rem; line-height: 1.15; text-align: center; box-shadow: 0 7px 16px rgba(0,74,173,.16); pointer-events: none; transform: translate(-50%, -50%) scale(.82); opacity: 0; }

        .photon-d0 { --beam-color: var(--plus); --state-angle: 45deg; }

        .bb84-image-card { position: relative; width: 232px; min-height: 245px; padding: 12px; box-sizing: border-box; background: #ffffff; border: 0 solid transparent; border-radius: 30px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; transition: filter .25s ease, opacity .25s ease, transform .25s ease, width .25s ease, min-height .25s ease, box-shadow .25s ease; z-index: 20; }

<body>

<aside class="bb84-image-dock" aria-label="BB84 current-step image preview">
    <div class="bb84-image-viewport">
        <div class="bb84-image-window">
            <div class="bb84-image-list">
                <div class="bb84-image-card" data-bb84-step="1"><div class="bb84-step-summary"><span class="bb84-step-number">1</span><span class="bb84-step-title">PREPARE</span></div><img src="pictures/bb84-1.png" alt="BB84 Step 1"></div>
                <div class="bb84-image-card is-current" data-bb84-step="2" aria-current="step"><div class="bb84-step-summary"><span class="bb84-step-number">2</span><span class="bb84-step-title">TRANSMIT</span></div><img src="pictures/bb84-2.png" alt="BB84 Step 2"></div>
                <div class="bb84-image-card" data-bb84-step="3"><div class="bb84-step-summary"><span class="bb84-step-number">3</span><span class="bb84-step-title">MEASURE</span></div><img src="pictures/bb84-3.png" alt="BB84 Step 3"></div>
                <div class="bb84-image-card" data-bb84-step="4"><div class="bb84-step-summary"><span class="bb84-step-number">4</span><span class="bb84-step-title">SIFTING</span></div><img src="pictures/bb84-4.png" alt="BB84 Step 4"></div>
                <div class="bb84-image-card" data-bb84-step="5"><div class="bb84-step-summary"><span class="bb84-step-number">5</span><span class="bb84-step-title">KEY</span></div><img src="pictures/bb84-5.png" alt="BB84 Step 5"></div>
            </div>
        </div>
    </div>
</aside>

<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html?section=qkd#quantum-security-applications" class="btn-back" title="back home">&#x25C0;&#xFE0E;</a>
        <div class="title-pill">QKD : BB84 Protocol</div>
    </div>
    <div class="header-center" id="step-title">STEP 2 : TRANSMIT</div>
    <div class="header-right">
        <button class="nav-btn" onclick="prevStep()">Back</button>
        <button class="nav-btn" onclick="nextStep()">Next</button>
    </div>
</div>

<div class="main-card" id="stage">
    
    <div class="decision-grid" id="grid-container">
        
        <div class="col" style="min-width: 150px;">
            <img src="pictures/cat_alice.svg" width="120" alt="Alice" class="character-avatar">
            <p class="flow-label">Alice Sent</p>
            <div class="result-capsule active" id="input-state">-</div>
        </div>

        <div class="col" style="width: 50px;">
            <div class="connector active full-width" id="conn-1"></div> 
        </div>

        <div class="col" style="min-width: 230px;" id="bob-col">
            <img src="pictures/cat_bob.svg" width="120" alt="Bob" class="character-avatar">
            
            <div class="bob-interactive" id="bob-interactive">
                <p style="margin:0; font-weight:bold; color:var(--primary-blue);">Choose a basis!</p>
                <div class="bob-choices">
                    <div class="bob-choice-btn pulse" onclick="startMeasurementProcess('S')">
                        <img src="pictures/b_vertical.svg" width="80" alt="S basis">
                        <div class="basis-circle">S</div>
                    </div>
                    <div class="bob-choice-btn pulse" onclick="startMeasurementProcess('D')">
                        <img src="pictures/b_diagonal.svg" width="80" alt="D basis">
                        <div class="basis-circle">D</div>
                    </div>
                </div>
            </div>

            <div class="bob-active-basis" id="bob-active-basis">
                <p class="flow-label">Bob Measured</p>
                <img id="bob-active-img" src="" width="80" style="margin-bottom: 10px;" alt="Key">
                <div class="basis-circle" style="margin-top:0;" id="bob-key-label">-</div>
            </div>
        </div>

        <div class="col col-connectors" id="connectors-area">
            <div class="connector arrow-connector arrow-single" id="arrow-match"></div>
            <div class="connector arrow-connector arrow-branch-up" id="arrow-mis-up"></div>
            <div class="connector arrow-connector arrow-branch-down" id="arrow-mis-down"></div>
        </div>

        <div class="col" id="results-area">
            <p id="results-area-title">Outcome</p>
            
            <div id="match-container" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                <div id="photon-landing-spot"></div>
                <div class="output-group" id="output-match" style="margin-top: 14px; opacity: 0; transition: opacity 0.5s ease; transform: translateX(14px);">
                    <div class="result-capsule active" id="match-state"> Waiting... </div>
                    <div class="result-icon match">✔</div>
                </div>
            </div>

            <div id="output-mismatch" style="display: none; flex-direction: column; gap: 22px; margin-top: 8px; transform: translateX(14px);">
                <div class="output-group">
                    <div class="result-capsule error" id="mis-state-up"> Waiting... </div>
                    <div class="result-icon mismatch">✖</div>
                </div>
                <div class="output-group">
                    <div class="result-capsule error" id="mis-state-down"> Waiting... </div>
                    <div class="result-icon mismatch">✖</div>
                </div>
            </div>
        </div>

    </div>

    <p class="bottom-hint" id="hint-text">Help Bob measure the incoming photon</p>

    <div class="basis-announcer" id="basis-announcer" aria-live="polite">
        <span class="basis-announcer-icon" aria-hidden="true">📢</span>
        <span class="basis-announcer-text" id="basis-announcer-text">Alice Basis : Z</span>
    </div>

    <div class="explanation-box" id="explain-box">
        <div class="explain-header">
            <p class="explain-title" id="explain-title">Analyzing Result...</p>
            <button class="retry-btn" onclick="resetBob()">↺ Try Another Basis</button>
        </div>
        <p class="explain-desc" id="explain-desc">Loading explanation...</p>
    </div>

</div>

<script>
    let alicePhotonStr = ""; 
    let aliceBasisStr = ""; 
    
    const photonConfig = {
        's1': { display: 'Qubit: |1⟩', label: 'Qubit: |1⟩', symbol: '↑', ket: '↑', stateKet: '|↑⟩' },
        's0': { display: 'Qubit: |0⟩', label: 'Qubit: |0⟩', symbol: '→', ket: '→', stateKet: '|→⟩' },
        'd1': { display: 'Qubit: |-⟩', label: 'Qubit: |-⟩', symbol: '↖', ket: '↖', stateKet: '|↖⟩' },
        'd0': { display: 'Qubit: |+⟩', label: 'Qubit: |+⟩', symbol: '↗', ket: '↗', stateKet: '|↗⟩' }
    };

    function createPhotonDisplay(ket, className = '') {
        const classAttr = className ? ` class="${className}"` : '';
        return `<div${classAttr}>${ket}</div>`;
    }

    function setPhotonLabel(elementId, photonKey) {
        const target = document.getElementById(elementId);
        if (!target) return;
        const photon = photonConfig[photonKey];
        target.innerHTML = createPhotonDisplay(photon.ket, `state-photon photon-${photonKey}`) + `<span>${photon.label}</span>`;
    }

    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const urlType = params.get("aliceBasis");
        const urlMsg = params.get("aliceMsg");
        const hasFreshStep1Data = Boolean(urlType && urlMsg !== null);
        const savedData = localStorage.getItem('qkdStepData');
        let parsedData = null;

        try {
            parsedData = savedData ? JSON.parse(savedData) : null;
        } catch (error) {
            localStorage.removeItem('qkdStepData');
        }

        if (hasFreshStep1Data) {
            localStorage.removeItem('qkdStepData');
            setupAliceState(urlType, urlMsg);
            return;
        }

        if (parsedData && parsedData.aliceState && parsedData.aliceBasis) {
            const isBit1 = parsedData.aliceState === '↑' || parsedData.aliceState === '↖';
            setupAliceState(parsedData.aliceBasis, isBit1 ? "1" : "0");

            if (parsedData.bobBasis) {
                requestAnimationFrame(() => {
                    startMeasurementProcess(parsedData.bobBasis, true);
                });
            }
            return;
        }

        setupAliceState("S", "0");
    });

    // 獨立出 Alice 設定邏輯
    function setupAliceState(type, msg) {
        msg = String(msg);
        if (type === "rectilinear" || type === "S") {
            aliceBasisStr = "S";
            alicePhotonStr = (msg === "0") ? "s0" : "s1";
        } else {
            aliceBasisStr = "D";
            alicePhotonStr = (msg === "0") ? "d0" : "d1";
        }
        setPhotonLabel("input-state", alicePhotonStr);
    }

    // 加入 skipAnimation 參數，如果為 true 就跳過動畫直接顯示
    function startMeasurementProcess(bobChosenBasis, skipAnimation = false) {
        if (window.showBb84ImageStep) window.showBb84ImageStep(3);
        document.getElementById("bob-interactive").style.display = "none";
        document.getElementById("hint-text").style.opacity = "0"; 
        
        const activeBasisUI = document.getElementById("bob-active-basis");
        activeBasisUI.style.display = "flex";
        
        if (bobChosenBasis === "S") {
            document.getElementById("bob-active-img").src = "pictures/b_vertical.svg";
            document.getElementById("bob-key-label").textContent = "S";
        } else {
            document.getElementById("bob-active-img").src = "pictures/b_diagonal.svg";
            document.getElementById("bob-key-label").textContent = "D";
        }

        const isMatch = (aliceBasisStr === bobChosenBasis);
        document.getElementById("results-area").classList.remove("show-result");
        
        if (isMatch) {
            setPhotonLabel("match-state", alicePhotonStr);
            document.getElementById("match-container").style.display = "flex";
            document.getElementById("output-mismatch").style.display = "none";
            document.getElementById("output-match").style.opacity = "0"; 
        } else {
            setPhotonLabel("mis-state-up", (bobChosenBasis === "S") ? 's1' : 'd1');
            setPhotonLabel("mis-state-down", (bobChosenBasis === "S") ? 's0' : 'd0');
            document.getElementById("match-container").style.display = "none";
            document.getElementById("output-mismatch").style.display = "flex";
        }

        if (skipAnimation) {
            // 直接顯示箭頭與結果面板
            if (isMatch) {
                document.getElementById("arrow-match").classList.add("active");
            } else {
                document.getElementById("arrow-mis-up").classList.add("active");
                document.getElementById("arrow-mis-down").classList.add("active");
            }
            displayFinalResult(isMatch);
        } else {
            animateMeasurement(isMatch);
        }
    }
    function animateMeasurement(isMatch) {
        const stage = document.getElementById('stage');
        const sourceEl = document.getElementById('input-state');
        const bobEl = document.getElementById('bob-active-img');
        const particle = document.createElement('div');
        particle.className = `photon-particle photon-${alicePhotonStr}`;
        particle.textContent = photonConfig[alicePhotonStr].ket;
        const stageRect = stage.getBoundingClientRect();
        const srcRect = sourceEl.getBoundingClientRect();
        const bobRect = bobEl.getBoundingClientRect();
        const landingSpot = isMatch ? document.getElementById('photon-landing-spot') : document.getElementById('results-area');
        const outRect = landingSpot.getBoundingClientRect();
        const photonHalf = 29;
        const startX = srcRect.left - stageRect.left + srcRect.width / 2 - photonHalf;
        const startY = srcRect.top - stageRect.top + srcRect.height / 2 - photonHalf;
        const toBobX = bobRect.left - stageRect.left + bobRect.width / 2 - photonHalf;
        const toBobY = bobRect.top - stageRect.top + bobRect.height / 2 - photonHalf;
        const toOutX = outRect.left - stageRect.left + outRect.width / 2 - photonHalf;
        const toOutY = outRect.top - stageRect.top + outRect.height / 2 - photonHalf;
        particle.style.left = startX + 'px';
        particle.style.top = startY + 'px';
        particle.style.setProperty('--tx-bob', (toBobX - startX) + 'px');
        particle.style.setProperty('--ty-bob', (toBobY - startY) + 'px');
        particle.style.setProperty('--tx-out', (toOutX - startX) + 'px');
        particle.style.setProperty('--ty-out', (toOutY - startY) + 'px');
        stage.appendChild(particle);
        requestAnimationFrame(() => { particle.style.animation = 'shoot-to-bob 1.5s forwards cubic-bezier(0.4, 0, 0.2, 1)'; });
        setTimeout(() => {
            if (isMatch) { document.getElementById("arrow-match").classList.add("active"); } 
            else {
                document.getElementById("arrow-mis-up").classList.add("active");
                document.getElementById("arrow-mis-down").classList.add("active");
            }
        }, 1500);
        setTimeout(() => {
            if (isMatch) {
                particle.style.animation = 'shoot-bob-to-outcome 0.8s forwards ease-out';
                setTimeout(() => {
                    particle.remove();
                    displayFinalResult(true);
                }, 800);
            } else {
                particle.style.animation = 'shoot-collapse 0.3s forwards ease-in';
                setTimeout(() => {
                    particle.remove();
                    displayFinalResult(false);
                }, 300);
            }
        }, 2000); 
    }
    function displayFinalResult(isMatch) {
        const resultsArea = document.getElementById("results-area");
        const explainBox = document.getElementById("explain-box");
        const explainTitle = document.getElementById("explain-title");
        const explainDesc = document.getElementById("explain-desc");
        const announcer = document.getElementById("basis-announcer");
        const announcerText = document.getElementById("basis-announcer-text");
        const aliceSymbol = photonConfig[alicePhotonStr].symbol;
        const bobBasisLabel = document.getElementById("bob-key-label").textContent;
        const bitValue = (aliceSymbol === '↑' || aliceSymbol === '↖') ? '1' : '0';
        if (announcer && announcerText) {
            const basisLabel = aliceBasisStr === "S" ? "Z" : "X";
            const stage = document.getElementById("stage");
            const aliceAvatar = document.querySelector('#grid-container .character-avatar[alt="Alice"]');
            const stageRect = stage.getBoundingClientRect();
            const aliceRect = aliceAvatar.getBoundingClientRect();
            const aliceCenterY = aliceRect.top - stageRect.top + aliceRect.height / 2;
            announcerText.textContent = "Alice Basis : " + basisLabel;
            announcer.style.setProperty("--announce-row-y", aliceCenterY + "px");
            announcer.classList.remove("show");
            void announcer.offsetWidth;
            announcer.classList.add("show");
        }
        if (isMatch) {
            document.getElementById("output-match").style.opacity = "1"; 
            explainBox.style.borderLeftColor = "var(--match-green)";
            explainBox.style.backgroundColor = "#f0fdf4";
            explainTitle.style.color = "var(--match-green)";

            const polarizerKet = bobBasisLabel === "S" ? "↑" : "↖";
            const isBlockedCase =
                (bobBasisLabel === "S" && alicePhotonStr === "s0") ||
                (bobBasisLabel === "D" && alicePhotonStr === "d0");

            if (isBlockedCase) {
                explainTitle.innerHTML = "🟢 Record";
                explainDesc.innerHTML = `After Alice announces the basis, Bob confirms they used the <b>same basis</b>.<br>No light passed through the <b>${polarizerKet}</b> polarizer, so <b>Bob identifies ${photonConfig[alicePhotonStr].label.replace('Qubit: ', '')}</b>. <span class='highlight-keep'>Record Bit ${bitValue}</span>.`;
            } else {
                explainTitle.innerHTML = "🟢 Record";
                explainDesc.innerHTML = `After Alice announces the basis, Bob confirms they used the <b>same basis</b>.<br>Light passed through the <b>${polarizerKet}</b> polarizer, so <b>Bob identifies ${photonConfig[alicePhotonStr].label.replace('Qubit: ', '')}</b>. <span class='highlight-keep'>Record Bit ${bitValue}</span>.`;
            }
        } else {
            explainBox.style.borderLeftColor = "var(--mismatch-red)";
            explainBox.style.backgroundColor = "#fff5f5";
            explainTitle.style.color = "var(--mismatch-red)";
            explainTitle.innerHTML = "🔴 Discard";
            explainDesc.innerHTML = `After Alice announces the basis, Bob finds they used a <b>different basis</b>.<br>Bob's result is random, so this bit is <span class='highlight-discard'>discarded</span>.`;
        }
        let aliceBasisType = (aliceSymbol === '↑' || aliceSymbol === '→') ? 'S' : 'D';
        const qkdData = {
            aliceState: aliceSymbol,
            aliceBasis: aliceBasisType, 
            bobBasis: bobBasisLabel     
        };
        localStorage.setItem('qkdStepData', JSON.stringify(qkdData));

        resultsArea.classList.add("show-result");
        explainBox.classList.add("show");
    }
    function resetBob() {
        if (window.showBb84ImageStep) window.showBb84ImageStep(2);
        document.getElementById("explain-box").classList.remove("show");
        document.getElementById("basis-announcer").classList.remove("show");
        document.getElementById("results-area").classList.remove("show-result");
        document.getElementById("arrow-match").classList.remove("active");
        document.getElementById("arrow-mis-up").classList.remove("active");
        document.getElementById("arrow-mis-down").classList.remove("active");
        const oldPhoton = document.querySelector('.photon-particle');
        if(oldPhoton) oldPhoton.remove();
        localStorage.removeItem('qkdStepData'); // 按下重試時清除舊紀錄
        setTimeout(() => {
            document.getElementById("bob-active-basis").style.display = "none";
            document.getElementById("match-container").style.display = "none";
            document.getElementById("output-mismatch").style.display = "none";
            document.getElementById("bob-interactive").style.display = "flex";
            document.getElementById("hint-text").style.opacity = "1";
        }, 300);
    }
    function prevStep() { window.location.href = 'BB84step1.html'; }
    function nextStep() { window.location.href = 'BB84step4.html'; }
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.bb84-image-dock');
    const windowBox = document.querySelector('.bb84-image-window');
    const list = document.querySelector('.bb84-image-list');
    let currentCard = document.querySelector('.bb84-image-card.is-current');
    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    function getReferenceOffset(isHorizontal) {
        const stepValue = currentCard ? currentCard.dataset.bb84Step : '2';
        const referenceCard = document.querySelector('.bb84-image-card[data-bb84-step="3"]');
        const shouldUseStep3Reference = stepValue === '2' || stepValue === '3';

        if (!shouldUseStep3Reference || !referenceCard) {
            if (isHorizontal) {
                return (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2);
            }
            const centeredOffset = (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2);
            return Math.max(0, centeredOffset);
        }

        const activeBefore = currentCard;
        const ariaBefore = activeBefore ? activeBefore.getAttribute('aria-current') : null;
        const referenceWasCurrent = referenceCard.classList.contains('is-current');

        if (!referenceWasCurrent) {
            activeBefore.classList.remove('is-current');
            activeBefore.removeAttribute('aria-current');
            referenceCard.classList.add('is-current');
            referenceCard.setAttribute('aria-current', 'step');
        }

        const offset = isHorizontal
            ? (windowBox.clientWidth / 2) - referenceCard.offsetLeft - (referenceCard.offsetWidth / 2)
            : Math.max(0, (windowBox.clientHeight / 2) - referenceCard.offsetTop - (referenceCard.offsetHeight / 2));

        if (!referenceWasCurrent) {
            referenceCard.classList.remove('is-current');
            referenceCard.removeAttribute('aria-current');
            activeBefore.classList.add('is-current');
            if (ariaBefore) activeBefore.setAttribute('aria-current', ariaBefore);
        }

        return offset;
    }

    window.lockBb84ImageToCurrentStep = function () {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        const offset = getReferenceOffset(isHorizontal);
        list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
    };

    window.showBb84ImageStep = function (step) {
        const stepValue = String(step);
        const nextCard = document.querySelector('.bb84-image-card[data-bb84-step="' + stepValue + '"]');
        if (!nextCard) return;
        document.querySelectorAll('.bb84-image-card').forEach(card => {
            card.classList.remove('is-current');
            card.removeAttribute('aria-current');
        });
        nextCard.classList.add('is-current');
        nextCard.setAttribute('aria-current', 'step');
        currentCard = nextCard;
        const stepTitle = document.getElementById('step-title');
        if (stepTitle) stepTitle.textContent = stepValue === '3' ? 'STEP 3 : MEASURE' : 'STEP 2 : TRANSMIT';
        requestAnimationFrame(window.lockBb84ImageToCurrentStep);
    };

    window.lockBb84ImageToCurrentStep();
    window.addEventListener('resize', window.lockBb84ImageToCurrentStep);
});
</script>
</body>
