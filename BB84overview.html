<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Key Distribution : BB84 Overview</title>
    <style>
        :root{--primary-blue:#549FD0;--alice-blue:#004aad;--bob-blue:#4C80C5;--dark-blue:#06276d;--dark-text:#263238;--muted:#667085;--line:#d7e3f5;--paper:#ffffff;--soft:#f8fbff;--goal-bg:#eef7ff}
        *{box-sizing:border-box}
        @keyframes gradientBG{
        0%{background-position:0% 50%}
        50%{background-position:100% 50%}
        100%{background-position:0% 50%}
        }
        body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px 20px;background:linear-gradient(-45deg,#E0F2FE,#F5F3FF,#ECFDF5,#dbeafe);background-size:400% 400%;animation:gradientBG 15s ease infinite,fadeIn .8s ease-out;margin:0;overflow-x:hidden;color:var(--dark-text);min-height:100vh}
        .bg-particles{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:-1;overflow:hidden}
        .particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(84,159,208,0.2) 0%,rgba(84,159,208,0) 70%);animation:drift 20s infinite linear alternate}
        .p1{width:300px;height:300px;top:-10%;left:-5%;animation-delay:0s}
        .p2{width:400px;height:400px;bottom:10%;right:-10%;background:radial-gradient(circle,rgba(0,74,173,0.1) 0%,rgba(0,74,173,0) 70%);animation-delay:-5s}
        .p3{width:200px;height:200px;top:40%;left:50%;background:radial-gradient(circle,rgba(76,128,197,0.1) 0%,rgba(76,128,197,0) 70%);animation-duration:25s}
        @keyframes drift{
        0%{transform:translate(0,0) scale(1)}
        100%{transform:translate(50px,-50px) scale(1.1)}
        }
        @keyframes fadeIn{
        from{opacity:0;transform:translateY(20px)}
        to{opacity:1;transform:translateY(0)}
        }
        @keyframes character-swing{
        0%{transform:rotate(-1.5deg) translateX(-3px)}
        50%{transform:rotate(1.5deg) translateX(3px)}
        100%{transform:rotate(-1.5deg) translateX(-3px)}
        }
        @keyframes bit-float{
        0%{transform:translate(0,0);opacity:0}
        20%{opacity:0.8}
        80%{opacity:0.8}
        100%{transform:translate(15px,-15px);opacity:0}
        }
        @keyframes start-pulse{
        0%{box-shadow:0 8px 18px rgba(0,74,173,.22),0 0 0 0 rgba(84,159,208,.38)}
        70%{box-shadow:0 12px 24px rgba(0,74,173,.28),0 0 0 15px rgba(84,159,208,0)}
        100%{box-shadow:0 8px 18px rgba(0,74,173,.22),0 0 0 0 rgba(84,159,208,0)}
        }
        @keyframes shine{
        0%{left:-80%}
        45%{left:130%}
        100%{left:130%}
        }
        .header{width:min(1000px,95vw);display:flex;align-items:center;justify-content:space-between;margin-bottom:25px;height:60px;gap:16px}
        .header-left{display:flex;align-items:center;gap:15px}
        .btn-back{width:40px;height:40px;background-color:var(--primary-blue);color:white;border-radius:50%;display:flex;justify-content:center;align-items:center;text-decoration:none;font-size:0;transition:all .3s cubic-bezier(0.175,0.885,0.32,1.275);cursor:pointer;border:none;box-shadow:0 2px 6px rgba(0,0,0,.15);flex-shrink:0}
        .btn-back::before{content:"";width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-right:11px solid currentColor;margin-left:-2px}
        .btn-back:hover{transform:scale(1.15) rotate(-10deg);background-color:var(--alice-blue)}
        .title-pill{border:2px solid var(--primary-blue);height:48px;padding:0 25px;border-radius:30px;font-weight:800;background:rgba(255,255,255,0.9);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;white-space:nowrap;font-size:1.1rem;box-shadow:0 4px 15px rgba(84,159,208,.1)}
        .step-text{font-weight:800;font-size:1.1rem;margin:0;color:var(--dark-text);letter-spacing:.05em;white-space:nowrap;text-transform:uppercase}
        .start-btn{position:relative;border:3px solid #004aad;background:var(--primary-blue);color:white;padding:0 32px;border-radius:999px;font-weight:900;cursor:pointer;transition:all .3s ease;height:52px;display:inline-flex;align-items:center;gap:10px;font-size:1.13rem;letter-spacing:.02em;overflow:hidden;animation:start-pulse 2.2s ease-in-out infinite}
        .start-btn::before{content:"";position:absolute;top:-42%;left:-80%;width:58%;height:184%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);transform:rotate(18deg);animation:shine 2.7s ease-in-out infinite}
        .start-btn::after{content:"➜";position:relative;z-index:1;font-size:1.15rem;transition:transform .3s ease}
        .start-btn span{position:relative;z-index:1}
        .start-btn:hover{transform:translateY(-3px) scale(1.05);background:#004aad;box-shadow:0 15px 30px rgba(0,74,173,.4);border-color:white}
        .start-btn:hover::after{transform:translateX(6px)}
        .main-card{width:min(1000px,95vw);min-height:620px;border:3px solid rgba(84,159,208,0.4);border-radius:35px;position:relative;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);display:flex;flex-direction:column;justify-content:flex-start;align-items:center;overflow:hidden;padding:26px 32px 32px;gap:18px;box-shadow:0 20px 40px rgba(0,74,173,0.08)}
        .overview-grid{width:100%;max-width:905px;display:grid;grid-template-columns:minmax(0,1.55fr) minmax(220px,.65fr);gap:16px;align-items:stretch}
        .info-panel{border:2px solid var(--line);border-radius:24px;background:rgba(248,251,255,0.9);padding:15px 18px;box-shadow:0 10px 24px rgba(84,159,208,.08)}
        .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:15px}
        .panel-title{margin:0;font-size:1.05rem;color:var(--dark-blue);font-weight:900;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
        .panel-title::before{content:"•";color:var(--primary-blue);font-size:1.5rem;line-height:0}
        .count-pill{padding:5px 11px;border-radius:999px;background:#ffffff;border:2px solid #b7d8f3;color:var(--primary-blue);font-weight:900;font-size:.8rem;white-space:nowrap}
        .participant-list{display:grid;grid-template-columns:minmax(150px,1fr) 120px minmax(150px,1fr);gap:14px;align-items:center}
        .participant-card{background:#ffffff;border:2px solid #cfe4f8;border-radius:20px;padding:12px 10px 11px;min-height:142px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;z-index:2;overflow:hidden}
        /* .participant-card.alice{animation:character-swing 4s ease-in-out infinite} */
        /* .participant-card.bob{animation:character-swing 4s ease-in-out infinite;animation-delay:.42s} */
        .participant-card img{width:76px;height:76px;object-fit:contain;display:block;position:relative;z-index:2}
        .role-label-alice,.role-label-bob{min-width:78px;padding:5px 14px;border-radius:999px;color:#fff;font-weight:900;text-align:center;box-shadow:0 4px 12px rgba(0,74,173,.12);font-size:.92rem;position:relative;z-index:2}
        .role-label-alice{background:linear-gradient(135deg,var(--alice-blue),#2a75d3)}
        .role-label-bob{background:linear-gradient(135deg,var(--bob-blue),#6b9be2)}
        .bits-stream{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
        .bit{position:absolute;color:var(--alice-blue);font-size:0.8rem;font-weight:bold;opacity:0;animation:bit-float 3s linear infinite}
        .bob .bit{color:var(--bob-blue)}
        .bit:nth-child(1){top:20%;left:30%;animation-delay:0.2s}
        .bit:nth-child(2){top:60%;left:70%;animation-delay:1.1s}
        .bit:nth-child(3){top:40%;left:10%;animation-delay:1.9s}
        .bit:nth-child(4){top:70%;left:40%;animation-delay:2.5s}
        .quantum-channel{display:flex;align-items:center;justify-content:center;width:120px;height:2px;position:relative;z-index:1}
        .quantum-channel::before{content:'';position:absolute;width:100%;height:2px;border-top:2px dashed #cfe4f8}
        .photon{width:9px;height:9px;border-radius:50%;position:absolute;left:0;animation:shoot 2.5s linear infinite;opacity:0}
        .photon:nth-child(1){animation-delay:0.0s;background:#3d7df2;box-shadow:0 0 10px #3d7df2,0 0 20px #3d7df2}
        .photon:nth-child(2){animation-delay:0.6s;background:#e55d8b;box-shadow:0 0 10px #e55d8b,0 0 20px #e55d8b}
        .photon:nth-child(3){animation-delay:1.2s;background:#f0a92d;box-shadow:0 0 10px #f0a92d,0 0 20px #f0a92d}
        .photon:nth-child(4){animation-delay:1.8s;background:#23a9a5;box-shadow:0 0 10px #23a9a5,0 0 20px #23a9a5}
        @keyframes shoot{
        0%{left:0;opacity:1;transform:scale(1.1)}
        15%{opacity:1;transform:scale(1.1)}
        85%{opacity:1;transform:scale(1.1)}
        100%{left:calc(100% - 9px);opacity:0;transform:scale(0.6)}
        }
        .goal-panel{border:2px solid #b7d8f3;border-radius:24px;background:linear-gradient(135deg,var(--goal-bg),#ffffff);padding:15px 20px;box-shadow:0 10px 24px rgba(84,159,208,.10);display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
        .goal-panel p{margin:0;color:#172033;font-weight:700;font-size:1.05rem;line-height:1.6;position:relative;z-index:1}
        .goal-highlight{color:var(--alice-blue);font-weight:900;background:rgba(84,159,208,.1);padding:2px 8px;border-radius:6px;display:inline-block;font-size:1.28em}
        .goal-passkey{width:66px;height:66px;object-fit:contain;display:block;margin:10px auto 0;transform:rotate(45deg);filter:drop-shadow(0 4px 8px rgba(0,74,173,.16))}
        .scene-frame{width:100%;max-width:905px;border:2px solid #cfe4f8;border-radius:28px;background:#ffffff;padding:12px;box-shadow:inset 0 0 20px rgba(84,159,208,.05),0 12px 28px rgba(84,159,208,.12);position:relative}
        .scene-frame img{width:100%;display:block;border-radius:20px;object-fit:contain}
        @media (max-width:860px){
        body{padding:24px 14px}
        .header{height:auto;gap:12px;flex-wrap:wrap}
        .header-center{order:3;width:100%;text-align:center}
        .main-card{padding:22px 18px 24px;min-height:auto}
        .overview-grid{grid-template-columns:1fr}
        .participant-card img{width:72px;height:72px}
        .participant-card{min-height:135px}
        .quantum-channel{width:60px}
        }
        @media (max-width:520px){
        .header{justify-content:center}
        .header-left{width:100%;justify-content:center}
        .start-btn{width:100%;justify-content:center}
        .participant-list{grid-template-columns:1fr;grid-template-rows:auto auto auto}
        .quantum-channel{width:2px;height:30px;margin:0 auto}
        .quantum-channel::before{width:2px;height:100%;border-top:none;border-left:2px dashed #b7d8f3}
        @keyframes shoot{
        0%{top:0;left:-3.5px;opacity:1;transform:scale(1.1)}
        15%{opacity:1;transform:scale(1.1)}
        85%{opacity:1;transform:scale(1.1)}
        100%{top:calc(100% - 9px);left:-3.5px;opacity:0;transform:scale(0.6)}
        }
        }
    </style>
</head>
<body>
<div class="bg-particles">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
</div>
<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html?section=qkd#quantum-security-applications" class="btn-back" title="back home">&#x25C0;&#xFE0E;</a>
        <div class="title-pill">QKD : BB84</div>
    </div>
    <div class="header-center"><p class="step-text">PROTOCOL OVERVIEW</p></div>
    <div class="header-right"><button class="start-btn" onclick="startProtocol()"><span>Start</span></button></div>
</div>
<div class="main-card">
    <div class="overview-grid">
        <section class="info-panel" aria-label="BB84 participants">
            <div class="panel-head">
                <h2 class="panel-title">Characters</h2>
                <span class="count-pill">2 Participants</span>
            </div>
            <div class="participant-list">
                <div class="participant-card alice">
                    <div class="bits-stream">
                    </div>
                    <img src="pictures/cat_alice.svg" alt="Alice">
                    <span class="role-label-alice">Sender</span>
                </div>
                <div class="quantum-channel">
                    <div class="photon"></div>
                    <div class="photon"></div>
                    <div class="photon"></div>
                    <div class="photon"></div>
                </div>
                <div class="participant-card bob">
                    <div class="bits-stream">
                    </div>
                    <img src="pictures/cat_bob.svg" alt="Bob">
                    <span class="role-label-bob">Receiver</span>
                </div>
            </div>
        </section>
        <section class="goal-panel" aria-label="BB84 protocol goal">
            <div class="panel-head">
                <h2 class="panel-title">Goal</h2>
            </div>
            <p>Create a <span class="goal-highlight">shared secret key</span> by retaining only the matched results.<img class="goal-passkey" src="pictures/passkey.png" alt="Passkey"></p>
        </section>
    </div>
    <div class="scene-frame">
        <img src="pictures/scene-QKD-BB84.png" alt="BB84 protocol scene overview">
    </div>
</div>
<script>
function startProtocol() {
    localStorage.removeItem('qssStepData');
    localStorage.removeItem('qssStep3Data');
    localStorage.removeItem('qkdStepData');
    setTimeout(() => {
        window.location.href = 'BB84step1.html';
    }, 200);
}
</script>
</body>
</html>
