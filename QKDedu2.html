<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>QKD interactive education</title>
    <style>
        :root {
            --primary-blue: #004aad;
            --dark-text: #333333;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;    
            padding: 40px 20px; 
            background-color: var(--bg-color);
            margin: 0;
        }

        /* =========================================
           頂部導覽列 (Header)
           ========================================= */
        .header {
            width: min(1000px, 95vw);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            width: 40px;
            height: 40px;
            background-color: var(--primary-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .title-pill {
            border: 2px solid var(--primary-blue);
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            color: var(--dark-text);
            font-size: 1.1rem;
            background: white;
        }

        .header-center {
            flex-grow: 1;
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .step-text {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--dark-text);
            margin: 2px 0;
        }

        .header-right {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            border: 2px solid var(--primary-blue);
            background: white;
            color: var(--dark-text);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--primary-blue);
            color: white;
        }

        /* =========================================
           主要內容區卡片 (Main Card)
           ========================================= */
        .main-card {
            width: min(1000px, 95vw);
            height: min(520px, 70vh);
            border: 3px solid var(--primary-blue);
            border-radius: 35px;
            position: relative;
            background: white;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 左下角 Alice */
        .character-alice {
            position: absolute;
            bottom: 20px;
            left: 50px;
            z-index: 10;
        }

        /* 雲朵容器 */
        .cloud-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-45%, -50%);
            width: 650px; 
            height: 450px;
            background-image: url('https://s112321005.github.io/Cybersecurity-Visualization/think.svg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================
           雲朵內部的判斷邏輯排版 (Grid/Flex)
           ========================================= */
        .decision-grid {
            display: flex;
            align-items: center;
            /* 稍微調整間距以適應新的連接器 */
            gap: 15px; 
            margin-top: -10px; /* 微調在雲朵內的垂直位置 */
            margin-left: 60px;
        }

        .col {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 160px; /* 控制上下選項的間距 */
        }

        .col-key {
            justify-content: center; /* 讓鑰匙保持在正中央 */
            padding: 0 10px; /* 給鑰匙一點左右空間 */
        }

        /* 0 和 1 的圓形按鈕 */
        .circle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary-blue);
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .circle-btn.active {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 0 0 4px #80d8ff; /* 加上一點選中光暈 */
        }

        /* =========================================
           更新後的連接器樣式 (CSS 繪製)
           ========================================= */
        .connector {
            position: relative;
            display: flex;
            align-items: center;
            height: 50px; /* 與按鈕同高，確保絕對水平對齊 */
            width: 60px;  /* 設定連接器的寬度 */
        }

        /* 繪製線條 (適用於所有連接器) */
        .connector::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px; /* 稍微加粗線條，使其更明顯 */
            background-color: var(--primary-blue); /* 使用主題藍色 */
            border-radius: 2px; /* 讓線條末端圓潤 */
            transform: translateY(-50%);
        }

        /* 僅繪製箭頭尖端 (適用於 arrow-connector) */
        .arrow-connector::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 0; /* 箭頭尖端在最右側 */
            width: 0;
            height: 0;
            /* 使用邊框技術繪製三角形 */
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 12px solid var(--primary-blue); /* 尖端顏色與線條一致 */
            transform: translateY(-50%);
        }

        /* 通過 / 不通過的膠囊標籤 */
        .result-capsule {
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid var(--primary-blue);
            color: var(--dark-text);
            font-weight: bold;
            font-size: 1.1rem;
            background: white;
            transition: 0.2s;
            display: flex;
            align-items: center;
            height: 22px; /* 控制膠囊高度 */
            white-space: nowrap; /* 防止文字折行 */
        }

        .result-capsule.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

    </style>
</head>
<script>
//接收第一頁選擇的type
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");

    const keyImg = document.getElementById("key-img");
    const passText = document.getElementById("res-1"); 
    const blockText = document.getElementById("res-0");

    if(!keyImg || !passText || !blockText) return;

    if(type === "rectilinear"){

        keyImg.src = "https://s112321005.github.io/Cybersecurity-Visualization/vertical.svg";

        passText.textContent = "|↑⟩";
        blockText.textContent = "|→⟩";

    }

    if(type === "diagonal"){

        keyImg.src = "https://s112321005.github.io/Cybersecurity-Visualization/diagonal.svg";

        passText.textContent = "|↗⟩";
        blockText.textContent = "|↖⟩";

    }

});

</script>
<body>

<div class="header">
    <div class="header-left">
        <a href="index.html" class="btn-back">&lt;</a>
        <div class="title-pill">Quantum Key Distribution</div>
    </div>
    
    <div class="header-center">
        <p class="step-text">STEP 1 :</p>
        <p class="step-text">Alice selects message 0 or 1 to determine <br>the direction of the light.</p>
    </div>
    
    <div class="header-right">
        <button class="nav-btn" onclick="prevStep()">Back</button>
        <button class="nav-btn" onclick="nextStep()">Next</button>
    </div>
</div>

<div class="main-card">
    
    <div class="character-alice">
        <img src="alice.svg" alt="Alice" width="160"> 
    </div>

    <div class="cloud-container">
        
        <div class="decision-grid">
            
            <div class="col">
                <div class="circle-btn active" id="btn-0" onclick="selectMessage(0)">0</div>
                <div class="circle-btn" id="btn-1" onclick="selectMessage(1)">1</div>
            </div>

            <div class="col">
                <div class="connector line-connector"></div>
                <div class="connector line-connector"></div>
            </div>

            <div class="col col-key">
                <img id="key-img" src="vertical.svg" width="90" alt="Key">
            </div>

            <div class="col">
                <div class="connector arrow-connector"></div>
                <div class="connector arrow-connector"></div>
            </div>

            <div class="col">
                <div class="result-capsule active" id="res-0"></div>
                <div class="result-capsule" id="res-1"></div>
            </div>

        </div>

    </div>

</div>

<script>
    let selectedMessage = 0; // 預設選擇 0

    function selectMessage(val) {
        selectedMessage = val;
        
        // 1. 重置所有樣式
        document.getElementById('btn-0').classList.remove('active');
        document.getElementById('btn-1').classList.remove('active');
        document.getElementById('res-0').classList.remove('active');
        document.getElementById('res-1').classList.remove('active');

        // 2. 根據選擇加上 active 樣式
        if (val === 0) {
            document.getElementById('btn-0').classList.add('active');
            document.getElementById('res-0').classList.add('active');
        } else {
            document.getElementById('btn-1').classList.add('active');
            document.getElementById('res-1').classList.add('active');
        }
        
        console.log("Alice 選擇了訊息:", val);
    }

    function nextStep() {
        // 1. 先把第一頁傳來這個網頁的 type 抓出來
        const params = new URLSearchParams(window.location.search);
        const type = params.get("type");

        // 2. 把 type 和 msg 串在一起，一起帶到下一頁 (QKDedu3.html)
        let nextUrl = "https://s112321005.github.io/Cybersecurity-Visualization/QKDedu3.html";
        nextUrl += "?type=" + type + "&msg=" + selectedMessage;
        
        window.location.href = nextUrl;
    }

    function prevStep() {
        let prevUrl = "https://s112321005.github.io/Cybersecurity-Visualization/QKDedu1.html";
        window.location.href = prevUrl;
        //window.history.back();
    }
</script>

</body>
</html>
