<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>Quantum Key Distribution: B92</title>
    <style>
        :root { --primary-blue: #549FD0; --alice-blue: #004aad; --bg-gradient: linear-gradient(135deg, #E0F2FE 0%, #F5F3FF 50%, #ECFDF5 100%); --dark-text: #333333; --bg-color: #f8f9fa; --active-blue: #eaf1fb; --photon-yellow: #ffeb3b; --zero: #3d7df2; --plus: #f0a92d; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 73, 176, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 73, 176, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 73, 176, 0); } }
        @keyframes float-anim { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
        @keyframes gentle-glow { 0% { box-shadow: 0 0 5px rgba(84, 159, 208, 0.2); transform: scale(1); } 100% { box-shadow: 0 0 15px rgba(84, 159, 208, 0.6); transform: scale(1.05); } }
        
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background: var(--bg-gradient); margin: 0; animation: fadeIn 0.8s ease-out; overflow-x: hidden; }
        
        /* Header styles */
        .header { width: min(1000px, 95vw); display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; height: 60px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { width: 40px; height: 40px; background-color: var(--primary-blue); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 1.1rem; transition: transform 0.2s; cursor: pointer; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.15); padding: 0; margin: 0; box-sizing: border-box; flex-shrink: 0; }
        .btn-back:hover { transform: scale(1.1); }
        .title-pill { border: 2px solid var(--primary-blue); height: 48px; padding: 0 25px; border-radius: 30px; font-weight: bold; background: white; display: flex; align-items: center; justify-content: center; box-sizing: border-box; white-space: nowrap; font-size: 1.1rem; color: var(--dark-text); }
        .step-text { font-weight: bold; font-size: 1.1rem; margin: 0; color: var(--dark-text); }
        
        /* Button styles */
        .nav-btn { border: 2px solid var(--primary-blue); background: white; padding: 0 30px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; opacity: 0.3; pointer-events: none; height: 48px; display: flex; align-items: center; box-sizing: border-box; font-size: 1.1rem; color: var(--dark-text); }
        .nav-btn.ready { opacity: 1; pointer-events: auto; background: var(--primary-blue); color: white; box-shadow: 0 4px 15px rgba(84, 159, 208, 0.3); }
        
        /* Main card area */
        .main-card { width: min(1000px, 95vw); height: 580px; border: 3px solid var(--primary-blue); border-radius: 35px; position: relative; background: white; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; overflow: hidden; padding-top: 25px; box-sizing: border-box; }
        
        /* Interactive area styles */
        .character-alice { margin-bottom: 5px; animation: float-anim 3.5s ease-in-out infinite; }
        .alice-interactive { display: flex; flex-direction: column; align-items: center; z-index: 5; width: 100%; }
        .prompt-text { margin: 0 0 20px 0; font-weight: bold; color: var(--alice-blue); font-size: 1.3rem; letter-spacing: 0.5px; }
        
        .selector-area { display: flex; align-items: flex-start; gap: 80px; margin-top: 10px; }
        .basis-column { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .basis-title { font-weight: bold; color: var(--alice-blue); font-size: 1.1rem; margin-bottom: 5px; background: #f0f4f8; padding: 5px 15px; border-radius: 15px; }
        
        .state-btn { cursor: pointer; padding: 20px; border: 2px solid #eee; border-radius: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; gap: 10px; width: 120px; background: white; position: relative; animation: pulse-anim 2s infinite; }
        .state-btn:hover { transform: translateY(-5px); border-color: #b7cdee; background: #fafcff; }
        .state-btn.active { border-color: var(--alice-blue); background: var(--active-blue); transform: scale(1.08); animation: none; box-shadow: 0 0 15px rgba(0, 73, 176, 0.4); }
        
        .photon-display { --photon-color: var(--zero); --photon-angle: 90deg; position: relative; width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle, #ffffff 0 52%, color-mix(in srgb, var(--photon-color) 30%, #ffffff) 53% 72%, #ffffff 73% 100%); border: 3px solid #ffffff; box-shadow: 0 0 20px color-mix(in srgb, var(--photon-color) 45%, transparent), 0 0 0 1px color-mix(in srgb, var(--photon-color) 20%, #ffffff); display: inline-flex; justify-content: center; align-items: center; margin-bottom: 5px; overflow: visible; }
        .photon-display::after { content: ""; position: absolute; left: 50%; top: 50%; width: 16px; height: 48px; background: var(--photon-color); transform: translate(-50%, -50%)rotate(var(--photon-angle)); box-shadow: 0 0 8px var(--photon-color); clip-path: polygon(50% 0, 100% 18%, 72% 18%, 72% 82%, 100% 82%, 50% 100%, 0 82%, 28% 82%, 28% 18%, 0 18%); }
        .photon-display.photon-zero { --photon-color: var(--zero); --photon-angle: 90deg; }
        .photon-display.photon-plus { --photon-color: var(--plus); --photon-angle: 45deg; }
        .braket { font-size: 1.8rem; font-weight: bold; color: var(--alice-blue); margin-bottom: 2px; }
        .bit-label { font-size: 1.1rem; color: #333; font-weight: bold; background: #ffeaa7; padding: 2px 10px; border-radius: 10px; }
        
        .explanation-area { display: flex; justify-content: center; align-items: center; margin-top: 35px; padding: 10px; }
        .explanation-text { color: #888; font-weight: bold; font-size: 1rem; margin: 0; text-align: center; }
        
        /* Bottom logic bar */
        .logic-footer { position: absolute; bottom: 0; left: 0; width: 100%; background-color: #f8fbff; border-top: 2px dashed #c7e2f3; padding: 18px 0; display: flex; justify-content: center; align-items: center; }
        .logic-container { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.05rem; }
        .logic-label { color: #888; font-size: 0.9rem; margin-right: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .logic-pill { background: white; border: 2px solid #c7e2f3; padding: 6px 16px; border-radius: 20px; color: var(--primary-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .logic-operator { color: #aaa; font-weight: bold; font-size: 1.4rem; }
        .logic-pill.result { background: var(--primary-blue); color: white; border-color: var(--primary-blue); animation: gentle-glow 1.5s infinite alternate; }
        .b92-image-dock { position: fixed; right: 16px; top: 0; width: 430px; height: 100vh; z-index: 900; pointer-events: none; display: flex; justify-content: center; overflow: visible; isolation: isolate; font-family:'Arial Rounded MT Bold','Arial Rounded MT','Arial',sans-serif; }
        .b92-image-viewport { position: relative; width: 330px; height: 100vh; background: #ffffff; box-sizing: border-box; box-shadow: 0 12px 26px rgba(0,0,0,.12); overflow: visible; z-index: 1; }
        .b92-image-viewport::before, .b92-image-viewport::after { content: ""; position: absolute; top: 0; width: 14px; height: 100vh; background: #d9d9d9; z-index: 1; pointer-events: none; }
        .b92-image-viewport::before { left: 0; }
        .b92-image-viewport::after { right: 0; }
        .b92-image-window { position: relative; width: 500px; height: 100vh; margin-left: -85px; overflow: hidden; z-index: 10; }
        .b92-image-list { position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 52px 0 42px; box-sizing: border-box; width: 500px; transform: translateY(0); transition: transform .55s cubic-bezier(.22,.8,.22,1); z-index: 20; }
        .b92-image-card { position: relative; width: 350px; min-height: 52px; padding: 0 18px; box-sizing: border-box; background: #ffffff; border: 6px solid var(--primary-blue); border-radius: 16px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; transition: width .55s cubic-bezier(.22,.8,.22,1), min-height .55s cubic-bezier(.22,.8,.22,1), padding .55s cubic-bezier(.22,.8,.22,1), border-width .55s cubic-bezier(.22,.8,.22,1), border-radius .55s cubic-bezier(.22,.8,.22,1), box-shadow .55s cubic-bezier(.22,.8,.22,1), filter .35s ease, opacity .35s ease, transform .55s cubic-bezier(.22,.8,.22,1); z-index: 20; overflow: hidden; }
        .b92-image-card:not(.is-current) { filter: none; opacity: 1; transform: scale(1); }
        .b92-image-card.is-current { width: 365px; min-height: 365px; padding: 14px; border: 7px solid var(--primary-blue); border-radius: 20px; box-shadow: 0 12px 28px rgba(84,159,208,.28); filter: none; opacity: 1; transform: scale(1); margin: 6px 0; z-index: 100; }
        .b92-step-summary { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 100%; color: #111; font-weight: 900; font-size: 1rem; letter-spacing: .02em; white-space: nowrap; transition: opacity .22s ease, transform .22s ease; }
        .b92-step-number { width: 22px; height: 22px; border-radius: 50%; background: var(--primary-blue); color: #ffffff; display: inline-flex; align-items: center; justify-content: center; font-size: .86rem; line-height: 1; flex: 0 0 auto; }
        .b92-step-title { display: inline-block; line-height: 1; }
        .b92-image-card img { position: relative; z-index: 101; width: 100%; height: 100%; max-width: 0; max-height: 0; object-fit: contain; display: block; opacity: 0; transform: scale(.92); transition: opacity .28s ease .2s, transform .45s cubic-bezier(.22,.8,.22,1) .12s, max-width .55s cubic-bezier(.22,.8,.22,1), max-height .55s cubic-bezier(.22,.8,.22,1); }
        .b92-image-card.is-current .b92-step-summary { opacity: 0; transform: translateY(-8px); position: absolute; pointer-events: none; }
        .b92-image-card.is-current img { max-width: 318px; max-height: 320px; opacity: 1; transform: scale(1); }
        @media (min-width: 1180px) { body { padding-right: 450px !important; } }
        @media (max-width: 1179px) { .b92-image-dock { position: relative; right: auto; top: auto; width: min(94vw, 840px); height: 320px; margin: 18px auto 10px; overflow: visible; } .b92-image-viewport { width: 100%; height: 320px; } .b92-image-viewport::before, .b92-image-viewport::after { width: 10px; height: 320px; } .b92-image-window { width: 100%; height: 320px; margin-left: 0; overflow: hidden; } .b92-image-list { flex-direction: row; align-items: center; gap: 14px; width: max-content; height: 320px; padding: 0 24px; } .b92-image-card { width: 270px; min-height: 52px; } .b92-image-card.is-current { width: 305px; min-height: 250px; margin: 0 10px; z-index: 100; } .b92-image-card.is-current img { max-width: 275px; max-height: 220px; } }
    </style>
</head>
<body>

<aside class="b92-image-dock" aria-label="B92 current-step image preview" data-current-step="1">
    <div class="b92-image-viewport">
        <div class="b92-image-window">
            <div class="b92-image-list">
                <div class="b92-image-card is-current" data-b92-step="1" aria-current="step"><div class="b92-step-summary"><span class="b92-step-number">1</span><span class="b92-step-title">PREPARE</span></div><img src="pictures/b92-1.png" alt="B92 Step 1"></div>
                <div class="b92-image-card" data-b92-step="2"><div class="b92-step-summary"><span class="b92-step-number">2</span><span class="b92-step-title">TRANSMIT</span></div><img src="pictures/b92-2.png" alt="B92 Step 2"></div>
                <div class="b92-image-card" data-b92-step="3"><div class="b92-step-summary"><span class="b92-step-number">3</span><span class="b92-step-title">MEASURE</span></div><img src="pictures/b92-3.png" alt="B92 Step 3"></div>
                <div class="b92-image-card" data-b92-step="4"><div class="b92-step-summary"><span class="b92-step-number">4</span><span class="b92-step-title">SIFTING</span></div><img src="pictures/b92-4.png" alt="B92 Step 4"></div>
                <div class="b92-image-card" data-b92-step="5"><div class="b92-step-summary"><span class="b92-step-number">5</span><span class="b92-step-title">KEY</span></div><img src="pictures/b92-5.png" alt="B92 Step 5"></div>
            </div>
        </div>
    </div>
</aside>

<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html" class="btn-back" title="back home">◀&#xFE0E;</a>
        <div class="title-pill">Quantum Key Distribution: B92</div>
    </div>
    <div class="header-center"><p class="step-text">STEP 1: Alice prepares the photon</p></div>
    <div class="header-right">
        <button id="next-btn" class="nav-btn" onclick="nextStep()" disabled>Next</button>
    </div>
</div>

<div class="main-card">
    <div class="alice-interactive">
        <div class="character-alice"><img src="pictures/cat_alice.svg" alt="Alice" width="120"></div>
        <p class="prompt-text">Choose a bit to send!</p>
        
        <div class="selector-area">
            <div class="basis-column">
                <div class="basis-title">S Basis (Rectilinear)</div>
                <div class="state-btn" onclick="selectState('0', 'rectilinear', this)">
                    <div class="photon-display photon-zero" aria-label="Qubit |0⟩"></div>
                    <span class="bit-label">Bit 0</span>
                </div>
            </div>
            
            <div style="width: 2px; height: 160px; background: #eee; align-self: center; margin-top: 40px;"></div>
            
            <div class="basis-column">
                <div class="basis-title">D Basis (Diagonal)</div>
                <div class="state-btn" onclick="selectState('1', 'diagonal', this)">
                    <div class="photon-display photon-plus" aria-label="Qubit |+⟩"></div>
                    <span class="bit-label">Bit 1</span>
                </div>
            </div>
        </div>

    </div>
    
    <div class="logic-footer">
        <div class="logic-container">
            <span class="logic-label">B92 Encoding</span>
            <span class="logic-pill">Message Bit</span>
            <span class="logic-operator">➔&#xFE0E;</span>
            <span class="logic-pill result">Non-orthogonal State</span>
        </div>
    </div>
</div>

<script>
    let selectedMsg = null;
    let selectedBasis = null;

    function selectState(bit, basis, el) {
        // Clear the active state from all buttons.
        document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
        
        // Mark the clicked button as active.
        el.classList.add('active');
        
        // Update the prompt text.
        document.querySelector('.prompt-text').textContent = "State Selected!";
        document.querySelector('.prompt-text').style.color = "#28a745"; 
        
        // Store the selected values.
        selectedMsg = bit;
        selectedBasis = basis;
        
        // Enable the Next button.
        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = false;
        nextBtn.classList.add('ready');
    }

    function nextStep() {
        if (selectedMsg === null) return;
        
        // Clear previous cached data to keep the flow clean.
        localStorage.removeItem('b92StepData'); 
        localStorage.removeItem('b92Step2Data'); 
        
        // Go to step two and pass the selected values to Bob through the URL.
        window.location.href = `B92step2.html?aliceMsg=${selectedMsg}&aliceBasis=${selectedBasis}`;
    }
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.b92-image-dock');
    const windowBox = document.querySelector('.b92-image-window');
    const list = document.querySelector('.b92-image-list');
    let currentCard = document.querySelector('.b92-image-card.is-current');

    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    function getStep2CollapsedStep1ReferenceOffset(isHorizontal) {
        const step1Card = document.querySelector('.b92-image-card[data-b92-step="1"]');
        const step3Card = document.querySelector('.b92-image-card[data-b92-step="3"]');
        if (!step1Card || !step3Card || !currentCard) {
            if (isHorizontal) {
                return (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2);
            }
            return Math.max(0, (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2));
        }

        const ariaBefore = currentCard.getAttribute('aria-current');

        currentCard.classList.remove('is-current');
        currentCard.removeAttribute('aria-current');
        step3Card.classList.add('is-current');
        step3Card.setAttribute('aria-current', 'step');

        const targetEdge = isHorizontal ? step1Card.offsetLeft : step1Card.offsetTop;

        step3Card.classList.remove('is-current');
        step3Card.removeAttribute('aria-current');
        currentCard.classList.add('is-current');
        if (ariaBefore) currentCard.setAttribute('aria-current', ariaBefore);

        const currentEdge = isHorizontal ? currentCard.offsetLeft : currentCard.offsetTop;
        return targetEdge - currentEdge;
    }

    window.lockB92ImageToCurrentStep = function () {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        const offset = getStep2CollapsedStep1ReferenceOffset(isHorizontal);
        list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
    };

    window.lockB92ImageToCurrentStep();
    window.addEventListener('resize', window.lockB92ImageToCurrentStep);
});
</script>
</body>
</html>
