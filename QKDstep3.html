<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QKD Step 3：最終結果展示</title>
    <link rel="stylesheet" href="analysisCSS.css">
    <style>
        /* 針對結果頁面微調，讓畫布置中且放大 */
        .result-view-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 40px 0;
        }
        .diagram-area {
            width: 100%;
            max-width: 900px;
            height: 600px;
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .page-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        /* 淡化未選中的元素 */
        .inactive {
            opacity: 0.2;
            filter: grayscale(100%);
        }
        .line-inactive {
            stroke: #e0e0e0 !important;
            stroke-dasharray: 5, 5;
        }
        .active-line {
            stroke: #333 !important;
            stroke-width: 4 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar" style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
        <a href="QKDstep2.html" class="btn-back" title="返回上一步">◀</a>
        <div class="page-title">QKD Step 3：光子測量結果</div>
    </div>

    <div class="result-view-container">
        <div class="diagram-area">
            <svg class="arrows" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;">
                <defs>
                    <marker id="arrow-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" id="arrow-path"/>
                    </marker>
                    <marker id="arrow-head-inactive" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#e0e0e0"/>
                    </marker>
                </defs>
                
                <line id="line-a-b-top" x1="17%" y1="50%" x2="35%" y2="25%" stroke="#333" stroke-width="3" marker-end="url(#arrow-head)" />
                <line id="line-a-b-bot" x1="17%" y1="50%" x2="35%" y2="75%" stroke="#333" stroke-width="3" marker-end="url(#arrow-head)" />
                
                <line id="line-b-res-top" x1="47%" y1="25%" x2="67%" y2="25%" stroke="#333" stroke-width="3" marker-end="url(#arrow-head)" />
                <line id="line-b-res-bot1" x1="47%" y1="75%" x2="67%" y2="55%" stroke="#333" stroke-width="3" marker-end="url(#arrow-head)" />
                <line id="line-b-res-bot2" x1="47%" y1="75%" x2="67%" y2="95%" stroke="#333" stroke-width="3" marker-end="url(#arrow-head)" />
            </svg>

            <div class="character-avatar" style="left: 10%;"><img src="pictures/cat_alice.svg" alt="Alice"></div>
            <div class="character-avatar" style="left: 40%;"><img src="pictures/cat_bob.svg" alt="Bob"></div>
            <div class="result-header" style="position: absolute; right: 5%; top: 5%; background:#d6e4ff; padding:8px 16px; border-radius:8px; font-weight:bold; color:#003366;">Result</div>
            
            <div class="node" style="left: 10%; top: 50%;">
                <img id="alice-key-img" src="pictures/diagonal.svg" class="polarizer-img">
                <div class="state-circle" id="alice-state-text" style="background:#004ba0; color:white;">|↗⟩</div>
            </div>
            
            <div class="node" style="left: 41%; top: 25%;">
                <img id="bob-key-top" src="pictures/b_diagonal.svg" class="polarizer-img">
            </div>
            <div class="node" style="left: 41%; top: 75%;">
                <img id="bob-key-bot" src="pictures/gray_vertical.svg" class="polarizer-img inactive">
            </div>

            <div class="node" style="left: 75%; top: 25%;">
                <div id="res-state-top" class="state-circle" style="background:#004ba0; color:white;">|↗⟩</div>
            </div>
            <div class="node" style="left: 75%; top: 55%;">
                <div id="res-state-bot1" class="state-circle inactive" style="background:#e0e0e0; color:#666;">|↑⟩</div>
            </div>
            <div class="node" style="left: 75%; top: 95%;">
                <div id="res-state-bot2" class="state-circle inactive" style="background:#e0e0e0; color:#666;">|→⟩</div>
            </div>

            <div id="mark-top" class="result-circle" style="left: 90%; top: 25%; width: 50px; height: 50px; background:#d4edda; color:#155724;">✔</div>
            <div id="mark-bot1" class="result-circle inactive" style="left: 90%; top: 56%; width: 50px; height: 50px; background:#e0e0e0; color:#666;">✖</div>
            <div id="mark-bot2" class="result-circle inactive" style="left: 90%; top: 96%; width: 50px; height: 50px; background:#e0e0e0; color:#666;">✖</div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 模擬從 Step 1 & Step 2 傳遞過來的資料 (實際情況請改為讀取 localStorage)
        // 假設這就是你在圖片中的情境：Alice 傳 |↗⟩ (X基底)，Bob 用 D(X) 基底測量
        let testData = localStorage.getItem('qkdStepData');
        let stepData = testData ? JSON.parse(testData) : {
            aliceState: '|↗⟩',
            aliceBasis: 'X', // 'Z' (rectilinear) 或 'X' (diagonal)
            bobBasis: 'X'    // 'Z' (rectilinear) 或 'X' (diagonal)
        };

        renderDiagram(stepData);
    });

    function renderDiagram(data) {
        const isAliceZ = (data.aliceBasis === 'Z');
        const isBobZ = (data.bobBasis === 'Z');
        const isSameBasis = (isAliceZ === isBobZ);

        // 1. 設定 Alice 端的圖示與狀態
        document.getElementById('alice-state-text').innerText = data.aliceState;
        document.getElementById('alice-key-img').src = isAliceZ ? "pictures/vertical.svg" : "pictures/diagonal.svg";

        // 2. 準備對應的相反基底符號 (用於不匹配時分裂的結果)
        const zStates = ['| ↑ ⟩', '|→⟩'];
        const xStates = ['|↗⟩', '|↖⟩'];
        const oppoStates = isAliceZ ? xStates : zStates;

        // 3. 設定結果端的狀態文字
        document.getElementById('res-state-top').innerText = data.aliceState;
        document.getElementById('res-state-bot1').innerText = oppoStates[0];
        document.getElementById('res-state-bot2').innerText = oppoStates[1];

        // 4. 判斷 Bob 選擇的鑰匙圖示
        const bobTopImg = document.getElementById('bob-key-top');
        const bobBotImg = document.getElementById('bob-key-bot');

        // 如果基底相同，走上半部 (Top Path)
        if (isSameBasis) {
            bobTopImg.src = isAliceZ ? "pictures/b_vertical.svg" : "pictures/b_diagonal.svg";
            bobBotImg.src = isAliceZ ? "pictures/gray_diagonal.svg" : "pictures/gray_vertical.svg";
            
            // 啟用上半部，淡化下半部
            setPathActive('top');
        } 
        // 如果基底不同，走下半部 (Bottom Path)
        else {
            bobTopImg.src = isAliceZ ? "pictures/gray_vertical.svg" : "pictures/gray_diagonal.svg";
            bobBotImg.src = isAliceZ ? "pictures/b_diagonal.svg" : "pictures/b_vertical.svg";
            
            // 啟用下半部，淡化上半部
            setPathActive('bottom');
        }
    }

    function setPathActive(pathType) {
        const topElements = [
            document.getElementById('bob-key-top'),
            document.getElementById('res-state-top'),
            document.getElementById('mark-top')
        ];
        const botElements = [
            document.getElementById('bob-key-bot'),
            document.getElementById('res-state-bot1'),
            document.getElementById('res-state-bot2'),
            document.getElementById('mark-bot1'),
            document.getElementById('mark-bot2')
        ];

        const lines = {
            top: [document.getElementById('line-a-b-top'), document.getElementById('line-b-res-top')],
            bot: [document.getElementById('line-a-b-bot'), document.getElementById('line-b-res-bot1'), document.getElementById('line-b-res-bot2')]
        };

        if (pathType === 'top') {
            // 顯示 Top，淡化 Bottom
            topElements.forEach(el => { el.classList.remove('inactive'); });
            botElements.forEach(el => { el.classList.add('inactive'); });
            
            lines.top.forEach(l => { l.classList.add('active-line'); l.classList.remove('line-inactive'); l.setAttribute('marker-end', 'url(#arrow-head)'); });
            lines.bot.forEach(l => { l.classList.remove('active-line'); l.classList.add('line-inactive'); l.setAttribute('marker-end', 'url(#arrow-head-inactive)'); });
            
        } else {
            // 顯示 Bottom，淡化 Top
            topElements.forEach(el => { el.classList.add('inactive'); });
            botElements.forEach(el => { el.classList.remove('inactive'); });
            
            lines.top.forEach(l => { l.classList.remove('active-line'); l.classList.add('line-inactive'); l.setAttribute('marker-end', 'url(#arrow-head-inactive)'); });
            lines.bot.forEach(l => { l.classList.add('active-line'); l.classList.remove('line-inactive'); l.setAttribute('marker-end', 'url(#arrow-head)'); });
        }
    }
</script>

</body>
</html>
