<!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">

    <title>Quantum Key Distribution：BB84</title>

    <style>

        :root { --primary-blue: #004aad; --dark-text: #333333; --bg-color: #f8f9fa; --photon-yellow: #ffeb3b; --match-green: #28a745; --mismatch-red: #dc3545; }

        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background-color: var(--bg-color); margin: 0; overflow-y: scroll; }

        .header { width: min(1000px, 95vw); display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; animation: fadeIn 0.8s ease-out forwards; }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .btn-back { width: 40px; height: 40px; background-color: var(--primary-blue); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 1rem; transition: transform 0.2s; cursor: pointer; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .btn-back:hover { transform: scale(1.1); }

        .page-title { border: 2px solid var(--primary-blue); color: #000; padding: 10px 40px; border-radius: 10px; font-size: 20px; font-weight: bold; }

        .header-center { flex-grow: 1; margin-left: 20px; font-weight: bold; font-size: 1.2rem; color: var(--dark-text); text-align: center; }

        .header-right { display: flex; gap: 15px; }

        .nav-btn { border: 2px solid var(--primary-blue); background: white; color: var(--dark-text); padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s; }

        .nav-btn:hover { background: var(--primary-blue); color: white; }

        .main-card { width: min(1000px, 95vw); height: 560px; border: 3px solid var(--primary-blue); border-radius: 35px; position: relative; background: white; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 25px; padding-bottom: 50px; animation: fadeIn 0.8s ease-out forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .decision-grid { display: flex; align-items: center; justify-content: center; gap: 30px; width: 100%; }

        .col { display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

        .character-avatar { position: absolute; bottom: 100%; margin-bottom: 20px; z-index: 10; }

        .result-capsule { padding: 12px 25px; border-radius: 30px; border: 2px solid var(--primary-blue); color: var(--primary-blue); font-weight: bold; font-size: 1.2rem; background: white; display: flex; align-items: center; justify-content: center; height: 25px; min-width: 100px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .result-capsule.active { background: var(--primary-blue); color: white; }

        .result-capsule.error { border-color: #999; color: #555; opacity: 0; transition: opacity 0.5s; }

        .basis-circle { width: 45px; height: 45px; border-radius: 50%; background: #4c80c5; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; margin-top: 10px; box-shadow: 0 4px 10px rgba(0, 74, 173, 0.3); }

        .bob-interactive { display: flex; flex-direction: column; align-items: center; gap: 10px; transition: opacity 0.3s ease; }

        .bob-choices { display: flex; gap: 20px; }

        .bob-choice-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 15px; border: 2px solid transparent; transition: all 0.2s; background: white; }

        .bob-choice-btn:hover { background-color: #e6f0ff; border-color: #80d8ff; transform: scale(1.05); }

        .pulse { animation: pulse-anim 2s infinite; }

        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 74, 173, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0); } }

        .bob-active-basis { display: none; flex-direction: column; align-items: center; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .connector { position: relative; display: flex; align-items: center; height: 50px; width: 0; opacity: 0; transition: width 0.5s ease-out, opacity 0.2s ease; }

        .connector::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background-color: var(--primary-blue); transform: translateY(-50%); }

        .arrow-connector::after { content: ""; position: absolute; top: 50%; right: -2px; width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 14px solid var(--primary-blue); transform: translateY(-50%); opacity: 0; transition: opacity 0.2s ease 0.4s; }

        .connector.active { opacity: 1; width: 60px; }

        .connector.active.full-width { width: 100%; }

        .arrow-connector.active::after { opacity: 1; }

        .col-connectors { position: relative; width: 60px; height: 160px; }

        .arrow-single { position: absolute; left: 0; top: 50%; transform: translateY(-50%); }

        .arrow-branch-up { position: absolute; left: 0; top: 50%; transform-origin: left center; transform: translateY(-50%) rotate(-35deg); }

        .arrow-branch-down { position: absolute; left: 0; top: 50%; transform-origin: left center; transform: translateY(-50%) rotate(35deg); }

        .result-icon { font-size: 2rem; font-weight: bold; margin-left: 15px; }

        .result-icon.match { color: var(--match-green); }

        .result-icon.mismatch { color: var(--mismatch-red); opacity: 0; transition: opacity 0.5s; }

        .output-group { display: flex; align-items: center; }

        #results-area { min-width: 180px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        #results-area- { color: gray; font-weight: bold; margin: 0; position: absolute; top: -10px; font-size: 0.9rem; }

        .show-result .result-capsule.error { opacity: 1; }

        .show-result .result-icon.mismatch { opacity: 1; }

        .explanation-box { position: absolute; bottom: 25px; width: 85%; background: #f8fbff; border-left: 6px solid var(--primary-blue); padding: 18px 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; opacity: 0; transform: translateY(20px); pointer-events: none; transition: all 0.5s ease; }

        .explanation-box.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .explain-header { display: flex; justify-content: space-between; align-items: center; }

        .explain- { font-weight: bold; font-size: 1.25rem; margin: 0; display: flex; align-items: center; gap: 8px; }

        .explain-desc { color: #555; font-size: 1.05rem; margin: 0; line-height: 1.4; }

        .highlight-keep { color: var(--match-green); font-weight: bold; }

        .highlight-discard { color: var(--mismatch-red); font-weight: bold; }

        .retry-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #ccc; background: white; color: #555; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 0.95rem; }

        .retry-btn:hover { background: #f0f0f0; border-color: #999; color: black; transform: scale(1.05); }

        .bottom-hint { position: absolute; bottom: 30px; color: gray; font-weight: bold; font-size: 1.1rem; transition: opacity 0.3s; }

        @keyframes shoot-to-bob { 0% { transform: translate(0, 0) scale(0); opacity: 1; } 20% { transform: translate(calc(var(--tx-bob) * 0.2), calc(var(--ty-bob) * 0.2)) scale(1.3); } 100% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(1); opacity: 1; } }

        @keyframes shoot-bob-to-outcome { 0% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(1); opacity: 1; } 100% { transform: translate(var(--tx-out), var(--ty-out)) scale(1); opacity: 1; } }

        @keyframes shoot-collapse { 0% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(1); opacity: 1; } 100% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(0); opacity: 0; } }

        .photon-particle { position: absolute; width: 35px; height: 35px; background: var(--photon-yellow); border-radius: 50%; box-shadow: 0 0 25px var(--photon-yellow); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.3rem; color: var(--primary-blue); pointer-events: none; z-index: 100; }

    </style>

</head>
