<head>

    <style>
        :root {
            --primary-blue: #549FD0;
            --bob-color: #4C80C5;
            --alice-color: #004aad;
            --dark-text: #333333;
            --bg-color: #f8f9fa;
            --bg-gradient: linear-gradient(135deg, #E0F2FE 0%, #F5F3FF 50%, #ECFDF5 100%);
            --photon-yellow: #ffeb3b; 
            --path-gray: #d0d0d0;
            --path-black: #333333;
        }

        body {
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center;    
            padding: 40px 20px; background: var(--bg-gradient); margin: 0;
            overflow-y: scroll; 
        }

        /* 頂部導覽列 */
        .header {
            width: min(1000px, 95vw); display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px; animation: fadeIn 0.8s ease-out forwards;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back {
            width: 40px; height: 40px; background-color: var(--primary-blue);
            color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            text-decoration: none; font-size: 1rem; transition: transform 0.2s; cursor: pointer; border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-back:hover { transform: scale(1.1); }
        .title-pill {
            border: 2px solid var(--primary-blue); padding: 8px 20px;
            border-radius: 30px; font-weight: bold; background: white; color: var(--dark-text);
            white-space: nowrap;
        }
        .header-center { 
            flex-grow: 1; margin-left: 20px; font-weight: bold; 
            font-size: 1.2rem; color: var(--dark-text); text-align: center; 
            white-space: nowrap;
        }
        .step-title-stack { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.15; white-space: normal; }
        .mode-tag { display: inline-flex; align-items: center; justify-content: center; margin-top: 5px; padding: 5px 14px; border-radius: 999px; background: #549FD0; color: #fff; font-size: 0.95rem; font-weight: 900; line-height: 1; }
        .header-right { display: flex; gap: 15px; }
        .nav-btn {
            border: 2px solid var(--primary-blue); background: white; color: var(--dark-text);
            padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: all 0.2s;
        }
        .nav-btn:not(:disabled) { background: white; color: var(--primary-blue); border-color: var(--primary-blue); box-shadow: 0 4px 15px rgba(84, 159, 208, 0.16); }
        .nav-btn:hover:not(:disabled) { background: var(--primary-blue); color: white; box-shadow: 0 4px 15px rgba(84, 159, 208, 0.3); }
        .nav-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }

        /* 主卡片：高度維持 720px */
        .main-card {
            width: min(1000px, 95vw); height: 720px; border: 3px solid var(--primary-blue); border-radius: 35px;
            position: relative; background: white; box-sizing: border-box; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 15px; animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 排版網格：【重點修改】margin-top 從 80px 增加到 120px，讓一切繼續往下移 */
        .decision-grid { 
            display: flex; align-items: center; justify-content: center; gap: 20px; width: 95%; 
            height: 280px; position: relative; margin-top: 120px; 
        }
        .col { height: 100%; display: flex; justify-content: center; position: relative; }

        /* Alice 的對話框 (位置相對於 decision-grid 保持不變) */
        .speech-bubble {
            position: absolute; top: -100px; background: white; border: 3px solid var(--alice-color);
            padding: 8px 16px 12px; border-radius: 20px; font-weight: bold; font-size: 0.88rem; line-height: 1.18;
            color: var(--alice-color); min-width: 175px; max-width: 205px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 20; min-height: 72px; height: auto; display: flex; align-items: center; justify-content: center; 
            box-sizing: border-box; text-align: center;
        }
        .speech-bubble::before {
            content: ''; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
            border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 16px solid var(--alice-color); z-index: 1;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            border-left: 9px solid transparent; border-right: 9px solid transparent; border-top: 13px solid white; z-index: 2;
        }

        /* 角色與 P1 位置 (位置相對於 decision-grid 保持不變) */
        .character-avatar { position: absolute; bottom: 50%; margin-bottom: 20px; height: 110px; width: auto; z-index: 10; }
        #alice-start { position: absolute; top: calc(50% + 20px); transform: translateY(-50%); background: var(--alice-color); color: white; border-color: var(--alice-color); }

        /* 上方互動區與按鈕 (位置相對於 decision-grid 保持不變) */
        .interactive-area { 
            position: absolute; top: -90px; left: 0; width: 100%; z-index: 5; 
            display: flex; justify-content: center; align-items: center; height: 65px;
        }
        .gate-btn {
            cursor: pointer; padding: 0 20px; border-radius: 15px; border: 2px solid var(--alice-color);
            background: white; color: var(--alice-color); font-weight: bold; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; height: 65px; box-sizing: border-box;
        }
        .gate-btn:hover { background: #f4f9ff; transform: translateY(-3px); }
        .measurement-label { background: white !important; color: var(--alice-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .measurement-label:hover { background: white !important; transform: none; }
        .svg-btn { background: #f0f7ff; border: 2px solid #cce0ff; border-radius: 50%; width: 65px; height: 65px; cursor: pointer; transition: all 0.2s; padding: 5px; outline: none; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .svg-btn:hover:not(:disabled) { transform: scale(1.15); border-color: var(--alice-color); background: white; }
        .svg-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .eye-icon { width: 100%; height: auto; display: block; }
        .measure-control-box { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--alice-color); font-weight: 900; }
        .control-pending-result { border-color: var(--path-black) !important; color: var(--path-black) !important; background: white !important; }
        .flying-eye { position: absolute; width: 52px; height: 52px; z-index: 150; pointer-events: none; filter: drop-shadow(0 5px 9px rgba(0,0,0,0.18)); }
        
        .pulse { animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(0, 73, 176, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(0, 73, 176, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 73, 176, 0); }
        }

        /* 分岔箭頭 */
        .fork-area { position: absolute; top: calc(50% + 20px); transform: translateY(-50%); width: 140px; height: 120px; }
        .fork-line { 
            position: absolute; left: 0; top: 50%; height: 3px; width: 140px; 
            background-color: var(--path-black); transform-origin: left center; transition: background-color 0.3s;
        }
        .fork-line::after {
            content: ""; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
            border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 14px solid var(--path-black); transition: border-left-color 0.3s;
        }
        .fork-up { transform: translateY(-50%) rotate(-25deg); }
        .fork-down { transform: translateY(-50%) rotate(25deg); }
        .fork-prob-label { position: absolute; left: 58px; color: #555; font-weight: 900; font-size: 0.9rem; background: rgba(255,255,255,0.9); padding: 1px 7px; border-radius: 999px; z-index: 3; pointer-events: none; }
        .fork-prob-up { top: 18px; }
        .fork-prob-down { bottom: 18px; }
        .fork-active { background-color: var(--alice-color); }
        .fork-active::after { border-left-color: var(--alice-color); }
        .fork-muted { background-color: #c9cfd8; opacity: 0.45; }
        .fork-muted::after { border-left-color: #c9cfd8; }

        /* 結果區排版設計 */
        .final-states-title { position: absolute; top: -40px; font-weight: bold; color: #555; margin: 0; width: 120px; text-align: center; left: 20px;}
        .final-states-container { 
            position: absolute; top: calc(50% + 20px); transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 70px; width: 100%; left: 20px; align-items: flex-start;
        }
        
        /* 橫向 Row 容器，用來裝 [膠囊] -> [箭頭] -> [結果狀態] */
        .row-container { display: flex; align-items: center; justify-content: flex-start; }

        .result-capsule {
            padding: 10px 20px; border-radius: 30px; border: 2px solid var(--path-gray);
            color: gray; font-weight: bold; font-size: 1.2rem; background: white;
            min-width: 100px; text-align: center; transition: all 0.3s; box-sizing: border-box; white-space: nowrap; 
        }
        
        .pulse-clickable { animation: pulse-click-anim 1.5s infinite; cursor: pointer !important; }
        .pulse-clickable:hover { transform: scale(1.05); }
        @keyframes pulse-click-anim {
            0% { box-shadow: 0 0 0 0 rgba(0,73,176,0.2); }
            70% { box-shadow: 0 0 0 12px rgba(0,73,176,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,73,176,0); }
        }
        .capsule-active { border-color: var(--alice-color); color: var(--alice-color); background: #f4f9ff; }

        /* 運算指向箭頭與結果文字 */
        .straight-arrow {
            height: 3px; background-color: var(--alice-color);
            position: relative; margin: 0 15px; display: none; width: 0; animation: expandArrow 0.4s forwards;
        }
        .straight-arrow::after {
            content: ""; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
            border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 14px solid var(--alice-color);
            opacity: 0; animation: fadeInArrowHead 0.2s 0.4s forwards;
        }
        @keyframes expandArrow { to { width: 50px; } }
        @keyframes fadeInArrowHead { to { opacity: 1; } }

        .psi-result {
            font-size: 1.6rem; font-weight: bold; color: var(--alice-color); display: none; 
            opacity: 0; transform: translateX(-10px); animation: fadeInRight 0.4s 0.4s ease-out forwards;
        }
        @keyframes fadeInRight { to { opacity: 1; transform: translateX(0); } }


        /* 光子與解說面板 */
        .photon-particle {
            position: absolute; width: 36px; height: 36px; background: var(--photon-yellow); border-radius: 50%; 
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.8); display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1rem; color: var(--bob-color); pointer-events: none; z-index: 100;
        }
        
        /* 解說面板貼到底部 */
        .explanation-box {
            position: absolute; bottom: 15px; width: 85%; background: #f8fbff;
            border-left: 6px solid var(--alice-color); padding: 15px 25px; border-radius: 15px; 
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); display: none; box-sizing: border-box;
        }
        .explanation-box.show { display: block; animation: fadeIn 0.5s; }
        .retry-btn { float: right; padding: 5px 15px; border-radius: 15px; border: 1px solid #ccc; cursor: pointer; background: white;}
        .retry-btn:hover { background: #eee; }
        .bottom-hint { position: absolute; bottom: 25px; color: gray; font-weight: bold; font-size: 1.1rem; }
        
        #exp-math { background: white; padding: 15px 10px; border-radius: 8px; text-align: center; font-size: 0.95rem; overflow-x: auto; margin-top: 10px;}

        /* ===== Ping-Pong right-side image-only fixed current-step window ===== */
        .pingpong-image-dock {
            position: fixed;
            right: 18px;
            top: 0;
            width: 330px;
            height: 100vh;
            z-index: 900;
            pointer-events: none;
            display: flex;
            justify-content: center;
            overflow: visible;
            isolation: isolate;
        }
        .pingpong-image-viewport {
            position: relative;
            width: 285px;
            height: 100vh;
            background: #ffffff;
            box-sizing: border-box;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
            overflow: visible;
            z-index: 1;
        }
        .pingpong-image-viewport::before,
        .pingpong-image-viewport::after {
            content: "";
            position: absolute;
            top: 0;
            width: 14px;
            height: 100vh;
            background: #d9d9d9;
            z-index: 1;
            pointer-events: none;
        }
        .pingpong-image-viewport::before { left: 0; }
        .pingpong-image-viewport::after { right: 0; }
        .pingpong-image-window {
            position: relative;
            width: 393px;
            height: 100vh;
            margin-left: -54px;
            overflow: hidden;
            z-index: 10;
        }
        .pingpong-image-list {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 34px;
            padding: 24px 0 34px;
            box-sizing: border-box;
            width: 393px;
            transform: translateY(0);
            transition: transform .45s ease;
            z-index: 20;
        }
        .pingpong-image-card {
            position: relative;
            width: 232px;
            min-height: 245px;
            padding: 12px;
            box-sizing: border-box;
            background: #ffffff;
            border: 0 solid transparent;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            transition: filter .25s ease, opacity .25s ease, transform .25s ease, width .25s ease, min-height .25s ease, box-shadow .25s ease;
            z-index: 20;
        }
        .pingpong-image-card:not(.is-current) {
            filter: grayscale(1) saturate(0);
            opacity: .42;
            transform: scale(.9);
        }
        .pingpong-image-card.is-current {
            width: 340px;
            min-height: 390px;
            padding: 16px;
            border: 11px solid #549FD0;
            border-radius: 36px;
            box-shadow: 0 12px 28px rgba(84, 159, 208, .28);
            filter: none;
            opacity: 1;
            transform: scale(1);
            margin: 8px 0;
            z-index: 100;
        }
        .pingpong-image-card img {
            position: relative;
            z-index: 101;
            width: 100%;
            height: 100%;
            max-width: 208px;
            max-height: 276px;
            object-fit: contain;
            display: block;
        }
        .pingpong-image-card.is-current img {
            max-width: 305px;
            max-height: 350px;
        }
        @media (min-width: 1180px) {
            body { padding-right: 350px !important; }
        }
        @media (max-width: 1179px) {
            .pingpong-image-dock {
                position: relative;
                right: auto;
                top: auto;
                width: min(94vw, 760px);
                height: 285px;
                margin: 18px auto 10px;
                overflow: visible;
            }
            .pingpong-image-viewport {
                width: 100%;
                height: 285px;
            }
            .pingpong-image-viewport::before,
            .pingpong-image-viewport::after {
                width: 10px;
                height: 285px;
            }
            .pingpong-image-window {
                width: 100%;
                height: 285px;
                margin-left: 0;
                overflow: hidden;
            }
            .pingpong-image-list {
                flex-direction: row;
                align-items: center;
                gap: 22px;
                width: max-content;
                height: 285px;
                padding: 0 18px;
            }
            .pingpong-image-card { width: 220px; min-height: 226px; }
            .pingpong-image-card.is-current {
                width: 305px;
                min-height: 258px;
                margin: 0 10px;
                z-index: 100;
            }
            .pingpong-image-card.is-current img { max-width: 270px; max-height: 230px; }
        }
        .pingpong-image-dock { right: 16px; width: 430px; font-family:'Arial Rounded MT Bold','Arial Rounded MT','Arial',sans-serif; }
        .pingpong-image-viewport { width: 330px; }
        .pingpong-image-window { width: 500px; margin-left: -85px; }
        .pingpong-image-list { gap: 12px; padding: 52px 0 42px; width: 500px; transition: transform .55s cubic-bezier(.22,.8,.22,1); }
        .pingpong-image-card { width: 350px; min-height: 52px; padding: 0 18px; border: 6px solid var(--primary-blue); border-radius: 16px; filter: none; opacity: 1; transform: scale(1); transition: width .55s cubic-bezier(.22,.8,.22,1), min-height .55s cubic-bezier(.22,.8,.22,1), padding .55s cubic-bezier(.22,.8,.22,1), border-width .55s cubic-bezier(.22,.8,.22,1), border-radius .55s cubic-bezier(.22,.8,.22,1), box-shadow .55s cubic-bezier(.22,.8,.22,1), filter .35s ease, opacity .35s ease, transform .55s cubic-bezier(.22,.8,.22,1); overflow: hidden; }
        .pingpong-image-card:not(.is-current) { filter: none; opacity: 1; transform: scale(1); }
        .pingpong-image-card.is-current { width: 365px; min-height: 365px; padding: 14px; border: 7px solid var(--primary-blue); border-radius: 20px; box-shadow: 0 12px 28px rgba(84,159,208,.28); margin: 6px 0; }
        .pingpong-step-summary { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 100%; color: #111; font-weight: 900; font-size: 1rem; letter-spacing: .02em; white-space: nowrap; transition: opacity .22s ease, transform .22s ease; }
        .pingpong-step-number { width: 22px; height: 22px; border-radius: 50%; background: var(--primary-blue); color: #ffffff; display: inline-flex; align-items: center; justify-content: center; font-size: .86rem; line-height: 1; flex: 0 0 auto; }
        .pingpong-step-title { display: inline-block; line-height: 1; }
        .pingpong-image-card img { max-width: 0; max-height: 0; opacity: 0; transform: scale(.92); transition: opacity .28s ease .2s, transform .45s cubic-bezier(.22,.8,.22,1) .12s, max-width .55s cubic-bezier(.22,.8,.22,1), max-height .55s cubic-bezier(.22,.8,.22,1); }
        .pingpong-image-card.is-current .pingpong-step-summary { opacity: 0; transform: translateY(-8px); position: absolute; pointer-events: none; }
        .pingpong-image-card.is-current img { max-width: 318px; max-height: 320px; opacity: 1; transform: scale(1); }
        @media (min-width: 1180px) { body { padding-right: 450px !important; } }
        @media (max-width: 1179px) {
            .pingpong-image-dock { width: min(94vw, 840px); height: 320px; }
            .pingpong-image-viewport { height: 320px; }
            .pingpong-image-viewport::before, .pingpong-image-viewport::after { height: 320px; }
            .pingpong-image-window { height: 320px; }
            .pingpong-image-list { gap: 14px; height: 320px; padding: 0 24px; }
            .pingpong-image-card { width: 270px; min-height: 52px; }
            .pingpong-image-card.is-current { width: 305px; min-height: 250px; margin: 0 10px; }
            .pingpong-image-card.is-current img { max-width: 275px; max-height: 220px; }
        }
    </style>
</head>
<body>

<aside class="pingpong-image-dock" aria-label="Ping-Pong current-step image preview" data-current-step="4">
    <div class="pingpong-image-viewport">
        <div class="pingpong-image-window">
            <div class="pingpong-image-list">
                <div class="pingpong-image-card" data-pingpong-step="1"><div class="pingpong-step-summary"><span class="pingpong-step-number">1</span><span class="pingpong-step-title">PREPARE</span></div><img src="pictures/pingpong-1.png" alt="Ping-Pong Step 1 Prepare"></div>
                <div class="pingpong-image-card" data-pingpong-step="2"><div class="pingpong-step-summary"><span class="pingpong-step-number">2</span><span class="pingpong-step-title">TRANSMIT</span></div><img src="pictures/pingpong-2.png" alt="Ping-Pong Step 2 Transmit"></div>
                <div class="pingpong-image-card" data-pingpong-step="3"><div class="pingpong-step-summary"><span class="pingpong-step-number">3</span><span class="pingpong-step-title">SELECTION</span></div><img src="pictures/pingpong-3.png" alt="Ping-Pong Step 3 Selection"></div>

<div class="header">

<div class="main-card" id="stage">
    
    <div class="decision-grid">
        <div class="col" style="width: 180px;">
            <div class="speech-bubble" id="alice-bubble">I received P1!</div>
            <img src="pictures/cat_alice.svg" alt="Alice" class="character-avatar">

        </div>

        <div class="col" style="width: 250px;">
            <div class="interactive-area" id="interactive-area"></div>
            <div class="fork-area" id="fork-container">
                <div class="fork-line fork-up" id="arrow-0"></div>
                <div class="fork-line fork-down" id="arrow-1"></div>
                <span class="fork-prob-label fork-prob-up" data-control-only>50%</span>
                <span class="fork-prob-label fork-prob-down" data-control-only>50%</span>
            </div>
        </div>

        <div class="col" style="width: 320px; align-items: flex-start; padding-left: 20px;">
            <p class="final-states-title" id="final-state-title">Final States</p>
            <div class="final-states-container">
                
                <div class="row-container">
                    <div class="result-capsule" id="final-state-0"><span id="label-0">|0⟩</span></div>
                    <div class="straight-arrow" id="straight-arrow-0"></div>
                    <div class="psi-result" id="psi-0">|𝜓⁺⟩</div>
                </div>

                <div class="row-container">
                    <div class="result-capsule" id="final-state-1"><span id="label-1">|1⟩</span></div>
                    <div class="straight-arrow" id="straight-arrow-1"></div>
                    <div class="psi-result" id="psi-1">|𝜓⁻⟩</div>
                </div>

            </div>
        </div>
    </div>

    <p class="bottom-hint" id="hint-text">Select an operation to proceed.</p>

    <div class="explanation-box" id="explain-box">
        <button class="retry-btn" onclick="location.reload()">↺&#xFE0E; Reset</button>
        <p style="font-weight: bold; font-size: 1.2rem; margin: 0; color: var(--alice-color);" id="exp-title">Result</p>
        <p id="exp-desc" style="margin: 10px 0; font-weight: 500;"></p>
        <div id="exp-math"></div>
    </div>

</div>

<script>
    const firstMode = localStorage.getItem('pingpongMode') || 'message';
    const mode = firstMode === 'message' ? 'control' : 'message';
    const bubble = document.getElementById('alice-bubble');
    const interactive = document.getElementById('interactive-area');

    function configureModeUI() {
        const header = document.getElementById('header-subtitle');
        if (header) {
            const title = mode === 'control' ? 'STEP 4 : MEASURE' : 'STEP 4 : ENCODE';
            const modeLabel = mode === 'control' ? 'Control Mode' : 'Message Mode';
            header.innerHTML = '<span class="step-title-stack"><span>' + title + '</span><span class="mode-tag">' + modeLabel + '</span></span>';
        }
        const step4Img = document.getElementById('pingpong-step4-img');
        const step5Img = document.getElementById('pingpong-step5-img');
        if (step4Img) step4Img.src = mode === 'control' ? 'pictures/pingpong-4-c.png' : 'pictures/pingpong-4-m.png';
        if (step5Img) step5Img.src = mode === 'control' ? 'pictures/pingpong-5-c.png' : 'pictures/pingpong-5-m.png';
    }

    window.onload = () => {
        configureModeUI();
        const title = document.getElementById('final-state-title');
        const hint = document.getElementById('hint-text');

        if (mode === 'control') {
            title.innerText = "Final States";
            hint.innerText = "Click Alice's eye to measure in the Z basis.";
            bubble.innerText = "Security Check Mode: measure P1.";
            interactive.innerHTML = `
                <div class="measure-control-box">
                    <button class="svg-btn pulse" id="alice-measure-eye" onclick="executeAction('measure')" title="Measure Alice's Particle">
                        <img src="pictures/a_eyez.svg" class="eye-icon" alt="Alice measurement eye">
                    </button>
                    <span>Z-Basis Measurement</span>
                </div>
            `;
            document.getElementById('label-0').innerText = "|0⟩";
            document.getElementById('label-1').innerText = "|1⟩";

            const state0 = document.getElementById('final-state-0');
            const state1 = document.getElementById('final-state-1');
            state0.classList.add('control-pending-result');
            state1.classList.add('control-pending-result');
            state0.removeAttribute('onclick');
            state1.removeAttribute('onclick');
        } else {
            title.innerText = "Encode";
            hint.innerText = "Select a bit to encode.";
            bubble.innerText = "Message Mode! Choose a bit to encode.";
            interactive.innerHTML = ""; 
            document.querySelectorAll('[data-control-only]').forEach(label => {
                label.style.display = 'none';
            });
            
            document.getElementById('label-0').innerText = "Bit 0 (I)";
            document.getElementById('label-1').innerText = "Bit 1 (Z)";

            const state0 = document.getElementById('final-state-0');
            const state1 = document.getElementById('final-state-1');
            state0.classList.add('pulse-clickable');
            state1.classList.add('pulse-clickable');
            state0.setAttribute('onclick', "executeAction('0')");
            state1.setAttribute('onclick', "executeAction('1')");
        }
    };

    function executeAction(choice) {
        document.querySelectorAll('.pulse-clickable').forEach(el => el.classList.remove('pulse-clickable'));
        document.querySelectorAll('.gate-btn, .svg-btn').forEach(btn => btn.classList.remove('pulse'));
        document.getElementById('final-state-0').removeAttribute('onclick');
        document.getElementById('final-state-1').removeAttribute('onclick');
        interactive.style.pointerEvents = 'none';

        if (choice === 'measure') {
            const measuredBit = Math.random() < 0.5 ? '0' : '1';
            const eyeButton = document.getElementById('alice-measure-eye');
            if (eyeButton) eyeButton.disabled = true;
            bubble.innerText = `Measuring... Alice may observe |${measuredBit}⟩.`;
            document.getElementById(measuredBit === '0' ? 'arrow-0' : 'arrow-1').classList.add('fork-active');
            document.getElementById(measuredBit === '0' ? 'arrow-1' : 'arrow-0').classList.add('fork-muted');
            if (measuredBit === '0') { document.getElementById('final-state-1').style.opacity = '0.4'; }
            else { document.getElementById('final-state-0').style.opacity = '0.4'; }
            animateMeasurementEye(measuredBit);
        } else if (mode === 'control') {
            bubble.innerText = `Measuring... Alice may observe |${choice}⟩.`;
            document.getElementById(choice === '0' ? 'arrow-0' : 'arrow-1').classList.add('fork-active');
            document.getElementById(choice === '0' ? 'arrow-1' : 'arrow-0').classList.add('fork-muted');
            
            if (choice === '0') { document.getElementById('final-state-1').style.opacity = '0.4'; }
            else { document.getElementById('final-state-0').style.opacity = '0.4'; }

            animateMeasurementEye(choice);
        } else {
            bubble.innerText = `Applying ${choice === '0' ? 'I' : 'Z'} Gate...`;
            document.getElementById(choice === '0' ? 'arrow-0' : 'arrow-1').classList.add('fork-active');
            
            if (choice === '0') { document.getElementById('final-state-1').style.opacity = '0.4'; }
            else { document.getElementById('final-state-0').style.opacity = '0.4'; }

            animateParticle(choice, true);
        }
    }

    function animateParticle(bit, isLastAnimation) {
        const stage = document.getElementById('stage');
        const start = document.getElementById('alice-start').getBoundingClientRect();
        const targetId = bit === '0' ? 'final-state-0' : 'final-state-1';
        const end = document.getElementById(targetId).getBoundingClientRect();
        const stRect = stage.getBoundingClientRect();
        const forkContainer = document.getElementById('fork-container').getBoundingClientRect();

        const particle = document.createElement('div');
        particle.className = 'photon-particle';
        particle.innerText = "P1";
        stage.appendChild(particle);

        const startX = start.left - stRect.left + start.width/2 - 18;
        const startY = start.top - stRect.top + start.height/2 - 18;
        const forkX = forkContainer.left - stRect.left; 
        const endX = end.left - stRect.left + end.width/2 - 18;
        const endY = end.top - stRect.top + end.height/2 - 18;

        const duration = 1500;
        const startT = performance.now();

        function frame(now) {
            const p = Math.min((now - startT) / duration, 1);
            let curX, curY;

            if (p < 0.3) {
                const p1 = p / 0.3;
                curX = startX + (forkX - startX) * p1;
                curY = startY;
            } else {
                const p2 = (p - 0.3) / 0.7;
                const easeP2 = p2 * (2 - p2); 
                curX = forkX + (endX - forkX) * easeP2;
                curY = startY + (endY - startY) * easeP2;
            }

            particle.style.left = curX + 'px';
            particle.style.top = curY + 'px';

            if (p < 1) {
                requestAnimationFrame(frame);
            } else {
                particle.remove();
                
                if (mode === 'control') {
                    if (isLastAnimation) {
                        showResult(bit, targetId);
                    }
                } else {
                    if (isLastAnimation) {
                        showResult(bit, targetId);
                    }
                }
            }
        }
        requestAnimationFrame(frame);
    }

    function animateMeasurementEye(bit) {
        const stage = document.getElementById('stage');
        const sourceEl = document.getElementById('alice-measure-eye');
        const targetId = bit === '0' ? 'final-state-0' : 'final-state-1';
        const targetEl = document.getElementById(targetId);

        if (!stage || !sourceEl || !targetEl) {
            showResult(bit, targetId);
            return;
        }

        const stageRect = stage.getBoundingClientRect();
        const srcRect = sourceEl.getBoundingClientRect();
        const targetRect = targetEl.getBoundingClientRect();
        const eye = document.createElement('img');
        eye.src = 'pictures/a_eyez.svg';
        eye.alt = '';
        eye.className = 'flying-eye';
        stage.appendChild(eye);

        const startX = srcRect.left - stageRect.left + srcRect.width / 2 - 26;
        const startY = srcRect.top - stageRect.top + srcRect.height / 2 - 26;
        const endX = targetRect.left - stageRect.left + targetRect.width / 2 - 26;
        const endY = targetRect.top - stageRect.top + targetRect.height / 2 - 26;
        const duration = 850;
        const startT = performance.now();

        function frame(now) {
            const p = Math.min((now - startT) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 3);
            eye.style.left = (startX + (endX - startX) * eased) + 'px';
            eye.style.top = (startY + (endY - startY) * eased) + 'px';
            eye.style.transform = `scale(${1 + 0.08 * Math.sin(p * Math.PI)})`;

            if (p < 1) {
                requestAnimationFrame(frame);
            } else {
                eye.remove();
                showResult(bit, targetId);
            }
        }

        requestAnimationFrame(frame);
    }

    function activateFinalState(bit) {
        const targetId = bit === '0' ? 'final-state-0' : 'final-state-1';
        const finalState = document.getElementById(targetId);
        
        finalState.classList.add('capsule-active');
        finalState.classList.add('pulse-clickable'); 
        finalState.setAttribute('onclick', `showResult('${bit}', '${targetId}')`);
    }

    function showResult(bit, targetId) {
        const state0 = document.getElementById('final-state-0');
        const state1 = document.getElementById('final-state-1');
        
        state0.classList.remove('pulse-clickable');
        state1.classList.remove('pulse-clickable');
        state0.removeAttribute('onclick');
        state1.removeAttribute('onclick');

        if (mode === 'control') {
            if (bit === '0') { state1.style.opacity = '0.4'; }
            else { state0.style.opacity = '0.4'; }
            document.getElementById(bit === '0' ? 'arrow-0' : 'arrow-1').classList.add('fork-active');
            document.getElementById(bit === '0' ? 'arrow-1' : 'arrow-0').classList.add('fork-muted');
            document.getElementById(targetId).classList.remove('control-pending-result');
            document.getElementById(targetId).classList.add('capsule-active');
        }

        const expBox = document.getElementById('explain-box');
        const expTitle = document.getElementById('exp-title');
        const expDesc = document.getElementById('exp-desc');
        const expMath = document.getElementById('exp-math');

        if (mode === 'control') {
            bubble.innerText = `Ah! I observed |${bit}⟩ !`;
            expTitle.innerText = "Security Check: Measurement Complete";
            expDesc.innerHTML = `Alice measured her particle and observed it <b>collapse</b> into state <b>|${bit}⟩</b>. She will now announce this result to Bob over a public channel to verify the entanglement.`;
            expMath.innerHTML = `$$ |𝜓^+\\rangle \\xrightarrow{M_z} |${bit}\\rangle_A \\otimes |${bit === '0' ? '1' : '0'}\\rangle_B $$`;
        } else {
            bubble.innerText = `Encoded and ready to send!`;
            expTitle.innerText = `Calculation Process`;
            expDesc.innerHTML = `Alice applies the <b>${bit === '0' ? 'I' : 'Z'} Gate</b> on her qubit. Here is the mathematical process showing the new global state:`;
            
            document.getElementById(targetId).classList.add('capsule-active');
            
            document.getElementById('straight-arrow-' + bit).style.display = 'block';
            document.getElementById('psi-' + bit).style.display = 'block';

            if (bit === '0') {
                expMath.innerHTML = `$$ (I \\otimes I)|𝜓^+\\rangle = \\frac{1}{\\sqrt{2}}(I|0\\rangle_A|1\\rangle_B + I|1\\rangle_A|0\\rangle_B) = \\frac{1}{\\sqrt{2}}(|01\\rangle + |10\\rangle) = |𝜓^+\\rangle $$`;
            } else {
                expMath.innerHTML = `$$ (Z \\otimes I)|𝜓^+\\rangle = \\frac{1}{\\sqrt{2}}(Z|0\\rangle_A|1\\rangle_B + Z|1\\rangle_A|0\\rangle_B) = \\frac{1}{\\sqrt{2}}(|01\\rangle - |10\\rangle) = |𝜓^-\\rangle $$`;
            }
        }

        if (window.MathJax) MathJax.typeset();
        expBox.classList.add('show');
        document.getElementById('next-btn').disabled = false;
        document.getElementById('hint-text').style.display = 'none';
        
        localStorage.setItem('pingpongSecondMessage', bit);
        localStorage.setItem('pingpongStep4Data', JSON.stringify({ bit: bit, mode: mode, firstMode: firstMode }));
    }

    function prevStep() { window.location.href = 'PINGPONGstep3.html'; }
    function nextStep() { window.location.href = 'PINGPONGstep5.html'; }
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.pingpong-image-dock');
    const windowBox = document.querySelector('.pingpong-image-window');
    const list = document.querySelector('.pingpong-image-list');
    let currentCard = document.querySelector('.pingpong-image-card.is-current');

    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    function setCurrentCard(stepKey) {
        const nextCard = document.querySelector('.pingpong-image-card[data-pingpong-step="' + stepKey + '"]');
        if (!nextCard) return;
        document.querySelectorAll('.pingpong-image-card').forEach(card => {
            card.classList.remove('is-current');
            card.removeAttribute('aria-current');
        });
        nextCard.classList.add('is-current');
        nextCard.setAttribute('aria-current', 'step');
        currentCard = nextCard;
    }

    function lockToCurrentStep() {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        const offset = isHorizontal
            ? (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2)
            : Math.max(0, (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2));
        list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
    }

    if (typeof configureModeUI === 'function') configureModeUI();
    const currentStep = dock?.dataset.currentStep || '4';
    setCurrentCard(currentStep);
    lockToCurrentStep();
    window.addEventListener('resize', lockToCurrentStep);
});
</script>
</body>
</html>
