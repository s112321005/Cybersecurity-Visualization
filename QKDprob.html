<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QKD Security Evaluator - Pro Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-blue: #0047AB; --bg-gray: #f8f9fa; --yellow: #FFD700; --green: #28a745; --red: #FF0000; }
        body { margin: 0; padding: 40px 0; background: var(--bg-gray); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; }
        .container { width: 1200px; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        .header-bar { display: flex; align-items: center; margin-bottom: 30px; }
        .btn-back { width: 42px; height: 42px; border-radius: 50%; background: var(--primary-blue); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; }
        .btn-back:hover { transform: scale(1.1); }
        .page-title { border: 2px solid var(--primary-blue); padding: 8px 30px; border-radius: 50px; font-weight: bold; color: var(--primary-blue); }
        .main-layout { display: flex; gap: 30px; align-items: flex-start; }
        .content-left { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
        .control-panel { background: #f1f5f9; padding: 20px 30px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; }
        .slider-group label { font-weight: 600; color: #334155; }
        input[type=range] { width: 100%; accent-color: var(--primary-blue); cursor: pointer; }
        .reverse-box { width: 340px; flex-shrink: 0; background: #ffffff; padding: 25px; border-radius: 20px; border: 2px solid #e2e8f0; position: sticky; top: 20px; }
        .reverse-box h3 { margin-top: 0; font-size: 1.1rem; color: var(--primary-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .reverse-box label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #475569; }
        .reverse-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .reverse-box button { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .reverse-box button:hover { background: #003580; }
        #reverseResult { margin-top: 20px; padding: 15px; border-radius: 10px; background: #f8fafc; border: 1px solid #e2e8f0; min-height: 50px; }
        .chart-box { height: 400px; width: 100%; }
        .value-grid-container { margin-top: 10px; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 15px; background: #fafafa; }
        .legend-bar { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.85rem; font-weight: bold; color: #64748b; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .value-grid { display: flex; flex-wrap: wrap; gap: 12px; min-height: 80px; }
        .v-card { background: white; border: 3px solid var(--primary-blue); padding: 12px 15px; border-radius: 12px; min-width: 200px; position: relative; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-close { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; background: #ff4d4d; color: white; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .card-stat { margin-top: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <a href="https://s112321005.github.io/Cybersecurity-Visualization/QuantumCybersecurityEducationPlatform.html" class="btn-back">◀</a>
            <div class="page-title">QKD Security Evaluator</div>
        </div>
        
        <div class="main-layout">
            <div class="content-left">
                <div class="control-panel">
                    <div class="slider-group">
                        <label>Analysis Range (N): <span id="nText">80</span></label>
                        <input type="range" id="nInput" min="4" max="150" value="80">
                    </div>
                </div>
                <div class="chart-box"><canvas id="myChart"></canvas></div>
                
                <div class="value-grid-container">
                    <div class="legend-bar">
                        <div class="legend-item"><div class="dot" style="background: var(--yellow);"></div> User Selected</div>
                        <div class="legend-item"><div class="dot" style="background: var(--green);"></div> Calculation Result</div>
                        <div class="legend-item"><div class="dot" style="background: var(--red);"></div> Safe Ponit (≥99.999999%)</div>
                    </div>
                    <div class="value-grid" id="valueGrid"></div>
                </div>
            </div>

            <div class="reverse-box">
                <h3>Solve for N</h3>
                <label>Target Detection Probability (P)</label>
                <input type="number" id="targetInput" step="0.00000001" placeholder="Enter number 0 to 1">
                <button onclick="solveN()">Calculate Required N</button>
                <div id="reverseResult">Awaiting calculation...</div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const nInput = document.getElementById('nInput');
        const nText = document.getElementById('nText');
        const valueGrid = document.getElementById('valueGrid');
        let chart;
        const selectedPoints = new Map();

        function calculateF(n) { return 1 - Math.pow(0.75, n); }

        function addCard(n, type = 'user') {
            selectedPoints.set(n, type);
            const cardId = `card-${n}`;
            let card = document.getElementById(cardId);
            
            let borderColor = 'var(--primary-blue)';
            if (n === 65) borderColor = 'var(--red)';
            else if (type === 'solved') borderColor = 'var(--green)';
            else if (type === 'user') borderColor = 'var(--yellow)';

            if (!card) {
                card = document.createElement('div');
                card.className = 'v-card';
                card.id = cardId;
                valueGrid.appendChild(card);
            }
            
            const detProb = calculateF(n);
            const undetProb = Math.pow(0.75, n);

            card.style.borderColor = borderColor;
            card.innerHTML = `
                <button class="btn-close" onclick="removeCard('${cardId}', ${n})">×</button>
                <div style="color:#64748b; font-weight:bold; border-bottom:1px solid #eee; margin-bottom:8px; padding-bottom:4px;">N = ${n}</div>
                <div class="card-stat">
                    <span style="display:block; font-size:0.7rem; color:#94a3b8; text-transform:uppercase;">Detected</span>
                    <strong style="color:#1e293b;">${(detProb * 100).toFixed(8)}%</strong>
                </div>
                <div class="card-stat">
                    <span style="display:block; font-size:0.7rem; color:#94a3b8; text-transform:uppercase;">Undetected</span>
                    <strong style="color:#64748b;">${(undetProb * 100).toFixed(8)}%</strong>
                </div>
            `;
            updateChartColors();
        }

        function removeCard(cardId, n) {
            document.getElementById(cardId)?.remove();
            selectedPoints.delete(n);
            updateChartColors();
        }

        function solveN() {
            const inputVal = document.getElementById('targetInput').value;
            const p = parseFloat(inputVal);
            const box = document.getElementById('reverseResult');

            if (inputVal === "" || p <= 0 || p >= 1) {
                alert("Please enter a number strictly between 0 and 1.");
                return;
            }
            
            const N = Math.log(1 - p) / Math.log(0.75);
            const ceilN = Math.ceil(N);
            
            box.innerHTML = `
                <div style="font-family: 'Times New Roman', serif; font-style: italic; font-size: 1.1rem; line-height: 2; margin-bottom: 15px; color: #334155;">
                    1 - ( <span style="font-size: 1.2rem;">¾</span> )<sup>n</sup> ≥ ${p} <br>
                    → ( <span style="font-size: 1.2rem;">¾</span> )<sup>n</sup> ≤ ${ (1-p).toFixed(10).replace(/\.?0+$/, "") } <br>
                    → n · log( 0.75 ) ≤ ${Math.log10(1-p).toFixed(4)} <br>
                    → n ≥ ${N.toFixed(4)}
                </div>
                <div style="padding: 15px; border: 2px solid var(--green); background: #f1f9f1; border-radius: 10px; text-align: center;">
                    <span style="font-size: 0.85rem; color: #166534; display: block; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;">Required N</span>
                    <span style="font-size: 1.8rem; font-weight: bold; color: var(--green);">N = ${ceilN}</span>
                </div>
            `;
            addCard(ceilN, 'solved');
        }

        function updateChartColors() {
            if (!chart) return;
            const maxN = parseInt(nInput.value);
            const bgColors = [];
            const radii = [];
            for (let i = 1; i <= maxN; i++) {
                let color = '#0047AB', r = 4;
                if (i === 65) { color = '#FF0000'; r = 7; } 
                else if (selectedPoints.get(i) === 'solved') { color = '#28a745'; r = 6; }
                else if (selectedPoints.get(i) === 'user') { color = '#FFD700'; r = 6; }
                bgColors.push(color); radii.push(r);
            }
            chart.data.datasets[0].pointBackgroundColor = bgColors;
            chart.data.datasets[0].pointBorderColor = bgColors;
            chart.data.datasets[0].pointRadius = radii;
            chart.update('none');
        }

        function initChart(maxN) {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: maxN}, (_, i) => i + 1),
                    datasets: [{ 
                        label: 'Detection Probability', 
                        data: Array.from({length: maxN}, (_, i) => calculateF(i+1)), 
                        borderColor: '#0047AB', 
                        backgroundColor: 'rgba(0, 71, 171, 0.1)', 
                        borderWidth: 2, 
                        fill: true, 
                        tension: 0.2, 
                        pointStyle: 'circle' 
                    }]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    onClick: (e, el) => { if (el.length > 0) addCard(el[0].index + 1, 'user'); },
                    scales: { 
                        y: { 
                            title: { display: true, text: 'Detection Probability', font: { weight: 'bold', size: 14 } }, 
                            beginAtZero: true, 
                            ticks: { callback: v => (v * 100).toFixed(0) + '%' } 
                        },
                        x: { 
                            title: { display: true, text: 'Number of Photons (N)', font: { weight: 'bold' } } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += (context.parsed.y * 100).toFixed(8) + '%';
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
            updateChartColors();
        }

        nInput.addEventListener('input', e => {
            nText.innerText = e.target.value;
            const val = parseInt(e.target.value);
            chart.data.labels = Array.from({length: val}, (_, i) => i + 1);
            chart.data.datasets[0].data = chart.data.labels.map(n => calculateF(n));
            updateChartColors();
        });
        
        initChart(80);
    </script>
</body>
</html>
