<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Analysis - Quantum Flow</title>
    <link rel="stylesheet" href="QSSanalysisCSS.css">
    <style>
        /* 額外針對 Eve 節點與資訊面板的樣式 */
        .eve-node { border-color: #ff4d4d !important; color: #ff4d4d !important; font-weight: 900 !important; }
        .line-eve { stroke: #ff4d4d !important; stroke-width: 4; stroke-dasharray: 4; }
        .config-info {
            background: #f1f3f5; padding: 10px; border-radius: 8px; margin-bottom: 15px;
            font-size: 13px; border-left: 4px solid var(--primary-blue);
        }
        .config-info b { color: var(--primary-blue); }
        .eve-active-tag { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="VerifySetting.html" class="btn-back">◀</a>
        <div class="page-title">QSS Analysis Visualization</div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="config-info">
                <div><b>Current Setting:</b></div>
                <div id="setting-summary">Loading...</div>
            </div>

            <div class="control-group bob-bg">
                <h4>1. Bob (Sender)</h4>
                <div class="btn-grid" id="bob-btns">
                    </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>2. Charlie 1st Op</h4>
                <div class="btn-grid" id="c1-btns">
                    </div>
            </div>

            <div class="control-group alice-bg">
                <h4>3. Alice (Encode)</h4>
                <div class="btn-grid">
                    <button class="state-btn" onclick="setOp('aliceOp', 'I')">I (Msg:0)</button>
                    <button class="state-btn" onclick="setOp('aliceOp', 'X')">X (Msg:1)</button>
                </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>4. Charlie 2nd Op</h4>
                <div class="btn-grid" id="c2-btns">
                    </div>
            </div>

            <button class="run-btn" onclick="runSimulation()">Run Simulation</button>
        </div>

        <div class="viz-area">
            <svg id="svg-canvas" width="950" height="550"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>
</div>

<script>
    // 1. 取得資料
    const settings = JSON.parse(localStorage.getItem('qssSettings')) || {
        bob: { basis: 'Z' },
        charlie: { bases: ['I', 'H'] },
        eve: { isOn: false, attack: 'None', location: 'None' }
    };

    let currentParams = {
        bobInit: (settings.bob.basis === 'Z') ? '0' : '+',
        charlieOp1: 'I',
        aliceOp: 'I',
        charlieOp2: 'I'
    };

    // 2. 定義欄位 (會根據 Eve 位置動態調整)
    let columns = [
        { id: 'bob', title: 'Bob', x: 70 },
        { id: 'c1', title: 'Charlie 1', x: 270 },
        { id: 'alice', title: 'Alice', x: 470 },
        { id: 'c2', title: 'Charlie 2', x: 670 },
        { id: 'final', title: 'Bob Result', x: 870 }
    ];

    const stateList = ['0', '1', '+', '-'];

    // 3. 初始化
    window.onload = () => {
        renderUI();
        injectEveColumn();
        initTree();
        runSimulation();
    };

    function renderUI() {
        // 更新資訊列
        const summary = document.getElementById('setting-summary');
        summary.innerHTML = `
            Basis: <b>${settings.bob.basis}</b><br>
            Eve: <span class="${settings.eve.isOn?'eve-active-tag':''}">
                ${settings.eve.isOn ? `Active (${settings.eve.location})` : 'Inactive'}
            </span>
        `;

        // 生成 Bob 按鈕
        const bobGroup = document.getElementById('bob-btns');
        const bobStates = (settings.bob.basis === 'Z') ? ['0', '1'] : ['+', '-'];
        bobStates.forEach(s => {
            const btn = createBtn(s, () => { currentParams.bobInit = s; runSimulation(); });
            bobGroup.appendChild(btn);
        });

        // 生成 Charlie 按鈕 (根據 Setting 勾選的基底)
        const c1Group = document.getElementById('c1-btns');
        const c2Group = document.getElementById('c2-btns');
        settings.charlie.bases.forEach(op => {
            c1Group.appendChild(createBtn(op, () => { currentParams.charlieOp1 = op; runSimulation(); }));
            c2Group.appendChild(createBtn(op, () => { currentParams.charlieOp2 = op; runSimulation(); }));
        });
    }

    function createBtn(txt, callback) {
        const b = document.createElement('button');
        b.className = 'state-btn';
        b.innerText = txt;
        b.onclick = (e) => {
            const all = b.parentElement.querySelectorAll('.state-btn');
            all.forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            callback();
        };
        return b;
    }

    function injectEveColumn() {
        if (!settings.eve.isOn) return;
        let insertIdx = 1; // 預設 B-C1
        if (settings.eve.location === 'C1-A') insertIdx = 2;
        if (settings.eve.location === 'A-C2') insertIdx = 3;

        const eveCol = { id: 'eve', title: 'Eve', x: 0, isEve: true };
        columns.splice(insertIdx, 0, eveCol);

        // 重新計算所有 X 座標使其均勻分佈
        const total = columns.length;
        columns.forEach((col, i) => {
            col.x = 60 + i * (840 / (total - 1));
        });
    }

    function applyOp(state, op) {
        if (op === 'I') return state;
        if (op === 'H') {
            const m = {'0':'+', '1':'-', '+':'0', '-':'1'};
            return m[state];
        }
        if (op === 'X') {
            const m = {'0':'1', '1':'0', '+':'+', '-':'-'};
            return m[state];
        }
        return state;
    }

    function initTree() {
        const svg = document.getElementById('svg-canvas');
        const nodesDiv = document.getElementById('nodes-container');

        columns.forEach((col, colIdx) => {
            const title = document.createElement('div');
            title.className = 'col-title' + (col.isEve ? ' eve-node' : '');
            title.style.left = `${col.x - 65}px`;
            title.style.top = '20px';
            title.innerText = col.title;
            nodesDiv.appendChild(title);

            stateList.forEach((s, rowIdx) => {
                const node = document.createElement('div');
                node.id = `node-${col.id}-${s}`;
                node.className = 'state-circle inactive' + (col.isEve ? ' eve-node' : '');
                node.style.left = `${col.x - 25}px`;
                node.style.top = `${100 + rowIdx * 100}px`;
                node.innerText = `|${s}⟩`;
                nodesDiv.appendChild(node);

                if (colIdx < columns.length - 1) {
                    const nextCol = columns[colIdx + 1];
                    stateList.forEach(ns => {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.id = `line-${col.id}${s}-${nextCol.id}${ns}`;
                        line.setAttribute("x1", col.x + 25);
                        line.setAttribute("y1", 100 + rowIdx * 100 + 25);
                        line.setAttribute("x2", nextCol.x - 25);
                        line.setAttribute("y2", 100 + stateList.indexOf(ns) * 100 + 25);
                        line.className.baseVal = "graph-line line-inactive" + (col.isEve ? ' line-eve' : '');
                        svg.appendChild(line);
                    });
                }
            });
        });
    }

    function runSimulation() {
        document.querySelectorAll('.state-circle').forEach(n => n.classList.add('inactive'));
        document.querySelectorAll('.graph-line').forEach(l => {
            l.classList.remove('line-active');
            l.classList.add('line-inactive');
        });

        let currentState = currentParams.bobInit;
        let fullPath = [{ id: 'bob', s: currentState }];

        // 依序走過動態定義的 columns
        for(let i=1; i < columns.length; i++) {
            const col = columns[i];
            if (col.id === 'eve') {
                // Eve 攔截邏輯：強制測量（隨機崩坍到 Z 或 X 基底，此處簡化為保持當前）
                // 模擬攻擊影響：如果是 Intercept，可能會造成誤差，這裡讓它發光通過
                currentState = currentState; 
            } else if (col.id === 'c1') {
                currentState = applyOp(currentState, currentParams.charlieOp1);
            } else if (col.id === 'alice') {
                currentState = applyOp(currentState, currentParams.aliceOp);
            } else if (col.id === 'c2') {
                currentState = applyOp(currentState, currentParams.charlieOp2);
            } else if (col.id === 'final') {
                currentState = currentState;
            }
            fullPath.push({ id: col.id, s: currentState });
        }

        // 點亮
        fullPath.forEach((p, i) => {
            const node = document.getElementById(`node-${p.id}-${p.s}`);
            if(node) node.classList.remove('inactive');
            
            if (i < fullPath.length - 1) {
                const next = fullPath[i+1];
                const line = document.getElementById(`line-${p.id}${p.s}-${next.id}${next.s}`);
                if(line) {
                    line.classList.add('line-active');
                    line.classList.remove('line-inactive');
                }
            }
        });
    }

    function setOp(key, val) {
        currentParams[key] = val;
        runSimulation();
    }
</script>
</body>
</html>
