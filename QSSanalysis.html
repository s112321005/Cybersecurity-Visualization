<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1900">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Visalization：Single Particle Flow</title>
    <link rel="stylesheet" href="analysisCSS.css">
    <style>
        .container {
            max-width: 1800px; 
            width: 1800px;
        }

        /* --- 節點容器設定 --- */
        .node { 
            position: absolute; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 2; 
            transform: translate(-50%, -50%); 
        }

        /* --- 實心填滿的圓 (已縮小尺寸) --- */
        .qss-shape {
            width: 45px;      /* 從 55px 縮小為 45px */
            height: 45px;     /* 從 55px 縮小為 45px */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem; /* 字體稍微縮小 */
            color: #ffffff;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.2);
        }

        /* --- 角色與運算專屬顏色設定 --- */
        .color-alice { background-color: #0047AB; }
        .color-bob { background-color: #4C80C5; }
        .color-charlie { background-color: #478CEA; }
        .color-op { background-color: #673AB7; } 

        #prob-tooltip {
            position: absolute;
            background: rgba(33, 37, 41, 0.9);
            color: #f8f9fa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: opacity 0.1s;
        }
        
        .character-avatar { position: absolute; top: 2%; transform: translateX(-50%); z-index: 5; }
        /* 放大 SVG 頭像 */
        .character-avatar img { width: 75px; } 

        /* --- 右側資訊欄專屬樣式 --- */
        .setting-item {
            background: #fff;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 4px solid #0047AB;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 14px;
        }
        .setting-item strong { 
            display: block; 
            color: #0047AB; 
            margin-bottom: 6px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 4px; 
            font-size: 15px;
        }
        .setting-item span { display: block; color: #444; line-height: 1.6; }
        .setting-item span div { margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="prob-tooltip">累積機率: 100%</div>

<div class="nav-tabs">
    <button class="tab-btn active">QSS Protocol</button>
</div>
<div id="view-qss" class="page-view active-view">
    <div class="container">
        <div class="top-bar" style="display: flex; align-items: center; justify-content: flex-start; gap: 20px; margin-bottom: 20px;">            
            <a href="VerifySetting.html" class="btn-back">◀</a>
            <div class="page-title">QSS：Single Particle Flow</div>
        </div>
        <div class="main-content">
            <div class="sidebar">
                <div class="selection-box" id="qss-options">
                    <h4>Bob Prepares</h4>
                    <div class="option-row basis-x" onclick="selectStateQSS(this, '|+⟩', 'X')">
                        <div class="state-btn" style="background:#4C80C5;color:#fff;">X Basis</div><div class="arrow-icon">➔</div><div class="state-btn" style="background:#4C80C5;color:#fff;">|+⟩</div>
                    </div>
                    <div class="option-row basis-x" onclick="selectStateQSS(this, '|−⟩', 'X')">
                        <div class="state-btn" style="background:#4C80C5;color:#fff;">X Basis</div><div class="arrow-icon">➔</div><div class="state-btn" style="background:#4C80C5;color:#fff;">|−⟩</div>
                    </div>
                </div>
                <div class="hint-text">Select initial state <br>for the protocol</div>
            </div>
            
            <div class="diagram-area" style="position: relative; height: 600px; overflow-x: auto; background: #fafafa; border-radius: 12px; border: 1px solid #eaeaea;">
                
                <div class="character-avatar" style="left: 6%;"><img src="pictures/cat_bob.svg" alt="Bob"></div>
                <div class="character-avatar" style="left: 22.5%;"><img src="pictures/cat_charlie.svg" alt="Charlie"></div>
                <div class="character-avatar" style="left: 44.5%;"><img src="pictures/cat_alice.svg" alt="Alice"></div>
                <div class="character-avatar" style="left: 66.5%;"><img src="pictures/cat_charlie.svg" alt="Charlie"></div>
                <div class="character-avatar" style="left: 88.5%;"><img src="pictures/cat_bob.svg" alt="Bob"></div>

                <svg id="qss-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
                    <defs>
                        <marker id="arrow-qss" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
                        </marker>
                    </defs>
                </svg>
                <div id="qss-nodes" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></div>
            </div>

            <div class="settings-panel">
                <h4>Current Settings</h4>
                <div class="settings-content" id="settings-display"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Tooltip ---
    function showTooltip(evt, text) {
        const tooltip = document.getElementById("prob-tooltip");
        tooltip.innerHTML = text;
        tooltip.style.display = "block";
        tooltip.style.left = (evt.pageX + 15) + 'px';
        tooltip.style.top = (evt.pageY + 15) + 'px';
    }

    function hideTooltip() {
        document.getElementById("prob-tooltip").style.display = "none";
    }

    // --- 量子閘邏輯 ---
    const quantumMath = {
        '|0⟩': {'I': '|0⟩', 'X': '|1⟩', 'Y': '-|1⟩', 'Z': '|0⟩', 'H': '|+⟩'},
        '|1⟩': {'I': '|1⟩', 'X': '|0⟩', 'Y': '|0⟩',  'Z': '-|1⟩', 'H': '|−⟩'},
        '|+⟩': {'I': '|+⟩', 'X': '|+⟩', 'Y': '|−⟩',  'Z': '|−⟩', 'H': '|0⟩'},
        '|−⟩': {'I': '|−⟩', 'X': '-|−⟩', 'Y': '-|+⟩', 'Z': '|+⟩',  'H': '|1⟩'}
    };

    function applyGate(stateStr, gate) {
        if (!stateStr || !gate) return stateStr;
        let isNegative = stateStr.startsWith('-');
        let baseState = isNegative ? stateStr.substring(1) : stateStr;
        let result = quantumMath[baseState][gate];
        if (!result) return baseState; 
        if (isNegative) result = result.startsWith('-') ? result.substring(1) : '-' + result;
        return result;
    }

    function measureState(stateStr, basis) {
        let s = stateStr.replace('-', '').replace('−', '-'); 
        if (basis === 'Z') {
            if (s.includes('0')) return [{state: '|0⟩', probSplit: 1.0}];
            if (s.includes('1')) return [{state: '|1⟩', probSplit: 1.0}];
            if (s.includes('+') || s.includes('-')) return [{state: '|0⟩', probSplit: 0.5}, {state: '|1⟩', probSplit: 0.5}];
        } else if (basis === 'X') {
            if (s.includes('+')) return [{state: '|+⟩', probSplit: 1.0}];
            if (s.includes('-')) return [{state: '|−⟩', probSplit: 1.0}];
            if (s.includes('0') || s.includes('1')) return [{state: '|+⟩', probSplit: 0.5}, {state: '|−⟩', probSplit: 0.5}];
        }
        return [{state: stateStr, probSplit: 1.0}];
    }

    // --- 讀取設定檔 ---
    let qssSettings = JSON.parse(localStorage.getItem('qssSettings')) || {
        "bob": {"particle": "single", "basis": "X"},
        "charlie": {"particle": "single", "operator": ["I", "Y", "H"]},
        "alice": {"particle": "single", "msg": "1", "message0Op": "I", "message1Op": "X"},
        "eve": {"isOn": false, "attack": "Intercept-resend", "location": "1_2"}
    };

    document.addEventListener('DOMContentLoaded', () => {
        
        // 格式化角色的資訊面板
        function formatRole(role, data) {
            if (!data) return '';
            let details = '';
            for (const [key, value] of Object.entries(data)) {
                if (key !== 'isOn') { // isOn 狀態統一在 Environment 顯示
                    let displayValue = Array.isArray(value) ? value.join(', ') : value;
                    details += `<div><b>${key}</b>: ${displayValue}</div>`;
                }
            }
            return `
                <div class="setting-item">
                    <strong>${role}</strong>
                    <span>${details}</span>
                </div>
            `;
        }

        // 產生右側資訊面板 HTML
        const settingsHtml = `
            <div class="setting-item">
                <strong>Protocol Order</strong>
                <span>Bob ➔ Charlie ➔ Alice ➔ Charlie ➔ Bob</span>
            </div>
            <div class="setting-item">
                <strong>Environment</strong>
                <span>Eve: ${qssSettings.eve.isOn ? '<span style="color:#dc3545;font-weight:bold;">ON</span>' : 'OFF'}</span>
            </div>
            ${formatRole('Alice', qssSettings.alice)}
            ${formatRole('Bob', qssSettings.bob)}
            ${formatRole('Charlie', qssSettings.charlie)}
            ${qssSettings.eve.isOn ? formatRole('Eavesdropper', qssSettings.eve) : ''}
        `;
        document.getElementById('settings-display').innerHTML = settingsHtml;

        // 預設點擊第一個 |+⟩ 按鈕
        const defaultOption = document.querySelector('#qss-options .option-row');
        if (defaultOption) selectStateQSS(defaultOption, '|+⟩', 'X');
    });

    function selectStateQSS(element, initialState, basis) {
        document.querySelectorAll('#qss-options .option-row').forEach(row => row.classList.remove('active'));
        element.classList.add('active');
        renderQSSTree(initialState, basis);
    }

    // --- 繪製連線 ---
    function drawArrowedLine(container, x1, y1, x2, y2, probVal) {
        const probStr = (probVal * 100).toFixed(1).replace('.0', '') + '%';
        // Node 縮小為 45px 後，X軸的縮進(offset)稍微減小，讓箭頭對齊圓圈邊緣
        const offsetX = 1.4; 
        let startX = x1 + offsetX;
        let endX = x2 - offsetX;
        let startY = y1;
        let endY = y2;

        if (y1 !== y2) {
            const dy = y2 - y1;
            startY = y1 + dy * 0.15;
            endY = y2 - dy * 0.15;
        }

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("style", "cursor: pointer;");
        g.onmousemove = (e) => showTooltip(e, `累積機率: ${probStr}`);
        g.onmouseout = hideTooltip;

        const visLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        visLine.setAttribute("x1", startX + "%");
        visLine.setAttribute("y1", startY + "px");
        visLine.setAttribute("x2", endX + "%");
        visLine.setAttribute("y2", endY + "px");
        visLine.setAttribute("stroke", "#333");
        visLine.setAttribute("stroke-width", "3");
        visLine.setAttribute("marker-end", "url(#arrow-qss)"); 
        visLine.setAttribute("pointer-events", "none"); 
        
        const sensorLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        sensorLine.setAttribute("x1", startX + "%");
        sensorLine.setAttribute("y1", startY + "px");
        sensorLine.setAttribute("x2", endX + "%");
        sensorLine.setAttribute("y2", endY + "px");
        sensorLine.setAttribute("stroke", "transparent");
        sensorLine.setAttribute("stroke-width", "15");
        sensorLine.setAttribute("pointer-events", "stroke");

        g.appendChild(sensorLine);
        g.appendChild(visLine);
        container.appendChild(g);
    }

    // --- 動態創建 Node (移除了 label 參數) ---
    function createNodeHtml(x, y, content, type, character) {
        let colorClass = `color-${character}`;
        if (type === 'operator' || type === 'basis') {
            colorClass = 'color-op';
        }
        
        return `
            <div class="node" style="left: ${x}%; top: ${y}px;">
                <div class="qss-shape ${colorClass}" style="pointer-events: auto;">${content}</div>
            </div>`;
    }

    function renderQSSTree(initialState, bobBasis) {
        const linesContainer = document.getElementById('qss-lines');
        const nodesContainer = document.getElementById('qss-nodes');
        
        linesContainer.innerHTML = `<defs><marker id="arrow-qss" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333" /></marker></defs>`;
        nodesContainer.innerHTML = '';

        let nodesHtml = '';

        const operators = qssSettings.charlie.operator;
        const numBranches = operators.length;
        const aliceOp = qssSettings.alice.msg === "1" ? qssSettings.alice.message1Op : qssSettings.alice.message0Op;
        
        const X = [6, 17, 28, 39, 50, 61, 72, 83, 94];
        const initialY = 320; 
        const spacing = 600 / (numBranches + 1); 
        
        // 1. Bob 準備狀態
        nodesHtml += createNodeHtml(X[0], initialY, initialState, 'state', 'bob');

        operators.forEach((charlieOp, index) => {
            const yPos = spacing * (index + 1);
            const branchProb = 1.0 / numBranches; 

            // 計算狀態變化
            const s1 = applyGate(initialState, charlieOp);
            const s2 = applyGate(s1, aliceOp);
            const s3 = applyGate(s2, charlieOp);
            const measurementResults = measureState(s3, bobBasis);

            // 繪製連線
            drawArrowedLine(linesContainer, X[0], initialY, X[1], yPos, branchProb);
            drawArrowedLine(linesContainer, X[1], yPos, X[2], yPos, branchProb);
            drawArrowedLine(linesContainer, X[2], yPos, X[3], yPos, branchProb);
            drawArrowedLine(linesContainer, X[3], yPos, X[4], yPos, branchProb);
            drawArrowedLine(linesContainer, X[4], yPos, X[5], yPos, branchProb);
            drawArrowedLine(linesContainer, X[5], yPos, X[6], yPos, branchProb);
            drawArrowedLine(linesContainer, X[6], yPos, X[7], yPos, branchProb);

            // 繪製節點 (移除了 label 引數)
            nodesHtml += createNodeHtml(X[1], yPos, charlieOp, 'operator', 'charlie');
            nodesHtml += createNodeHtml(X[2], yPos, s1, 'state', 'charlie');
            
            nodesHtml += createNodeHtml(X[3], yPos, aliceOp, 'operator', 'alice');
            nodesHtml += createNodeHtml(X[4], yPos, s2, 'state', 'alice');
            
            nodesHtml += createNodeHtml(X[5], yPos, charlieOp, 'operator', 'charlie');
            nodesHtml += createNodeHtml(X[6], yPos, s3, 'state', 'charlie');
            
            nodesHtml += createNodeHtml(X[7], yPos, bobBasis, 'basis', 'bob');

            // Bob 的最終測量結果分岔
            if (measurementResults.length === 1) {
                drawArrowedLine(linesContainer, X[7], yPos, X[8], yPos, branchProb);
                nodesHtml += createNodeHtml(X[8], yPos, measurementResults[0].state, 'result', 'bob');
            } else {
                measurementResults.forEach((res, i) => {
                    const splitY = yPos + (i === 0 ? -30 : 30);
                    const finalProb = branchProb * res.probSplit;
                    drawArrowedLine(linesContainer, X[7], yPos, X[8], splitY, finalProb);
                    nodesHtml += createNodeHtml(X[8], splitY, res.state, 'result', 'bob');
                });
            }
        });

        nodesContainer.innerHTML = nodesHtml;
    }
</script>
</body>
</html>
