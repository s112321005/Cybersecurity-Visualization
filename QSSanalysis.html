<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Analysis - Flow View</title>
    <link rel="stylesheet" href="QSSanalysisCSS.css">
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="VerifySetting.html" class="btn-back">тЧА</a>
        <div class="page-title">QSS Sequence Visualization</div>
    </div>

    <div class="main-content">
        <div class="sidebar">
            <div class="selection-box" style="background:#eef5ff; border-color:var(--primary-blue);">
                <h4 style="background:#dbe9ff; color:var(--primary-blue);">System Settings</h4>
                <div style="padding: 10px 15px; font-size: 13px; line-height: 1.6;">
                    <span id="info-bob-basis"></span><br>
                    <span id="info-eve-status"></span>
                </div>
            </div>

            <div class="selection-box">
                <h4><span class="tag-bob"></span> 1. Bob's Initial State</h4>
                <div class="option-row" id="bob-btns"></div>
            </div>

            <div class="selection-box">
                <h4><span class="tag-c1"></span> 2. Charlie 1st Op</h4>
                <div class="option-row" id="c1-btns"></div>
            </div>

            <div class="selection-box">
                <h4><span class="tag-alice"></span> 3. Alice Encode</h4>
                <div class="option-row">
                    <button class="state-btn active" onclick="setOp('alice', 'I', this)">I (Msg:0)</button>
                    <button class="state-btn" onclick="setOp('alice', 'X', this)">X (Msg:1)</button>
                </div>
            </div>

            <div class="selection-box">
                <h4><span class="tag-c2"></span> 4. Charlie 2nd Op</h4>
                <div class="option-row" id="c2-btns"></div>
            </div>
        </div>

        <div class="viz-area">
            <div class="flow-container" id="flow-container">
                </div>
        </div>
    </div>
</div>

<script>
    // --- 1. шоАхПЦшинхоЪш│ЗцЦЩ ---
    const settings = JSON.parse(localStorage.getItem('qssSettings')) || {
        bob: { basis: 'Z' },
        charlie: { bases: ['I', 'H'] },
        eve: { isOn: false, attack: 'None', location: 'None' }
    };

    // чХ╢хЙНф╜┐чФишАЕчЪДщБ╕цУЗчЛАцЕЛ
    let currentOps = {
        bob: (settings.bob.basis === 'Z') ? '0' : '+',
        c1: 'I',
        alice: 'I',
        c2: 'I'
    };

    // --- 2. хИЭхзЛхМЦщаБщЭв ---
    window.onload = () => {
        initSidebar();
        updateFlowchart();
    };

    function initSidebar() {
        // щбпчд║шинхоЪш│ЗшиК
        document.getElementById('info-bob-basis').innerHTML = `Bob Basis: <b>${settings.bob.basis}</b>`;
        const eveText = settings.eve.isOn ? `<b style="color:var(--eve-red)">Active (${settings.eve.location})</b>` : `<b>Inactive</b>`;
        document.getElementById('info-eve-status').innerHTML = `Eve Status: ${eveText}`;

        // чФЯцИР Bob цМЙщИХ
        const bobGroup = document.getElementById('bob-btns');
        const bobStates = (settings.bob.basis === 'Z') ? ['0', '1'] : ['+', '-'];
        bobStates.forEach((s, idx) => {
            const btn = document.createElement('button');
            btn.className = `state-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `|${s}тЯй`;
            btn.onclick = function() { setOp('bob', s, this); };
            bobGroup.appendChild(btn);
        });

        // чФЯцИР Charlie цМЙщИХ
        const c1Group = document.getElementById('c1-btns');
        const c2Group = document.getElementById('c2-btns');
        settings.charlie.bases.forEach((op, idx) => {
            // Charlie 1
            const btn1 = document.createElement('button');
            btn1.className = `state-btn ${idx === 0 ? 'active' : ''}`;
            btn1.innerText = op;
            btn1.onclick = function() { setOp('c1', op, this); };
            c1Group.appendChild(btn1);
            if(idx === 0) currentOps.c1 = op; // щаРшинщБ╕чммф╕АхАЛ

            // Charlie 2
            const btn2 = document.createElement('button');
            btn2.className = `state-btn ${idx === 0 ? 'active' : ''}`;
            btn2.innerText = op;
            btn2.onclick = function() { setOp('c2', op, this); };
            c2Group.appendChild(btn2);
            if(idx === 0) currentOps.c2 = op;
        });
    }

    // цЫ┤цЦ░цУНф╜Ьф╕жщЗНч╣к
    function setOp(step, val, btnEl) {
        currentOps[step] = val;
        // хИЗцПЫцМЙщИХ active цигх╝П
        const row = btnEl.parentElement;
        row.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        
        updateFlowchart();
    }

    // --- 3. щЗПхнРщБЛчоЧщВПш╝п ---
    function applyOp(state, op) {
        if (op === 'I') return state;
        const maps = {
            'H': {'0':'+', '1':'-', '+':'0', '-':'1'},
            'X': {'0':'1', '1':'0', '+':'+', '-':'-'}
        };
        return maps[op] ? maps[op][state] : state;
    }

    // --- 4. ч╣кшг╜ц░┤х╣│ц╡БчиЛхЬЦ ---
    function updateFlowchart() {
        const container = document.getElementById('flow-container');
        container.innerHTML = ''; // ц╕Ечй║шИКхЬЦ

        // ф╛Эх║Пх╗║члЛц╡БчиЛщЩгхИЧ
        let flowSteps = [];
        let currentState = currentOps.bob;
        let stepCount = 1;

        // ш╝ФхКйхЗ╜х╝Пя╝ЪцОихЕечпАщ╗Юф╕жцОищА▓чЛАцЕЛ
        const addNode = (id, title, theme, opLabel, opVal, isFinal = false) => {
            if (!isFinal && opVal) {
                currentState = applyOp(currentState, opVal);
            }
            flowSteps.push({
                title: title,
                theme: theme,
                opLabel: opLabel,
                stateStr: `|╧И${stepCount}тЯй = |${currentState}тЯй`
            });
            stepCount++;
        };

        // 1. Bob
        addNode('bob', "1. Bob Init", "node-bob", `State: |${currentOps.bob}тЯй`, null);

        // Eve цФФцИк (B-C1)
        if (settings.eve.isOn && settings.eve.location === 'B-C1') {
            addNode('eve', "Eve Intercept", "node-eve", "Measurement", null);
        }

        // 2. Charlie 1
        addNode('c1', "2. Charlie 1", "node-charlie", `Op: ${currentOps.c1}`, currentOps.c1);

        // Eve цФФцИк (C1-A)
        if (settings.eve.isOn && settings.eve.location === 'C1-A') {
            addNode('eve', "Eve Intercept", "node-eve", "Measurement", null);
        }

        // 3. Alice
        addNode('alice', "3. Alice Encode", "node-alice", `Op: ${currentOps.alice}`, currentOps.alice);

        // Eve цФФцИк (A-C2)
        if (settings.eve.isOn && settings.eve.location === 'A-C2') {
            addNode('eve', "Eve Intercept", "node-eve", "Measurement", null);
        }

        // 4. Charlie 2
        addNode('c2', "4. Charlie 2", "node-charlie", `Op: ${currentOps.c2}`, currentOps.c2);

        // 5. Final Result
        flowSteps.push({
            title: "Final Result",
            theme: "node-final",
            opLabel: "Bob Receives",
            stateStr: `Result = |${currentState}тЯй`
        });

        // --- ц╕▓цЯУхИ░чХлщЭвф╕К ---
        flowSteps.forEach((step, index) => {
            // х╗║члЛцЦ╣хбК
            const nodeDiv = document.createElement('div');
            nodeDiv.className = `flow-node ${step.theme}`;
            nodeDiv.innerHTML = `
                <div class="node-header">${step.title}</div>
                <div class="node-body">
                    <div class="op-label">${step.opLabel}</div>
                    <div class="state-label">${step.stateStr}</div>
                </div>
            `;
            container.appendChild(nodeDiv);

            // хжВцЮЬф╕НцШпцЬАх╛Мф╕АхАЛя╝МчХлф╕АхАЛчонщан
            if (index < flowSteps.length - 1) {
                const arrowDiv = document.createElement('div');
                arrowDiv.className = 'flow-arrow';
                arrowDiv.innerHTML = `
                    <svg viewBox="0 0 40 20">
                        <path d="M0,10 L35,10" stroke="#888" stroke-width="3" fill="none"/>
                        <polygon points="32,5 40,10 32,15" fill="#888"/>
                    </svg>
                `;
                container.appendChild(arrowDiv);
            }
        });
    }
</script>
</body>
</html>
