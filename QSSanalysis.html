<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1900">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>Verify: Quantum Secret Sharing</title>
    <style>
        :root { --primary-blue: #0047AB; --light-blue: #D0E0FF; --inactive-gray: #e0e0e0; --bg-color: #f8f9fa; --eve-red: #ff4d4d; --bob-blue: #4C80C5; --charlie-blue: #478CEA; --op-purple: #FFE69A; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px 0; color: #333; min-width: 1450px !important; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 1450px !important; max-width: 1850px !important; flex-shrink: 0 !important; margin: 0 auto; }
        .nav-tabs, .tab-btn, .state-btn, .state-circle, .eve-state-circle, .prob-circle, .result-circle, .btn-back, .top-bar, .option-row, .character-avatar, .line-tooltip { display: flex; align-items: center; justify-content: center; font-weight: bold; transition: all 0.3s ease; box-sizing: border-box; }
        .nav-tabs { gap: 20px; margin-bottom: 30px; }
        .tab-btn { background-color: white; color: var(--primary-blue); border: 2px solid var(--primary-blue); padding: 10px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background-color: var(--primary-blue); color: white; box-shadow: 0 5px 15px rgba(0,71,171,0.3); }
        .page-view { display: none; width: 100%; justify-content: center; }
        .page-view.active-view { display: flex; }
        .top-bar { margin-bottom: 30px; }
        .page-title { border: 2px solid var(--primary-blue); color: #000; padding: 10px 40px; border-radius: 10px; font-size: 20px; font-weight: bold; }
        .main-content { display: flex; flex-direction: row !important; gap: 30px; align-items: flex-start; width: 100%; }
        .sidebar { width: 220px; display: flex; flex-direction: column; align-items: center; z-index: 10; gap: 20px; flex-shrink: 0; }
        .selection-box { background: var(--light-blue); border-radius: 15px; padding: 20px 15px; width: 100%; box-sizing: border-box; }
        .selection-box h4 { margin: 0 0 15px 0; text-align: center; color: #333; }
        .option-row { gap: 12px; cursor: pointer; padding: 10px; border-radius: 8px; margin-bottom: 10px; justify-content: space-between; }
        .option-row:hover { background-color: #f0f4f8; }
        .option-row.active .state-btn { background-color: var(--bob-blue); color: white; }
        .state-btn { background: white; border: 2px solid var(--bob-blue); color: var(--bob-blue); padding: 6px 12px; border-radius: 6px; font-size: 18px; pointer-events: none; white-space: nowrap; }
        .arrow-icon { color: var(--bob-blue); font-size: 1.2rem; font-weight: bold; }
        .hint-text { margin-top: 15px; color: #888; font-weight: bold; font-size: 14px; text-align: center; }
        .diagram-area { position: relative; flex-grow: 1; height: 450px; }
        .arrows { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .node { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 2; transform: translate(-50%, -50%); }
        .polarizer-img { width: 70px; height: auto; object-fit: contain; }
        .qss-shape { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4rem; color: #ffffff; box-shadow: 2px 3px 6px rgba(0,0,0,0.2); }
        .color-alice { background-color: var(--primary-blue); }
        .color-bob { background-color: var(--bob-blue); }
        .color-charlie { background-color: var(--charlie-blue); }
        .color-op { background-color: var(--op-purple); color: #af7754 !important; width: 42px !important; height: 42px !important; font-size: 1.1rem !important; }
        .state-circle, .eve-state-circle { width: 45px; height: 45px; border-radius: 50%; font-size: 18px; margin-top: 10px; }
        .state-circle { background: var(--primary-blue); color: white; }
        .state-circle.inactive { background-color: var(--inactive-gray); color: #666; }
        .eve-state-circle { background: var(--eve-red); color: white; }
        .state-circle.eve-error { background-color: var(--eve-red); color: white; border: 2px solid var(--eve-red); }
        .state-circle.eve-error.inactive { background-color: var(--inactive-gray); color: #666; border: 2px solid var(--eve-red); }
        .prob-circle, .result-circle { position: absolute; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; z-index: 3; transform: translate(-50%, -50%); }
        .prob-circle { background: var(--light-blue); }
        .prob-circle.inactive { background-color: var(--inactive-gray); color: #333; }
        .result-circle { background: var(--light-blue); color: #28a745; }
        .result-circle.inactive { color: #000; }
        #prob-tooltip { position: absolute; background: rgba(33, 37, 41, 0.9); color: #f8f9fa; padding: 6px 12px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; pointer-events: none; display: none; z-index: 1000; }
        .character-avatar { position: absolute; top: 2%; transform: translateX(-50%); z-index: 10; flex-direction: column; padding: 8px 12px; border-radius: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); background-color: #ffffff; }
        .character-avatar img { width: 75px; object-fit: contain; }
        .avatar-alice { border: 3px solid var(--primary-blue); width: 350px; left:40%;}
        .avatar-bob-1 { border: 3px solid var(--bob-blue);  width: 132px;}
        .avatar-bob-2 { border: 3px solid var(--bob-blue);  width: 252px;}
        .avatar-charlie { border: 3px solid var(--charlie-blue); width: 225px; }
        .result-header { position: absolute; top: -10px; left: 90%; transform: translateX(-50%); background: var(--light-blue); padding: 10px 25px; border-radius: 15px; font-weight: bold; text-align: center; z-index: 10; white-space: nowrap; }
        .settings-panel { width: 100%; box-sizing: border-box; background: var(--light-blue); border-radius: 15px; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .settings-panel h4 { margin: 0 0 10px 0; text-align: center; color: #333; border-bottom: 2px solid var(--primary-blue); padding-bottom: 8px; }
        .setting-item { background: #fff; padding: 12px; margin-bottom: 12px; border-radius: 8px; border-left: 4px solid var(--primary-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; }
        .setting-item strong { display: block; color: var(--primary-blue); margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; font-size: 15px; }
        .setting-item span { display: block; color: inherit; line-height: 1.6; }
        .setting-item span div { margin-bottom: 3px; }
        .setting-item.off-state span, .setting-item.off-state strong { color: #999; }
        .setting-item.eve-on { border-left-color: var(--eve-red) !important; color: var(--eve-red) !important; }
        .setting-item.eve-on strong { color: var(--eve-red) !important; border-bottom-color: #ffcccc !important; }
        .setting-item.eve-off { border-left-color: #999 !important; color: #999 !important; }
        .setting-item.eve-off strong { color: #999 !important; border-bottom-color: #eee !important; }
        .line-inactive { stroke: #b0b0b0 !important; opacity: 0.3; stroke-width: 2; }
        .btn-back { background-color: var(--primary-blue); color: white; text-decoration: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); flex-shrink: 0; }
        .btn-back:hover { transform: scale(1.1); background-color: #003380; color: white; }
        .line-tooltip { position: absolute; background: rgba(0, 0, 0, 0.6); color: #ffffff; padding: 8px 12px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; z-index: 1000; white-space: nowrap; box-shadow: 0px 4px 6px rgba(0,0,0,0.3); }
        svg.arrows line { cursor: pointer; transition: stroke-width 0.2s ease; pointer-events: stroke !important; }
        svg.arrows line:hover { stroke-width: 5 !important; }
    </style>
</head>
<body>

<div id="prob-tooltip">Probability: 100%</div>
<div id="view-qss" class="page-view active-view">
    <div class="container">
        <div class="top-bar" style="display: flex; align-items: center; justify-content: flex-start; gap: 20px; margin-bottom: 20px;">            
            <a href="VerifySetting.html" class="btn-back">◀</a>
            <div class="page-title">Quantum Secret Sharing</div>
        </div>
        <div class="main-content">
            
            <div class="sidebar">
                <div class="selection-box" id="qss-options"></div>
                
                <div class="settings-panel">
                    <h4>Experiment Info</h4>
                    <div class="settings-content" id="settings-display"></div>
                </div>
            </div>

            <div class="diagram-area" style="position: relative; height: 600px; overflow-x: auto; background: #fafafa; border-radius: 12px; border: 1px solid #eaeaea;">
                
                <div class="character-avatar avatar-bob-1" style="left: 6%;"><img src="pictures/cat_bob.svg" alt="Bob"></div>
                <div class="character-avatar avatar-charlie" style="left: 21%;"><img src="pictures/cat_charlie.svg" alt="Charlie"></div>
                <div class="character-avatar avatar-alice" style="left: 45%;"><img src="pictures/cat_alice.svg" alt="Alice"></div>
                <div class="character-avatar avatar-charlie" style="left: 69%;"><img src="pictures/cat_charlie.svg" alt="Charlie"></div>
                <div class="character-avatar avatar-bob-2" style="left: 89%;"><img src="pictures/cat_bob.svg" alt="Bob"></div>

                <svg id="qss-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
                    <defs>
                        <marker id="arrow-qss" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
                        </marker>
                    </defs>
                </svg>
                <div id="qss-nodes" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function showTooltip(evt, text) {
        const tooltip = document.getElementById("prob-tooltip");
        tooltip.innerHTML = text;
        tooltip.style.display = "block";
        tooltip.style.left = (evt.pageX + 15) + 'px';
        tooltip.style.top = (evt.pageY + 15) + 'px';
    }

    function hideTooltip() {  document.getElementById("prob-tooltip").style.display = "none";}

    const quantumMath = {
        '|0⟩': {'I': '|0⟩', 'X': '|1⟩', 'Y': '-|1⟩', 'Z': '|0⟩', 'H': '|+⟩'},
        '|1⟩': {'I': '|1⟩', 'X': '|0⟩', 'Y': '|0⟩',  'Z': '-|1⟩', 'H': '|−⟩'},
        '|+⟩': {'I': '|+⟩', 'X': '|+⟩', 'Y': '|−⟩',  'Z': '|−⟩', 'H': '|0⟩'},
        '|−⟩': {'I': '|−⟩', 'X': '-|−⟩', 'Y': '-|+⟩', 'Z': '|+⟩',  'H': '|1⟩'}
    };

    function applyGate(stateStr, gate) {
        if (!stateStr || !gate) return stateStr;
        let isNegative = stateStr.startsWith('-');
        let baseState = isNegative ? stateStr.substring(1) : stateStr;
        let result = quantumMath[baseState][gate];
        if (!result) return baseState; 
        if (isNegative) result = result.startsWith('-') ? result.substring(1) : '-' + result;
        return result;
    }

    function measureState(stateStr, basis) {
        let s = stateStr.replace('-', '').replace('−', '-'); 
        if (basis === 'Z') {
            if (s.includes('0')) return [{state: '|0⟩', probSplit: 1.0}];
            if (s.includes('1')) return [{state: '|1⟩', probSplit: 1.0}];
            return [{state: '|0⟩', probSplit: 0.5}, {state: '|1⟩', probSplit: 0.5}];
        } else if (basis === 'X') {
            if (s.includes('+')) return [{state: '|+⟩', probSplit: 1.0}];
            if (s.includes('-')) return [{state: '|−⟩', probSplit: 1.0}];
            return [{state: '|+⟩', probSplit: 0.5}, {state: '|−⟩', probSplit: 0.5}];
        }
        return [{state: stateStr, probSplit: 1.0}];
    }

    let qssSettings = JSON.parse(localStorage.getItem('qssSettings')) || {
        "bob": {"particle": "single", "basis": "X"},
        "charlie": {"particle": "single", "operator": ["I", "Y", "H"]},
        "alice": {"particle": "single", "msg": "1", "message0Op": "I", "message1Op": "X"},
        "eve": {"isOn": false, "attack": "Intercept-resend", "location": "1_2"}
    };

    document.addEventListener('DOMContentLoaded', () => {
        const bobBasis = qssSettings.bob.basis;
        const optionsContainer = document.getElementById('qss-options');
        let optionsHtml = `<h4>Bob</h4>`;

        if (bobBasis === 'X') {
            optionsHtml += `
            <div style="display: flex; gap: 10px; justify-content: center;">
                <div class="option-row" onclick="selectStateQSS(this, '|+⟩', 'X')"><div class="state-btn">|＋⟩</div></div>
                <div class="option-row" onclick="selectStateQSS(this, '|−⟩', 'X')"><div class="state-btn">|－⟩</div></div>
            </div>`;
        } else {
            optionsHtml += `
            <div style="display: flex; gap: 10px; justify-content: center;">
                <div class="option-row" onclick="selectStateQSS(this, '|0⟩', 'Z')"><div class="state-btn">|０⟩</div></div>
                <div class="option-row" onclick="selectStateQSS(this, '|1⟩', 'Z')"><div class="state-btn">|１⟩</div></div>
            </div>`;
        }
        optionsContainer.innerHTML = optionsHtml;

        function formatRole(roleName, data) {
            if (!data) return '';
            let extraClass = '';
            let title = `${roleName}`;
            
            if (roleName === 'Eavesdropper') {
                extraClass = data.isOn ? 'eve-on' : 'eve-off';
                title = `${roleName} ：${data.isOn ? 'ON' : 'OFF'}`;
            }
            let details = '';
            for (const [key, value] of Object.entries(data)) {
                if (key !== 'isOn') {
                    let displayValue = Array.isArray(value) ? value.join(', ') : value;
                    details += `<div><b>${key}</b>: ${displayValue}</div>`;
                }
            }
            return `
                <div class="setting-item ${extraClass}">
                    <strong>${title}</strong>
                    <span>${details}</span>
                </div>
            `;
        }

        const settingsHtml = `
            ${formatRole('Bob (Prepare)', qssSettings.bob)}
            ${formatRole('Charlie', qssSettings.charlie)}
            ${formatRole('Alice', qssSettings.alice)}
            ${formatRole('Eavesdropper', qssSettings.eve)}
        `;
        document.getElementById('settings-display').innerHTML = settingsHtml;

        const defaultOption = document.querySelector('#qss-options .option-row');
        if (defaultOption) {
            const defaultState = bobBasis === 'X' ? '|+⟩' : '|0⟩';
            selectStateQSS(defaultOption, defaultState, bobBasis);
        }
    });

    function selectStateQSS(element, initialState, basis) {
        document.querySelectorAll('#qss-options .option-row').forEach(row => row.classList.remove('active'));
        element.classList.add('active');
        renderQSSTree(initialState, basis);
    }

    function drawArrowedLine(container, x1, y1, x2, y2, probVal) {
        const probStr = (probVal * 100).toFixed(1).replace('.0', '') + '%';
        const offsetX = 2.6; 
        let startX = x1 + offsetX;
        let endX = x2 - offsetX;
        let startY = y1;
        let endY = y2;

        if (y1 !== y2) {
            const dy = y2 - y1;
            startY = y1 + dy * 0.15;
            endY = y2 - dy * 0.15;
        }

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("style", "cursor: pointer;");
        g.onmousemove = (e) => showTooltip(e, `Probability: ${probStr}`);
        g.onmouseout = hideTooltip;

        const visLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        visLine.setAttribute("x1", startX + "%");
        visLine.setAttribute("y1", startY + "px");
        visLine.setAttribute("x2", endX + "%");
        visLine.setAttribute("y2", endY + "px");
        visLine.setAttribute("stroke", "#444");
        visLine.setAttribute("stroke-width", "2.5");
        visLine.setAttribute("marker-end", "url(#arrow-qss)"); 
        visLine.setAttribute("pointer-events", "none"); 

        const sensorLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        sensorLine.setAttribute("x1", startX + "%");
        sensorLine.setAttribute("y1", startY + "px");
        sensorLine.setAttribute("x2", endX + "%");
        sensorLine.setAttribute("y2", endY + "px");
        sensorLine.setAttribute("stroke", "transparent");
        sensorLine.setAttribute("stroke-width", "15");
        sensorLine.setAttribute("pointer-events", "stroke");

        g.appendChild(sensorLine);
        g.appendChild(visLine);
        container.appendChild(g);
    }

    function createNodeHtml(x, y, content, type, character) {
        let colorClass = `color-${character}`;
        if (type === 'operator' || type === 'basis') colorClass = 'color-op';
        return `<div class="node" style="left: ${x}%; top: ${y}px;"><div class="qss-shape ${colorClass}">${content}</div></div>`;
    }

    function renderQSSTree(initialState, bobBasis) {
        const linesContainer = document.getElementById('qss-lines');
        const nodesContainer = document.getElementById('qss-nodes');
        
        linesContainer.innerHTML = `<defs><marker id="arrow-qss" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333" /></marker></defs>`;
        nodesContainer.innerHTML = '';

        let nodesHtml = '';
        const operators = qssSettings.charlie.operator;
        const numBranches = operators.length;
        const aliceOp = qssSettings.alice.msg === "1" ? qssSettings.alice.message1Op : qssSettings.alice.message0Op;
        
        const X = [4.5, 16, 26, 38, 50, 62, 74, 84, 94];
        const yOffset = 60;
        const initialY = 280 + yOffset; 
        const spacing = (600 - yOffset) / (numBranches + 1); 
        
        nodesHtml += createNodeHtml(X[0], initialY, initialState, 'state', 'bob');

        operators.forEach((charlieOp, index) => {
            const yPos = yOffset + (spacing * (index + 1));
            const branchProb = 1.0 / numBranches; 

            const s1 = applyGate(initialState, charlieOp);
            const s2 = applyGate(s1, aliceOp);
            const s3 = applyGate(s2, charlieOp);
            const measurementResults = measureState(s3, bobBasis);

            drawArrowedLine(linesContainer, X[0], initialY, X[1], yPos, branchProb);
            drawArrowedLine(linesContainer, X[1], yPos, X[2], yPos, branchProb);
            drawArrowedLine(linesContainer, X[2], yPos, X[3], yPos, branchProb);
            drawArrowedLine(linesContainer, X[3], yPos, X[4], yPos, branchProb);
            drawArrowedLine(linesContainer, X[4], yPos, X[5], yPos, branchProb);
            drawArrowedLine(linesContainer, X[5], yPos, X[6], yPos, branchProb);
            drawArrowedLine(linesContainer, X[6], yPos, X[7], yPos, branchProb);

            nodesHtml += createNodeHtml(X[1], yPos, charlieOp, 'operator', 'charlie');
            nodesHtml += createNodeHtml(X[2], yPos, s1, 'state', 'charlie');
            nodesHtml += createNodeHtml(X[3], yPos, aliceOp, 'operator', 'alice');
            nodesHtml += createNodeHtml(X[4], yPos, s2, 'state', 'alice');
            nodesHtml += createNodeHtml(X[5], yPos, charlieOp, 'operator', 'charlie');
            nodesHtml += createNodeHtml(X[6], yPos, s3, 'state', 'charlie');
            nodesHtml += createNodeHtml(X[7], yPos, bobBasis, 'basis', 'bob');

            if (measurementResults.length === 1) {
                drawArrowedLine(linesContainer, X[7], yPos, X[8], yPos, branchProb);
                nodesHtml += createNodeHtml(X[8], yPos, measurementResults[0].state, 'result', 'bob');
            } else {
                measurementResults.forEach((res, i) => {
                    const splitY = yPos + (i === 0 ? -35 : 35);
                    const finalProb = branchProb * res.probSplit;
                    drawArrowedLine(linesContainer, X[7], yPos, X[8], splitY, finalProb);
                    nodesHtml += createNodeHtml(X[8], splitY, res.state, 'result', 'bob');
                });
            }
        });

        nodesContainer.innerHTML = nodesHtml;
    }
</script>
</body>
</html>
