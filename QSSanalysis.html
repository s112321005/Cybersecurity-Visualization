<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Analysis - Quantum Cat Flow</title>
    <link rel="stylesheet" href="QSSanalysisCSS.css">
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="VerifySetting.html" class="btn-back">◀</a>
        <div class="page-title">QSS Analysis Visualization</div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="config-info">
                <div><b>Current Setting:</b></div>
                <div id="setting-summary">Loading...</div>
            </div>

            <div class="control-group bob-bg">
                <h4>
                    <img src="https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_bob.svg" class="char-avatar">
                    1. Bob (Sender)
                </h4>
                <div class="btn-grid" id="bob-btns"></div>
            </div>

            <div class="control-group charlie-bg">
                <h4>
                    <img src="https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_charlie.svg" class="char-avatar">
                    2. Charlie 1st
                </h4>
                <div class="btn-grid" id="c1-btns"></div>
            </div>

            <div class="control-group alice-bg">
                <h4>
                    <img src="https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_alice.svg" class="char-avatar">
                    3. Alice (Encode)
                </h4>
                <div class="btn-grid">
                    <button class="state-btn" onclick="setOp('aliceOp', 'I')">I (Msg:0)</button>
                    <button class="state-btn" onclick="setOp('aliceOp', 'X')">X (Msg:1)</button>
                </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>
                    <img src="https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_charlie.svg" class="char-avatar">
                    4. Charlie 2nd
                </h4>
                <div class="btn-grid" id="c2-btns"></div>
            </div>

            <button class="run-btn" onclick="runSimulation()">Run Simulation</button>
        </div>

        <div class="viz-area">
            <svg id="svg-canvas" width="950" height="550"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>
</div>

<script>
    const settings = JSON.parse(localStorage.getItem('qssSettings')) || {
        bob: { basis: 'Z' },
        charlie: { bases: ['I', 'H'] },
        eve: { isOn: false, attack: 'None', location: 'None' }
    };

    let currentParams = {
        bobInit: (settings.bob.basis === 'Z') ? '0' : '+',
        charlieOp1: 'I',
        aliceOp: 'I',
        charlieOp2: 'I'
    };

    // 定義欄位與對應頭像
    const avatars = {
        'bob': 'https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_bob.svg',
        'c1': 'https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_charlie.svg',
        'alice': 'https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_alice.svg',
        'c2': 'https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_charlie.svg',
        'final': 'https://s112321005.github.io/Cybersecurity-Visualization/pictures/cat_bob.svg',
        'eve': 'https://s112321005.github.io/pictures/eve.svg' // 如果有 Eve 圖片可換
    };

    let columns = [
        { id: 'bob', title: 'Bob', x: 70 },
        { id: 'c1', title: 'Charlie 1', x: 270 },
        { id: 'alice', title: 'Alice', x: 470 },
        { id: 'c2', title: 'Charlie 2', x: 670 },
        { id: 'final', title: 'Result', x: 870 }
    ];

    const stateList = ['0', '1', '+', '-'];

    window.onload = () => {
        renderUI();
        injectEveColumn();
        initTree();
        runSimulation();
    };

    function renderUI() {
        const summary = document.getElementById('setting-summary');
        summary.innerHTML = `Basis: <b>${settings.bob.basis}</b> | Eve: <span class="${settings.eve.isOn?'eve-active-tag':''}">${settings.eve.isOn ? 'ON' : 'OFF'}</span>`;

        const bobGroup = document.getElementById('bob-btns');
        const bobStates = (settings.bob.basis === 'Z') ? ['0', '1'] : ['+', '-'];
        bobStates.forEach(s => {
            bobGroup.appendChild(createBtn(s, () => { currentParams.bobInit = s; runSimulation(); }));
        });

        const c1Group = document.getElementById('c1-btns');
        const c2Group = document.getElementById('c2-btns');
        settings.charlie.bases.forEach(op => {
            c1Group.appendChild(createBtn(op, () => { currentParams.charlieOp1 = op; runSimulation(); }));
            c2Group.appendChild(createBtn(op, () => { currentParams.charlieOp2 = op; runSimulation(); }));
        });
    }

    function createBtn(txt, callback) {
        const b = document.createElement('button');
        b.className = 'state-btn';
        b.innerText = txt;
        b.onclick = () => {
            b.parentElement.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            callback();
        };
        return b;
    }

    function injectEveColumn() {
        if (!settings.eve.isOn) return;
        let insertIdx = (settings.eve.location === 'C1-A') ? 2 : (settings.eve.location === 'A-C2' ? 3 : 1);
        columns.splice(insertIdx, 0, { id: 'eve', title: 'Eve', x: 0, isEve: true });
        columns.forEach((col, i) => col.x = 60 + i * (840 / (columns.length - 1)));
    }

    function initTree() {
        const svg = document.getElementById('svg-canvas');
        const nodesDiv = document.getElementById('nodes-container');

        columns.forEach((col, colIdx) => {
            // 生成帶頭像的標題
            const title = document.createElement('div');
            title.className = 'col-title' + (col.isEve ? ' eve-node' : '');
            title.style.left = `${col.x - 50}px`;
            title.style.top = '10px';
            
            const img = document.createElement('img');
            img.src = avatars[col.id] || "";
            img.className = 'char-avatar';
            if(!avatars[col.id]) img.style.display='none';
            
            title.appendChild(img);
            const span = document.createElement('span');
            span.innerText = col.title;
            title.appendChild(span);
            nodesDiv.appendChild(title);

            stateList.forEach((s, rowIdx) => {
                const node = document.createElement('div');
                node.id = `node-${col.id}-${s}`;
                node.className = 'state-circle inactive' + (col.isEve ? ' eve-node' : '');
                node.style.left = `${col.x - 25}px`;
                node.style.top = `${120 + rowIdx * 100}px`; // 下移一點避開頭像
                node.innerText = `|${s}⟩`;
                nodesDiv.appendChild(node);

                if (colIdx < columns.length - 1) {
                    const nextCol = columns[colIdx + 1];
                    stateList.forEach(ns => {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.id = `line-${col.id}${s}-${nextCol.id}${ns}`;
                        line.setAttribute("x1", col.x + 25);
                        line.setAttribute("y1", 120 + rowIdx * 100 + 25);
                        line.setAttribute("x2", nextCol.x - 25);
                        line.setAttribute("y2", 120 + stateList.indexOf(ns) * 100 + 25);
                        line.className.baseVal = "graph-line line-inactive" + (col.isEve ? ' line-eve' : '');
                        svg.appendChild(line);
                    });
                }
            });
        });
    }

    function applyOp(state, op) {
        if (op === 'I') return state;
        const maps = {
            'H': {'0':'+', '1':'-', '+':'0', '-':'1'},
            'X': {'0':'1', '1':'0', '+':'+', '-':'-'}
        };
        return maps[op] ? maps[op][state] : state;
    }

    function runSimulation() {
        document.querySelectorAll('.state-circle').forEach(n => n.classList.add('inactive'));
        document.querySelectorAll('.graph-line').forEach(l => {
            l.classList.remove('line-active');
            l.classList.add('line-inactive');
        });

        let cur = currentParams.bobInit;
        let path = [{ id: 'bob', s: cur }];

        for(let i=1; i < columns.length; i++) {
            const col = columns[i];
            if (col.id === 'c1') cur = applyOp(cur, currentParams.charlieOp1);
            else if (col.id === 'alice') cur = applyOp(cur, currentParams.aliceOp);
            else if (col.id === 'c2') cur = applyOp(cur, currentParams.charlieOp2);
            path.push({ id: col.id, s: cur });
        }

        path.forEach((p, i) => {
            document.getElementById(`node-${p.id}-${p.s}`)?.classList.remove('inactive');
            if (i < path.length - 1) {
                const line = document.getElementById(`line-${p.id}${p.s}-${path[i+1].id}${path[i+1].s}`);
                if(line) { line.classList.add('line-active'); line.classList.remove('line-inactive'); }
            }
        });
    }

    function setOp(key, val) {
        currentParams[key] = val;
        runSimulation();
    }
</script>
</body>
</html>
