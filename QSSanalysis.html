<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Analysis - Tree Logic</title>
    <link rel="stylesheet" href="QSSanalysisCSS.css">
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="QKDsetting.html" class="btn-back">◀</a>
        <div class="page-title">QSS Analysis：Tree Logic Visualization</div>
    </div>

    <div class="main-layout" style="display: flex; gap: 20px;">
        
        <div class="sidebar" style="width: 250px; flex-shrink: 0;">
            <div class="control-group bob-bg">
                <h4>1. Bob Init State</h4>
                <div class="btn-grid">
                    <button class="state-btn active" onclick="selectParam('bobInit', '0')">|0⟩</button>
                    <button class="state-btn" onclick="selectParam('bobInit', '1')">|1⟩</button>
                    <button class="state-btn" onclick="selectParam('bobInit', '+')">|+⟩</button>
                    <button class="state-btn" onclick="selectParam('bobInit', '-')">|-⟩</button>
                </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>2. Charlie 1st Op</h4>
                <div class="btn-grid">
                    <button class="state-btn active" onclick="selectParam('charlieOp1', 'I')">I</button>
                    <button class="state-btn" onclick="selectParam('charlieOp1', 'H')">H</button>
                    <button class="state-btn" onclick="selectParam('charlieOp1', 'Z')">Z</button>
                </div>
            </div>

            <div class="control-group alice-bg">
                <h4>3. Alice Encode (Msg)</h4>
                <div class="btn-grid">
                    <button class="state-btn active" onclick="selectParam('aliceOp', 'I')">I (Msg=0)</button>
                    <button class="state-btn" onclick="selectParam('aliceOp', 'X')">X (Msg=1)</button>
                </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>4. Charlie 2nd Op</h4>
                <div class="btn-grid">
                    <button class="state-btn active" onclick="selectParam('charlieOp2', 'I')">I</button>
                    <button class="state-btn" onclick="selectParam('charlieOp2', 'H')">H</button>
                    <button class="state-btn" onclick="selectParam('charlieOp2', 'Z')">Z</button>
                </div>
            </div>
            
            <button class="run-btn" onclick="runSimulation()">Run Sequence</button>
            
            <div class="result-box" id="final-result" style="margin-top: 15px; padding: 10px; background: #eee; border-radius: 8px; text-align: center; font-weight: bold;">
                Waiting for run...
            </div>
        </div>

        <div class="viz-area" id="viz-area">
            <svg id="lines-svg" width="100%" height="100%" style="position: absolute; top: 0; left: 0; pointer-events: none;">
                </svg>
            
            <div id="nodes-container"></div>
        </div>

    </div>
</div>

<script>
    // 當前選擇的參數
    let currentParams = {
        bobInit: '0',
        charlieOp1: 'I',
        aliceOp: 'I',
        charlieOp2: 'I'
    };

    // 介面選擇邏輯
    function selectParam(type, value) {
        currentParams[type] = value;
        const group = event.target.parentElement;
        group.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        runSimulation(); // 即時更新圖表
    }

    // 量子態轉換邏輯 (簡易版模擬)
    function applyOperation(state, op) {
        if (op === 'I') return state;
        if (op === 'H') {
            if (state === '0') return '+';
            if (state === '1') return '-';
            if (state === '+') return '0';
            if (state === '-') return '1';
        }
        if (op === 'Z') {
            if (state === '0') return '0';
            if (state === '1') return '1'; 
            if (state === '+') return '-';
            if (state === '-') return '+';
        }
        if (op === 'X') { // Alice's encoding
            if (state === '0') return '1';
            if (state === '1') return '0';
            if (state === '+') return '+';
            if (state === '-') return '-';
        }
        return state;
    }

    // 建立視覺化網格
    const columns = [
        { id: 'col-bob1', x: 50, title: "Bob", nodes: ['0', '1', '+', '-'] },
        { id: 'col-ch1', x: 250, title: "Charlie Op1", nodes: ['I', 'H', 'Z'] },
        { id: 'col-alice', x: 450, title: "Alice Encode", nodes: ['I', 'X'] },
        { id: 'col-ch2', x: 650, title: "Charlie Op2", nodes: ['I', 'H', 'Z'] },
        { id: 'col-bob2', x: 850, title: "Bob Measure", nodes: ['0', '1', '+', '-'] }
    ];

    function initGraph() {
        const container = document.getElementById('nodes-container');
        const svg = document.getElementById('lines-svg');
        container.innerHTML = '';
        svg.innerHTML = '';

        // 建立節點
        columns.forEach((col, colIdx) => {
            // 加入標題
            const title = document.createElement('div');
            title.className = 'col-title';
            title.style.left = `${col.x - 40}px`;
            title.style.top = `20px`;
            title.innerText = col.title;
            container.appendChild(title);

            const spacing = 400 / col.nodes.length;
            col.nodes.forEach((nodeVal, rowIdx) => {
                const y = 80 + rowIdx * spacing + (spacing/2);
                
                const node = document.createElement('div');
                node.className = 'state-circle';
                node.id = `node-${colIdx}-${rowIdx}`;
                node.innerText = nodeVal;
                node.style.left = `${col.x}px`;
                node.style.top = `${y}px`;
                node.dataset.val = nodeVal;
                container.appendChild(node);
            });
        });

        // 建立連線 (將每一層連到下一層)
        for (let i = 0; i < columns.length - 1; i++) {
            const colA = columns[i];
            const colB = columns[i+1];
            
            colA.nodes.forEach((_, aIdx) => {
                colB.nodes.forEach((_, bIdx) => {
                    const y1 = 80 + aIdx * (400/colA.nodes.length) + (400/colA.nodes.length)/2 + 25;
                    const y2 = 80 + bIdx * (400/colB.nodes.length) + (400/colB.nodes.length)/2 + 25;
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", colA.x + 50);
                    line.setAttribute("y1", y1);
                    line.setAttribute("x2", colB.x);
                    line.setAttribute("y2", y2);
                    line.setAttribute("class", "graph-line line-inactive");
                    line.id = `line-${i}-${aIdx}-${bIdx}`;
                    svg.appendChild(line);
                });
            });
        }
    }

    function runSimulation() {
        // 1. 計算量子態演化
        const s0 = currentParams.bobInit;
        const s1 = applyOperation(s0, currentParams.charlieOp1); // 中間態 1
        const s2 = applyOperation(s1, currentParams.aliceOp);    // 中間態 2
        const s3 = applyOperation(s2, currentParams.charlieOp2); // 中間態 3 (Bob收到的態)
        
        // 找到各階段對應的 Node Index
        const idx0 = columns[0].nodes.indexOf(s0);
        const idx1 = columns[1].nodes.indexOf(currentParams.charlieOp1);
        const idx2 = columns[2].nodes.indexOf(currentParams.aliceOp);
        const idx3 = columns[3].nodes.indexOf(currentParams.charlieOp2);
        const idx4 = columns[4].nodes.indexOf(s3); // Bob 最終測量到的結果

        // 2. 更新視覺 (熄滅所有，點亮 Active)
        document.querySelectorAll('.state-circle').forEach(n => n.classList.add('inactive'));
        document.querySelectorAll('.graph-line').forEach(l => {
            l.classList.add('line-inactive');
            l.classList.remove('line-active');
        });

        const activePaths = [
            { col: 0, nodeIdx: idx0 },
            { col: 1, nodeIdx: idx1 },
            { col: 2, nodeIdx: idx2 },
            { col: 3, nodeIdx: idx3 },
            { col: 4, nodeIdx: idx4 }
        ];

        // 點亮 Node 與 Line
        for(let i=0; i<activePaths.length; i++) {
            const p = activePaths[i];
            document.getElementById(`node-${p.col}-${p.nodeIdx}`).classList.remove('inactive');
            
            if (i < activePaths.length - 1) {
                const pNext = activePaths[i+1];
                const line = document.getElementById(`line-${i}-${p.nodeIdx}-${pNext.nodeIdx}`);
                line.classList.remove('line-inactive');
                line.classList.add('line-active');
            }
        }

        // 顯示結果
        const resBox = document.getElementById('final-result');
        const aliceMsg = currentParams.aliceOp === 'I' ? '0' : '1';
        resBox.innerHTML = `Bob Measured: <b>|${s3}⟩</b><br>Deduced Alice Msg: <b>${aliceMsg}</b>`;
    }

    // 初始化
    window.onload = () => {
        initGraph();
        runSimulation();
    };
</script>
</body>
</html>
