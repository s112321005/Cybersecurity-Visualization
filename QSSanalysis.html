<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Analysis - Quantum State Tree</title>
    <link rel="stylesheet" href="QSSanalysisCSS.css">
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="VerifySetting.html" class="btn-back">◀</a>
        <div class="page-title">QSS Analysis Visualization</div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="control-group bob-bg">
                <h4>1. Bob (Sender)</h4>
                <p style="font-size: 12px; text-align: center; margin-top:-10px;">Basis: <span id="display-bob-basis">-</span></p>
                <div class="btn-grid" id="bob-btns">
                    </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>2. Charlie 1st Op</h4>
                <div class="btn-grid">
                    <button class="state-btn" onclick="setOp('charlieOp1', 'I')">I</button>
                    <button class="state-btn" onclick="setOp('charlieOp1', 'H')">H</button>
                </div>
            </div>

            <div class="control-group alice-bg">
                <h4>3. Alice (Encode)</h4>
                <div class="btn-grid">
                    <button class="state-btn" onclick="setOp('aliceOp', 'I')">I (0)</button>
                    <button class="state-btn" onclick="setOp('aliceOp', 'X')">X (1)</button>
                </div>
            </div>

            <div class="control-group charlie-bg">
                <h4>4. Charlie 2nd Op</h4>
                <div class="btn-grid">
                    <button class="state-btn" onclick="setOp('charlieOp2', 'I')">I</button>
                    <button class="state-btn" onclick="setOp('charlieOp2', 'H')">H</button>
                </div>
            </div>

            <button class="run-btn" onclick="runSimulation()">Run Quantum Flow</button>
        </div>

        <div class="viz-area" id="viz-container">
            <svg id="svg-canvas" width="950" height="550">
                </svg>
            <div id="nodes-container">
                </div>
        </div>
    </div>
</div>

<script>
    // --- 1. 資料接收與變數設定 ---
    const savedSettings = JSON.parse(localStorage.getItem('qssSettings')) || {};
    const bobBasis = savedSettings.bob?.basis || 'Z'; 
    
    let currentParams = {
        bobInit: (bobBasis === 'Z') ? '0' : '+',
        charlieOp1: 'I',
        aliceOp: 'I',
        charlieOp2: 'I'
    };

    // 樹狀圖結構定義
    const columns = [
        { id: 'bob', title: 'Bob Init', x: 80, states: ['0', '1', '+', '-'] },
        { id: 'c1', title: 'After Charlie 1', x: 280, states: ['0', '1', '+', '-'] },
        { id: 'alice', title: 'After Alice', x: 480, states: ['0', '1', '+', '-'] },
        { id: 'c2', title: 'After Charlie 2', x: 680, states: ['0', '1', '+', '-'] },
        { id: 'final', title: 'Final State', x: 880, states: ['0', '1', '+', '-'] }
    ];

    // --- 2. 初始化頁面 ---
    window.onload = () => {
        document.getElementById('display-bob-basis').innerText = bobBasis + " Basis";
        renderBobButtons();
        initTree();
        runSimulation(); // 預設跑一次
    };

    function renderBobButtons() {
        const container = document.getElementById('bob-btns');
        const states = (bobBasis === 'Z') ? ['0', '1'] : ['+', '-'];
        states.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'state-btn';
            btn.innerText = s;
            btn.onclick = () => {
                currentParams.bobInit = s;
                runSimulation();
            };
            container.appendChild(btn);
        });
    }

    function setOp(key, val) {
        currentParams[key] = val;
        runSimulation();
    }

    // --- 3. 量子邏輯閘計算 ---
    function applyOp(state, op) {
        if (op === 'I') return state;
        if (op === 'X') {
            const map = { '0':'1', '1':'0', '+':'+', '-':'-' };
            return map[state];
        }
        if (op === 'Z') {
            const map = { '0':'0', '1':'1', '+':'-', '-':'+' };
            return map[state];
        }
        if (op === 'H') {
            const map = { '0':'+', '1':'-', '+':'0', '-': '1' };
            return map[state];
        }
        return state;
    }

    // --- 4. 繪製樹狀圖 ---
    function initTree() {
        const svg = document.getElementById('svg-canvas');
        const nodesDiv = document.getElementById('nodes-container');

        // 畫標題與節點
        columns.forEach((col, colIdx) => {
            // 標題
            const title = document.createElement('div');
            title.className = 'col-title';
            title.style.left = `${col.x - 65}px`;
            title.style.top = '20px';
            title.innerText = col.title;
            nodesDiv.appendChild(title);

            // 圓圈
            col.states.forEach((state, rowIdx) => {
                const node = document.createElement('div');
                node.id = `node-${col.id}-${state}`;
                node.className = 'state-circle inactive';
                node.style.left = `${col.x - 25}px`;
                node.style.top = `${100 + rowIdx * 100}px`;
                node.innerText = `|${state}⟩`;
                nodesDiv.appendChild(node);

                // 畫線 (連到下一排的所有可能)
                if (colIdx < columns.length - 1) {
                    const nextCol = columns[colIdx + 1];
                    nextCol.states.forEach(nextState => {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.id = `line-${col.id}${state}-${nextCol.id}${nextState}`;
                        line.setAttribute("x1", col.x + 25);
                        line.setAttribute("y1", 100 + rowIdx * 100 + 25);
                        line.setAttribute("x2", nextCol.x - 25);
                        line.setAttribute("y2", 100 + nextCol.states.indexOf(nextState) * 100 + 25);
                        line.className.baseVal = "graph-line line-inactive";
                        svg.appendChild(line);
                    });
                }
            });
        });
    }

    // --- 5. 執行模擬並更新路徑 ---
    function runSimulation() {
        // 全域熄滅
        document.querySelectorAll('.state-circle').forEach(n => n.classList.add('inactive'));
        document.querySelectorAll('.graph-line').forEach(l => {
            l.classList.remove('line-active');
            l.classList.add('line-inactive');
        });

        // 計算路徑
        const s1 = currentParams.bobInit;
        const s2 = applyOp(s1, currentParams.charlieOp1);
        const s3 = applyOp(s2, currentParams.aliceOp);
        const s4 = applyOp(s3, currentParams.charlieOp2);
        const s5 = s4; // 最終狀態

        const path = [
            { col: 'bob', state: s1 },
            { col: 'c1', state: s2 },
            { col: 'alice', state: s3 },
            { col: 'c2', state: s4 },
            { col: 'final', state: s5 }
        ];

        // 點亮路徑
        path.forEach((p, i) => {
            document.getElementById(`node-${p.col}-${p.state}`).classList.remove('inactive');
            if (i < path.length - 1) {
                const next = path[i+1];
                const lineId = `line-${p.col}${p.state}-${next.col}${next.state}`;
                const line = document.getElementById(lineId);
                line.classList.add('line-active');
                line.classList.remove('line-inactive');
            }
        });

        // 更新左側按鈕 UI 狀態
        updateButtonUI();
    }

    function updateButtonUI() {
        // 這邊可以加入讓當前選中的按鈕變色的邏輯
        const btns = document.querySelectorAll('.state-btn');
        btns.forEach(b => {
            b.classList.remove('active');
            if (b.innerText.includes(currentParams.charlieOp1) || 
                b.innerText.includes(currentParams.aliceOp) || 
                b.innerText === currentParams.bobInit) {
                // 簡單判斷，實際可依需求精確化
            }
        });
    }
</script>
</body>
</html>
