<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>QSS Analysis Visualization</title>
    <style>
        :root {
            --alice-color: #e83e8c; /* Pink */
            --bob-color: #0d6efd;   /* Blue */
            --charlie-color: #6f42c1; /* Purple */
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --border-color: #dee2e6;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: sans-serif;
            min-width: 1200px;
        }

        /* 頂部導航 */
        .top-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .btn-back {
            width: 40px; height: 40px;
            background-color: #333;
            color: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-back:hover { background-color: #000; transform: scale(1.05); }
        .page-title {
            background: white;
            padding: 10px 30px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #333;
            color: #333;
        }
        .eve-alert {
            display: none;
            margin-left: auto;
            background: #ffebee;
            color: #d32f2f;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px dashed #d32f2f;
            font-weight: bold;
        }

        /* 主佈局：左右側邊欄 + 中間視覺化 */
        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            height: 380px;
        }

        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-weight: bold;
            color: white;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .bg-alice { background-color: var(--alice-color); }
        .bg-bob { background-color: var(--bob-color); }
        .bg-charlie { background-color: var(--charlie-color); }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .option-btn {
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }
        .option-btn:hover, .option-btn.active {
            border-color: #333;
            background: #f8f9fa;
        }

        /* 中間 SVG 視覺化區域 */
        .visualization-area {
            flex-grow: 1;
            background: var(--panel-bg);
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--border-color);
            position: relative;
            background-image: radial-gradient(#d5d5d5 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
        }
        .node-circle { fill: white; stroke-width: 4; }
        .node-alice { stroke: var(--alice-color); }
        .node-bob { stroke: var(--bob-color); }
        .node-charlie { stroke: var(--charlie-color); }
        .node-text { font-family: sans-serif; font-weight: bold; font-size: 14px; text-anchor: middle; }
        .link-line { stroke: #888; stroke-width: 3; stroke-dasharray: 5,5; fill: none; }
        
        /* 底部數據表 */
        .data-table-container {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--border-color);
            height: 250px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th {
            background: #f1f3f5;
            padding: 12px;
            border-bottom: 2px solid #ccc;
            font-weight: bold;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="QKDsetting.html" class="btn-back">◀</a>
        <div class="page-title">QSS Analysis</div>
        <div id="eve-alert" class="eve-alert">⚠️ Eavesdropper is Active</div>
    </div>

    <div class="main-content">
        <div class="sidebar" style="border-color: var(--alice-color);">
            <div>
                <div class="sidebar-title bg-alice">3. Alice's Message</div>
                <div class="option-grid" id="alice-msg-grid">
                    <div class="option-btn" onclick="addSequence('↑')">↑</div>
                    <div class="option-btn" onclick="addSequence('→')">→</div>
                    <div class="option-btn" onclick="addSequence('↗')">↗</div>
                    <div class="option-btn" onclick="addSequence('↘')">↘</div>
                </div>
            </div>
            <div>
                <div class="sidebar-title bg-alice">3. Alice's Basis</div>
                <div class="option-grid" id="alice-basis-grid">
                    </div>
            </div>
        </div>

        <div class="visualization-area">
            <svg viewBox="0 0 800 300">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#888" />
                    </marker>
                </defs>

                <line x1="180" y1="150" x2="360" y2="150" class="link-line" marker-end="url(#arrowhead)" id="line-alice-bob" />
                <line x1="440" y1="150" x2="620" y2="150" class="link-line" marker-end="url(#arrowhead)" id="line-bob-charlie" />

                <g transform="translate(140, 150)">
                    <circle cx="0" cy="0" r="40" class="node-circle node-alice" />
                    <text x="0" y="-55" class="node-text" fill="var(--alice-color)">3. Alice</text>
                    <image href="pictures/cat_alice.svg" x="-25" y="-25" width="50" height="50" />
                </g>

                <g transform="translate(400, 150)">
                    <circle cx="0" cy="0" r="40" class="node-circle node-bob" />
                    <text x="0" y="-55" class="node-text" fill="var(--bob-color)">1. Bob</text>
                    <image href="pictures/cat_bob.svg" x="-25" y="-25" width="50" height="50" />
                </g>

                <g transform="translate(660, 150)">
                    <circle cx="0" cy="0" r="40" class="node-circle node-charlie" />
                    <text x="0" y="-55" class="node-text" fill="var(--charlie-color)">2. Charlie</text>
                    <image href="pictures/cat_charlie.svg" x="-25" y="-25" width="50" height="50" />
                </g>

                <g id="eve-node" transform="translate(270, 80)" style="display: none;">
                    <circle cx="0" cy="0" r="30" fill="white" stroke="#d32f2f" stroke-width="3" />
                    <text x="0" y="-40" class="node-text" fill="#d32f2f">Eve</text>
                    <image href="pictures/Eavesdropper.svg" x="-20" y="-20" width="40" height="40" />
                    <line x1="0" y1="30" x2="0" y2="70" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,4" />
                </g>
            </svg>
        </div>

        <div class="sidebar" style="border-color: #888;">
            <div>
                <div class="sidebar-title bg-bob">1. Bob's Basis</div>
                <div class="option-grid" id="bob-basis-grid">
                    </div>
            </div>
            <div>
                <div class="sidebar-title bg-charlie">2. Charlie's Basis</div>
                <div class="option-grid" id="charlie-basis-grid" style="grid-template-columns: repeat(3, 1fr);">
                    </div>
            </div>
        </div>
    </div>

    <div class="data-table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th style="color: var(--alice-color);">3. Alice Message</th>
                    <th style="color: var(--alice-color);">3. Alice Basis</th>
                    <th style="color: var(--bob-color);">1. Bob Basis</th>
                    <th style="color: var(--charlie-color);">2. Charlie Basis</th>
                </tr>
            </thead>
            <tbody id="sequence-table-body">
                </tbody>
        </table>
    </div>

    <script>
        let sequenceCount = 0;
        let currentSettings = null;

        document.addEventListener('DOMContentLoaded', () => {
            const storedSettings = localStorage.getItem('qssSettings');
            if (!storedSettings) {
                alert("No configuration found! Returning to setting page.");
                window.location.href = 'QKDsetting.html';
                return;
            }

            currentSettings = JSON.parse(storedSettings);

            // 1. 處理 Eve 的顯示邏輯與位置
            if (currentSettings.eve.isOn) {
                const eveAlert = document.getElementById('eve-alert');
                const eveNode = document.getElementById('eve-node');
                eveAlert.style.display = 'block';
                eveNode.style.display = 'block';
                
                // 根據上一頁設定的 location 決定 Eve 視覺化位置
                // 如果是 '2_3' (Alice & Bob 之間)，位置 x=270
                // 如果是 '1_2' (Bob & Charlie 之間)，位置 x=530
                if (currentSettings.eve.location === '1_2') {
                    eveNode.setAttribute('transform', 'translate(530, 80)');
                    eveAlert.innerText = '⚠️ Eve Intercepting between Bob & Charlie';
                } else {
                    eveNode.setAttribute('transform', 'translate(270, 80)');
                    eveAlert.innerText = '⚠️ Eve Intercepting between Alice & Bob';
                }
            }

            // 2. 渲染左側 Alice 的 Basis
            document.getElementById('alice-basis-grid').innerHTML = 
                `<div class="option-btn active">${currentSettings.alice.basis}</div>`;

            // 3. 渲染右側 Bob 的 Basis
            document.getElementById('bob-basis-grid').innerHTML = 
                `<div class="option-btn active">${currentSettings.bob.basis}</div>`;

            // 4. 渲染右側 Charlie 的 Basis (陣列)
            const charlieGrid = document.getElementById('charlie-basis-grid');
            charlieGrid.innerHTML = '';
            currentSettings.charlie.bases.forEach(basis => {
                charlieGrid.innerHTML += `<div class="option-btn active">${basis}</div>`;
            });
        });

        // 點擊 Alice Message 新增紀錄至 Table 的互動邏輯
        function addSequence(message) {
            if (!currentSettings) return;
            sequenceCount++;
            
            const tbody = document.getElementById('sequence-table-body');
            const tr = document.createElement('tr');
            
            // 隨機從 Charlie 勾選的 Basis 中挑選一個作為本次模擬
            const randomCharlieBasis = currentSettings.charlie.bases[Math.floor(Math.random() * currentSettings.charlie.bases.length)];

            tr.innerHTML = `
                <td style="color: #888;">${sequenceCount}</td>
                <td style="font-weight: bold; font-size: 20px;">${message}</td>
                <td>${currentSettings.alice.basis}</td>
                <td>${currentSettings.bob.basis}</td>
                <td>${randomCharlieBasis}</td>
            `;
            
            // 讓最新的一筆資料顯示在最上方
            tbody.insertBefore(tr, tbody.firstChild);
        }
    </script>
</body>
</html>
