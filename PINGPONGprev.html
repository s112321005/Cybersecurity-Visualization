        .pingpong-image-card.is-current img{max-width:318px;max-height:320px;opacity:1;transform:scale(1)}

        @media (max-width:1179px){.pingpong-image-dock{width:min(94vw,840px);height:320px}.pingpong-image-viewport{height:320px}.pingpong-image-viewport::before,.pingpong-image-viewport::after{height:320px}.pingpong-image-window{height:320px}.pingpong-image-list{gap:14px;height:320px;padding:0 24px}.pingpong-image-card{width:270px;min-height:52px}.pingpong-image-card.is-current{width:305px;min-height:250px;margin:0 10px}.pingpong-image-card.is-current img{max-width:275px;max-height:220px}}

<body>
    <aside class="pingpong-image-dock" aria-label="Ping-Pong current-step image preview" data-current-step="1">
        <div class="pingpong-image-viewport">
            <div class="pingpong-image-window">
                <div class="pingpong-image-list">
                    <div class="pingpong-image-card is-current" data-pingpong-step="1" aria-current="step"><div class="pingpong-step-summary"><span class="pingpong-step-number">1</span><span class="pingpong-step-title">PREPARE</span></div><img src="pictures/pingpong-1.png" alt="Ping-Pong Step 1 Prepare"></div>
                    <div class="pingpong-image-card" data-pingpong-step="2"><div class="pingpong-step-summary"><span class="pingpong-step-number">2</span><span class="pingpong-step-title">TRANSMIT</span></div><img src="pictures/pingpong-2.png" alt="Ping-Pong Step 2 Transmit"></div>
                    <div class="pingpong-image-card" data-pingpong-step="3"><div class="pingpong-step-summary"><span class="pingpong-step-number">3</span><span class="pingpong-step-title">SELECTION</span></div><img src="pictures/pingpong-3.png" alt="Ping-Pong Step 3 Selection"></div>
                    <div class="pingpong-image-card" data-pingpong-step="4"><div class="pingpong-step-summary"><span class="pingpong-step-number">4</span><span class="pingpong-step-title">OPERATION</span></div><img src="pictures/pingpong-4-m.png" alt="Ping-Pong Step 4 Operation"></div>
                    <div class="pingpong-image-card" data-pingpong-step="5"><div class="pingpong-step-summary"><span class="pingpong-step-number">5</span><span class="pingpong-step-title">CHECK / DECODE</span></div><img src="pictures/pingpong-5-m.png" alt="Ping-Pong Step 5 Check or Decode"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="header">
        <div class="header-left">
            <a href="QuantumCybersecurityEducationPlatform.html?section=qsdc#quantum-security-applications" class="btn-back" title="Back to Home" aria-label="Back to Home">&#x25C0;&#xFE0E;</a>
            <div class="page-title">QSDC : ping pong</div>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <button class="nav-btn" onclick="nextStep()">Next</button>
        </div>
    </div>

    <div class="main-card">
        <div class="state-badge" aria-label="Current entangled state">
            <p class="state-badge-title">Current Entangled State</p>
            <div class="state-badge-formula" id="state-badge-formula" aria-live="polite">
                \( |\Psi^+\rangle = \frac{1}{\sqrt{2}}(|01\rangle + |10\rangle)_{12} \)
            </div>
        </div>
        
        <div class="interaction-area" id="main-interaction">
            <div class="entanglement-zone">
                <div class="particle-group">
                    <img src="pictures/cat_alice.svg" class="avatar" alt="Alice Cat">
                    <button class="svg-btn" id="btn-measure-a" onclick="measureA()" title="Observe Alice's Particle">
                        <img src="pictures/a_eyez.svg" class="eye-icon" alt="Eye Icon">
                    </button>
                    <div id="alice-ball" class="photon-particle">?</div>
                </div>

                <div class="entangle-link" id="entangle-line"></div>

                <div class="particle-group" id="bob-group">
                    <img src="pictures/cat_bob.svg" class="avatar" alt="Bob Cat">
                    <button class="svg-btn" id="btn-measure-b" onclick="measureB()" title="Observe Bob's Particle">
                        <img src="pictures/b_eyez.svg" class="eye-icon" alt="Eye Icon">
                    </button>
                    <div id="bob-ball" class="photon-particle">?</div>
                </div>
            </div>
        </div>

        <div class="controls" id="guess-controls" style="display: none;">
            <button class="nav-btn" onclick="submitGuess(0)">Guess Result is |0⟩</button>
            <button class="nav-btn" onclick="submitGuess(1)">Guess Result is |1⟩</button>
        </div>

        <div class="hint-box" id="hint">
            A pair is ready! Measure <b>Alice</b> and <b>Bob</b> to observe their particles.
        </div>

        <div class="history-panel">
            <div class="history-title">Observation Log</div>
            <div class="log-row">
                <img src="pictures/cat_alice.svg" class="log-avatar" alt="Alice">
                <div class="log-circle circle-a">1</div>
                <div class="log-bits" id="log-bits-a"></div>
            </div>
            <div class="log-row">
                <img src="pictures/cat_bob.svg" class="log-avatar" alt="Bob">
                <div class="log-circle circle-b">2</div>
                <div class="log-bits" id="log-bits-b"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content" id="modal-card">
            <div class="modal-icon" id="modal-icon">?</div>
            <h2 class="modal-title" id="modal-title">Title</h2>
            <p class="modal-text" id="modal-text">Message</p>
            <button class="modal-btn" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        let pairsMeasured = 0;
        let currentPairNumber = 0; 
        let phase = 1; 
        let aMeasured = false;
        let bMeasured = false;
        let currentA = 0;
        let currentB = 1;
        
        let targetToGuess = null; 
        let correctlyGuessed10 = false;
        let correctlyGuessed01 = false;
        let isCurrentGuessCorrect = false;
        let measuredFormulaBits = { 1: false, 2: false };
        let phase1GeneratedTerms = [];

        let stateBadgeCollapsed = false;
        const STATE_BADGE_COLLAPSE_COMPLETE_MS = 1850;

        function getCurrentTermKey() {
            return `${currentA}${currentB}`;
        }

        function typesetStateBadgeFormula() {
            const formula = document.getElementById('state-badge-formula');
            if (window.MathJax?.typesetPromise) {
                MathJax.typesetClear?.([formula]);
                MathJax.typesetPromise([formula]);
            }
        }

        function setStateBadgeLatex(latex, animate = false) {
            const formula = document.getElementById('state-badge-formula');
            const applyLatex = () => {
                formula.innerHTML = `\\( ${latex} \\)`;
                typesetStateBadgeFormula();
                if (animate) {
                    requestAnimationFrame(() => formula.classList.remove('formula-transition'));
                }
            };
            if (animate) {
                formula.classList.add('formula-transition');
                setTimeout(applyLatex, 650);
            } else {
                formula.classList.remove('formula-transition');
                applyLatex();
            }
        }

        function renderStateBadgeFormula(mode = 'superposition', activeTerm = null, fadingTerm = null) {
            const activeColor = '#549FD0';
            const fadeColor = '#b8c2cc';

            function coloredDigit(digit, color) {
                return `\\textcolor{${color}}{${digit}}`;
            }

            function formatTerm(term, activeTerm, fadingTerm) {
                const digits = term.split('');
                const isActive = term === activeTerm;
                const isFading = term === fadingTerm;

                const formattedDigits = digits.map((digit, index) => {
                    const particleNumber = index + 1;
                    if (!measuredFormulaBits[particleNumber]) return digit;
                    if (isActive) return coloredDigit(digit, activeColor);
                    if (isFading) return coloredDigit(digit, fadeColor);
                    return digit;
                }).join('');

                return `|${formattedDigits}\\rangle`;
            }

            if (mode === 'collapsed') {
                const collapsedTerm = formatTerm(activeTerm, activeTerm, null);
                setStateBadgeLatex(`|\\Psi^+\\rangle \\rightarrow ${collapsedTerm}_{12}`, true);
                return;
            }

            if (!activeTerm && !fadingTerm) {
                setStateBadgeLatex('|\\Psi^+\\rangle = \\frac{1}{\\sqrt{2}}(|01\\rangle + |10\\rangle)_{12}');
                return;
            }

            const term01 = formatTerm('01', activeTerm, fadingTerm);
            const term10 = formatTerm('10', activeTerm, fadingTerm);
            setStateBadgeLatex(`|\\Psi^+\\rangle = \\frac{1}{\\sqrt{2}}(${term01} + ${term10})_{12}`, true);
        }

        function resetStateBadgeColor() {
            measuredFormulaBits = { 1: false, 2: false };
            stateBadgeCollapsed = false;
            renderStateBadgeFormula();
        }

        function colorStateBadgeBit(particleNumber) {
            measuredFormulaBits[particleNumber] = true;
            if (phase === 1) {
                if (!stateBadgeCollapsed) {
                    collapseStateBadgeToMeasuredTerm();
                } else {
                    renderStateBadgeFormula('collapsed', getCurrentTermKey());
                }
            } else if (!stateBadgeCollapsed) {
                renderStateBadgeFormula('superposition', getCurrentTermKey());
            } else {
                renderStateBadgeFormula('collapsed', getCurrentTermKey());
            }
        }

        function collapseStateBadgeToMeasuredTerm() {
            const activeTerm = getCurrentTermKey();
            const fadingTerm = activeTerm === '01' ? '10' : '01';
            stateBadgeCollapsed = true;
            renderStateBadgeFormula('superposition', activeTerm, fadingTerm);
            setTimeout(() => renderStateBadgeFormula('collapsed', activeTerm), 720);
        }

        function generatePair() {
            currentPairNumber++; 

            if (phase === 1) {
                let term;
                if (phase1GeneratedTerms.length === 2 && phase1GeneratedTerms[0] === phase1GeneratedTerms[1]) {
                    term = phase1GeneratedTerms[0] === '10' ? '01' : '10';
                } else {
                    term = Math.random() < 0.5 ? '10' : '01';
                }
                currentA = Number(term[0]);
                currentB = Number(term[1]);
                phase1GeneratedTerms.push(term);
            } else if (phase === 2) {
                if (!correctlyGuessed10) {
                    currentA = 1;
                    currentB = 0;
                } else if (!correctlyGuessed01) {
                    currentA = 0;
                    currentB = 1;
                }
            }

            aMeasured = false;
            bMeasured = false;
            targetToGuess = null;
            resetStateBadgeColor();
            
            const aBall = document.getElementById('alice-ball');
            const bBall = document.getElementById('bob-ball');
            
            aBall.innerText = "?";
            aBall.className = "photon-particle"; 
            bBall.innerText = "?";
            bBall.className = "photon-particle"; 
            document.getElementById('entangle-line').style.opacity = '1';
            
            document.getElementById('btn-measure-a').disabled = false;
            document.getElementById('btn-measure-b').disabled = false;
            document.getElementById('guess-controls').style.display = 'none';

            if (phase === 1) {
                document.getElementById('hint').innerHTML = `Pair ${currentPairNumber} generated! Click either Eye icon; the entangled partner will appear automatically.`;
            } else if (phase === 2) {
                document.getElementById('hint').innerHTML = `<b>Guessing Mode (Pair ${currentPairNumber}):</b> Measure ONE particle, then guess the other's result!`;
            }
        }

        function revealAliceParticle() {
            aMeasured = true;
            document.getElementById('btn-measure-a').disabled = true;
            const aBall = document.getElementById('alice-ball');
            aBall.style.transform = 'scale(1.2)';
            setTimeout(() => aBall.style.transform = 'scale(1)', 150);
            aBall.innerText = `|${currentA}⟩`;
            aBall.classList.add('measured-a');
            colorStateBadgeBit(1);
        }

        function revealBobParticle() {
            bMeasured = true;
            document.getElementById('btn-measure-b').disabled = true;
            const bBall = document.getElementById('bob-ball');
            bBall.style.transform = 'scale(1.2)';
            setTimeout(() => bBall.style.transform = 'scale(1)', 150);
            bBall.innerText = `|${currentB}⟩`;
            bBall.classList.add('measured-b');
            colorStateBadgeBit(2);
        }

        function measureA() {
            if (aMeasured) return;
            revealAliceParticle();
            
            if (phase === 1) {
                document.getElementById('btn-measure-b').disabled = true;
                document.getElementById('hint').innerText = "Alice measured! Bob's entangled particle appears automatically.";
                setTimeout(() => {
                    revealBobParticle();
                    checkCompletionPhase1();
                }, STATE_BADGE_COLLAPSE_COMPLETE_MS);
            } else if (phase === 2 && !bMeasured) {
                targetToGuess = 'B';
                document.getElementById('btn-measure-b').disabled = true;
                document.getElementById('guess-controls').style.display = 'flex';
                document.getElementById('hint').innerHTML = "You observed Alice! Since they are entangled, what do you think <b>Bob</b> has?";
            }
        }

        function measureB() {
            if (bMeasured) return;
            revealBobParticle();
            
            if (phase === 1) {
                document.getElementById('btn-measure-a').disabled = true;
                document.getElementById('hint').innerText = "Bob measured! Alice's entangled particle appears automatically.";
                setTimeout(() => {
                    revealAliceParticle();
                    checkCompletionPhase1();
                }, STATE_BADGE_COLLAPSE_COMPLETE_MS);
            } else if (phase === 2 && !aMeasured) {
                targetToGuess = 'A';
                document.getElementById('btn-measure-a').disabled = true;
                document.getElementById('guess-controls').style.display = 'flex';
                document.getElementById('hint').innerHTML = "You observed Bob! Since they are entangled, what do you think <b>Alice</b> has?";
            }
        }

        function checkCompletionPhase1() {
            if (aMeasured && bMeasured) {
                recordLog();
                document.getElementById('entangle-line').style.opacity = '0.3'; 
                pairsMeasured++;
                
                if (pairsMeasured >= 3) {
                    phase = 2;
                    document.getElementById('hint').innerHTML = "<b>Pattern detected!</b> Getting ready for Guessing Mode...";
                    setTimeout(generatePair, 2500);
                } else {
                    document.getElementById('hint').innerHTML = "Measurement complete. Generating next pair...";
                    setTimeout(generatePair, 1500);
                }
            }
        }

        function submitGuess(guessedValue) {
            let correctValue = (targetToGuess === 'A') ? currentA : currentB;
            
            if (targetToGuess === 'A') {
                aMeasured = true;
                document.getElementById('alice-ball').innerText = `|${currentA}⟩`;
                document.getElementById('alice-ball').classList.add('measured-a');
                colorStateBadgeBit(1);
            } else {
                bMeasured = true;
                document.getElementById('bob-ball').innerText = `|${currentB}⟩`;
                document.getElementById('bob-ball').classList.add('measured-b');
                colorStateBadgeBit(2);
            }
            
            document.getElementById('guess-controls').style.display = 'none';
            document.getElementById('entangle-line').style.opacity = '0.3';
            recordLog();

            if (guessedValue === correctValue) {
                isCurrentGuessCorrect = true;
                showModal("success", "Correct!", "Entangled particles in this state always show opposite results.");
            } else {
                isCurrentGuessCorrect = false;
                showModal("error", "Incorrect!", "Remember, whatever one particle shows, the other will be its EXACT OPPOSITE. Try again!");
            }
        }

        function showModal(type, title, text) {
            const overlay = document.getElementById('result-modal');
            const card = document.getElementById('modal-card');
            const icon = document.getElementById('modal-icon');
            
            card.className = `modal-content ${type}`;
            icon.innerText = (type === 'success') ? '✓' : '✕';
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            
            overlay.classList.add('show');
        }

        function closeModal() {
            document.getElementById('result-modal').classList.remove('show');
            
            if (isCurrentGuessCorrect) {
                if (currentA === 1 && currentB === 0) correctlyGuessed10 = true;
                if (currentA === 0 && currentB === 1) correctlyGuessed01 = true;

                if (correctlyGuessed10 && correctlyGuessed01) {
                    phase = 3;
                    document.getElementById('hint').innerHTML = "<b>Excellent!</b> Your observations perfectly match the definition of the <b>|Ψ+⟩</b> state (where particle 1 belongs to Alice and particle 2 to Bob): a <span style='display:inline-block;vertical-align:middle;text-align:center;font-size:0.85em;line-height:1.1;margin:0 4px;'><span style='border-bottom:1px solid currentColor;display:block;'>1</span><span style='display:block;'>2</span></span> probability of measuring |10⟩ and a <span style='display:inline-block;vertical-align:middle;text-align:center;font-size:0.85em;line-height:1.1;margin:0 4px;'><span style='border-bottom:1px solid currentColor;display:block;'>1</span><span style='display:block;'>2</span></span> probability of measuring |01⟩.";
                } else {
                    document.getElementById('hint').innerHTML = `Correct! Now, let's try the other scenario to confirm your understanding...`;
                    setTimeout(generatePair, 600);
                }
            } else {
                document.getElementById('hint').innerHTML = `Let's retry that scenario to make sure you got the pattern.`;
                setTimeout(generatePair, 600);
            }
        }

        function recordLog() {
            // Add | ⟩ symbol
            const logA = document.getElementById('log-bits-a');
            const itemA = document.createElement('div');
            itemA.className = "log-item";
            itemA.innerHTML = `
                <div class="log-index">${currentPairNumber}</div>
                <div class="bit-box bit-a">|${currentA}⟩</div>
            `;
            logA.appendChild(itemA);
            logA.scrollLeft = logA.scrollWidth;
            
            // Add | ⟩ symbol
            const logB = document.getElementById('log-bits-b');
            const itemB = document.createElement('div');
            itemB.className = "log-item";
            itemB.innerHTML = `
                <div class="bit-box bit-b">|${currentB}⟩</div>
            `;
            logB.appendChild(itemB);
            logB.scrollLeft = logB.scrollWidth;
        }

        window.onload = generatePair;
        
        function nextStep() { window.location.href = 'PINGPONGstep1.html';}
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dock = document.querySelector('.pingpong-image-dock');
            const windowBox = document.querySelector('.pingpong-image-window');
            const list = document.querySelector('.pingpong-image-list');
            let currentCard = document.querySelector('.pingpong-image-card.is-current');

            if (dock) {
                dock.addEventListener('wheel', function (event) {
                    event.preventDefault();
                }, { passive: false });
            }

            function getStep2CollapsedStep1ReferenceOffset(isHorizontal) {
                const step1Card = document.querySelector('.pingpong-image-card[data-pingpong-step="1"]');
                const step3Card = document.querySelector('.pingpong-image-card[data-pingpong-step="3"]');
                if (!step1Card || !step3Card || !currentCard) {
                    if (isHorizontal) {
                        return (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2);
                    }
                    return Math.max(0, (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2));
                }

                const ariaBefore = currentCard.getAttribute('aria-current');

                currentCard.classList.remove('is-current');
                currentCard.removeAttribute('aria-current');
                step3Card.classList.add('is-current');
                step3Card.setAttribute('aria-current', 'step');

                const targetEdge = isHorizontal ? step1Card.offsetLeft : step1Card.offsetTop;

                step3Card.classList.remove('is-current');
                step3Card.removeAttribute('aria-current');
                currentCard.classList.add('is-current');
                if (ariaBefore) currentCard.setAttribute('aria-current', ariaBefore);

                const currentEdge = isHorizontal ? currentCard.offsetLeft : currentCard.offsetTop;
                return targetEdge - currentEdge;
            }

            window.lockPingpongImageToCurrentStep = function () {
                if (!windowBox || !list || !currentCard) return;
                const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
                const offset = getStep2CollapsedStep1ReferenceOffset(isHorizontal);
                list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
            };

            window.showPingpongImageStep = function (stepKey) {
                const nextCard = document.querySelector('.pingpong-image-card[data-pingpong-step="' + stepKey + '"]');
                if (!nextCard) return;
                document.querySelectorAll('.pingpong-image-card').forEach(card => {
                    card.classList.remove('is-current');
                    card.removeAttribute('aria-current');
                });
                nextCard.classList.add('is-current');
                nextCard.setAttribute('aria-current', 'step');
                currentCard = nextCard;
                requestAnimationFrame(window.lockPingpongImageToCurrentStep);
            };

            window.showPingpongImageStep(dock?.dataset.currentStep || '1');
            window.addEventListener('resize', window.lockPingpongImageToCurrentStep);
        });
    </script>
</body>
