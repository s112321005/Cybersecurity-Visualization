        @media (max-width:1179px){body{padding-right:20px!important}.pingpong-image-dock{position:relative;right:auto;top:auto;width:min(94vw,840px);height:320px;margin:18px auto 10px}.pingpong-image-viewport{width:100%;height:320px}.pingpong-image-viewport::before,.pingpong-image-viewport::after{height:320px;width:10px;z-index:0}.pingpong-image-window{width:100%;height:320px;margin-left:0}.pingpong-image-list{flex-direction:row;align-items:center;gap:14px;width:max-content;height:320px;padding:0 24px}.pingpong-image-card{width:270px;min-height:52px}.pingpong-image-card.is-current{width:305px;min-height:250px;margin:0 10px}.pingpong-image-card.is-current img{max-width:275px;max-height:220px}.main-card{height:760px}.party-alice{left:calc(35% + 90px);top:34px}.party-bob{left:109px;top:268px}.party-charlie{right:85px;top:268px}#stage.message-layout .party-alice{left:calc(35% + 155px);top:14px}#stage.message-layout .party-bob{left:159px;top:238px}#stage.message-layout .party-charlie{right:55px;top:238px}.party img{width:112px}.center-panel{top:340px;width:min(430px,82vw)}.center-panel.message-panel{left:calc(54% + 20px);top:175px;transform:translateX(-50%);width:min(210px,82vw);align-items:center}.center-panel.detecting-panel{left:50%;top:510px;transform:translateX(-50%);width:min(420px,92vw);align-items:center}.mode-badge{left:calc(54% + 20px);top:110px}.mode-badge.corner{left:18px;top:80px;transform:none}.floating-announcement{left:calc(35% + 90px);top:32px;transform:translateX(-50%);max-width:220px}#replay-btn,#step-btn{left:-15px}

<body>
<aside class="pingpong-image-dock" aria-label="Zhang-Man current-step image preview" data-current-step="5">
    <div class="pingpong-image-viewport">

                <div class="pingpong-image-card" data-pingpong-step="1"><div class="pingpong-step-summary"><span class="pingpong-step-number">1</span><span class="pingpong-step-title">PREPARE</span></div><img src="pictures/zm-1.png" alt="Zhang-Man Step 1 Prepare"></div>
                <div class="pingpong-image-card" data-pingpong-step="2"><div class="pingpong-step-summary"><span class="pingpong-step-number">2</span><span class="pingpong-step-title">DISTRIBUTE</span></div><img src="pictures/zm-2.png" alt="Zhang-Man Step 2 Distribute"></div>
                <div class="pingpong-image-card" data-pingpong-step="3"><div class="pingpong-step-summary"><span class="pingpong-step-number">3</span><span class="pingpong-step-title">SELECT MODE</span></div><img src="pictures/zm-3.png" alt="Zhang-Man Step 3 Select Mode"></div>
                <div class="pingpong-image-card" data-pingpong-step="4"><div class="pingpong-step-summary"><span class="pingpong-step-number">4</span><span class="pingpong-step-title">CHECK / MESSAGE</span></div><img id="zm-step4-img" src="pictures/zm-4-m.png" alt="Zhang-Man Step 4"></div>

            </div>
        </div>
    </div>
</aside>

<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html?section=qss#quantum-security-applications" class="btn-back" title="back home" aria-label="Back to Home"></a>

<div class="main-card" id="stage">
    <div class="mode-badge" id="mode-badge">Mode</div>

    <div class="ent-line" id="line12"></div>
    <div class="ent-line" id="line34"></div>
    <div class="ent-line" id="line56"></div>
    <div class="ent-tag" id="etag12">\( |\Psi^-\rangle_{12} \)</div>
    <div class="ent-tag" id="etag34">\( |\Psi^-\rangle_{34} \)</div>
    <div class="ent-tag" id="etag56">\( |\Psi^-\rangle_{56} \)</div>

    <div class="party party-alice" id="party-alice">
        <img src="pictures/cat_alice.svg" alt="Alice">
                <div class="qubit-row"><div class="qubit" id="q1">q1</div><div class="qubit" id="q6">q6</div></div>
        <div class="measurement-result" id="alice-result"></div>
    </div>

    <div class="party party-bob" id="party-bob">
        <img src="pictures/cat_bob.svg" alt="Bob">
                <div class="qubit-row"><div class="qubit" id="q2">q2</div><div class="qubit" id="q3">q3</div></div>
        <div class="measurement-result" id="bob-result"></div>
    </div>

    <div class="party party-charlie" id="party-charlie">
        <img src="pictures/cat_charlie.svg" alt="Charlie">
                <div class="qubit-row"><div class="qubit" id="q4">q4</div><div class="qubit" id="q5">q5</div></div>
        <div class="measurement-result" id="charlie-result"></div>
    </div>

    <div class="center-panel" id="center-panel"></div>
    <div class="announcement floating-announcement" id="announcement"></div>

    <div class="hint-box" id="hint-box">
        <p class="hint-title" id="hint-title">Step 4</p>
        <p class="hint-text" id="hint-text">The action depends on the mode Alice selected in Step 3.</p>
    </div>
</div>

<script>
    const selectedMode = localStorage.getItem('zhangManMode') || 'detecting';

    const initialEntanglementPairs = [
        { line: 'line12', tag: 'etag12', a: 'q1', b: 'q2', label: '\( |\Psi^-\rangle_{12} \)', tagOffsetY: 10 },
        { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\( |\Psi^-\rangle_{34} \)', tagOffsetY: 10 },
        { line: 'line56', tag: 'etag56', a: 'q5', b: 'q6', label: '\( |\Psi^-\rangle_{56} \)', tagOffsetY: 10 }
    ];

    let linePairs = [...initialEntanglementPairs];

    function centerOf(element, container) {
        const r = element.getBoundingClientRect();
        const c = container.getBoundingClientRect();
        return { x: r.left - c.left + r.width / 2, y: r.top - c.top + r.height / 2 };
    }

    function drawLine(lineId, fromId, toId, tagId, shape = 'straight', tagOffsetY = 10) {
        const area = document.getElementById('stage');
        const from = document.getElementById(fromId);
        const to = document.getElementById(toId);
        const line = document.getElementById(lineId);
        const tag = document.getElementById(tagId);
        if (!area || !from || !to || !line || !tag) return;
        const a = centerOf(from, area);
        const b = centerOf(to, area);

        if (shape === 'arc') {
            const left = Math.min(a.x, b.x);
            const right = Math.max(a.x, b.x);
            const width = right - left;
            const arcHeight = Number(line.dataset.arcHeight || 76);
            const top = Math.min(a.y, b.y) - arcHeight + 8;
            line.classList.add('arc');
            line.style.left = left + 'px';
            line.style.top = top + 'px';
            line.style.width = width + 'px';
            line.style.height = arcHeight + 'px';
            line.style.border = '4px dashed var(--alice-color)';
            line.style.borderBottom = 'none';
            line.style.borderTop = '4px dashed var(--alice-color)';
            line.style.borderRadius = Math.max(48, width / 2) + 'px ' + Math.max(48, width / 2) + 'px 0 0';
            line.style.background = 'transparent';
            line.style.transform = 'none';
            tag.style.left = ((a.x + b.x) / 2) + 'px';
            tag.style.top = (top + tagOffsetY) + 'px';
            return;
        }

        line.classList.remove('arc');
        line.style.height = '0';
        line.style.border = '';
        line.style.borderTop = '4px dashed var(--alice-color)';
        line.style.borderRadius = '0';
        line.style.background = 'transparent';

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        line.style.left = a.x + 'px';
        line.style.top = a.y + 'px';
        line.style.width = length + 'px';
        line.style.transform = 'rotate(' + angle + 'deg)';
        tag.style.left = ((a.x + b.x) / 2) + 'px';
        tag.style.top = ((a.y + b.y) / 2 + tagOffsetY) + 'px';
    }

    function setEntanglementPairs(pairs) {
        linePairs = pairs;
        linePairs.forEach(pair => {
            const tag = document.getElementById(pair.tag);
            if (tag && pair.label) tag.innerHTML = pair.label;
        });
        updateEntangleLines();
    }

    function updateEntangleLines() {
        linePairs.forEach(pair => {
            const tag = document.getElementById(pair.tag);
            if (tag && pair.label) tag.innerHTML = pair.label;
            const lineEl = document.getElementById(pair.line);
            if (lineEl) {
                if (pair.arcHeight) lineEl.dataset.arcHeight = pair.arcHeight;
                else delete lineEl.dataset.arcHeight;
            }
            drawLine(pair.line, pair.a, pair.b, pair.tag, pair.shape || 'straight', pair.tagOffsetY ?? 10);
        });
        if (window.MathJax) MathJax.typesetPromise(['etag12','etag34','etag56'].map(id => document.getElementById(id)).filter(Boolean));
    }

    function showDetectingInitialEntanglement() {
        if (stage) stage.classList.remove('message-layout');
        linePairs = [
            { line: 'line12', tag: 'etag12', a: 'q1', b: 'q2', label: '\\( |\\Psi^-\\rangle_{12} \\)', shape: 'straight', tagOffsetY: 10 },
            { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\\( |\\Psi^-\\rangle_{34} \\)', shape: 'straight', tagOffsetY: 10 },
            { line: 'line56', tag: 'etag56', a: 'q5', b: 'q6', label: '\\( |\\Psi^-\\rangle_{56} \\)', shape: 'straight', tagOffsetY: 10 }
        ];

        ['line12','etag12','line34','etag34','line56','etag56'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = 'block';
                el.style.opacity = '1';
                el.style.visibility = 'visible';
                el.style.filter = '';
            }
        });

        ['line12','line34','line56'].forEach(id => {
            const line = document.getElementById(id);
            if (line) {
                line.classList.remove('arc');
                line.style.height = '0';
                line.style.border = '';
                line.style.borderTop = '4px dashed var(--alice-color)';
                line.style.borderBottom = '';
                line.style.borderRadius = '0';
                line.style.background = 'transparent';
                line.style.transformOrigin = 'left center';
            }
        });

        updateEntangleLines();
        setTimeout(updateEntangleLines, 0);
        setTimeout(updateEntangleLines, 80);
        setTimeout(updateEntangleLines, 220);
    }

    function showOnlyQ34Entanglement() {
        linePairs = [
            { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\\( |\\Psi^-\\rangle_{34} \\)', shape: 'straight', tagOffsetY: 4 }
        ];

        const line34 = document.getElementById('line34');
        const tag34 = document.getElementById('etag34');
        if (tag34) tag34.innerHTML = '\\( |\\Psi^-\\rangle_{34} \\)';

        ['line12','etag12','line56','etag56'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.style.opacity = '0';
                el.style.visibility = 'hidden';
                el.style.display = 'none';
            }
        });

        if (line34) {
            line34.style.display = 'block';
            line34.style.opacity = '1';
            line34.style.visibility = 'visible';
            line34.classList.remove('arc');
            line34.style.border = '';
            line34.style.borderTop = '4px dashed var(--alice-color)';
            line34.style.height = '0';
            line34.style.borderRadius = '0';
            line34.style.transformOrigin = 'left center';
        }

        if (tag34) {
            tag34.style.display = 'block';
            tag34.style.opacity = '1';
            tag34.style.visibility = 'visible';
        }

        drawLine('line34', 'q3', 'q4', 'etag34', 'straight', 4);
        if (window.MathJax) MathJax.typesetPromise([tag34]).then(() => drawLine('line34', 'q3', 'q4', 'etag34', 'straight', 4));
        setTimeout(() => drawLine('line34', 'q3', 'q4', 'etag34', 'straight', 4), 0);
        setTimeout(() => drawLine('line34', 'q3', 'q4', 'etag34', 'straight', 4), 80);
        setTimeout(() => drawLine('line34', 'q3', 'q4', 'etag34', 'straight', 4), 200);
    }

    function showMessageEntanglement(aliceBell, bcBell) {
        const label16 = bellLatexFromText(aliceBell, '16');
        const label25 = bellLatexFromText(bcBell, '25');
        linePairs = [
            { line: 'line12', tag: 'etag12', a: 'q1', b: 'q6', label: label16, shape: 'straight', tagOffsetY: 50 },
            { line: 'line56', tag: 'etag56', a: 'q2', b: 'q5', label: label25, shape: 'arc', tagOffsetY: 6, arcHeight: 52 },
            { line: 'line34', tag: 'etag34', a: 'q3', b: 'q4', label: '\\( |\\Psi^-\\rangle_{34} \\)', shape: 'straight', tagOffsetY: 4 }
        ];

        ['line12','etag12','line34','etag34','line56','etag56'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = 'block';
                el.style.opacity = '1';
                el.style.visibility = 'visible';
                el.style.filter = '';
            }
        });

        ['line12','line34','line56'].forEach(id => {
            const line = document.getElementById(id);
            if (line) {
                line.classList.remove('arc');
                line.style.height = '0';
                line.style.border = '';
                line.style.borderTop = '4px dashed var(--alice-color)';
                line.style.borderBottom = '';
                line.style.borderRadius = '0';
                line.style.background = 'transparent';
                line.style.transformOrigin = 'left center';
            }
        });

        updateEntangleLines();
        setTimeout(updateEntangleLines, 0);
        setTimeout(updateEntangleLines, 80);
        setTimeout(updateEntangleLines, 220);
        setTimeout(updateEntangleLines, 420);
    }


    function wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getEyeAsset(party, basis) {
        const low = basis.toLowerCase();
        if (party === 'alice') return 'pictures/a_eye' + low + '.svg';
        if (party === 'charlie') return 'pictures/c_eye' + low + '.svg';
        return 'pictures/b_eye' + low + '.svg';
    }

    async function showMeasureEye(party, basis = 'X') {
        const stage = document.getElementById('stage');
        const anchor = document.getElementById('party-' + party);
        if (!stage || !anchor) return;
        const c = centerOf(anchor, stage);
        const src = getEyeAsset(party, basis);
        const eye = document.createElement('div');
        eye.className = 'measure-eye ' + party + '-eye';
        eye.innerHTML = '<img src="' + src + '" alt="' + party + ' ' + basis + ' basis" onerror="this.replaceWith(document.createTextNode(\'👁 ' + basis + '\'))">';
        eye.style.left = c.x + 'px';
        eye.style.top = (c.y - 70) + 'px';
        stage.appendChild(eye);
        requestAnimationFrame(() => eye.classList.add('show'));
        await wait(1050);
        eye.remove();
    }

    function preloadEyeAssets() {
        ['pictures/a_eyex.svg','pictures/a_eyez.svg','pictures/b_eyex.svg','pictures/b_eyez.svg','pictures/c_eyex.svg','pictures/c_eyez.svg'].forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    function setMessageResult(targetId, html) {
        const host = document.getElementById(targetId);
        if (!host) return;
        host.innerHTML = '<div class="result-item">' + html + '</div>';
    }

    function showPostEyeMessageEntanglement() {
        const stage = document.getElementById('stage');
        const aliceBell = localStorage.getItem('zhangManAliceBell16') || '|Ψ⁻⟩₁₆';

        if (stage) stage.classList.add('message-post-eye');

        linePairs = [
            { line: 'line12', tag: 'etag12', a: 'q1', b: 'q6', label: bellLatexFromText(aliceBell, '16'), shape: 'straight', tagOffsetY: 50 },
            { line: 'line34', tag: 'etag34', a: 'q2', b: 'q3', label: '\\( |\\Psi^-\\rangle_{23} \\)', shape: 'straight', tagOffsetY: 63 },
            { line: 'line56', tag: 'etag56', a: 'q4', b: 'q5', label: '\\( |\\Phi^+\\rangle_{45} \\)', shape: 'straight', tagOffsetY: 63 }
        ];

        ['line12','etag12','line34','etag34','line56','etag56'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = 'block';
                el.style.opacity = '1';
                el.style.visibility = 'visible';
                el.style.filter = '';
            }
        });

        ['line12','line34','line56'].forEach(id => {
            const line = document.getElementById(id);
            if (line) {
                line.classList.remove('arc');
                line.style.height = '0';
                line.style.border = '';
                line.style.borderTop = '4px dashed var(--alice-color)';
                line.style.borderBottom = '';
                line.style.borderRadius = '0';
                line.style.background = 'transparent';
                line.style.transformOrigin = 'left center';
            }
        });

        updateEntangleLines();
        setTimeout(updateEntangleLines, 0);
        setTimeout(updateEntangleLines, 90);
        setTimeout(updateEntangleLines, 240);
    }

    function showMessageMeasurementFeedback(kind) {
        document.getElementById('alice-result').innerHTML = '';
        document.getElementById('bob-result').innerHTML = '';
        document.getElementById('charlie-result').innerHTML = '';

        const publicAlice16 = localStorage.getItem('zhangManAliceBell16') || '|Ψ⁻⟩₁₆';
        const opBits = localStorage.getItem('zhangManOperation') || '00';
        const op = operationFromBits(opBits);

        if (kind === 'alice') {
            showMeasureEye('bob', 'X');
            showMeasureEye('charlie', 'X');
            setMessageResult('bob-result', '<span class="result-dot bob"></span><span>Bell(23) = |Ψ⁻⟩</span>');
            setMessageResult('charlie-result', '<span class="result-dot charlie"></span><span>Bell(45) = |Φ⁺⟩</span>');
        } else if (kind === 'bc') {
            showMeasureEye('alice', 'X');
            setMessageResult('alice-result', '<span class="result-dot alice"></span><span>Original Bell(16) = |Φ⁺⟩</span>');
            setMessageResult('bob-result', '<span class="result-dot bob"></span><span>Inferred Bell(25) = |Φ⁺⟩</span>');
            setMessageResult('charlie-result', '<span class="result-dot charlie"></span><span>No operation used here</span>');
        } else {
            showMeasureEye('alice', 'X');
            setMessageResult('alice-result', '<span class="result-dot alice"></span><span>Announced Bell(16) = ' + publicAlice16.replace(/[₀-₉]/g, '') + '</span>');
            setMessageResult('bob-result', '<span class="result-dot bob"></span><span>Recovered operation = ' + op + '</span>');
            setMessageResult('charlie-result', '<span class="result-dot charlie"></span><span>Secret bits = ' + opBits + '</span>');
        }

        setTimeout(showPostEyeMessageEntanglement, 220);
    }

    function markMeasured(ids) {
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.add('measured');
        });
    }

    function oppositeResult(value, basis) {
        if (basis === 'Z') return value === '|0⟩' ? '|1⟩' : '|0⟩';
        return value === '|+⟩' ? '|−⟩' : '|+⟩';
    }

    function bellLatexFromText(textValue, pair) {
        const match = String(textValue || '').match(/[ΦΨ][⁺⁻]/);
        if (!match) return '\\( |Bell\\rangle_{' + pair + '} \\)';
        const state = match[0].replace('Φ','\\Phi').replace('Ψ','\\Psi').replace('⁺','^+').replace('⁻','^-');
        return '\\( |' + state + '\\rangle_{' + pair + '} \\)';
    }

    function setPlainResult(targetId, rows) {
        const host = document.getElementById(targetId);
        if (!host) return;
        host.innerHTML = rows.map(row => `<div class="result-item" data-qubit="${row.qubit}"><span>${row.qubit}=${row.value}</span></div>`).join('');
    }

    function highlightResultPair(firstQubit, secondQubit) {
        document.querySelectorAll('.result-item').forEach(item => item.classList.remove('active'));
        [firstQubit, secondQubit].forEach(q => {
            const item = document.querySelector(`.result-item[data-qubit="${q}"]`);
            if (item) item.classList.add('active');
        });
    }

    const bcInferenceExample = {
        bob23: '|Ψ⁻⟩₂₃',
        charlie45: '|Φ⁺⟩₄₅',
        initial34: '|Ψ⁻⟩₃₄',
        inferred25: '|Φ⁺⟩₂₅',
        alice16: '|Φ⁺⟩₁₆',
        operation: 'u₄',
        secret: '11'
    };

    function setQ25Highlight(show) {
        const tag = document.getElementById('etag56');
        const line = document.getElementById('line56');
        [tag, line].forEach(el => {
            if (!el) return;
            el.style.filter = show ? 'drop-shadow(0 0 8px rgba(84,159,208,.85))' : '';
        });
    }

    function qChipPairHTML(pairText) {
        const map = {
            '12': [['q1','alice'], ['q2','bob']],
            '16': [['q1','alice'], ['q6','bob']],
            '23': [['q2','bob'], ['q3','bob']],
            '25': [['q2','bob'], ['q5','charlie']],
            '34': [['q3','bob'], ['q4','charlie']],
            '45': [['q4','charlie'], ['q5','charlie']],
            '56': [['q5','charlie'], ['q6','bob']]
        };
        const items = map[pairText] || [];
        return `<span class="q-chip-pair">${items.map(([q, cls]) => `<span class="q-chip ${cls === 'bob' ? '' : cls}">${q}</span>`).join('')}</span>`;
    }

    function renderMeasurementCards() {
        return String.raw`
            <div class="decode-measure-grid">
                <div class="decode-measure-card focus"><b>Bob measures</b><span class="q-chip-pair"><span class="q-chip">q2</span><span class="q-chip">q3</span></span>\( |\Psi^-\rangle_{23} \)</div>
                <div class="decode-measure-card focus"><b>Charlie measures</b><span class="q-chip-pair"><span class="q-chip charlie">q4</span><span class="q-chip charlie">q5</span></span>\( |\Phi^+\rangle_{45} \)</div>
                <div class="decode-measure-card focus"><b>Initial</b><span class="q-chip-pair"><span class="q-chip">q3</span><span class="q-chip charlie">q4</span></span><span class="state-box">\( |\Psi^-\rangle_{34} \)</span></div>
            </div>`;
    }

    function bellCore(textValue) {
        const m = String(textValue || '').match(/[ΦΨ][⁺⁻]/);
        return m ? m[0] : 'Ψ⁻';
    }

    function bellLatexCore(core) {
        return core.replace('Φ','\\Phi').replace('Ψ','\\Psi').replace('⁺','^+').replace('⁻','^-');
    }

    function bellTextWithPair(textValue, pair) {
        return '|' + bellCore(textValue) + '⟩' + pair.split('').map(n => '₀₁₂₃₄₅₆₇₈₉'[Number(n)]).join('');
    }

    function bellLatexWithPair(textValue, pair) {
        return '\\( |' + bellLatexCore(bellCore(textValue)) + '\\rangle_{' + pair + '} \\)';
    }

    function operationFromBits(bits) {
        return { '00': 'I', '01': 'Z', '10': 'Y', '11': 'X' }[bits] || 'I';
    }

    function original16FromInferred25(bcBell) {
        return bellTextWithPair(bcBell || '|Ψ⁻⟩₂₅', '16');
    }

    function renderDecodeChoices() {
        const stage = document.getElementById('stage');
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const opBits = localStorage.getItem('zhangManOperation') || '00';

        const hintBox = document.getElementById('hint-box');
        if (hintBox) hintBox.classList.remove('expanded');
        hintTitle.innerText = 'Collaborative Decoding';
        hintText.innerHTML = `
            <div class="detecting-hint">
                <div class="detecting-note">Click the three parts in order to see how Bob and Charlie use their Bell-measurement results to infer ${qChipPairHTML('25')}, then combine it with Alice's public ${qChipPairHTML('16')} result to recover the secret bits.</div>
                <div class="decode-choice-grid">
                    <button class="decode-choice-btn" data-kind="alice" onclick="showDecodeExplain('alice')">1. Infer ${qChipPairHTML('25')}<br>from ${qChipPairHTML('23')} ${qChipPairHTML('45')}</button>
                    <button class="decode-choice-btn" data-kind="bc" onclick="showDecodeExplain('bc')">2. Use ${qChipPairHTML('16')} ${qChipPairHTML('25')}<br>find operation</button>
                    <button class="decode-choice-btn" data-kind="secret" onclick="showDecodeExplain('secret')">3. Recover secret<br><span class="secret-badge">${opBits}</span></button>
                </div>
            </div>`;
        if (window.MathJax) MathJax.typesetPromise([hintText]);
    }

    function showDecodeExplain(kind) {
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        if (!hintTitle || !hintText) return;
        const hintBox = document.getElementById('hint-box');
        if (hintBox) hintBox.classList.add('expanded');

        const publicAlice16 = localStorage.getItem('zhangManAliceBell16') || '|Ψ⁻⟩₁₆';
        const inferred25 = '|Φ⁺⟩₂₅';
        const original16 = '|Φ⁺⟩₁₆';
        const opBits = localStorage.getItem('zhangManOperation') || '00';
        const op = operationFromBits(opBits);

        let title = 'Collaborative Decoding';
        let body = '';

        showMessageMeasurementFeedback(kind);

        if (kind === 'alice') {
            title = 'Infer the <span class="q-chip-pair"><span class="q-chip">q2</span><span class="q-chip charlie">q5</span></span> Bell State';
            body = String.raw`
                ${renderMeasurementCards()}
                <div class="swap-hint">Direct entanglement swapping: ${qChipPairHTML('23')}${qChipPairHTML('45')} → ${qChipPairHTML('25')}${qChipPairHTML('34')}.</div>
                <div class="decode-long-formula">
                    <span>\( |\Psi^{-}\rangle_{23}|\Phi^{+}\rangle_{45}= \)</span>
                    <span class="state-box">\( -\frac{1}{2}|\Phi^{+}\rangle_{25}|\Psi^{-}\rangle_{34} \)</span>
                    <span>\( +\frac{1}{2}|\Phi^{-}\rangle_{25}|\Psi^{+}\rangle_{34} \)</span>
                    <span>\( -\frac{1}{2}|\Psi^{+}\rangle_{25}|\Phi^{-}\rangle_{34} \)</span>
                    <span>\( +\frac{1}{2}|\Psi^{-}\rangle_{25}|\Phi^{+}\rangle_{34} \)</span>
                </div>
                <div class="decode-detail-formula decode-focus">
                    Match <span class="match-result">\( |\Psi^{-}\rangle_{34} \)</span>
                    \( \Rightarrow |\Phi^{+}\rangle_{25} \)
                </div>`;
            setTimeout(() => setQ25Highlight(true), 0);
        } else if (kind === 'bc') {
            title = 'Use Alice Public ' + qChipPairHTML('16') + ' Result';
            body = String.raw`
                <div class="decode-measure-grid">
                    <div class="decode-measure-card focus"><b>Original</b>${qChipPairHTML('12')} \( |\Psi^{-}\rangle_{12} \)</div>
                    <div class="decode-measure-card focus"><b>Original</b>${qChipPairHTML('56')} \( |\Psi^{-}\rangle_{56} \)</div>
                    <div class="decode-measure-card focus"><b>Inferred</b>${qChipPairHTML('25')}<span class="state-box">\( |\Phi^{+}\rangle_{25} \)</span></div>
                </div>
                <div class="swap-hint">Direct entanglement swapping with no operation: ${qChipPairHTML('12')}${qChipPairHTML('56')} → ${qChipPairHTML('16')}${qChipPairHTML('25')}.</div>
                <div class="decode-long-formula">
                    <span>\( |\Psi^{-}\rangle_{12}|\Psi^{-}\rangle_{56}= \)</span>
                    <span class="state-box">\( -\frac{1}{2}|\Phi^{+}\rangle_{16}|\Phi^{+}\rangle_{25} \)</span>
                    <span>\( +\frac{1}{2}|\Phi^{-}\rangle_{16}|\Phi^{-}\rangle_{25} \)</span>
                    <span>\( +\frac{1}{2}|\Psi^{+}\rangle_{16}|\Psi^{+}\rangle_{25} \)</span>
                    <span>\( -\frac{1}{2}|\Psi^{-}\rangle_{16}|\Psi^{-}\rangle_{25} \)</span>
                </div>
                <div class="decode-detail-formula decode-focus">
                    Match <span class="match-result">\( |\Phi^{+}\rangle_{25} \)</span>
                    \( \Rightarrow |\Phi^{+}\rangle_{16}\ \text{before Alice's operation} \)
                </div>`;
            setTimeout(() => setQ25Highlight(true), 0);
        } else {
            title = 'Recover Secret Bits';
            body = String.raw`
                <div class="decode-detail-text">Only this final comparison uses Alice's selected operation. Compare the original ${qChipPairHTML('16')} state from direct swapping with Alice's public ${qChipPairHTML('16')} result from Step 3.</div>
                <div class="decode-measure-grid">
                    <div class="decode-measure-card focus"><b>Original</b>${qChipPairHTML('16')} \( |\Phi^{+}\rangle_{16} \)</div>
                    <div class="decode-measure-card focus"><b>Alice public</b>${qChipPairHTML('16')} ${bellLatexWithPair(publicAlice16, '16')}</div>
                    <div class="decode-measure-card focus"><b>Recovered operation</b> \( ${op} \)</div>
                </div>
                <div class="unitary-compare-table">
                    <div class="unitary-compare-cell ${opBits === '00' ? 'active' : ''}">00<br>\(I\)</div>
                    <div class="unitary-compare-cell ${opBits === '01' ? 'active' : ''}">01<br>\(Z\)</div>
                    <div class="unitary-compare-cell ${opBits === '10' ? 'active' : ''}">10<br>\(Y\)</div>
                    <div class="unitary-compare-cell ${opBits === '11' ? 'active' : ''}">11<br>\(X\)</div>
                </div>
                <div class="decode-detail-formula decode-focus">
                    \( |\Phi^{+}\rangle_{16} \)
                    \( \xrightarrow{${op}} \)
                    ${bellLatexWithPair(publicAlice16, '16')}
                    \( \Rightarrow \text{secret bits}=${opBits} \)
                </div>`;
            setTimeout(() => setQ25Highlight(false), 0);
        }

        hintTitle.innerHTML = title;
        hintText.innerHTML = `
            <div class="decode-card-top">
                <button class="decode-back-btn" onclick="setQ25Highlight(false); renderDecodeChoices()">Choose again</button>
            </div>
            <div class="decode-detail-body">${body}</div>`;
        if (window.MathJax) MathJax.typesetPromise([hintText, hintTitle]);
    }

    function configureStep4UI() {
        const badge = document.getElementById('mode-badge');
        const header = document.getElementById('header-subtitle');
        const panel = document.getElementById('center-panel');
        const hintTitle = document.getElementById('hint-title');
        const hintText = document.getElementById('hint-text');
        const stage = document.getElementById('stage');
        const step4Img = document.getElementById('zm-step4-img');
        const step5Img = document.getElementById('zm-step5-img');

        panel.classList.remove('message-panel', 'detecting-panel');
        if (stage) stage.classList.remove('message-post-eye');
        document.getElementById('alice-result').innerHTML = '';
        document.getElementById('bob-result').innerHTML = '';
        document.getElementById('charlie-result').innerHTML = '';

        if (selectedMode === 'detecting') {
            if (stage) stage.classList.remove('message-layout');
            if (step4Img) step4Img.src = 'pictures/zm-5-d.png';
            if (step5Img) step5Img.src = 'pictures/zm-5-d.png';
            badge.innerText = 'Detecting Mode';
            badge.classList.add('corner');
            badge.style.borderColor = 'var(--detect)';
            badge.style.color = 'var(--detect)';
            header.innerText = 'STEP 5 : PUBLIC COMPARE';

            showOnlyQ34Entanglement();
            markMeasured(['q1','q2','q5','q6']);

            const raw = localStorage.getItem('zhangManDetectingResults');
            const result = raw ? JSON.parse(raw) : {};
            const basis = result.basis || 'Z';
            const aliceQ1 = result.aliceQ1 || '|0⟩';
            const bobQ2 = result.bobQ2 || oppositeResult(aliceQ1, basis);
            const aliceQ6 = result.aliceQ6 || '|1⟩';
            const charlieQ5 = result.charlieQ5 || oppositeResult(aliceQ6, basis);
            const pass12 = bobQ2 === oppositeResult(aliceQ1, basis);
            const pass56 = charlieQ5 === oppositeResult(aliceQ6, basis);

            setPlainResult('alice-result', [{ qubit: 'q1', value: aliceQ1 }, { qubit: 'q6', value: aliceQ6 }]);
            setPlainResult('bob-result', [{ qubit: 'q2', value: bobQ2 }]);
            setPlainResult('charlie-result', [{ qubit: 'q5', value: charlieQ5 }]);

            hintTitle.innerText = 'Public Comparison';
            hintText.innerHTML = `
                <div class="detecting-hint">
                    <div class="detecting-note">Everyone publishes the checking results. If paired outcomes are opposite in the same basis, this run passes the security check.</div>
                    <div class="final-grid">
                        <div class="final-card"><b>Basis</b><br>${basis}</div>
                        <div class="final-card clickable ${pass12 ? 'pass' : ''}" onclick="highlightResultPair('q1','q2')"><b>q1 / q2</b><br>${aliceQ1} vs ${bobQ2}</div>
                        <div class="final-card clickable ${pass56 ? 'pass' : ''}" onclick="highlightResultPair('q6','q5')"><b>q6 / q5</b><br>${aliceQ6} vs ${charlieQ5}</div>
                    </div>
                    <div class="decode-line">\\( |\\Psi^-\\rangle=\\frac{1}{\\sqrt{2}}(|01\\rangle-|10\\rangle) \\Rightarrow \\text{opposite outcomes in the same basis} \\)</div>
                </div>`;

            panel.classList.add('detecting-panel');
            panel.innerHTML = `<button class="action-btn primary" onclick="prevStep()">Back to Measurement</button>`;
        } else {
            if (stage) stage.classList.add('message-layout');
            if (step4Img) step4Img.src = 'pictures/zm-5-m.png';
            if (step5Img) step5Img.src = 'pictures/zm-5-m.png';
            badge.innerText = 'Message Mode';
            badge.classList.remove('corner');
            badge.style.borderColor = 'var(--message)';
            badge.style.color = 'var(--message)';
            header.innerText = 'STEP 5 : COLLABORATIVE DECODE';

            const op = localStorage.getItem('zhangManOperation') || '00';
            const aliceBell = localStorage.getItem('zhangManAliceBell16') || '|Ψ⁻⟩₁₆';
            const bcBell = localStorage.getItem('zhangManBobCharlieBell25') || '|Ψ⁻⟩₂₅';
            const decoded = { '00': 'I', '01': 'Z', '10': 'Y', '11': 'X' }[op] || 'I';

            showMessageEntanglement(aliceBell, bcBell);
            setTimeout(() => showMessageEntanglement(aliceBell, bcBell), 120);
            markMeasured(['q1','q6']);

            document.getElementById('alice-result').innerText = `Announced ${aliceBell}`;
            document.getElementById('bob-result').innerText = 'shares q2,q3';
            document.getElementById('charlie-result').innerText = 'shares q4,q5';

            renderDecodeChoices();

            panel.classList.add('message-panel');
            panel.innerHTML = ``;
        }

        document.getElementById('next-btn').disabled = false;
        if (window.MathJax) MathJax.typesetPromise();
        setTimeout(updateEntangleLines, 0);
        setTimeout(updateEntangleLines, 80);
    }

    function prevStep() { window.location.href = 'ZMstep3.html'; }
    function nextStep() { window.location.href = 'QuantumCybersecurityEducationPlatform.html?section=qss#quantum-security-applications'; }

    document.addEventListener('DOMContentLoaded', () => {
        preloadEyeAssets();
        configureStep4UI();
        window.addEventListener('resize', updateEntangleLines);
    });
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.pingpong-image-dock');
    const windowBox = document.querySelector('.pingpong-image-window');
    const list = document.querySelector('.pingpong-image-list');
    let currentCard = document.querySelector('.pingpong-image-card.is-current');

    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    window.lockPingpongImageToCurrentStep = function () {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        const offset = isHorizontal
            ? (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2)
            : Math.max(0, (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2));
        list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
    };

    window.showPingpongImageStep = function (stepKey) {
        const nextCard = document.querySelector('.pingpong-image-card[data-pingpong-step="' + stepKey + '"]');
        if (!nextCard) return;
        document.querySelectorAll('.pingpong-image-card').forEach(card => {
            card.classList.remove('is-current');
            card.removeAttribute('aria-current');
        });
        nextCard.classList.add('is-current');
        nextCard.setAttribute('aria-current', 'step');
        currentCard = nextCard;
        requestAnimationFrame(window.lockPingpongImageToCurrentStep);
    };

    window.showPingpongImageStep(dock?.dataset.currentStep || '4');
    window.addEventListener('resize', window.lockPingpongImageToCurrentStep);
});
</script>
