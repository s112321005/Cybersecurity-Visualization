<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>Protocol Selection & Verification - Quantum Platform</title>
    <style>
        :root { --primary-blue: #0047A0; --text-dark: #333333; --bg-color: #f0f2f5; --border-width: 4px; --border-radius: 15px; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); margin: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; user-select: none; 
        }
        .page-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,71,160,0.1) 0%, rgba(255,255,255,1) 100%); z-index: -1; }
        .selection-window { background-color: white; border: var(--border-width) solid var(--primary-blue); border-radius: var(--border-radius); width: 80vw; height: 650px; max-width: 1400px; padding: 30px 60px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; box-sizing: border-box; position: relative; }
        
        /* 標題區域：左上角固定分類描述 */
        .header-group { margin-bottom: 15px; }
        .header-title { font-size: 26px; font-weight: 900; color: var(--text-dark); margin: 0; display: flex; align-items: center; gap: 15px; }
        .category-full-desc { font-size: 40px; font-weight: 800; color: var(--text-dark); margin-left: 10px; }
        
        .scene-image-container { flex-grow: 1; min-height: 0; border-radius: 12px; background-color: #f8fafc; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 25px; position: relative; overflow: hidden; cursor: zoom-in; }
        #bg-png { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; }
        #scene-img { max-width: 95%; max-height: 95%; object-fit: contain; position: relative; z-index: 2; pointer-events: none; }
        
        .controls-row { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 60px; margin-bottom: 10px; }
        .carousel-area { display: flex; align-items: center; gap: 10px; }
        .nav-arrow { font-size: 22px; cursor: pointer; color: var(--text-dark); user-select: none; padding: 5px 15px; transition: transform 0.1s; }
        .nav-arrow:active { transform: scale(0.8); }
        .category-box { width: 180px; height: 45px; border: 3px solid var(--text-dark); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: 900; color: var(--text-dark); letter-spacing: 1px; background-color: #fcfcfc; }
        .action-btn { position: absolute; right: 0; bottom: 5px; background-color: var(--primary-blue); color: white; border: none; border-radius: 30px; padding: 0 35px; height: 45px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; white-space: nowrap; z-index: 10; }
        .action-btn:hover { background-color: #003377; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,71,160,0.2); }
        .btn-back { width: 40px; height: 40px; background-color: var(--primary-blue); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 1.1rem; transition: transform 0.2s; cursor: pointer; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.15); flex-shrink: 0; }
        
        /* Pagination Dots */
        .pagination-dots { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .dot { width: 10px; height: 10px; border: 2px solid var(--text-dark); border-radius: 50%; transition: all 0.3s ease; cursor: pointer; background-color: transparent; }
        .dot.active { background-color: var(--text-dark); transform: scale(1.4); }
        .dot.out-of-range { border-color: #ccc; background-color: transparent; cursor: default; }
        
        .scroll-hint { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 13px; font-style: italic; writing-mode: vertical-rl; }
        
        /* Lightbox */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; overflow: hidden; }
        #lightbox-content { position: relative; width: 85vw; height: 85vh; display: flex; justify-content: center; align-items: center; transform-origin: center; transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        #lb-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; }
        #lb-img { max-width: 90%; max-height: 90%; object-fit: contain; position: relative; z-index: 2; pointer-events: none; }
        
        /* 帶黑框的關閉按鈕 */
        #lightbox-close { 
            position: absolute; top: 30px; right: 40px; 
            width: 45px; height: 45px;
            background-color: white; 
            border: 3px solid black; 
            color: black; 
            font-size: 32px; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 1001; font-weight: bold; user-select: none;
            border-radius: 8px;
            line-height: 0;
            transition: transform 0.1s;
        }
        #lightbox-close:hover { background-color: #eee; transform: scale(1.05); }

        #lightbox-hint { position: absolute; bottom: 20px; color: white; background: rgba(0,0,40,0.6); padding: 8px 20px; border-radius: 20px; font-size: 14px; pointer-events: none; z-index: 1001; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="page-overlay"></div>
    <div class="selection-window" id="mainWindow">
        <div class="header-group">
            <div class="header-title">
                <a href="QuantumCybersecurityEducationPlatform.html" class="btn-back">◀&#xFE0E;</a>
                <span class="category-full-desc" id="mode-desc">QKD：Jointly Establish a Secure Key</span>
            </div>
        </div>
        
        <div class="scene-image-container" onclick="openLightbox()" ondragstart="return false;">
            <img id="bg-png" src="pictures/scene-background.png" alt="Background">
            <img id="scene-img" src="" alt="Protocol Scene">
        </div>

        <div class="controls-row">
            <div class="carousel-area">
                <div class="nav-arrow" onclick="changeMode(-1)">&#9664;</div>
                <div class="category-box"><span id="mode-name">QKD</span></div>
                <div class="nav-arrow" onclick="changeMode(1)">&#9654;</div>
            </div>
            <button class="action-btn" id="goBtn">Analyze NOW!</button>
        </div>

        <div class="scroll-hint">Scroll to Switch Protocols</div>
        <div class="pagination-dots" id="dotContainer"></div>
    </div>

    <div id="lightbox" ondragstart="return false;">
        <div id="lightbox-close" onclick="closeLightbox()">&times;</div>
        <div id="lightbox-content">
            <img id="lb-bg" src="pictures/scene-background.png" alt="Background">
            <img id="lb-img" src="" alt="Zoomed Scene">
        </div>
        <div id="lightbox-hint">Scroll: Zoom In/Out | Drag: Move (When Zoomed) | Click ×: Close</div>
    </div>

    <script>
        const quantumData = [
            { mode: "QKD", description: "QKD：Jointly Establish a Secure Key", protocols: [{ name: "BB84", link: "bb84_analysis.html" }, { name: "B92", link: "b92_analysis.html" }]},
            { mode: "QSS", description: "QSS：Secret Sharing, Cooperative Recovery", protocols: [ { name: "ZhangLiMan", link: "zlm_analysis.html" }]},
            { mode: "QSDC", description: "QSDC：Secure Quantum Message Transmission", protocols: [ { name: "pingpong", link: "pingpong_analysis.html" }]}
        ];
        
        let modeIdx = 0, protoIdx = 0, isThrottled = false;
        let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

        function updateDisplay() {
            const currentMode = quantumData[modeIdx];
            const currentProto = currentMode.protocols[protoIdx];
            
            // 更新左上角大標題與分類方塊
            document.getElementById('mode-desc').textContent = currentMode.description;
            document.getElementById('mode-name').textContent = currentMode.mode;
            document.getElementById('goBtn').onclick = () => { window.location.href = currentProto.link; };
            
            // 更新圖片：命名規則為 scene-分類-協定.png
            const img = document.getElementById('scene-img');
            img.src = `pictures/scene-${currentMode.mode}-${currentProto.name}.png`;
            
            updateDots();
        }

        function updateDots() {
            const container = document.getElementById('dotContainer');
            container.innerHTML = '';
            const protocols = quantumData[modeIdx].protocols;
            const total = protocols.length;

            protocols.forEach((_, i) => {
                const dot = document.createElement('div');
                let className = 'dot';
                if (i === protoIdx) className += ' active';
                // 超過 5 個時，離目前索引超過 2 的點變灰
                if (total > 5 && Math.abs(i - protoIdx) > 2) className += ' out-of-range';
                
                dot.className = className;
                dot.onclick = () => { protoIdx = i; updateDisplay(); };
                container.appendChild(dot);
            });
        }

        function changeMode(dir) {
            modeIdx = (modeIdx + dir + quantumData.length) % quantumData.length;
            protoIdx = 0; // 切換分類時重置為該分類第一個協定
            updateDisplay();
        }

        function changeProtocol(dir) {
            const currentMode = quantumData[modeIdx];
            protoIdx = (protoIdx + dir + currentMode.protocols.length) % currentMode.protocols.length;
            updateDisplay();
        }

        // --- Lightbox 邏輯 ---
        const lb = document.getElementById('lightbox');
        const lbContent = document.getElementById('lightbox-content');

        function openLightbox() {
            const mainImg = document.getElementById('scene-img');
            document.getElementById('lb-img').src = mainImg.src;
            lb.style.display = "flex";
            resetZoom();
        }

        function closeLightbox() { lb.style.display = "none"; }
        function resetZoom() { scale = 1; posX = 0; posY = 0; updateImgTransform(true); }

        function updateImgTransform(withTransition = false) {
            if (scale <= 1) { posX = 0; posY = 0; lb.style.cursor = 'default'; } 
            else { lb.style.cursor = 'grab'; }
            lbContent.style.transition = withTransition ? "transform 0.3s ease" : "none";
            lbContent.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        lb.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.15 : 0.15;
            const oldScale = scale;
            scale = Math.min(Math.max(1, scale + delta), 3);
            updateImgTransform(scale < oldScale && scale === 1);
        });

        lb.addEventListener('mousedown', (e) => {
            if (e.target.id === 'lightbox-close' || scale <= 1) return;
            isDragging = true;
            lb.style.cursor = 'grabbing';
            startX = e.clientX - posX;
            startY = e.clientY - posY;
            lbContent.style.transition = "none";
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || lb.style.display !== "flex") return;
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateImgTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; if (scale > 1) lb.style.cursor = 'grab'; });

        // 全局滾輪切換 Protocol
        window.addEventListener('wheel', (e) => {
            if (lb.style.display === "flex") return;
            if (isThrottled) return;
            isThrottled = true;
            changeProtocol(e.deltaY > 0 ? 1 : -1);
            setTimeout(() => { isThrottled = false; }, 300);
        });

        updateDisplay();
    </script>
</body>
</html>
