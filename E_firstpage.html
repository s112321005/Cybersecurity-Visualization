<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://s112321005.github.io/Cybersecurity-Visualization/">
    <title>Quantum Cybersecurity Education Platform</title>
    <style>
        :root {
            --primary-blue: #0047A0; /* 主題深藍色 */
            --text-dark: #333333;
            --bg-color: #ffffff;
        }

        body {
            /* 換成適合英文的無襯線字體 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部標題區塊設計 */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 60px;
        }

        .header img {
            width: 60px;
            height: auto;
        }

        .header h1 {
            font-size: 32px; /* 稍微縮小一點點以適應英文長度 */
            color: var(--text-dark);
            margin: 0;
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* 卡片容器設計 */
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            flex-wrap: wrap; /* 螢幕縮小時自動換行 */
        }

        /* 單一卡片設計 (設定為超連結標籤) */
        .card {
            position: relative; /* 為了讓上方的藍色標籤可以絕對定位在框線上 */
            width: 300px;
            height: 380px;
            border: 4px solid var(--primary-blue);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px 30px;
            box-sizing: border-box;
            text-decoration: none; /* 移除超連結的底線 */
            color: var(--text-dark);
            background-color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 71, 160, 0.15);
        }

        /* 卡片上方的藍色膠囊標籤 */
        .card-badge {
            position: absolute;
            top: -18px; /* 配合字體縮小微調高度 */
            background-color: var(--primary-blue);
            color: white;
            padding: 8px 18px; /* 縮小左右 padding 讓長英文能塞入卡片寬度 */
            border-radius: 30px;
            font-size: 14px; /* 縮小字體以適應英文長度 */
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* 卡片中間的圖片 */
        .card img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-top: 30px;
        }

        /* 卡片底部的文字 */
        .card-title {
            font-size: 18px; /* 稍微縮小以適應英文 */
            font-weight: 800;
            margin: 0;
            text-align: center; /* 讓斷行時的文字保持置中 */
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="pictures/computer.svg" alt="Computer Icon">
        <h1>Quantum Cybersecurity Education Platform</h1>
    </div>

    <div class="cards-container">
        
        <a href="Information_security_application.html" class="card">
            <div class="card-badge">Education Tier: Introduction</div>
            <img src="pictures/quantum.svg" alt="Education Tier Icon">
            <p class="card-title">Quantum Communication &<br>Basic Security Scenarios</p>
        </a>

        <a href="#" class="card">
            <div class="card-badge">Design Tier: Security Verification</div>
            <img src="pictures/calculate.svg" alt="Design Tier Icon">
            <p class="card-title">Computation & Verification</p>
        </a>

        <a href="#" class="card">
            <div class="card-badge">Analysis Tier: Research & Analysis</div>
            <img src="pictures/analyze.svg" alt="Analysis Tier Icon">
            <p class="card-title">Protocol Comparison & Analysis</p>
        </a>

    </div>

</body>
</html>
