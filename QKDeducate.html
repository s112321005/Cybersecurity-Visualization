<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>QKD 模擬器 - Step 1 (Updated)</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #e3f2fd;
        }

        /* 1. 更新 body 設定，讓它們上下排列 */
        body {
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; /* 上下垂直排列 */
            align-items: center;    /* 水平置中 */
            padding: 20px; 
            background-color: #f9f9f9; /* 加一點微微的灰底，讓白色卡片更跳 */
        }

        /* 2. 標題列設定 */
        .header {
            width: 1400px; /* 對齊 main-card 寬度 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px; /* 代替 <br> 的距離 */
        }

        /* 外部卡片容器 */
        .main-card {
            width: 1400px;
            border: 3px solid var(--primary-blue);
            border-radius: 40px;
            padding: 30px;
            position: relative; /* 子元素定位的基準 */
            min-height: 520px; /* 固定最小高度，確保畫面比例 */
            background: white;
            box-sizing: border-box;
        }

        /* 左上角超連結按鈕 (Quantum Key Distribution) */
        .back-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            background: var(--primary-blue);
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 右上角控制鈕 (上一步/下一步) */
        .nav-controls button {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
            color: #555;
            transition: 0.2s;
        }
        .nav-controls button:hover { background: #eee; }

        /* STEP 文字 */
        .step-text { font-size: 1.25rem; font-weight: bold; margin: 0; line-height: 1.4; }

        /* =========================================
           主要的漫畫風格區塊
           ========================================= */

        /* Alice 角色圖示 (左下角) */
        .character-alice {
            position: absolute;
            bottom: 20px; /* 貼齊 main-card 的底線 */
            left: 150px;
            z-index: 10;
        }

        /* 已移除的 thought-dots CSS 設定已全部刪除 */

        /* --- 澎湃雲朵邊框核心設定 --- */
        .cloud-container {
            position: relative;
            width: 800px; /* 雲朵大致寬度，依據你的 SVG 調整 */
            height: 480px; /* 雲朵大致高度 */
            margin: -20px auto 0 auto; /* 澎湃雲朵上移一些 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 使用你自己的更圓滑澎湃的雲朵 SVG */
        .cloud-bubble {
            width: 80%;
            height: 80%;
            background-image: url('https://s112321005.github.io/Cybersecurity-Visualization/think.svg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-bottom: 20px; /* 讓內容在雲朵裡稍微往下移，避開雲朵頂部邊緣 */
        }

        /* 偏振器選擇內容 */
        .content {
            text-align: center;
        }

        /* 偏振器選項排列 */
        .basis-options {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: -20px; /* 選項在雲朵內稍微上移 */
        }

        .basis-item {
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border-radius: 20px;
        }

        .basis-item:hover {
            transform: scale(1.08);
        }

        .basis-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 26px;
            margin-top: 15px;
        }

        /* 選中狀態：加大外框光暈 */
        .basis-item.active .basis-circle {
            box-shadow: 0 0 0 8px #add8e6;
        }

        /* 底部灰色提示文字 */
        .bottom-hint {
            color: gray; 
            margin-top: 50px; 
            font-weight: bold; 
            font-size: 1.1rem;
        }

    </style>
</head>
<body>

<div class="header">
        <a href="index.html" class="back-link">
            <span style="margin-right:12px;">〈</span> Quantum Key Distribution
        </a>
        <div style="margin-left: 20px;">
            <p class="step-text">STEP 1 : Alice 決定 S、D 其中一種偏振器作為鑰匙</p>
        </div>
        <div class="nav-controls">
            <button onclick="prevStep()">上一步</button>
            <button onclick="nextStep()">下一步</button>
        </div>
</div>

<div class="main-card">
    
    <div class="character-alice">
        <img src="https://s112321005.github.io/Cybersecurity-Visualization/alice.svg" alt="Alice" width="160"> 
    </div>

    <div class="cloud-container">
        <div class="cloud-bubble">
            <div class="content">
                <div class="basis-options">
                    <div class="basis-item" id="basis-s" onclick="selectBasis('rectilinear')">
                        <img src="https://s112321005.github.io/Cybersecurity-Visualization/vertical.svg" width="95" alt="key-s">
                        <div class="basis-circle">S</div>
                    </div>

                    <div class="basis-item" id="basis-d" onclick="selectBasis('diagonal')">
                        <img src="https://s112321005.github.io/Cybersecurity-Visualization/diagonal.svg" width="95" alt="key-d">
                        <div class="basis-circle">D</div>
                    </div>
                </div>
                <p class="bottom-hint">點選偏振器幫 Alice 選擇鑰匙</p>
            </div>
        </div>
    </div>

</div>

<script>
    let selectedBasis = null;

    function selectBasis(type) {
        // 移除所有 active class
        document.querySelectorAll('.basis-item').forEach(el => el.classList.remove('active'));
        
        // 加入 active 到點選的項目
        if(type === 'rectilinear') {
            document.getElementById('basis-s').classList.add('active');
        } else {
            document.getElementById('basis-d').classList.add('active');
        }
        
        selectedBasis = type;
        console.log("Alice 選擇了:", type);
    }

    function nextStep() {
        if (!selectedBasis) {
            alert("請先選擇一個偏振器！");
            return;
        }
        // 跳轉到下一頁的邏輯
        window.location.href = "step2.html?basis=" + selectedBasis;
    }

    function prevStep() {
        window.history.back();
    }
</script>

</body>
</html>
