<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <title>Quantum Key Distribution：B92</title>
    <style>

        .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
        .main-card { width: min(1000px, 95vw); height: 560px; border: 3px solid var(--primary-blue); border-radius: 35px; position: relative; background: white; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 25px; padding-bottom: 50px; animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .decision-grid { --flow-center: 93px; --branch-center-gap: 71px; display: flex; align-items: flex-start; justify-content: center; gap: 30px; width: 100%; height: 180px; }
        .col { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; position: relative; min-height: 180px; }
        .character-avatar { position: absolute; top: -140px; margin-bottom: 0; z-index: 10; width: 120px; height: 120px; object-fit: contain; }
        .flow-label { color: gray; font-weight: bold; margin: 0; height: 18px; font-size: 0.9rem; text-align: center; }
        #input-state { margin-top: calc(var(--flow-center) - 40.5px); }
        .result-capsule { padding: 8px 18px; border-radius: 30px; border: 2px solid var(--primary-blue); color: var(--primary-blue); font-weight: bold; font-size: 1.05rem; background: white; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 29px; min-width: 120px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .result-capsule.active { background: var(--primary-blue); color: white; }
        #input-state.result-capsule.active { background: var(--alice-blue); border-color: var(--alice-blue); }
        .result-capsule.error { border-color: #999; color: #555; opacity: 0; transition: opacity 0.5s; }
        .result-capsule.keep { background: #549FD0; border-color: #549FD0; color: white; }
        .filter-circle { min-width: 58px; height: 45px; border-radius: 24px; background: #4c80c5; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; margin-top: 10px; padding: 0 12px; box-shadow: 0 4px 10px rgba(0, 74, 173, 0.3); box-sizing: border-box; }
        .bob-interactive { display: flex; flex-direction: column; align-items: center; gap: 10px; transition: opacity 0.3s ease; }
        .bob-choices { display: flex; gap: 20px; }
        .bob-choice-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 15px; border: 2px solid transparent; transition: all 0.2s; background: white; }
        .bob-choice-btn:hover { background-color: #e6f0ff; border-color: #80d8ff; transform: scale(1.05); }
        .pulse { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 74, 173, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 74, 173, 0); } }
        .bob-active-filter { display: none; flex-direction: column; align-items: center; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .connector { position: relative; display: flex; align-items: center; height: 50px; width: 0; opacity: 0; transition: width 0.5s ease-out, opacity 0.2s ease; }
        .connector::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background-color: var(--primary-blue); transform: translateY(-50%); }
        .arrow-connector::after { content: ""; position: absolute; top: 50%; right: -2px; width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 14px solid var(--primary-blue); transform: translateY(-50%); opacity: 0; transition: opacity 0.2s ease 0.4s; }
        .connector.active { opacity: 1; width: 60px; }
        .connector.active.full-width { width: 100%; }
        .decision-grid > .col > .connector.active.full-width { margin-top: calc(var(--flow-center) - 25px); }
        .arrow-connector.active::after { opacity: 1; }
        .col-connectors { position: relative; width: 60px; height: 180px; }
        .arrow-single { position: absolute; left: 0; top: var(--flow-center); transform: translateY(-50%); }
        .arrow-branch-up { position: absolute; left: 0; top: var(--flow-center); transform-origin: left center; transform: translateY(-50%) rotate(-35deg); }
        .arrow-branch-down { position: absolute; left: 0; top: var(--flow-center); transform-origin: left center; transform: translateY(-50%) rotate(35deg); }
        .result-icon { font-size: 2rem; font-weight: bold; margin-left: 15px; }
        .result-icon.match { color: var(--match-green); opacity: 0; transition: opacity 0.5s; }
        .result-icon.mismatch { color: var(--mismatch-red); opacity: 0; transition: opacity 0.5s; }
        .output-group { display: flex; align-items: center; }
        #results-area { min-width: 180px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; transform: translateX(-8px); }
        #results-area-title { color: gray; font-weight: bold; margin: 0; height: 18px; font-size: 0.9rem; }
        #photon-landing-spot { position: absolute; width: 1px; height: 1px; top: var(--flow-center); left: 0; pointer-events: none; }
        .outcome-stack { display: none; flex-direction: column; gap: 22px; margin-top: calc(var(--flow-center) - 40.5px); transform: translateX(14px); }
        .outcome-stack.single { gap: 10px; }
        #branch-result { margin-top: calc(var(--flow-center) - 72px); }
        .outcome-stack .result-icon { opacity: 0; }
        .outcome-stack .result-capsule { opacity: 0; transform: translateY(8px); }
        .show-result.show-single #single-result, .show-result.show-branch #branch-result { display: flex; }
        .show-result .outcome-stack .result-capsule { animation: outcomePillFade 0.45s ease forwards; }
        .show-result .outcome-stack .output-group:nth-child(2) .result-capsule { animation-delay: 0.12s; }
        .show-result .outcome-stack .result-icon { animation: outcomeIconFade 0.35s ease 0.18s forwards; }
        .show-result .outcome-stack .output-group:nth-child(2) .result-icon { animation-delay: 0.28s; }
        @keyframes outcomePillFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes outcomeIconFade { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
        .explanation-box { position: absolute; bottom: 25px; width: 85%; background: #f8fbff; border-left: 6px solid var(--primary-blue); padding: 18px 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; opacity: 0; transform: translateY(20px); pointer-events: none; transition: all 0.5s ease; }
        .explanation-box.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .explain-header { display: flex; justify-content: space-between; align-items: center; }
        .explain-title { font-weight: bold; font-size: 1.25rem; margin: 0; }
        .explain-desc { color: #555; font-size: 1.05rem; margin: 0; line-height: 1.4; }
        .highlight-keep { color: var(--match-green); font-weight: bold; }
        .highlight-discard { color: var(--mismatch-red); font-weight: bold; }
        .retry-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #ccc; background: white; color: #555; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 0.95rem; }
        .retry-btn:hover { background: #f0f0f0; border-color: #999; color: black; transform: scale(1.05); }
        .bottom-hint { position: absolute; bottom: 30px; color: gray; font-weight: bold; font-size: 1.1rem; transition: opacity 0.3s; }
        .photon-display, .photon-particle { --photon-color: var(--zero); --photon-angle: 90deg; position: relative; border-radius: 50%; background: radial-gradient(circle, #ffffff 0 52%, color-mix(in srgb, var(--photon-color) 30%, #ffffff) 53% 72%, #ffffff 73% 100%); border: 3px solid #ffffff; box-shadow: 0 0 20px color-mix(in srgb, var(--photon-color) 45%, transparent), 0 0 0 1px color-mix(in srgb, var(--photon-color) 20%, #ffffff); display: flex; justify-content: center; align-items: center; flex: 0 0 auto; }
        .photon-display { width: 35px; height: 35px; }
        .photon-particle { position: absolute; width: 58px; height: 58px; pointer-events: none; z-index: 100; }
        .photon-display::after, .photon-particle::after { content: ""; position: absolute; left: 50%; top: 50%; background: var(--photon-color); transform: translate(-50%, -50%)rotate(var(--photon-angle)); box-shadow: 0 0 8px var(--photon-color); clip-path: polygon(50% 0, 100% 18%, 72% 18%, 72% 82%, 100% 82%, 50% 100%, 0 82%, 28% 82%, 28% 18%, 0 18%); }
        .photon-display::after { width: 10px; height: 28px; box-shadow: 0 0 6px var(--photon-color); }
        .photon-particle::after { width: 16px; height: 42px; }
        #bob-active-img { margin-top: calc(var(--flow-center) - 58px); }
        @keyframes shoot-to-bob { 0% { transform: translate(0, 0) scale(0); opacity: 1; } 20% { transform: translate(calc(var(--tx-bob) * 0.2), calc(var(--ty-bob) * 0.2)) scale(1.25); } 100% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(1); opacity: 1; } }
        @keyframes shoot-bob-to-outcome { 0% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(1); opacity: 1; } 78% { transform: translate(var(--tx-out), var(--ty-out)) scale(1); opacity: 1; } 100% { transform: translate(var(--tx-out), var(--ty-out)) scale(0.78); opacity: 0; } }
        @keyframes shoot-blocked { 0% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(1); opacity: 1; } 100% { transform: translate(var(--tx-bob), var(--ty-bob)) scale(0); opacity: 0; } }
        .b92-image-dock { position: fixed; right: 16px; top: 0; width: 430px; height: 100vh; z-index: 900; pointer-events: none; display: flex; justify-content: center; overflow: visible; isolation: isolate; font-family:'Arial Rounded MT Bold','Arial Rounded MT','Arial',sans-serif; }
        .b92-image-viewport { position: relative; width: 330px; height: 100vh; background: #ffffff; box-sizing: border-box; box-shadow: 0 12px 26px rgba(0,0,0,.12); overflow: visible; z-index: 1; }
        .b92-image-viewport::before, .b92-image-viewport::after { content: ""; position: absolute; top: 0; width: 14px; height: 100vh; background: #d9d9d9; z-index: 1; pointer-events: none; }
        .b92-image-viewport::before { left: 0; }
        .b92-image-viewport::after { right: 0; }
        .b92-image-window { position: relative; width: 500px; height: 100vh; margin-left: -85px; overflow: hidden; z-index: 10; }
        .b92-image-list { position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 52px 0 42px; box-sizing: border-box; width: 500px; transform: translateY(0); transition: transform .55s cubic-bezier(.22,.8,.22,1); z-index: 20; }
        .b92-image-card { position: relative; width: 350px; min-height: 52px; padding: 0 18px; box-sizing: border-box; background: #ffffff; border: 6px solid var(--primary-blue); border-radius: 16px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; transition: width .55s cubic-bezier(.22,.8,.22,1), min-height .55s cubic-bezier(.22,.8,.22,1), padding .55s cubic-bezier(.22,.8,.22,1), border-width .55s cubic-bezier(.22,.8,.22,1), border-radius .55s cubic-bezier(.22,.8,.22,1), box-shadow .55s cubic-bezier(.22,.8,.22,1), filter .35s ease, opacity .35s ease, transform .55s cubic-bezier(.22,.8,.22,1); z-index: 20; overflow: hidden; }
        .b92-image-card:not(.is-current) { filter: none; opacity: 1; transform: scale(1); }
        .b92-image-card.is-current { width: 365px; min-height: 365px; padding: 14px; border: 7px solid var(--primary-blue); border-radius: 20px; box-shadow: 0 12px 28px rgba(84,159,208,.28); filter: none; opacity: 1; transform: scale(1); margin: 6px 0; z-index: 100; }
        .b92-step-summary { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 100%; color: #111; font-weight: 900; font-size: 1rem; letter-spacing: .02em; white-space: nowrap; transition: opacity .22s ease, transform .22s ease; }
        .b92-step-number { width: 22px; height: 22px; border-radius: 50%; background: var(--primary-blue); color: #ffffff; display: inline-flex; align-items: center; justify-content: center; font-size: .86rem; line-height: 1; flex: 0 0 auto; }
        .b92-step-title { display: inline-block; line-height: 1; }
        .b92-image-card img { position: relative; z-index: 101; width: 100%; height: 100%; max-width: 0; max-height: 0; object-fit: contain; display: block; opacity: 0; transform: scale(.92); transition: opacity .28s ease .2s, transform .45s cubic-bezier(.22,.8,.22,1) .12s, max-width .55s cubic-bezier(.22,.8,.22,1), max-height .55s cubic-bezier(.22,.8,.22,1); }
        .b92-image-card.is-current .b92-step-summary { opacity: 0; transform: translateY(-8px); position: absolute; pointer-events: none; }
        .b92-image-card.is-current img { max-width: 318px; max-height: 320px; opacity: 1; transform: scale(1); }
        @media (min-width: 1180px) { body { padding-right: 450px !important; } }
        @media (max-width: 1179px) { .b92-image-dock { position: relative; right: auto; top: auto; width: min(94vw, 840px); height: 320px; margin: 18px auto 10px; overflow: visible; } .b92-image-viewport { width: 100%; height: 320px; } .b92-image-viewport::before, .b92-image-viewport::after { width: 10px; height: 320px; } .b92-image-window { width: 100%; height: 320px; margin-left: 0; overflow: hidden; } .b92-image-list { flex-direction: row; align-items: center; gap: 14px; width: max-content; height: 320px; padding: 0 24px; } .b92-image-card { width: 270px; min-height: 52px; } .b92-image-card.is-current { width: 305px; min-height: 250px; margin: 0 10px; z-index: 100; } .b92-image-card.is-current img { max-width: 275px; max-height: 220px; } }
    </style>
</head>
<body>
<aside class="b92-image-dock" aria-label="B92 current-step image preview">
    <div class="b92-image-viewport">
        <div class="b92-image-window">
            <div class="b92-image-list">
                <div class="b92-image-card" data-b92-step="1"><div class="b92-step-summary"><span class="b92-step-number">1</span><span class="b92-step-title">PREPARE</span></div><img src="pictures/b92-1.png" alt="B92 Step 1"></div>
                <div class="b92-image-card is-current" data-b92-step="2" aria-current="step"><div class="b92-step-summary"><span class="b92-step-number">2</span><span class="b92-step-title">TRANSMIT</span></div><img src="pictures/b92-2.png" alt="B92 Step 2"></div>
                <div class="b92-image-card" data-b92-step="3"><div class="b92-step-summary"><span class="b92-step-number">3</span><span class="b92-step-title">MEASURE</span></div><img src="pictures/b92-3.png" alt="B92 Step 3"></div>
                <div class="b92-image-card" data-b92-step="4"><div class="b92-step-summary"><span class="b92-step-number">4</span><span class="b92-step-title">SIFTING</span></div><img src="pictures/b92-4.png" alt="B92 Step 4"></div>
                <div class="b92-image-card" data-b92-step="5"><div class="b92-step-summary"><span class="b92-step-number">5</span><span class="b92-step-title">KEY</span></div><img src="pictures/b92-5.png" alt="B92 Step 5"></div>
            </div>
        </div>
    </div>
</aside>

<div class="header">
    <div class="header-left">
        <a href="QuantumCybersecurityEducationPlatform.html" class="btn-back" title="back home">◀&#xFE0E</a>
        <div class="title-pill">Quantum Key Distribution：B92</div>
    </div>
    <div class="header-center" id="step-title">STEP 2 : TRANSMIT</div>
    <div class="header-right">
        <button class="nav-btn" onclick="prevStep()">Back</button>
        <button id="next-btn" class="nav-btn" onclick="nextStep()" disabled>Next</button>
    </div>
</div>

<div class="main-card" id="stage">
    <div class="decision-grid" id="grid-container">
        <div class="col" style="min-width: 150px;">
            <img src="pictures/cat_alice.svg" width="120" alt="Alice" class="character-avatar">
            <p class="flow-label">Alice Sent</p>
            <div class="result-capsule active" id="input-state">-</div>
        </div>

        <div class="col" style="width: 50px;">
            <div class="connector active full-width"></div>
        </div>

        <div class="col" style="min-width: 230px;" id="bob-col">
            <img src="pictures/cat_bob.svg" width="120" alt="Bob" class="character-avatar">
            <div class="bob-interactive" id="bob-interactive">
                <p style="margin:0; font-weight:bold; color:var(--primary-blue);">Choose a polarizer!</p>
                <div class="bob-choices">
                    <div class="bob-choice-btn pulse" onclick="startMeasurementProcess('vertical', this)">
                        <img src="pictures/b_vertical.svg" width="80" alt="Vertical polarizer">
                        <div class="filter-circle">|↑⟩</div>
                    </div>
                    <div class="bob-choice-btn pulse" onclick="startMeasurementProcess('anti-diagonal', this)">
                        <img src="pictures/b_diagonal.svg" width="80" alt="Anti-diagonal polarizer">
                        <div class="filter-circle">|↖⟩</div>
                    </div>
                </div>
            </div>

            <div class="bob-active-filter" id="bob-active-filter">
                <p class="flow-label">Bob Measured</p>
                <img id="bob-active-img" src="" width="80" style="margin-bottom: 10px;" alt="Selected polarizer">
                <div class="filter-circle" id="bob-filter-label">-</div>
            </div>
        </div>

        <div class="col col-connectors">
            <div class="connector arrow-connector arrow-single" id="arrow-single"></div>
            <div class="connector arrow-connector arrow-branch-up" id="arrow-branch-up"></div>
            <div class="connector arrow-connector arrow-branch-down" id="arrow-branch-down"></div>
        </div>

        <div class="col" id="results-area">
            <p id="results-area-title">Outcome</p>
            <div id="photon-landing-spot"></div>
            <div class="outcome-stack single" id="single-result">
                <div class="output-group">
                    <div class="result-capsule error" id="single-state"> Waiting... </div>
                    <div class="result-icon mismatch">✖</div>
                </div>
            </div>
            <div class="outcome-stack" id="branch-result">
                <div class="output-group">
                    <div class="result-capsule keep" id="branch-up-state"> Waiting... </div>
                    <div class="result-icon match">✔</div>
                </div>
                <div class="output-group">
                    <div class="result-capsule error" id="branch-down-state"> Waiting... </div>
                    <div class="result-icon mismatch">✖</div>
                </div>
            </div>
        </div>
    </div>

    <p class="bottom-hint" id="hint-text">Help Bob test the incoming photon with a polarizer</p>

    <div class="explanation-box" id="explain-box">
        <div class="explain-header">
            <p class="explain-title" id="explain-title">Analyzing Result...</p>
            <button class="retry-btn" onclick="resetBob()">↺ Try Another Polarizer</button>
        </div>
        <p class="explain-desc" id="explain-desc">Loading explanation...</p>
    </div>
</div>

<script>
    let aliceMsg = null;
    let alicePhoton = null;
    let hasMeasured = false;

    const qubitVisuals = {
        zero: { label: '|0⟩', ket: '|0⟩', symbol: '→', basis: 'rectilinear', photonColor: 'var(--zero)', photonAngle: '90deg' },
        one: { label: '|1⟩', ket: '|1⟩', symbol: '↑', basis: 'rectilinear', photonColor: 'var(--one)', photonAngle: '0deg' },
        plus: { label: '|+⟩', ket: '|+⟩', symbol: '↗', basis: 'diagonal', photonColor: 'var(--plus)', photonAngle: '45deg' },
        minus: { label: '|-⟩', ket: '|-⟩', symbol: '↖', basis: 'diagonal', photonColor: 'var(--minus)', photonAngle: '-45deg' }
    };

    const stateConfig = {
        '0': qubitVisuals.zero,
        '1': qubitVisuals.plus
    };

    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        aliceMsg = params.get("aliceMsg") ?? "0";
        if (aliceMsg !== "0" && aliceMsg !== "1") aliceMsg = "0";
        alicePhoton = stateConfig[aliceMsg];
        setAliceState();
        localStorage.removeItem('b92Step2Data');
    });

    function createPhotonDisplay(photon) {
        return `<div class="photon-display" style="--photon-color:${photon.photonColor}; --photon-angle:${photon.photonAngle};" aria-label="${photon.label}"></div>`;
    }

    function createQubitDisplay(photon) {
        return createPhotonDisplay(photon) + `<span>Qubit: ${photon.label}</span>`;
    }

    function setAliceState() {
        document.getElementById("input-state").innerHTML = createQubitDisplay(alicePhoton);
    }

    function startMeasurementProcess(bobFilter, el) {
        if (hasMeasured) return;
        hasMeasured = true;
        if (window.showB92ImageStep) window.showB92ImageStep('3');
        document.querySelectorAll('.bob-choice-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById("bob-interactive").style.display = "none";
        document.getElementById("hint-text").style.opacity = "0";

        const activeFilterUI = document.getElementById("bob-active-filter");
        activeFilterUI.style.display = "flex";
        const filterLabel = bobFilter === "vertical" ? "|↑⟩" : "|↖⟩";
        document.getElementById("bob-active-img").src = bobFilter === "vertical" ? "pictures/b_vertical.svg" : "pictures/b_diagonal.svg";
        document.getElementById("bob-filter-label").textContent = filterLabel;

        const isConclusive = (aliceMsg === "0" && bobFilter === "anti-diagonal") || (aliceMsg === "1" && bobFilter === "vertical");
        prepareOutcome(isConclusive, bobFilter);
        animateMeasurement(isConclusive, bobFilter);
    }

    function prepareOutcome(isConclusive, bobFilter) {
        document.getElementById("results-area").classList.remove("show-result");
        document.getElementById("results-area").classList.remove("show-single", "show-branch");

        if (isConclusive) {
            const upperPhoton = aliceMsg === "0" ? qubitVisuals.minus : qubitVisuals.one;
            const lowerPhoton = aliceMsg === "0" ? qubitVisuals.plus : qubitVisuals.zero;
            document.getElementById("branch-up-state").innerHTML = createQubitDisplay(upperPhoton);
            document.getElementById("branch-down-state").innerHTML = createQubitDisplay(lowerPhoton);
        } else {
            document.getElementById("single-state").innerHTML = createQubitDisplay(alicePhoton);
        }

        const detector = isConclusive ? "click" : "no-click";
        localStorage.setItem('b92Step2Data', JSON.stringify({
            aliceMsg,
            aliceBasis: alicePhoton.basis,
            aliceState: alicePhoton.symbol,
            bobFilter,
            detector,
            finalBit: isConclusive ? `Record ${alicePhoton.label}` : "Discard",
            bit: isConclusive ? aliceMsg : "",
            conclusive: isConclusive
        }));
    }

    function animateMeasurement(isConclusive, bobFilter) {
        const stage = document.getElementById('stage');
        const sourceEl = document.getElementById('input-state');
        const bobEl = document.getElementById('bob-active-img');
        const particle = document.createElement('div');
        particle.className = 'photon-particle';
        particle.style.setProperty('--photon-color', alicePhoton.photonColor);
        particle.style.setProperty('--photon-angle', alicePhoton.photonAngle);
        particle.setAttribute('aria-label', alicePhoton.label);

        const stageRect = stage.getBoundingClientRect();
        const srcRect = sourceEl.getBoundingClientRect();
        const bobRect = bobEl.getBoundingClientRect();
        const outRect = document.getElementById('photon-landing-spot').getBoundingClientRect();
        const half = 29;
        const startX = srcRect.left - stageRect.left + srcRect.width / 2 - half;
        const startY = srcRect.top - stageRect.top + srcRect.height / 2 - half;
        const toBobX = bobRect.left - stageRect.left + bobRect.width / 2 - half;
        const toBobY = bobRect.top - stageRect.top + bobRect.height / 2 - half;
        const toOutX = outRect.left - stageRect.left + outRect.width / 2 - half;
        const toOutY = outRect.top - stageRect.top + outRect.height / 2 - half;

        particle.style.left = startX + 'px';
        particle.style.top = startY + 'px';
        particle.style.setProperty('--tx-bob', (toBobX - startX) + 'px');
        particle.style.setProperty('--ty-bob', (toBobY - startY) + 'px');
        particle.style.setProperty('--tx-out', (toOutX - startX) + 'px');
        particle.style.setProperty('--ty-out', (toOutY - startY) + 'px');
        stage.appendChild(particle);

        requestAnimationFrame(() => { particle.style.animation = 'shoot-to-bob 1.2s forwards cubic-bezier(0.4, 0, 0.2, 1)'; });
        setTimeout(() => {
            if (isConclusive) {
                document.getElementById("arrow-branch-up").classList.add("active");
                document.getElementById("arrow-branch-down").classList.add("active");
            } else {
                document.getElementById("arrow-single").classList.add("active");
            }
        }, 1200);
        setTimeout(() => {
            if (isConclusive) {
                particle.style.animation = 'shoot-bob-to-outcome 1s forwards ease-out';
                setTimeout(() => {
                    particle.remove();
                    displayFinalResult(true, bobFilter);
                }, 1000);
            } else {
                particle.style.animation = 'shoot-blocked 0.35s forwards ease-in';
                setTimeout(() => {
                    particle.remove();
                    displayFinalResult(false, bobFilter);
                }, 350);
            }
        }, 1600);
    }

    function displayFinalResult(isConclusive, bobFilter) {
        const explainBox = document.getElementById("explain-box");
        const explainTitle = document.getElementById("explain-title");
        const explainDesc = document.getElementById("explain-desc");
        const blockedState = bobFilter === "vertical" ? "|0⟩" : "|+⟩";
        const inferredState = bobFilter === "vertical" ? "|+⟩" : "|0⟩";
        const recordQubit = bobFilter === "vertical" ? "|1⟩" : "|0⟩";

        if (isConclusive) {
            explainBox.style.borderLeftColor = "var(--match-green)";
            explainBox.style.backgroundColor = "#f0fdf4";
            explainTitle.style.color = "var(--match-green)";
            explainTitle.innerHTML = "🟢 Record";
            explainDesc.innerHTML = `Light passed. This polarizer blocks <b>${blockedState}</b>, so Alice could not have sent <b>${blockedState}</b>.<br>Bob infers Alice sent <b>${inferredState}</b>: <span class="highlight-keep">Qubit ${recordQubit}</span>.`;
        } else {
            explainBox.style.borderLeftColor = "var(--mismatch-red)";
            explainBox.style.backgroundColor = "#fff5f5";
            explainTitle.style.color = "var(--mismatch-red)";
            explainTitle.innerHTML = "🔴 Discard";
            explainDesc.innerHTML = `No light passed. Bob cannot tell whether the photon was blocked or lost, so this result is <span class="highlight-discard">inconclusive</span>.`;
        }

        document.getElementById("results-area").classList.add("show-result");
        document.getElementById("results-area").classList.add(isConclusive ? "show-branch" : "show-single");
        explainBox.classList.add("show");
        const nextBtn = document.getElementById("next-btn");
        nextBtn.disabled = false;
        nextBtn.classList.add("ready");
    }

    function resetBob() {
        hasMeasured = false;
        if (window.showB92ImageStep) window.showB92ImageStep('2');
        document.getElementById("explain-box").classList.remove("show");
        document.getElementById("results-area").classList.remove("show-result");
        document.getElementById("results-area").classList.remove("show-single", "show-branch");
        document.getElementById("arrow-single").classList.remove("active");
        document.getElementById("arrow-branch-up").classList.remove("active");
        document.getElementById("arrow-branch-down").classList.remove("active");
        document.getElementById("bob-active-filter").style.display = "none";
        document.getElementById("bob-interactive").style.display = "flex";
        document.getElementById("hint-text").style.opacity = "1";
        document.querySelectorAll('.bob-choice-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.photon-particle').forEach(photon => photon.remove());
        localStorage.removeItem('b92Step2Data');
        const nextBtn = document.getElementById("next-btn");
        nextBtn.disabled = true;
        nextBtn.classList.remove("ready");
    }

    function prevStep() { window.location.href = 'B92step1.html'; }
    function nextStep() { window.location.href = 'B92step3.html'; }
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const dock = document.querySelector('.b92-image-dock');
    const windowBox = document.querySelector('.b92-image-window');
    const list = document.querySelector('.b92-image-list');
    let currentCard = document.querySelector('.b92-image-card.is-current');
    if (dock) {
        dock.addEventListener('wheel', function (event) {
            event.preventDefault();
        }, { passive: false });
    }

    function getReferenceOffset(isHorizontal) {
        const currentStep = currentCard ? currentCard.dataset.b92Step : '2';
        const referenceCard = document.querySelector('.b92-image-card[data-b92-step="3"]');
        const shouldUseStep3Reference = currentStep === '2' || currentStep === '3';

        if (!shouldUseStep3Reference || !referenceCard) {
            if (isHorizontal) {
                return (windowBox.clientWidth / 2) - currentCard.offsetLeft - (currentCard.offsetWidth / 2);
            }
            const centeredOffset = (windowBox.clientHeight / 2) - currentCard.offsetTop - (currentCard.offsetHeight / 2);
            return Math.max(0, centeredOffset);
        }

        const activeBefore = currentCard;
        const ariaBefore = activeBefore ? activeBefore.getAttribute('aria-current') : null;
        const referenceWasCurrent = referenceCard.classList.contains('is-current');

        if (!referenceWasCurrent) {
            activeBefore.classList.remove('is-current');
            activeBefore.removeAttribute('aria-current');
            referenceCard.classList.add('is-current');
            referenceCard.setAttribute('aria-current', 'step');
        }

        const offset = isHorizontal
            ? (windowBox.clientWidth / 2) - referenceCard.offsetLeft - (referenceCard.offsetWidth / 2)
            : Math.max(0, (windowBox.clientHeight / 2) - referenceCard.offsetTop - (referenceCard.offsetHeight / 2));

        if (!referenceWasCurrent) {
            referenceCard.classList.remove('is-current');
            referenceCard.removeAttribute('aria-current');
            activeBefore.classList.add('is-current');
            if (ariaBefore) activeBefore.setAttribute('aria-current', ariaBefore);
        }

        return offset;
    }

    window.lockB92ImageToCurrentStep = function () {
        if (!windowBox || !list || !currentCard) return;
        const isHorizontal = window.matchMedia('(max-width: 1179px)').matches;
        const offset = getReferenceOffset(isHorizontal);
        list.style.transform = isHorizontal ? 'translateX(' + offset + 'px)' : 'translateY(' + offset + 'px)';
    };

    window.showB92ImageStep = function (step) {
        const nextCard = document.querySelector('.b92-image-card[data-b92-step="' + step + '"]');
        if (!nextCard) return;
        document.querySelectorAll('.b92-image-card').forEach(card => {
            card.classList.remove('is-current');
            card.removeAttribute('aria-current');
        });
        nextCard.classList.add('is-current');
        nextCard.setAttribute('aria-current', 'step');
        currentCard = nextCard;
        const stepTitle = document.getElementById('step-title');
        if (stepTitle) stepTitle.textContent = step === '3' ? 'STEP 3 : MEASURE' : 'STEP 2 : TRANSMIT';
        requestAnimationFrame(window.lockB92ImageToCurrentStep);
    };

    window.lockB92ImageToCurrentStep();
    window.addEventListener('resize', window.lockB92ImageToCurrentStep);
});
</script>
</body>
