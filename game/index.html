<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Photon Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;min-height:100vh;margin:0;padding:42px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:#F0F8FF;background-image:linear-gradient(45deg,#D6EAF8 25%,transparent 25%,transparent 50%,#D6EAF8 50%,#D6EAF8 75%,transparent 75%,transparent);background-size:100px 100px;color:#0F2027}
.game-title{font-family:"Titan One",cursive;font-size:5rem;color:white;-webkit-text-stroke:3px #0F2027;text-shadow:0 0 8px rgba(52,152,219,0.8);letter-spacing:4px;margin:0 0 36px;text-align:center}
.map-container{display:grid;grid-template-columns:repeat(5,100px);gap:24px;padding:34px;border:5px solid #0F2027;border-radius:32px;background:rgba(255,255,255,0.82);box-shadow:12px 12px 0 #85C1E9}
.level-node{width:100px;height:100px;background:white;border:5px solid #0F2027;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;box-shadow:0 6px 0 #3498DB;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s,background 0.18s,color 0.18s;text-decoration:none;color:#0F2027;position:relative}
.level-node::after{content:"";position:absolute;top:15px;left:18px;width:20px;height:12px;border-radius:50%;background:rgba(255,255,255,0.9);transform:rotate(-24deg);pointer-events:none}
.level-node:hover{transform:rotate(5deg) scale(1.1);background:#5DADE2;color:white;box-shadow:0 11px 0 #0F2027}
.level-node:active{transform:rotate(2deg) scale(1.04);box-shadow:0 3px 0 #0F2027}
@media (max-width:760px){body{justify-content:flex-start;padding:28px 14px}.game-title{font-size:3.2rem;-webkit-text-stroke:2px #0F2027}.map-container{grid-template-columns:repeat(3,86px);gap:18px;padding:22px}.level-node{width:86px;height:86px;font-size:24px}}
</style>
</head>
<body>
<h1 class="game-title">Photon Quest</h1>
<div class="map-container" id="level-grid"></div>
<script>
const popAudio = new Audio("pop.m4a");
const grid = document.getElementById("level-grid");
function playSound(audio) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
}
for (let i = 1; i <= 9; i++) {
    const node = document.createElement("a");
    node.className = "level-node";
    node.textContent = i;
    node.href = `game/level${i}.html`;
    node.addEventListener("click", () => playSound(popAudio));
    grid.appendChild(node);
}
</script>
</body>
</html>
