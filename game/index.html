<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Photon Quest | 光測量實驗室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Titan+One&display=swap" rel="stylesheet">
  <style>
    /* 藍色系背景與斜紋 */
    body { 
      font-family: Arial, sans-serif; 
      background-color: #F0F8FF; /* AliceBlue */
      background-image: linear-gradient(45deg, #D6EAF8 25%, transparent 25%, transparent 50%, #D6EAF8 50%, #D6EAF8 75%, transparent 75%, transparent); 
      background-size: 100px 100px; 
      color: #0F2027; /* 深藍黑色 */
    }
    
    /* 遊戲標題發光效果 (藍色光暈) */
    .game-title { 
      font-family: 'Titan One', cursive; 
      font-size: 5rem; 
      color: white; 
      -webkit-text-stroke: 3px #0F2027; 
      text-shadow: 0 0 8px rgba(52, 152, 219, 0.8); 
      letter-spacing: 4px; 
    }
    @keyframes glow { 
      from { text-shadow: 0 0 4px #5DADE2, 0 0 9px #5DADE2; } 
      to { text-shadow: 0 0 6px #2E86C1, 0 0 12px #2E86C1; } 
    }

    /* 按鈕樣式 */
    .game-btn { 
      cursor: pointer; 
      border: 5px solid #0F2027; 
      border-radius: 60px; 
      padding: 12px; 
      font-size: 26px; 
      font-weight: 900; 
      color: white; 
      text-shadow: 2px 2px 0 #0F2027; 
      box-shadow: 0 6px 0 #0F2027; 
      position: relative; 
      transition: transform 0.15s, box-shadow 0.15s, top 0.1s; 
      text-decoration: none; 
      display: inline-block; 
      text-align: center; 
    }
    .game-btn:hover { transform: translateY(-5px) scale(1.04); box-shadow: 0 11px 0 #0F2027; }
    .game-btn:active { top: 4px; box-shadow: 0 2px 0 #0F2027; }
    
    /* 藍色系按鈕調色 */
    .btn-red { background: #E74C3C; } /* 保留一個紅色作登出/警告 */
    .btn-green { background: #48C9B0; } /* 青藍綠色 */
    .btn-blue { background: #3498DB; } /* 主題藍 */

    #quest-map { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; }
    
    /* 玩家資訊欄 (藍色陰影) */
    .player-bar { 
      width: 100%; 
      max-width: 700px; 
      background: white; 
      border: 5px solid #0F2027; 
      border-radius: 20px; 
      padding: 15px 25px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      box-shadow: 10px 10px 0px #85C1E9; 
    }
    .player-avatar { 
      width: 92px; height: 92px; 
      background: #EBF5FB; 
      border: 5px solid #0F2027; 
      border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 3rem; font-weight: 900; 
      overflow: hidden; flex-shrink: 0; 
    }
    
    /* 3x3 關卡網格 */
    .map-container { 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 24px; 
      padding: 30px; 
    }
    
    /* 關卡節點 */
    .level-node { 
      width: 100px; height: 100px; 
      background: white; 
      border: 5px solid #0F2027; 
      border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 28px; font-weight: 900; 
      box-shadow: 0 6px 0 #3498DB; 
      cursor: pointer; transition: all 0.3s; 
      text-decoration: none; color: #0F2027; 
      position: relative;
    }
    .level-node::after {
      content: "";
      position: absolute;
      top: 15px;
      left: 18px;
      width: 20px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      transform: rotate(-24deg);
      pointer-events: none;
    }
    .level-node:hover:not(.locked) { 
      transform: rotate(5deg) scale(1.1); 
      background: #5DADE2; 
      color: white; 
    }
    .level-node.locked { 
      background: #e2e8f0; color: #94a3b8; 
      cursor: not-allowed; 
      box-shadow: 0 6px 0 #cbd5e1; 
      border-color: #cbd5e1; 
    }

    #auth-gate { position: fixed; inset: 0; background: rgba(240, 248, 255, 0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 18px; }
    #auth-gate h2 { font-size: 2rem; font-weight: 900; color: #0F2027; }
    #auth-gate p  { color: #0F2027; font-weight: bold; font-size: 1.2rem; }
    @media (min-width: 1024px) { body {zoom: 0.95;} }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
  
  <div id="auth-gate" style="display:none">
    <div style="font-size:4rem">🔐</div>
    <h2>Login Required</h2>
    <p>Please enter the laboratory first!</p>
    <a href="../login.html" class="game-btn btn-blue" style="font-size: 1.2rem; padding: 12px 36px;">Go to Login</a>
  </div>

  <h1 class="game-title mb-7 text-center">Photon Quest</h1>
  
  <div id="quest-map">
    <div class="player-bar mb-5">
      <div class="flex items-center gap-4">
        <div id="player-avatar" class="player-avatar">⚛️</div>
        <div>
          <div id="display-username" class="text-2xl font-black">Scientist</div>
          <div class="text-sm font-bold text-gray-500 uppercase tracking-widest">Quantum Explorer</div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm font-black" style="color:#2980B9">PROGRESS</div>
        <div id="display-level" class="text-4xl font-black">LV. 1</div>
      </div>
    </div>

    <div class="map-container" id="level-grid"></div>

    <div class="flex justify-center gap-6 mt-4">
      <button onclick="playPopThen(() => location.href='../login.html')" class="game-btn btn-blue px-10" style="font-size:18px">HUB</button>
      <button onclick="playPopThen(handleLogout)" class="game-btn btn-red px-10" style="font-size:18px">LOGOUT</button>
      <!-- <button onclick="playPopThen(() => location.href='lab2.html')" class="game-btn btn-green px-10" style="font-size:18px">LAB</button> -->
    </div>
  </div>

  <script>
    const popAudio = new Audio('pop.m4a');
    function playSound(audio) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }
    function playPopThen(callback) {
      playSound(popAudio);
      setTimeout(callback, 120);
    }

    (function initQuestMap() {
      // 測試用：強制設定一個測試帳號，讓你不用登入也能看到畫面 (正式環境請移除)
      if(!sessionStorage.getItem('currentUser')) {
          sessionStorage.setItem('currentUser', 'TestUser');
      }

      const user = sessionStorage.getItem('currentUser');
      showQuestMap(user);
      
      document.addEventListener('click', event => {
        if (event.target.closest('.level-node:not(.locked)')) {
          playSound(popAudio);
        }
      }, true);

      if (!user) {
        document.getElementById('auth-gate').style.display = 'flex';
        return;
      }
    })();

    function showQuestMap(user) {
      const _ml  = parseInt(sessionStorage.getItem('quest_level'));
      const _cl  = parseInt(sessionStorage.getItem('currentLevel'));
      
      // 等級限制在 1 到 9 之間
      const currentLv = Math.min(
        Math.max(
          isNaN(_ml) ? 1 : _ml,
          isNaN(_cl) ? 1 : _cl,
          1
        ), 
        9
      );
      
      document.getElementById('display-username').innerText = user;
      document.getElementById('display-level').innerText    = `LV. ${currentLv}`;
      
      const grid = document.getElementById('level-grid');
      grid.innerHTML = '';
      
      // 產生 1 到 9 關
      for (let i = 1; i <= 9; i++) {
        const node = document.createElement('a');
        node.className = 'level-node';
        node.innerText = i; 
        
        // 判斷是否解鎖
        if (i === 1 || i <= currentLv) {
          node.href = `level${i}.html`;
        } else {
          node.classList.add('locked');
          node.onclick = (e) => {
            e.preventDefault();
            alert('Level Locked! Complete previous experiments first.');
          };
        }
        grid.appendChild(node);
      }
    }

    function handleLogout() {
      sessionStorage.clear();
      window.location.href = '../login.html';
    }
  </script>
</body>
</html>
