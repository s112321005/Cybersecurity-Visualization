<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polarization Basis - Level 2</title>
    <style>
:root {
    --primary-blue: #549FD0;
    --ink: #263238;
    --bg-gradient: linear-gradient(135deg,#E0F2FE 0%,#F5F3FF 50%,#ECFDF5 100%);
    --muted: #667085;
    --paper: #ffffff;
    --line: #d7e3f5;
    --pass: #20a464;
    --block: #d94343;
    --zero: #3d7df2;
    --one: #e55d8b;
    --plus: #f0a92d;
    --minus: #23a9a5;
    --off: #9aa4b2;
}
* { box-sizing: border-box; }
body {
    font-family: "Segoe UI", "Noto Sans TC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 34px 18px;
    background: var(--bg-gradient);
    color: var(--ink);
    margin: 0;
}
.header {
    width: min(1080px, 95vw);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 20px;
    animation: fadeIn 0.65s ease-out both;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.btn-back {
    width: 40px;
    height: 40px;
    background-color: var(--primary-blue);
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    transition: transform 0.2s;
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.btn-back::before {
    content: "";
    width: 0;
    height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-right: 11px solid currentColor;
    margin-left: -2px;
}
.btn-back:hover { transform: scale(1.1); }
.page-title {
    border: 2px solid var(--primary-blue);
    color: #07152e;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 20px;
    font-weight: 800;
    background: white;
    white-space: nowrap;
}
.header-center {
    flex: 1;
    text-align: center;
    font-weight: 800;
    font-size: 1.15rem;
}
.main-card {
    width: min(1080px, 95vw);
    height: 710px;
    min-height: 710px;
    border: 3px solid var(--primary-blue);
    border-radius: 28px;
    position: relative;
    background: var(--paper);
    overflow: hidden;
    padding: 18px;
    animation: fadeIn 0.75s ease-out both;
}
.game-shell {
    display: grid;
    grid-template-columns: 340px minmax(560px, 1fr);
    gap: 18px;
    height: 100%;
    min-height: 0;
}
.panel {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fbfdff;
    padding: 14px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.level-kicker {
    color: var(--primary-blue);
    font-weight: 950;
    font-size: 0.9rem;
    margin-bottom: 8px;
}
.question {
    margin: 0 0 12px;
    color: #17345f;
    font-size: 1.18rem;
    line-height: 1.35;
    font-weight: 950;
}
.scenario-card {
    display: grid;
    grid-template-columns: 1fr 56px 1fr;
    gap: 8px;
    align-items: center;
    border: 1px solid var(--line);
    background: white;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 12px;
}
.scenario-item {
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    color: #334155;
    font-weight: 900;
    text-align: center;
}
.scenario-arrow {
    color: var(--primary-blue);
    font-size: 2rem;
    font-weight: 950;
    text-align: center;
}
.state-symbol {
    width: 62px;
    height: 62px;
}
.filter-stack {
    display: flex;
    justify-content: center;
    gap: 6px;
}
.filter-icon {
    width: 52px;
    height: 64px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 5px 8px rgba(16,48,91,0.12));
}
.filter-stack .filter-icon {
    width: 42px;
    height: 56px;
}
.photon-glyph {
    position: relative;
    border-radius: 50%;
    border: 2px solid color-mix(in srgb,var(--color) 72%,white);
    background: radial-gradient(circle,#fff 0 45%, color-mix(in srgb,var(--color) 18%,transparent) 46% 100%);
    box-shadow: 0 0 18px color-mix(in srgb,var(--color) 32%,transparent);
    display: grid;
    place-items: center;
    --color: var(--one);
    --angle: 0deg;
}
.photon-glyph::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 6px solid color-mix(in srgb,var(--color) 22%,white);
}
.photon-glyph::after {
    content: attr(data-symbol);
    position: absolute;
    left: 50%;
    bottom: -25px;
    transform: translateX(-50%);
    color: #5b6470;
    font-size: 0.92rem;
    font-weight: 950;
}
.polar-arrow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 12px;
    height: 38px;
    border-radius: 999px;
    background: var(--color);
    transform: translate(-50%, -50%) rotate(var(--angle));
    box-shadow: 0 0 10px color-mix(in srgb,var(--color) 42%,transparent);
    z-index: 2;
}
.polar-arrow::before,
.polar-arrow::after {
    content: "";
    position: absolute;
    left: 50%;
    width: 0;
    height: 0;
    transform: translateX(-50%);
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
}
.polar-arrow::before {
    top: -10px;
    border-bottom: 15px solid var(--color);
}
.polar-arrow::after {
    bottom: -10px;
    border-top: 15px solid var(--color);
}
.choice-block { margin-bottom: 12px; }
.choice-title {
    margin: 0 0 7px;
    font-size: 0.94rem;
    font-weight: 950;
    color: #475569;
}
.choice-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.choice-row.three,
.choice-row.outputs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.choice-btn {
    appearance: none;
    border: 2px solid #d7e3f5;
    border-radius: 12px;
    background: white;
    color: #263238;
    min-height: 48px;
    padding: 8px 10px;
    font-weight: 950;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(31,67,107,0.06);
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}
.choice-btn:hover { transform: translateY(-2px); border-color: #94b9ee; }
.choice-btn.active { border-color: var(--primary-blue); background: #edf5ff; box-shadow: 0 8px 22px rgba(0,74,173,0.14); }
.choice-btn.correct { border-color: var(--pass); background: #f0fff5; }
.choice-btn.wrong { border-color: var(--block); background: #fff3f3; }
.feedback {
    min-height: 54px;
    margin-top: auto;
    padding: 10px 12px;
    border-radius: 12px;
    background: #eef7ff;
    color: #17345f;
    font-weight: 850;
    line-height: 1.35;
}
.feedback.good { background: #effff4; color: #14783e; }
.feedback.bad { background: #fff1f1; color: #9e2626; }
.game-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
}
.action-btn {
    border: 0;
    border-radius: 999px;
    background: var(--primary-blue);
    color: white;
    padding: 10px 14px;
    font-weight: 950;
    cursor: pointer;
}
.action-btn.secondary {
    background: #eaf3fb;
    color: var(--primary-blue);
    border: 2px solid var(--primary-blue);
}
.stage {
    position: relative;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    border: 1px solid #dfe8f5;
    border-radius: 16px;
    background:
        linear-gradient(90deg, rgba(0,74,173,0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0,74,173,0.05) 1px, transparent 1px),
        #ffffff;
    background-size: 42px 42px;
}
.result-badge {
    position: absolute;
    left: 51%;
    top: calc(38% - 108px);
    transform: translateX(-50%);
    z-index: 8;
    min-width: 96px;
    text-align: center;
    border-radius: 999px;
    padding: 9px 14px;
    color: white;
    font-weight: 950;
    background: var(--pass);
    box-shadow: 0 8px 24px rgba(32,164,100,0.24);
}
.result-badge.blocked { background: var(--block); box-shadow: 0 8px 24px rgba(217,67,67,0.22); }
.result-badge.split { background: var(--primary-blue); box-shadow: 0 8px 24px rgba(84,159,208,0.22); }
.beam-wrap { position: absolute; inset: 0; pointer-events: none; }
.source {
    position: absolute;
    left: 68px;
    top: 38%;
    width: 78px;
    height: 78px;
    transform: translateY(-50%);
    z-index: 3;
}
.filter-stand {
    position: absolute;
    left: 50%;
    top: 38%;
    width: 138px;
    transform: translate(-50%, -49%);
    z-index: 3;
    filter: drop-shadow(0 12px 18px rgba(16,48,91,0.18));
}
.filter-stand img { width: 100%; height: auto; display: block; }
.second-filter { display: none; left: calc(50% + 104px); width: 116px; opacity: 0.86; }
.dual-filter .primary-filter { left: calc(50% - 62px); }
.dual-filter .second-filter { display: block; }
.photon-dot {
    position: absolute;
    left: 103px;
    top: 38%;
    width: 18px;
    height: 18px;
    margin: -9px 0 0 -9px;
    border-radius: 50%;
    background: var(--beam-color);
    box-shadow: 0 0 18px var(--beam-color), 0 0 30px color-mix(in srgb,var(--beam-color) 52%,transparent);
    animation: photonPass 4s linear infinite;
    z-index: 5;
}
.blocked .photon-dot { animation-name: photonBlock; }
.beam {
    position: absolute;
    top: 38%;
    height: 8px;
    border-radius: 999px;
    transform: translateY(-50%);
    background: linear-gradient(90deg, transparent, var(--beam-color), transparent);
    opacity: 0.74;
}
.beam.in { left: 136px; right: calc(50% + 76px); }
.beam.mid {
    left: calc(50% - 4px);
    right: calc(50% - 122px);
    opacity: 0;
}
.beam.out {
    left: calc(50% + 78px);
    right: 118px;
    opacity: 0;
    background: linear-gradient(90deg, transparent, var(--pass-color), transparent);
}
.dual-filter .beam.out { left: calc(50% + 166px); }
.passed .beam.out,
.dual-filter.passed .beam.mid { animation: outputBeam 4s linear infinite; }
.split-source {
    position: absolute;
    left: calc(50% + 126px);
    top: var(--split-top);
    width: 58px;
    height: 58px;
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
    z-index: 5;
}
.split-source::after {
    bottom: -22px;
    font-size: 0.82rem;
}
.split-a {
    --split-top: 30%;
    --color: var(--split-block-color);
    filter: grayscale(0.15);
}
.split-b {
    --split-top: 46%;
    --color: var(--pass-color);
}
.split-label {
    position: absolute;
    left: calc(50% + 178px);
    top: var(--split-top);
    transform: translateY(-50%) scale(0.3);
    min-width: 74px;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--line);
    color: #17345f;
    font-weight: 950;
    font-size: 0.78rem;
    text-align: center;
    opacity: 0;
    z-index: 6;
    box-shadow: 0 6px 16px rgba(0,42,100,0.08);
}
.split-label-a { --split-top: 30%; }
.split-label-b { --split-top: 46%; }
.split-mode .split-source,
.split-mode .split-label { animation: splitPop 4s linear infinite; }
.block-flash {
    position: absolute;
    left: 50%;
    top: 38%;
    width: 64px;
    height: 64px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 4px solid rgba(217,67,67,0.68);
    opacity: 0;
    z-index: 6;
}
.dual-filter .block-flash { left: calc(50% - 62px); }
.block-flash::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 8px;
    height: 62px;
    border-radius: 999px;
    background: rgba(217,67,67,0.82);
    transform: translate(-50%, -50%) rotate(-45deg);
    box-shadow: 0 0 12px rgba(217,67,67,0.32);
}
.blocked .block-flash { animation: blockFlash 4s linear infinite; }
.detector {
    position: absolute;
    right: 58px;
    top: 38%;
    width: 90px;
    height: 90px;
    transform: translateY(-50%);
    border-radius: 50%;
    background: transparent;
    z-index: 3;
}
.detector-source {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 78px;
    height: 78px;
    transform: translate(-50%, -50%) scale(0.55);
    opacity: 0;
    z-index: 2;
    --color: var(--detector-color);
}
.passed .detector-source { animation: detectorAppear 4s linear infinite; }
.explain-card {
    position: absolute;
    left: 70px;
    right: 70px;
    bottom: 48px;
    min-height: 86px;
    padding: 16px 18px;
    border-radius: 16px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(215,227,245,0.95);
    color: #334155;
    font-weight: 850;
    line-height: 1.45;
    z-index: 7;
    box-shadow: 0 10px 24px rgba(0,42,100,0.08);
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes photonPass {
    0% { left: 103px; transform: scale(0.7); opacity: 0; }
    10% { opacity: 1; }
    50% { left: 50%; transform: scale(1); opacity: 1; }
    90% { left: calc(100% - 106px); transform: scale(1); opacity: 1; }
    100% { left: calc(100% - 106px); transform: scale(1); opacity: 0; }
}
@keyframes photonBlock {
    0% { left: 103px; transform: scale(0.7); opacity: 0; }
    12% { opacity: 1; }
    50% { left: 50%; transform: scale(1); opacity: 1; }
    64%, 100% { left: 50%; transform: scale(0.08); opacity: 0; }
}
@keyframes blockFlash {
    0%, 50%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    58% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
    78% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
    88% { opacity: 0; transform: translate(-50%, -50%) scale(1.55); }
}
@keyframes splitPop {
    0%, 50% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    60%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
@keyframes outputBeam {
    0%, 50% { opacity: 0; }
    60%, 100% { opacity: 0.82; }
}
@keyframes detectorAppear {
    0%, 89% { opacity: 0; transform: translate(-50%, -50%) scale(0.45); }
    90%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
@media (max-width: 1180px) {
    .header { flex-wrap: wrap; }
    .header-center { order: 3; flex-basis: 100%; }
    .game-shell { grid-template-columns: 1fr; }
    .main-card { height: auto; min-height: auto; }
    .stage { min-height: 520px; }
    .panel { min-height: auto; }
}
@media (max-width: 640px) {
    body { padding: 18px 10px; }
    .page-title { padding: 9px 14px; font-size: 17px; }
    .header-center { font-size: 1rem; }
    .main-card { padding: 12px; border-radius: 20px; }
    .choice-row.outputs,
    .choice-row.three { grid-template-columns: 1fr; }
    .scenario-card { grid-template-columns: 1fr; }
    .scenario-arrow { transform: rotate(90deg); }
    .source { left: 32px; width: 64px; height: 64px; }
    .filter-stand { width: 104px; }
    .detector { right: 28px; width: 72px; height: 72px; }
    .explain-card { left: 12px; right: 12px; bottom: 24px; }
}

.tutorial-photon {
    position: relative;
    border-radius: 50%;
    border: 2px solid color-mix(in srgb,var(--beam-color) 72%,white);
    background: radial-gradient(circle, #ffffff 0 47%, color-mix(in srgb,var(--beam-color) 28%,transparent) 48% 54%, transparent 55% 100%);
    box-shadow: 0 0 18px color-mix(in srgb,var(--beam-color) 38%,transparent);
    display: grid;
    place-items: center;
    --beam-color: var(--minus);
    --state-angle: -45deg;
}
.tutorial-photon::before {
    content: "";
    position: absolute;
    inset: 11px;
    border-radius: 50%;
    border: 6px solid color-mix(in srgb,var(--beam-color) 22%,white);
}
.tutorial-photon::after {
    content: attr(data-symbol);
    position: absolute;
    left: 50%;
    bottom: -25px;
    transform: translateX(-50%);
    color: #5b6470;
    font-size: 0.92rem;
    font-weight: 950;
}
.tutorial-photon.hide-symbol::after {
    display: none;
}
.tutorial-photon > span {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 16px;
    height: 48px;
    background: var(--beam-color);
    transform: translate(-50%, -50%) rotate(var(--state-angle));
    box-shadow: 0 0 10px var(--beam-color);
    clip-path: polygon(50% 0,100% 18%,72% 18%,72% 82%,100% 82%,50% 100%,0 82%,28% 82%,28% 18%,0 18%);
    z-index: 2;
}
.choice-photon {
    width: 82px;
    height: 82px;
    margin: 4px auto 26px;
}

.level-three-card {
    height: 710px;
    min-height: 710px;
}
.level-three-shell {
    display: grid;
    grid-template-columns: minmax(560px, 1fr) 320px;
    gap: 18px;
    height: 100%;
    min-height: 0;
}
.level-three-panel {
    border: 5px solid var(--ink);
    border-radius: 24px;
    background:
        radial-gradient(circle at 20% 18%, rgba(255,216,77,0.22), transparent 28%),
        radial-gradient(circle at 86% 78%, rgba(229,93,139,0.16), transparent 30%),
        #fbfdff;
    padding: 18px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 10px 10px 0 color-mix(in srgb,var(--primary-blue) 52%,white);
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.level-three-panel.waiting {
    opacity: 1;
    transform: translateX(0) scale(1);
    pointer-events: none;
}
.level-three-panel.ready {
    opacity: 1;
    transform: translateX(0) scale(1);
    animation: choicesPop 0.36s ease-out both;
}
.level-badge-static {
    align-self: flex-start;
    border: 4px solid var(--ink);
    border-radius: 999px;
    background: #ffffff;
    color: var(--ink);
    padding: 10px 16px;
    font-weight: 950;
    box-shadow: 0 6px 0 var(--primary-blue);
    margin-bottom: 14px;
}
.level-three-options {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin: 16px 0;
}
.option-tile {
    appearance: none;
    border: 5px solid var(--ink);
    border-radius: 32px;
    background:
        linear-gradient(180deg, #ffffff 0%, #f8fcff 100%);
    color: #263238;
    min-height: 178px;
    padding: 14px;
    font-weight: 950;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    box-shadow: 0 8px 0 var(--primary-blue), 0 16px 24px rgba(31,67,107,0.1);
    position: relative;
    top: 0;
    transition: transform 0.16s ease, box-shadow 0.16s ease, top 0.12s ease, background 0.16s ease;
}
.option-tile strong {
    display: block;
    color: var(--ink);
    font-size: 1.2rem;
    font-weight: 950;
    margin-bottom: 12px;
}
.option-tile:hover {
    transform: translateY(-5px) rotate(-2deg) scale(1.03);
    box-shadow: 0 13px 0 var(--primary-blue), 0 20px 30px rgba(31,67,107,0.14);
}
.option-tile:active {
    top: 5px;
    box-shadow: 0 3px 0 var(--primary-blue), 0 8px 18px rgba(31,67,107,0.1);
}
.option-tile.active {
    background: #edf5ff;
    box-shadow: 0 8px 0 var(--plus), 0 14px 24px rgba(0,74,173,0.14);
}
.option-tile.correct { background: #f0fff5; box-shadow: 0 8px 0 var(--pass), 0 14px 24px rgba(32,164,100,0.14); }
.option-tile.wrong { background: #fff3f3; box-shadow: 0 8px 0 var(--block), 0 14px 24px rgba(217,67,67,0.14); }
.option-tile:disabled {
    cursor: default;
}
.option-tile > span:last-child {
    color: #334155;
    font-size: 1rem;
}
.next-level-btn {
    margin-top: auto;
    appearance: none;
    border: 5px solid var(--ink);
    border-radius: 999px;
    background: var(--primary-blue);
    color: white;
    min-height: 58px;
    padding: 12px 18px;
    font-weight: 950;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--ink), 0 16px 24px rgba(31,67,107,0.1);
    position: relative;
    top: 0;
    transition: transform 0.16s ease, box-shadow 0.16s ease, top 0.12s ease;
}
.next-level-btn:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 12px 0 var(--ink), 0 20px 30px rgba(31,67,107,0.14);
}
.next-level-btn:active {
    top: 5px;
    box-shadow: 0 3px 0 var(--ink), 0 8px 18px rgba(31,67,107,0.1);
}
.block-choice-icon {
    position: relative;
    width: 82px;
    height: 82px;
    border-radius: 50%;
    border: 5px solid #111111;
    background: rgba(255,255,255,0.92);
    box-shadow: 0 0 18px rgba(17,17,17,0.12);
}
.block-choice-icon::before,
.block-choice-icon::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 9px;
    height: 66px;
    border-radius: 999px;
    background: #111111;
    box-shadow: 0 0 12px rgba(17,17,17,0.18);
}
.block-choice-icon::before { transform: translate(-50%, -50%) rotate(45deg); }
.block-choice-icon::after { transform: translate(-50%, -50%) rotate(-45deg); }
.level-three-stage {
    position: relative;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    border: 5px solid var(--ink);
    border-radius: 24px;
    background:
        linear-gradient(90deg, rgba(0,74,173,0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0,74,173,0.05) 1px, transparent 1px),
        #ffffff;
    background-size: 42px 42px, 42px 42px, auto;
    box-shadow: 10px 10px 0 color-mix(in srgb,var(--minus) 38%,white);
}
.level-top-btn {
    position: relative;
    top: 0;
    border: 4px solid var(--ink);
    border-radius: 999px;
    background: #ffffff;
    color: var(--ink);
    padding: 10px 16px;
    font-weight: 950;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--primary-blue);
    transition: transform 0.16s ease, box-shadow 0.16s ease, top 0.12s ease;
}
.level-top-btn:hover {
    transform: translateY(-3px) scale(1.03);
    background: var(--primary-blue);
    color: white;
    box-shadow: 0 9px 0 var(--ink);
}
.level-top-btn:active {
    top: 4px;
    box-shadow: 0 2px 0 var(--ink);
}
.level-three-scene {
    position: absolute;
    left: 52px;
    right: 52px;
    top: 38%;
    height: 160px;
    transform: translateY(-50%);
}
.level-three-scene .tutorial-photon {
    position: absolute;
    left: 0;
    top: 50%;
    width: 92px;
    height: 92px;
    transform: translateY(-50%);
    z-index: 6;
}
.level-three-beam {
    position: absolute;
    left: 82px;
    width: calc(50% - 82px);
    top: 50%;
    height: 8px;
    border-radius: 999px;
    transform: translateY(-50%);
    background: linear-gradient(90deg, transparent, var(--minus));
    opacity: 0;
    z-index: 7;
}
.intro-animation .level-three-beam {
    animation: levelThreeBeamIntro 1.7s linear forwards;
}
.finish-animation .level-three-beam {
    opacity: 0.82;
}
.level-three-beam-after {
    position: absolute;
    left: 50%;
    width: calc(100% - 50% - 74px);
    top: 50%;
    height: 8px;
    border-radius: 999px;
    transform: translateY(-50%);
    background: linear-gradient(90deg, var(--minus), transparent);
    opacity: 0;
    z-index: 7;
}
.will-pass .finish-animation .level-three-beam-after {
    animation: levelThreeBeamFinish 2.4s linear forwards;
}
.level-three-dot {
    position: absolute;
    left: 46px;
    top: 50%;
    width: 18px;
    height: 18px;
    margin: -9px 0 0 -9px;
    border-radius: 50%;
    background: var(--minus);
    box-shadow: 0 0 18px var(--minus), 0 0 30px color-mix(in srgb,var(--minus) 52%,transparent);
    opacity: 0;
    z-index: 8;
}
.result-placeholder {
    position: absolute;
    left: calc(100% - 74px);
    top: 50%;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 4px dashed rgba(38,50,56,0.82);
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.2);
    z-index: 10;
    pointer-events: none;
}
.will-block .result-placeholder {
    left: 50%;
}
.level-three-scene .passed-photon {
    position: absolute;
    left: calc(100% - 74px);
    top: 50%;
    width: 82px;
    height: 82px;
    transform: translate(-50%, -50%) scale(0.35);
    opacity: 0;
    z-index: 9;
}
.will-pass .finish-animation .passed-photon {
    animation: passedPhotonAppear 0.5s ease-out 1.85s forwards;
}
.intro-animation .level-three-dot {
    animation: levelThreePhotonIntro 1.7s linear forwards;
}
.will-pass .finish-animation .level-three-dot {
    animation: levelThreePhotonFinish 2.4s linear forwards;
}
.will-block .finish-animation .level-three-dot {
    animation: levelThreePhotonBlock 1.15s linear forwards;
}
.level-three-filter,
.level-filter {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 138px;
    transform: translate(-50%, -49%);
    filter: none;
    z-index: 5;
}
.level-three-filter img,
.level-filter img {
    width: 100%;
    height: auto;
    display: block;
}
.level-filter.second {
    left: calc(50% + 122px);
    width: 116px;
    opacity: 0.92;
}
.level-block-mark {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 5px solid #111111;
    transform: translate(-50%, -50%) scale(0.35);
    opacity: 0;
    z-index: 9;
    background: rgba(255,255,255,0.7);
}
.level-block-mark::before,
.level-block-mark::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 9px;
    height: 58px;
    border-radius: 999px;
    background: #111111;
}
.level-block-mark::before { transform: translate(-50%, -50%) rotate(45deg); }
.level-block-mark::after { transform: translate(-50%, -50%) rotate(-45deg); }
.will-block .finish-animation .level-block-mark {
    animation: levelBlockPop 0.5s ease-out 0.55s forwards;
}
.level-three-stage .explain-card {
    position: absolute;
    left: 70px;
    right: 70px;
    bottom: 48px;
}
.result-pop {
    position: absolute;
    left: 50%;
    top: 70%;
    transform: translate(-50%, -50%) scale(0.7);
    z-index: 14;
    min-width: 170px;
    padding: 16px 24px;
    border: 5px solid var(--ink);
    border-radius: 28px;
    background: white;
    color: var(--ink);
    font-size: 1.55rem;
    font-weight: 950;
    text-align: center;
    box-shadow: 0 9px 0 var(--primary-blue), 0 18px 30px rgba(31,67,107,0.16);
    opacity: 0;
    pointer-events: none;
}
.result-pop.show {
    opacity: 1;
    animation: resultPop 0.35s ease-out both;
}
.result-pop.good {
    box-shadow: 0 9px 0 var(--pass), 0 18px 30px rgba(31,67,107,0.16);
}
.result-pop.bad {
    box-shadow: 0 9px 0 var(--block), 0 18px 30px rgba(31,67,107,0.16);
}
.level-modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(7,21,46,0.28);
    backdrop-filter: blur(4px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
}
.level-modal-overlay.show {
    opacity: 1;
    visibility: visible;
}
.level-modal-card {
    width: min(340px, 82%);
    border: 5px solid #ddd;
    border-radius: 28px;
    background: white;
    padding: 30px 28px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.24);
    transform: scale(0.78) translateY(20px);
    transition: transform 0.38s cubic-bezier(0.175,0.885,0.32,1.275);
}
.level-modal-overlay.show .level-modal-card {
    transform: scale(1) translateY(0);
}
.level-modal-card.success { border-color: var(--pass); }
.level-modal-card.error { border-color: var(--block); }
.level-modal-icon {
    width: 78px;
    height: 78px;
    margin: 0 auto 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 3rem;
    font-weight: 950;
    box-shadow: 0 4px 15px rgba(0,0,0,0.12);
}
.level-modal-card.success .level-modal-icon {
    background: var(--pass);
    box-shadow: 0 0 20px rgba(32,164,100,0.38);
}
.level-modal-card.error .level-modal-icon {
    background: var(--block);
    box-shadow: 0 0 20px rgba(217,67,67,0.38);
}
.level-modal-title {
    margin: 0 0 22px;
    font-size: 2rem;
    font-weight: 950;
}
.level-modal-card.success .level-modal-title { color: var(--pass); }
.level-modal-card.error .level-modal-title { color: var(--block); }
.level-modal-btn {
    border: 0;
    border-radius: 999px;
    padding: 12px 34px;
    color: white;
    font-size: 1rem;
    font-weight: 950;
    cursor: pointer;
    background: var(--primary-blue);
    box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.level-modal-card.success .level-modal-btn { background: var(--pass); }
.level-modal-card.error .level-modal-btn { background: var(--block); }
.level-modal-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 7px 16px rgba(0,0,0,0.2);
}

@media (max-width: 1180px) {
    .level-three-card {
        height: auto;
        min-height: auto;
    }
    .level-three-shell {
        grid-template-columns: 1fr;
    }
    .level-three-stage {
        min-height: 520px;
    }
}

@keyframes levelThreePhotonIntro {
    0% { left: 46px; transform: scale(0.7); opacity: 0; }
    10% { opacity: 1; }
    80% { left: calc(50% - 8px); transform: scale(1); opacity: 1; }
    100% { left: 50%; transform: scale(1.05); opacity: 1; }
}

@keyframes levelThreePhotonFinish {
    0% { left: 50%; transform: scale(1.05); opacity: 1; }
    16% { left: calc(50% + 16px); transform: scale(1); opacity: 1; }
    86% { left: calc(100% - 74px); transform: scale(1); opacity: 1; }
    100% { left: calc(100% - 74px); transform: scale(0.9); opacity: 0; }
}

@keyframes levelThreePhotonBlock {
    0% { left: 50%; transform: scale(1.05); opacity: 1; }
    45% { left: 50%; transform: scale(1.12); opacity: 1; }
    100% { left: 50%; transform: scale(0.08); opacity: 0; }
}

@keyframes levelThreeBeamIntro {
    0%, 18% { opacity: 0.24; }
    50%, 100% { opacity: 0.82; }
}

@keyframes levelThreeBeamFinish {
    0% { opacity: 0; }
    18%, 100% { opacity: 0.82; }
}

@keyframes levelBlockPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
    72% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

@keyframes passedPhotonAppear {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.35); }
    72% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

@keyframes resultPop {
    0% { transform: translate(-50%, -50%) scale(0.7) rotate(-3deg); }
    70% { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
}

@keyframes choicesPop {
    0% { opacity: 0; transform: translateX(28px) scale(0.92) rotate(2deg); }
    72% { opacity: 1; transform: translateX(-4px) scale(1.03) rotate(-1deg); }
    100% { opacity: 1; transform: translateX(0) scale(1) rotate(0deg); }
}

@media (max-width: 640px) {
    .level-three-options {
        grid-template-columns: 1fr;
    }
    .level-three-scene {
        left: 26px;
        right: 26px;
    }
    .level-three-scene .tutorial-photon {
        width: 72px;
        height: 72px;
    }
    .level-three-beam {
        left: 64px;
        width: calc(50% - 64px);
    }
    .level-three-beam-after {
        width: calc(100% - 50% - 52px);
    }
    .level-three-filter {
        width: 104px;
    }
    .level-three-stage .explain-card {
        left: 12px;
        right: 12px;
        bottom: 24px;
    }
}

    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="btn-back" title="Back to levels"></a>
            <div class="page-title">Level2</div>
        </div>
        <div class="header-center">Photon Direction & Polarizer Game</div>
    </div>
    <main class="main-card" data-level-page="2"></main>
    <script>
const photonTypes = {
    vertical: { symbol: "1", label: "|1>", angle: "0deg", color: "var(--one)" },
    horizontal: { symbol: "0", label: "|0>", angle: "90deg", color: "var(--zero)" },
    diagRight: { symbol: "+", label: "|+>", angle: "45deg", color: "var(--plus)" },
    diagLeft: { symbol: "-", label: "|->", angle: "-45deg", color: "var(--minus)" }
};

const filterTypes = {
    vertical: { label: "Vertical", image: "pictures/vertical.svg" },
    diagonal: { label: "Diagonal", image: "https://s112321005.github.io/Cybersecurity-Visualization/pictures/b_diagonal.svg" }
};

const levels = [
    { photon: "vertical", filters: ["vertical"], pass: "pass", output: "vertical" },
    { photon: "horizontal", filters: ["vertical"], pass: "block", output: "none" },
    { photon: "diagLeft", filters: ["diagonal"], pass: "pass", output: "diagLeft" },
    { photon: "diagRight", filters: ["diagonal"], pass: "block", output: "none" },
    { photon: "diagRight", filters: ["vertical"], pass: "split", output: "splitVertical", splitPass: "vertical", splitBlock: "horizontal" },
    { photon: "diagLeft", filters: ["vertical"], pass: "split", output: "splitVertical", splitPass: "vertical", splitBlock: "horizontal" },
    { photon: "horizontal", filters: ["diagonal"], pass: "split", output: "splitDiagonal", splitPass: "diagLeft", splitBlock: "diagRight" },
    { photon: "vertical", filters: ["diagonal"], pass: "split", output: "splitDiagonal", splitPass: "diagLeft", splitBlock: "diagRight" },
    { photon: "horizontal", filters: ["vertical", "diagonal"], pass: "block", output: "none" }
];

const page = document.querySelector("[data-level-page]");
const levelIndex = Math.max(0, Number(page.dataset.levelPage || 1) - 1);
const level = levels[levelIndex] || levels[0];
const levelFiles = ["level1.html", "level2.html", "level3.html", "level4.html", "level5.html", "level6.html", "level7.html", "level8.html", "level9.html"];

function photonMarkup(id = "", extraClass = "") {
    return `<div class="tutorial-photon ${extraClass}" ${id ? `id="${id}"` : ""}><span></span></div>`;
}

function setPhoton(el, state) {
    const photon = photonTypes[state];
    el.dataset.symbol = photon.symbol;
    el.style.setProperty("--beam-color", photon.color);
    el.style.setProperty("--state-angle", photon.angle);
}

function renderLevel() {
    const levelNo = levelIndex + 1;
    const photon = photonTypes[level.photon];
    const passState = level.splitPass || level.output || level.photon;
    const passPhoton = photonTypes[passState] || photon;
    const correctAnswer = level.pass === "block" ? "none" : "pass";
    const doesLightContinue = level.pass !== "block";
    const filtersMarkup = level.filters.map((filterName, index) => {
        const filter = filterTypes[filterName];
        return `<div class="level-filter ${index > 0 ? "second" : ""}"><img src="${filter.image}" alt=""></div>`;
    }).join("");

    page.classList.add("level-three-card");
    page.innerHTML = `
        <section class="level-three-shell">
            <section class="level-three-stage ${doesLightContinue ? "will-pass" : "will-block"}">
                <div class="level-three-scene">
                    ${photonMarkup("levelPhoton", "hide-symbol")}
                    <div class="level-three-beam"></div>
                    <div class="level-three-beam-after"></div>
                    <div class="level-three-dot"></div>
                    <span class="result-placeholder"></span>
                    ${photonMarkup("passedPhoton", "passed-photon hide-symbol")}
                    ${filtersMarkup}
                    <span class="level-block-mark"></span>
                </div>
                <div class="level-modal-overlay" id="levelResultModal">
                    <div class="level-modal-card" id="levelModalCard">
                        <div class="level-modal-icon" id="levelModalIcon">!</div>
                        <h2 class="level-modal-title" id="levelModalTitle">Correct!</h2>
                        <button class="level-modal-btn" id="levelModalBtn" type="button">OK</button>
                    </div>
                </div>
            </section>

            <aside class="level-three-panel ready" id="levelPanel">
                <div class="level-badge-static">Level ${levelNo}</div>
                <h1 class="question">Pick one!</h1>

                <div class="level-three-options">
                    <button class="option-tile" type="button" data-answer="pass" aria-label="light passes">
                        <strong>PASS</strong>
                        ${photonMarkup("", "choice-photon hide-symbol")}
                    </button>
                    <button class="option-tile" type="button" data-answer="none" aria-label="blocked">
                        <strong>BLOCK</strong>
                        <span class="block-choice-icon"></span>
                    </button>
                </div>
                <button class="next-level-btn" id="nextLevelBtn" type="button">Next Level</button>
            </aside>
        </section>
    `;

    setPhoton(document.getElementById("levelPhoton"), level.photon);
    setPhoton(document.getElementById("passedPhoton"), passState);
    document.querySelectorAll(".choice-photon").forEach((el) => setPhoton(el, passState));

    let selected = null;
    let isAnimating = false;
    let isReady = false;
    let introTimer = null;
    let delayTimer = null;
    let resultTimer = null;
    const scene = document.querySelector(".level-three-scene");
    const panel = document.getElementById("levelPanel");
    const levelResultModal = document.getElementById("levelResultModal");
    const levelModalCard = document.getElementById("levelModalCard");
    const levelModalIcon = document.getElementById("levelModalIcon");
    const levelModalTitle = document.getElementById("levelModalTitle");

    function setOptionDisabled(disabled) {
        document.querySelectorAll(".option-tile").forEach((item) => {
            item.disabled = disabled;
        });
    }

    function startIntro() {
        selected = null;
        isReady = false;
        isAnimating = true;
        setOptionDisabled(true);
        levelResultModal.classList.remove("show");
        scene.classList.remove("intro-animation", "finish-animation");
        document.querySelectorAll(".option-tile").forEach((item) => {
            item.classList.remove("active", "correct", "wrong");
        });
        void scene.offsetWidth;
        scene.classList.add("intro-animation");
        introTimer = window.setTimeout(() => {
            isReady = true;
            isAnimating = false;
            panel.classList.add("ready");
            setOptionDisabled(false);
        }, 1800);
    }

    function showResultModal(correct) {
        levelModalCard.className = `level-modal-card ${correct ? "success" : "error"}`;
        levelModalIcon.innerHTML = correct ? "&#10003;" : "!";
        levelModalTitle.textContent = correct ? "Correct!" : "Incorrect!";
        levelResultModal.classList.add("show");
    }

    function returnToChoice() {
        selected = null;
        isReady = true;
        isAnimating = false;
        if (delayTimer) window.clearTimeout(delayTimer);
        if (resultTimer) window.clearTimeout(resultTimer);
        delayTimer = null;
        resultTimer = null;
        levelResultModal.classList.remove("show");
        scene.classList.remove("finish-animation");
        setOptionDisabled(false);
        document.querySelectorAll(".option-tile").forEach((item) => {
            item.classList.remove("active", "correct", "wrong");
        });
    }

    document.querySelectorAll(".option-tile").forEach((btn) => {
        btn.addEventListener("click", () => {
            if (isAnimating || !isReady) return;
            selected = btn.dataset.answer;
            isAnimating = true;
            isReady = false;
            document.querySelectorAll(".option-tile").forEach((item) => {
                item.classList.toggle("active", item === btn);
            });
            setOptionDisabled(true);
            scene.classList.remove("finish-animation");

            delayTimer = window.setTimeout(() => {
                void scene.offsetWidth;
                scene.classList.add("finish-animation");

                resultTimer = window.setTimeout(() => {
                    const correct = selected === correctAnswer;
                    document.querySelectorAll(".option-tile").forEach((item) => {
                        item.classList.toggle("correct", item.dataset.answer === correctAnswer && correct);
                        item.classList.toggle("wrong", item === btn && !correct);
                    });
                    showResultModal(correct);
                    isAnimating = false;
                }, 2400);
            }, 500);
        });
    });

    document.getElementById("levelModalBtn").addEventListener("click", returnToChoice);
    document.getElementById("nextLevelBtn").addEventListener("click", () => {
        window.location.href = levelFiles[levelIndex + 1] || "index.html";
    });
    startIntro();
}

renderLevel();

    </script>
</body>
</html>
